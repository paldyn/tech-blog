<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Loose 오브젝트 vs Pack 파일</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">.git/objects/ 저장 구조 비교</text>

  <!-- Left: Loose objects -->
  <text x="210" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Loose 오브젝트</text>

  <rect x="60" y="116" width="300" height="260" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  .git/objects/</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">  ├── 8a/</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  │   └── b686e8a729f4…  (blob)</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">  ├── ab/</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  │   └── c123def456…   (tree)</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">  ├── ff/</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  │   └── f000aaa111…   (commit)</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  ├── info/</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  └── pack/             ← pack 저장소</text>

  <!-- Loose characteristics -->
  <rect x="60" y="388" width="300" height="76" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="210" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Loose 특성</text>
  <text x="210" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">zlib deflate 개별 압축</text>
  <text x="210" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">오브젝트 1개 = 파일 1개</text>
  <text x="210" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SHA 앞 2자리 = 디렉터리명</text>

  <!-- Arrow -->
  <line x1="360" y1="244" x2="420" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>
  <text x="390" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git gc</text>

  <!-- Right: Pack file -->
  <text x="660" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Pack 파일</text>

  <rect x="420" y="116" width="400" height="260" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="436" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  .git/objects/pack/</text>
  <text x="436" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">  ├── pack-abc123….pack  ← 오브젝트 데이터</text>
  <text x="436" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">  └── pack-abc123….idx   ← 인덱스 파일</text>
  <text x="436" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">  .pack 구조:</text>
  <text x="436" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  [헤더][오브젝트1][오브젝트2]...</text>
  <text x="436" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">   - FULL 오브젝트: zlib 전체 압축</text>
  <text x="436" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">   - OFS_DELTA: 같은 pack 내 기준 오프셋</text>
  <text x="436" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">   - REF_DELTA: SHA로 참조된 기준 오브젝트</text>
  <text x="436" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">  .idx 구조: SHA → .pack 오프셋 매핑</text>
  <text x="436" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  이진 탐색 O(log n)으로 빠른 조회 가능</text>

  <!-- Pack characteristics -->
  <rect x="420" y="388" width="400" height="76" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Pack 특성</text>
  <text x="620" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">델타 압축: 유사한 오브젝트를 차이만 저장</text>
  <text x="620" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">수천 개 오브젝트를 2~3개 파일로 압축</text>
  <text x="620" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">inode 절약, 전송 시 효율적</text>
</svg>
