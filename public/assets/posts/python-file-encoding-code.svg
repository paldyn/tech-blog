<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">한국어 파일 인코딩 실전 패턴</text>

  <rect x="60" y="68" width="760" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 1. EUC-KR 파일 → UTF-8로 변환</text>
  <text xml:space="preserve" x="78" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">def</tspan> <tspan fill="#55c555">convert_encoding</tspan>(src, dst, from_enc, to_enc):</text>
  <text xml:space="preserve" x="78" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">with</tspan> (<tspan font-weight="600" fill="#7ec8e3">open</tspan>(src, <tspan fill="#ce9178">"r"</tspan>, encoding=from_enc) as fin,</text>
  <text xml:space="preserve" x="78" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          <tspan font-weight="600" fill="#7ec8e3">open</tspan>(dst, <tspan fill="#ce9178">"w"</tspan>, encoding=to_enc) as fout):</text>
  <text xml:space="preserve" x="78" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        fout.write(fin.read())</text>
  <text xml:space="preserve" x="78" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">convert_encoding(<tspan fill="#ce9178">"old.txt"</tspan>, <tspan fill="#ce9178">"new.txt"</tspan>, <tspan fill="#ce9178">"euc-kr"</tspan>, <tspan fill="#ce9178">"utf-8"</tspan>)</text>

  <line x1="78" y1="206" x2="800" y2="206" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2. BOM 있는 UTF-8-SIG (Excel CSV) 처리</text>
  <text xml:space="preserve" x="78" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"excel.csv"</tspan>, encoding=<tspan fill="#ce9178">"utf-8-sig"</tspan>) as f:</text>
  <text xml:space="preserve" x="78" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    content = f.read()   <tspan fill="#9aa4b8"># BOM 자동 제거</tspan></text>

  <line x1="78" y1="282" x2="800" y2="282" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 3. 오류 바이트 무시하고 최대한 읽기</text>
  <text xml:space="preserve" x="78" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"messy.txt"</tspan>, encoding=<tspan fill="#ce9178">"utf-8"</tspan>,</text>
  <text xml:space="preserve" x="78" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          errors=<tspan fill="#ce9178">"replace"</tspan>) as f:</text>
  <text xml:space="preserve" x="78" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    text = f.read()   <tspan fill="#9aa4b8"># 깨진 바이트 → '?'</tspan></text>
</svg>
