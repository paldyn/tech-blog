<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">virtualrowcount 설정과 주의사항</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">rowheight 고정 필수 — 동적 행 높이와 함께 사용 불가</text>

  <!-- Left: XML setting -->
  <rect x="60" y="94" width="360" height="30" fill="#1a1a2e" rx="4"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">XML 속성 설정</text>

  <rect x="60" y="129" width="360" height="228" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">&lt;Grid</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  id=<tspan fill="#ce9178">"grdBig"</tspan></text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  bindeddataset=<tspan fill="#ce9178">"dsHuge"</tspan></text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  <!-- 가상화: 화면에 50행만 렌더 --></text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  virtualrowcount=<tspan fill="#b5cea8">"50"</tspan></text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  <!-- rowheight 반드시 고정 --></text>
  <text x="76" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  rowheight=<tspan fill="#b5cea8">"24"</tspan></text>
  <text x="76" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  <!-- cellrecycling 켜기 권장 --></text>
  <text x="76" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  cellrecycling=<tspan fill="#ce9178">"true"</tspan></text>
  <text x="76" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">/&gt;</text>

  <!-- Right: limitations and workarounds -->
  <rect x="460" y="94" width="360" height="30" fill="#2e1a0d" rx="4"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">가상화 사용 시 제약 및 대안</text>

  <rect x="460" y="129" width="360" height="228" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 동적 행 높이 사용 불가</text>
  <text x="476" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// autorowheight와 충돌</text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ setCellMerge 일부 제한</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// 셀 병합 + 가상화 혼용 주의</text>
  <text x="476" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✓ 스크롤 위치 저장/복원</text>
  <text x="476" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text>
  <text x="504" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> nScroll = grd.vscrollpos;</text>
  <text x="476" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 데이터 갱신 후 복원</text>
  <text x="476" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grd.set_vscrollpos(nScroll);</text>
  <text x="476" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✓ 특정 행으로 스크롤 이동</text>
  <text x="476" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grd.scrollToRow(<tspan fill="#b5cea8">5000</tspan>);</text>
</svg>
