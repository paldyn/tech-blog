<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메모리 누수 패턴 — 원인과 해결</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">가장 흔한 4가지 메모리 누수 패턴</text>

  <!-- Pattern 1: Event listener not removed -->
  <rect x="60" y="96" width="380" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">① 제거되지 않은 이벤트 리스너</text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">// ❌ 컴포넌트 제거 후 리스너 남음</text>
  <text x="80" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">window.addEventListener(<tspan fill="#ce9178">'resize'</tspan>, handler);</text>
  <text x="80" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">// ✅ cleanup 시 반드시 제거</text>

  <!-- Pattern 2: Closure holding DOM -->
  <rect x="460" y="96" width="360" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">② 클로저가 DOM 참조 유지</text>
  <text x="480" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">// ❌ element는 제거되어도 클로저에 남음</text>
  <text x="480" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> el = document.getElementById(<tspan fill="#ce9178">'btn'</tspan>);</text>
  <text x="480" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> fn = () => console.log(el.textContent);</text>

  <!-- Pattern 3: setInterval not cleared -->
  <rect x="60" y="206" width="380" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">③ 정리되지 않은 타이머</text>
  <text x="80" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">// ❌ interval이 컴포넌트 참조를 유지</text>
  <text x="80" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> id = setInterval(() => updateUI(), <tspan fill="#b5cea8">1000</tspan>);</text>
  <text x="80" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">// ✅ return () => clearInterval(id)</text>

  <!-- Pattern 4: Growing cache without eviction -->
  <rect x="460" y="206" width="360" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">④ 무제한으로 커지는 캐시</text>
  <text x="480" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">// ❌ 항목이 추가만 되고 삭제 없음</text>
  <text x="480" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> cache = {}; <tspan fill="#9aa4b8">// Object는 GC 불가</tspan></text>
  <text x="480" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">// ✅ WeakMap 또는 크기 제한 LRU</text>

  <!-- Memory timeline illustration -->
  <rect x="60" y="320" width="760" height="78" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">메모리 사용량 그래프 패턴</text>
  <!-- Sawtooth (healthy) -->
  <polyline points="80,374 120,358 140,380 180,362 200,380 240,365 260,380"
            fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">톱니 → 정상 (GC 작동)</text>
  <!-- Staircase (leak) -->
  <polyline points="360,380 400,360 440,360 480,340 520,340 560,320 600,320"
            fill="none" stroke="#e05555" stroke-width="2"/>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">계단형 증가 → 메모리 누수</text>
</svg>
