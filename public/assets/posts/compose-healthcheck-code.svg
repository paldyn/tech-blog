<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">healthcheck 서비스별 예시</text>

  <!-- PostgreSQL healthcheck -->
  <text x="80" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">PostgreSQL</text>

  <rect x="60" y="96" width="360" height="188" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">db</tspan>:</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    image: postgres:16</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">healthcheck</tspan>:</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">test</tspan>: [<tspan fill="#ce9178">"CMD-SHELL"</tspan>,</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        <tspan fill="#ce9178">"pg_isready -U postgres"</tspan>]</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">interval</tspan>: <tspan fill="#b5cea8">5s</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">timeout</tspan>: <tspan fill="#b5cea8">5s</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">retries</tspan>: <tspan fill="#b5cea8">5</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">start_period</tspan>: <tspan fill="#b5cea8">10s</tspan></text>

  <!-- HTTP API healthcheck -->
  <text x="480" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">HTTP API</text>

  <rect x="460" y="96" width="360" height="188" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">api</tspan>:</text>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    image: my-api</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">healthcheck</tspan>:</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">test</tspan>: [<tspan fill="#ce9178">"CMD"</tspan>, <tspan fill="#ce9178">"curl"</tspan>,</text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        <tspan fill="#ce9178">"-f"</tspan>, <tspan fill="#ce9178">"http://localhost/health"</tspan>]</text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">interval</tspan>: <tspan fill="#b5cea8">10s</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">timeout</tspan>: <tspan fill="#b5cea8">3s</tspan></text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">retries</tspan>: <tspan fill="#b5cea8">3</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3" font-weight="600">start_period</tspan>: <tspan fill="#b5cea8">15s</tspan></text>

  <!-- Divider -->
  <line x1="60" y1="304" x2="820" y2="304" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Check cmd reference -->
  <text x="60" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">test 명령 형식</text>
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CMD        — 배열, 첫 요소가 실행 파일   · exit 0 = healthy</text>
  <text x="60" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CMD-SHELL  — 문자열을 /bin/sh -c 로 실행 · 파이프·리다이렉트 사용 가능</text>
  <text x="60" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NONE       — healthcheck 비활성화 (이미지 HEALTHCHECK 무시)</text>
</svg>
