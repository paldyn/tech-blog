<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">syslog / rsyslog 로그 흐름</text>

  <!-- Sources -->
  <rect x="60" y="66" width="140" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">커널 (dmesg)</text>

  <rect x="220" y="66" width="140" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">syslog() 호출</text>

  <rect x="380" y="66" width="140" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="450" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">journald</text>

  <rect x="540" y="66" width="140" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="610" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">원격 syslog</text>

  <rect x="700" y="66" width="120" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">imfile</text>

  <!-- Arrows to rsyslog -->
  <line x1="130" y1="114" x2="380" y2="162" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="114" x2="400" y2="162" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="114" x2="440" y2="162" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="610" y1="114" x2="490" y2="162" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="114" x2="500" y2="162" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- rsyslog box -->
  <rect x="260" y="162" width="360" height="60" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">rsyslogd</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필터링 · 파싱 · 변환 · 라우팅</text>

  <!-- Output arrows -->
  <line x1="310" y1="222" x2="160" y2="270" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="390" y1="222" x2="380" y2="270" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="490" y1="222" x2="580" y2="270" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="570" y1="222" x2="760" y2="270" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Output boxes -->
  <rect x="60" y="270" width="200" height="52" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1"/>
  <text x="160" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">/var/log/*.log</text>
  <text x="160" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 파일</text>

  <rect x="280" y="270" width="200" height="52" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1"/>
  <text x="380" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">데이터베이스</text>
  <text x="380" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MySQL / Elasticsearch</text>

  <rect x="500" y="270" width="160" height="52" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1"/>
  <text x="580" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">원격 서버</text>
  <text x="580" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TCP/UDP/TLS</text>

  <rect x="680" y="270" width="140" height="52" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1"/>
  <text x="750" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">콘솔</text>
  <text x="750" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/dev/console</text>

  <!-- Config file note -->
  <rect x="60" y="346" width="760" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># facility.severity  destination</text>
  <text x="80" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kern.* <tspan fill="#ffffff">             /var/log/kern.log</tspan></text>
  <text x="390" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">   auth.info<tspan fill="#ffffff"> /var/log/auth.log</tspan></text>
</svg>
