<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">field()와 __post_init__ 활용</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">기본값 팩토리와 초기화 후 처리</text>

  <!-- Code block -->
  <rect x="60" y="88" width="560" height="360" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">from</text>
  <text x="112" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> dataclasses </text>
  <text x="214" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">import</text>
  <text x="265" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> dataclass, field</text>

  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">@dataclass</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> Inventory:</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    name: str</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0">    # 가변 기본값: field()로 factory 사용</text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    items: list = field(default_factory=list)</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0">    # repr=False: __repr__ 에서 제외</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    _cache: dict = field(</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">        default_factory=dict, repr=</text>
  <text x="350" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">False</text>
  <text x="392" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>

  <!-- __post_init__ -->
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">__post_init__(self):</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0">        # __init__ 직후 자동 호출</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">        if not</text>
  <text x="144" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> self.name:</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">            raise</text>
  <text x="162" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> ValueError(</text>
  <text x="253" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"name 필수"</text>
  <text x="342" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>

  <!-- Usage -->
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">inv = Inventory(</text>
  <text x="214" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"창고A"</text>
  <text x="270" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">inv.items.append(</text>
  <text x="231" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"사과"</text>
  <text x="275" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># repr: Inventory(name='창고A', items=['사과'])</text>

  <!-- Right annotations -->
  <rect x="650" y="96" width="190" height="72" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="745" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">가변 기본값 금지</text>
  <text x="745" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">items: list = []  ← 오류!</text>
  <text x="745" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">field(default_factory=list)</text>

  <rect x="650" y="186" width="190" height="72" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">field() 옵션</text>
  <text x="745" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">repr, compare, hash</text>
  <text x="745" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">init, metadata</text>

  <rect x="650" y="276" width="190" height="72" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="745" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">__post_init__</text>
  <text x="745" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__init__ 완료 후 호출</text>
  <text x="745" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유효성 검사, 파생값 계산</text>
</svg>
