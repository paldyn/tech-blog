<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 메서드 — 타입 추론 흐름</text>

  <!-- Method definition box -->
  <rect x="40" y="68" width="800" height="80" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제네릭 메서드 선언 — 반환 타입 앞에 &lt;T&gt; 위치</text>
  <text x="56" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public static</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">T</tspan><tspan fill="#ffffff"> identity(</tspan><tspan fill="#7ec8e3" font-weight="600">T</tspan><tspan fill="#ffffff"> value) { </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> value; }</tspan></text>

  <!-- Inference flow: 3 call sites -->
  <defs>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Call 1 -->
  <rect x="40" y="178" width="240" height="62" fill="#0d1a2a" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">identity("Java")</text>
  <text x="160" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인수: String 리터럴</text>

  <!-- Call 2 -->
  <rect x="320" y="178" width="240" height="62" fill="#0d1a2a" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">identity(42)</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인수: Integer 리터럴</text>

  <!-- Call 3 -->
  <rect x="600" y="178" width="240" height="62" fill="#0d1a2a" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">identity(3.14)</text>
  <text x="720" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인수: Double 리터럴</text>

  <!-- Arrows up to method box -->
  <line x1="160" y1="178" x2="220" y2="148" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="178" x2="440" y2="148" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="178" x2="660" y2="148" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Results -->
  <rect x="40" y="270" width="240" height="44" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">T = String → String</text>

  <rect x="320" y="270" width="240" height="44" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">T = Integer → Integer</text>

  <rect x="600" y="270" width="240" height="44" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">T = Double → Double</text>

  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">컴파일러가 인수 타입에서 T를 자동 추론 — 명시적 타입 인자 불필요</text>
</svg>
