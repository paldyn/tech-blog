<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Protocol vs ABC: 두 가지 서브타이핑</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">명목적(nominal) vs 구조적(structural) 타입 시스템</text>

  <!-- ABC column header -->
  <rect x="60" y="88" width="360" height="50" rx="8" fill="#1a2040" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">ABC (명목적 서브타이핑)</text>

  <!-- Protocol column header -->
  <rect x="460" y="88" width="360" height="50" rx="8" fill="#2a1a30" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">Protocol (구조적 서브타이핑)</text>

  <!-- Row 1: 인식 방식 -->
  <rect x="60" y="150" width="360" height="56" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="240" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">타입 인식 방식</text>
  <text x="240" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">명시적 상속 필요</text>
  <text x="240" y="200" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"></text>
  <rect x="460" y="150" width="360" height="56" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="640" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">타입 인식 방식</text>
  <text x="640" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메서드 서명만 일치하면 자동 인정</text>

  <!-- Row 2: 상속 필요 여부 -->
  <rect x="60" y="216" width="360" height="56" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="240" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">상속 필요 여부</text>
  <text x="240" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  반드시 상속해야 함</text>
  <rect x="460" y="216" width="360" height="56" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="640" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">상속 필요 여부</text>
  <text x="640" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  상속 없이도 동작</text>

  <!-- Row 3: 외부 라이브러리 -->
  <rect x="60" y="282" width="360" height="56" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="240" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">외부 클래스 지원</text>
  <text x="240" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수정 불가 클래스는 사용 불가</text>
  <rect x="460" y="282" width="360" height="56" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="640" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">외부 클래스 지원</text>
  <text x="640" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">기존 클래스도 자동 호환</text>

  <!-- Row 4: 런타임 체크 -->
  <rect x="60" y="348" width="360" height="56" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="240" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">런타임 isinstance 체크</text>
  <text x="240" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 기본 지원</text>
  <rect x="460" y="348" width="360" height="56" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="640" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">런타임 isinstance 체크</text>
  <text x="640" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c040">@runtime_checkable 필요</text>

  <!-- Footer -->
  <rect x="60" y="424" width="760" height="44" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ABC: 구현 강제 + 공통 로직 제공 목적에 적합</text>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Protocol: 타입 힌트 + 덕 타이핑 조합, 외부 라이브러리와의 호환에 특히 강력</text>
</svg>
