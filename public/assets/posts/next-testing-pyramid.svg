<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Next.js 테스트 피라미드</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">단위 · 통합 · E2E 테스트 도구 선택 기준</text>

  <!-- Pyramid shape -->
  <!-- E2E (top) -->
  <polygon points="440,96 300,196 580,196" fill="#111827" stroke="#e05555" stroke-width="2"/>
