  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">React Testing Library + MSW</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API Route · Server Action 테스트</text>

  <!-- Unit (bottom) -->
  <polygon points="200,296 80,380 800,380 680,296" fill="#111827" stroke="#55c555" stroke-width="2"/>
