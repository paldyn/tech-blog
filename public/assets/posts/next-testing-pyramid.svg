  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Playwright / Cypress</text>

  <!-- Integration (middle) -->
  <polygon points="300,196 200,296 680,296 580,196" fill="#111827" stroke="#ce9178" stroke-width="2"/>
