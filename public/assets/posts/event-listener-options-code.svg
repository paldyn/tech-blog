<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">옵션 사용 코드 패턴</text>

  <!-- Left: once + signal -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">once + signal 패턴</text>

  <rect x="60" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// once: 자동 제거</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">btn.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, handler, {</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  once: <tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// signal: AbortController로 일괄 제거</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const <tspan fill="#ffffff">ac = </tspan><tspan fill="#7ec8e3">new </tspan><tspan fill="#e8e8e8">AbortController();</tspan></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, fn, {</tspan></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  signal: ac.signal });</text>

  <!-- Right: passive + capture -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">passive + capture 패턴</text>

  <rect x="450" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 스크롤 성능 최적화</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'touchmove'</tspan><tspan fill="#e8e8e8">, fn, {</tspan></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  passive: <tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="466" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 캡처 단계에서 가로채기</text>
  <text x="466" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">document.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, fn, {</tspan></text>
  <text x="466" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  capture: <tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="466" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Bottom: removeEventListener symmetry -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">removeEventListener — 옵션 일치 필수</text>

  <rect x="60" y="296" width="760" height="126" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// capture 옵션이 다르면 제거 안 됨 — 흔한 실수</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, handler, { capture: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8"> });</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">el.<tspan fill="#7ec8e3">removeEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, handler);       </tspan><tspan fill="#9aa4b8">// ✕ 제거 실패</tspan></text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">el.<tspan fill="#7ec8e3">removeEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, handler, { capture: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8"> }); </tspan><tspan fill="#9aa4b8">// ✓</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// signal 방식은 옵션 불일치 문제 없이 일괄 제거 가능</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ac.<tspan fill="#7ec8e3">abort</tspan><tspan fill="#e8e8e8">();   </tspan><tspan fill="#9aa4b8">// signal로 등록된 모든 리스너 제거</tspan></text>
</svg>
