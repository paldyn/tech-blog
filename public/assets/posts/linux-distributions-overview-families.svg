<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Linux 배포판 계열도</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">4대 계열과 주요 파생 배포판</text>

  <!-- Debian Family -->
  <rect x="60" y="96" width="185" height="340" fill="#0a1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="152" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Debian 계열</text>
  <text x="152" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지: .deb / apt</text>
  <rect x="80" y="158" width="145" height="30" fill="#0d2030" rx="4"/>
  <text x="152" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Debian</text>
  <rect x="80" y="198" width="145" height="30" fill="#0d2030" rx="4"/>
  <text x="152" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Ubuntu (2004)</text>
  <rect x="80" y="238" width="145" height="28" fill="#0d2030" rx="4"/>
  <text x="152" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Linux Mint</text>
  <rect x="80" y="276" width="145" height="28" fill="#0d2030" rx="4"/>
  <text x="152" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Pop!_OS</text>
  <rect x="80" y="314" width="145" height="28" fill="#0d2030" rx="4"/>
  <text x="152" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Raspberry Pi OS</text>
  <rect x="80" y="352" width="145" height="28" fill="#0d2030" rx="4"/>
  <text x="152" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Kali Linux</text>
  <text x="152" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">데스크톱·범용 서버</text>

  <!-- RHEL Family -->
  <rect x="265" y="96" width="185" height="340" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="357" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">RHEL 계열</text>
  <text x="357" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지: .rpm / dnf</text>
  <rect x="285" y="158" width="145" height="30" fill="#2a1010" rx="4"/>
  <text x="357" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">RHEL (유료)</text>
  <rect x="285" y="198" width="145" height="30" fill="#2a1010" rx="4"/>
  <text x="357" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Fedora</text>
  <rect x="285" y="238" width="145" height="28" fill="#2a1010" rx="4"/>
  <text x="357" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">CentOS Stream</text>
  <rect x="285" y="276" width="145" height="28" fill="#2a1010" rx="4"/>
  <text x="357" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">AlmaLinux</text>
  <rect x="285" y="314" width="145" height="28" fill="#2a1010" rx="4"/>
  <text x="357" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Rocky Linux</text>
  <rect x="285" y="352" width="145" height="28" fill="#2a1010" rx="4"/>
  <text x="357" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Oracle Linux</text>
  <text x="357" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">엔터프라이즈·프로덕션</text>

  <!-- Arch Family -->
  <rect x="470" y="96" width="185" height="340" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="562" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Arch 계열</text>
  <text x="562" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지: .pkg / pacman</text>
  <rect x="490" y="158" width="145" height="30" fill="#102010" rx="4"/>
  <text x="562" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Arch Linux</text>
  <rect x="490" y="198" width="145" height="30" fill="#102010" rx="4"/>
  <text x="562" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Manjaro</text>
  <rect x="490" y="238" width="145" height="28" fill="#102010" rx="4"/>
  <text x="562" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">EndeavourOS</text>
  <rect x="490" y="276" width="145" height="28" fill="#102010" rx="4"/>
  <text x="562" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Garuda Linux</text>
  <rect x="490" y="352" width="145" height="28" fill="#102010" rx="4"/>
  <text x="562" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">SteamOS (Valve)</text>
  <text x="562" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">롤링 릴리즈·고급 사용자</text>

  <!-- Independents -->
  <rect x="675" y="96" width="170" height="340" fill="#1a0d1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="760" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">독립 계열</text>
  <text x="760" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">독자 패키지 시스템</text>
  <rect x="695" y="158" width="130" height="30" fill="#2a1030" rx="4"/>
  <text x="760" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">openSUSE</text>
  <rect x="695" y="198" width="130" height="30" fill="#2a1030" rx="4"/>
  <text x="760" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Gentoo</text>
  <rect x="695" y="238" width="130" height="28" fill="#2a1030" rx="4"/>
  <text x="760" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Slackware</text>
  <rect x="695" y="276" width="130" height="28" fill="#2a1030" rx="4"/>
  <text x="760" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">NixOS</text>
  <rect x="695" y="314" width="130" height="28" fill="#2a1030" rx="4"/>
  <text x="760" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Alpine Linux</text>
  <rect x="695" y="352" width="130" height="28" fill="#2a1030" rx="4"/>
  <text x="760" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Void Linux</text>
  <text x="760" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">컨테이너·실험적</text>
</svg>
