<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Portal 심화 — 모달 컴포넌트 구현</text>

  <rect x="60" y="70" width="500" height="350" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="140" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Modal({ isOpen, onClose, children }) {</text>
  <text x="78" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  if</text>
  <text x="100" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> (!isOpen) </text>
  <text x="185" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="233" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#b5cea8"> null</text>
  <text x="78" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // Esc 키로 닫기</text>
  <text x="78" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  useEffect(() =&gt; {</text>
  <text x="78" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">    const</text>
  <text x="120" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> fn = (e) =&gt; e.key === 'Escape' &amp;&amp; onClose();</text>
  <text x="78" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    document.addEventListener('keydown', fn);</text>
  <text x="78" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text x="130" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> () =&gt; document.removeEventListener('keydown', fn);</text>
  <text x="78" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  }, [onClose]);</text>
  <text x="78" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="126" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> createPortal(</text>
  <text x="78" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;div className="overlay" onClick={onClose}&gt;</text>
  <text x="78" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      &lt;div className="modal-box"</text>
  <text x="78" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">           onClick={(e) =&gt; e.stopPropagation()}&gt;</text>
  <text x="78" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">        {children}</text>
  <text x="78" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      &lt;/div&gt;</text>
  <text x="78" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;/div&gt;,</text>
  <text x="78" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    document.getElementById('modal-root')</text>

  <!-- Right: checklist -->
  <rect x="600" y="70" width="220" height="350" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">모달 구현 체크리스트</text>

  <text x="620" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✓ Esc 키로 닫기</text>
  <text x="620" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✓ 오버레이 클릭으로 닫기</text>
  <text x="620" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✓ 박스 클릭 버블링 차단</text>
  <text x="620" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✓ createPortal로 마운트</text>
  <text x="620" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">✗ body 스크롤 잠금</text>
  <text x="634" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">overflow:hidden on body</text>
  <text x="620" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">✗ 포커스 트랩</text>
  <text x="634" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Tab이 모달 안에서만 순환</text>
  <text x="620" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">✗ aria-modal="true"</text>
  <text x="634" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">접근성 속성 추가 필요</text>
  <text x="620" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">✗ 애니메이션</text>
  <text x="634" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">열기/닫기 전환 효과</text>
  <text x="634" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">(Framer Motion 등)</text>
</svg>
