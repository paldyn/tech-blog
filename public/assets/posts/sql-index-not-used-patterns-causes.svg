<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">인덱스가 사용되지 않는 주요 원인</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">패턴만 알면 대부분 쿼리를 수정해 인덱스를 활성화할 수 있다</text>

  <!-- Pattern 1: Function on column -->
  <rect x="60" y="95" width="360" height="130" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">① 컬럼에 함수 적용</text>
  <rect x="78" y="128" width="324" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="94" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-- ✗ 인덱스 무효</text>
  <text x="94" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="139" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> YEAR(created_at) = </text>
  <text x="294" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2025</text>
  <text x="94" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">-- ✓ 수정: 범위로</text>
  <text x="94" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="139" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> created_at >= </text>
  <text x="246" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'2025-01-01'</text>

  <!-- Pattern 2: Implicit type conversion -->
  <rect x="460" y="95" width="360" height="130" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">② 암묵적 타입 변환</text>
  <rect x="478" y="128" width="324" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="494" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-- ✗ VARCHAR 컬럼에 숫자</text>
  <text x="494" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="539" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> phone_no = </text>
  <text x="625" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">01012345678</text>
  <text x="494" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">-- ✓ 문자열로 전달</text>
  <text x="494" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="539" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> phone_no = </text>
  <text x="625" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'01012345678'</text>

  <!-- Pattern 3: Leading wildcard -->
  <rect x="60" y="245" width="360" height="130" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">③ 전방 와일드카드 LIKE</text>
  <rect x="78" y="278" width="324" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="94" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-- ✗ 전방 와일드카드</text>
  <text x="94" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="139" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> name </text>
  <text x="183" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">LIKE</text>
  <text x="211" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '%alice'</text>
  <text x="94" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">-- ✓ 후방 와일드카드</text>
  <text x="94" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="139" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> name </text>
  <text x="183" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">LIKE</text>
  <text x="211" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> 'alice%'</text>

  <!-- Pattern 4: OR conditions -->
  <rect x="460" y="245" width="360" height="130" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">④ OR 조건 분기</text>
  <rect x="478" y="278" width="324" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="494" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-- ✗ OR로 인덱스 병합 비효율</text>
  <text x="494" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#e8e8e8"> id=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#7ec8e3"> OR</tspan><tspan fill="#e8e8e8"> status=</tspan><tspan fill="#ce9178">'x'</tspan></text>

  <text x="494" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">-- ✓ IN 또는 UNION ALL</text>
  <text x="494" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#e8e8e8"> id </tspan><tspan fill="#7ec8e3">IN</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <!-- Low selectivity note -->
  <rect x="60" y="400" width="760" height="110" fill="#0d1520" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">⑤ 낮은 선택도(Low Selectivity) — 옵티마이저 판단</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인덱스를 타도 전체의 20~30% 이상 행을 읽어야 한다면</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">옵티마이저가 스스로 Full Scan을 선택한다 (랜덤 I/O 비용 > 순차 Full Scan 비용)</text>
  <text x="440" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">예: gender 컬럼 (M/F만 존재) 인덱스는 대부분 미사용</text>
</svg>
