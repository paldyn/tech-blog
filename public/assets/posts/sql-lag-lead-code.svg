<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">전일 대비 변화량 계산</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">LAG(amount, 1, 0) — offset=1, default=0</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  order_date, amount,</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#55c555">LAG</tspan>(amount, <tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">OVER</tspan> (<tspan fill="#7ec8e3">ORDER BY</tspan> order_date)</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">AS</tspan> prev_amount,</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  amount - <tspan fill="#55c555">LAG</tspan>(amount, <tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">OVER</tspan> (<tspan fill="#7ec8e3">ORDER BY</tspan> order_date)</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">AS</tspan> daily_delta,</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#55c555">LEAD</tspan>(amount, <tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">OVER</tspan> (<tspan fill="#7ec8e3">ORDER BY</tspan> order_date)</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">AS</tspan> next_amount</text>

  <!-- footer note -->
  <text x="440" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">LAG(col, N, default) — N행 앞, LEAD(col, N, default) — N행 뒤</text>
</svg>
