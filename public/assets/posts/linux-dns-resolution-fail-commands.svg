<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DNS 진단 핵심 명령어</text>

  <!-- Left: 진단 -->
  <text x="225" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">진단</text>

  <rect x="50" y="88" width="350" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 기본 조회</text>
  <text x="66" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nslookup google.com</text>
  <text x="66" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">host google.com</text>
  <text x="66" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 외부 DNS 직접 쿼리</text>
  <text x="66" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dig @8.8.8.8 google.com</text>
  <text x="66" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># resolved 상태</text>
  <text x="66" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">resolvectl status</text>
  <text x="66" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># nsswitch 확인</text>
  <text x="66" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">cat /etc/nsswitch.conf</text>
  <text x="66" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getent hosts google.com</text>

  <!-- Right: 조치 -->
  <text x="655" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">조치</text>

  <rect x="480" y="88" width="350" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="496" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># DNS 서버 임시 추가</text>
  <text x="496" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">echo "nameserver 8.8.8.8" \</text>
  <text x="496" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  | sudo tee /etc/resolv.conf</text>
  <text x="496" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># resolved 재시작</text>
  <text x="496" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">systemctl</tspan><tspan fill="#ffffff"> restart \</tspan></text>
  <text x="496" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  systemd-resolved</text>
  <text x="496" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># nmcli DNS 영구 설정</text>
  <text x="496" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">nmcli</tspan><tspan fill="#ffffff"> con mod eth0 \</tspan></text>
  <text x="496" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ipv4.dns "8.8.8.8 1.1.1.1"</text>
  <text x="496" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">nmcli</tspan><tspan fill="#ffffff"> con up eth0</tspan></text>

  <!-- Bottom bar -->
  <rect x="50" y="316" width="780" height="72" rx="8" fill="#0f1525" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">resolv.conf 심볼릭 링크 확인 (systemd-resolved 사용 시)</text>
  <text x="440" y="362" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ls -la /etc/resolv.conf</text>
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ /run/systemd/resolve/stub-resolv.conf 링크인지 확인</text>
</svg>
