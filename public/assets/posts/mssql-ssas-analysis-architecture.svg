<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSAS 아키텍처 — Multidimensional vs Tabular</text>

  <!-- Data Sources -->
  <rect x="60" y="80" width="160" height="54" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">데이터 소스</text>
  <text x="140" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL Server / DW / Files</text>

  <!-- ETL -->
  <rect x="260" y="80" width="160" height="54" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ETL / SSIS</text>
  <text x="340" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">변환 · 로드</text>

  <!-- Arrow: DS -> ETL -->
  <line x1="220" y1="107" x2="258" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- SSAS Engine box -->
  <rect x="460" y="60" width="360" height="200" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSAS 엔진</text>

  <!-- Multidimensional -->
  <rect x="476" y="100" width="150" height="140" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="551" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Multidimensional</text>
  <text x="551" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MOLAP / ROLAP</text>
  <text x="551" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">큐브 · 차원 · 계층</text>
  <text x="551" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">MDX 쿼리</text>
  <text x="551" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">사전 집계 · Write-back</text>
  <text x="551" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">KPI · 액션 · 번역</text>

  <!-- Tabular -->
  <rect x="646" y="100" width="158" height="140" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="725" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Tabular</text>
  <text x="725" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">xVelocity / VertiPaq</text>
  <text x="725" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">컬럼 저장 + 압축</text>
  <text x="725" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">DAX / MDX 쿼리</text>
  <text x="725" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">관계 · 측정값</text>
  <text x="725" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Power BI 연동</text>

  <!-- Arrow: ETL -> SSAS -->
  <line x1="420" y1="107" x2="458" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Clients -->
  <rect x="60" y="310" width="170" height="54" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="145" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Excel / Pivot Table</text>
  <text x="145" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MDX / DAX 자동 생성</text>

  <rect x="250" y="310" width="170" height="54" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="335" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Power BI</text>
  <text x="335" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DirectQuery / Import</text>

  <rect x="440" y="310" width="170" height="54" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="525" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">SSRS / 커스텀 앱</text>
  <text x="525" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ADOMD.NET 연결</text>

  <!-- Arrow SSAS -> Clients -->
  <line x1="640" y1="262" x2="640" y2="295" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="145" y1="295" x2="640" y2="295" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="145" y1="295" x2="145" y2="308" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="335" y1="295" x2="335" y2="308" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="525" y1="295" x2="525" y2="308" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Code block: MDX vs DAX -->
  <rect x="60" y="400" width="370" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- MDX (Multidimensional)</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> <tspan fill="#ffffff">[Measures].[Sales]</tspan></text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  ON COLUMNS,</text>
  <text x="76" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  [Date].[Year].MEMBERS ON ROWS</text>
  <text x="76" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan> <tspan fill="#ffffff">[Sales Cube]</tspan></text>

  <rect x="450" y="400" width="370" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- DAX (Tabular)</text>
  <text x="466" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Sales YTD :=</text>
  <text x="466" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">CALCULATE</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="466" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">SUM</tspan><tspan fill="#ffffff">(Sales[Amount]),</tspan></text>
  <text x="466" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">DATESYTD</tspan><tspan fill="#ffffff">(Date[Date]))</tspan></text>
</svg>
