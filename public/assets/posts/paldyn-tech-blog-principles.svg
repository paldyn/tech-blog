<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">PALDYN 기술블로그가 글을 쓰는 원칙</text>
  <text x="440" y="82" text-anchor="middle" font-size="13" fill="#666">실패 맥락 · 데이터 우선 · 재활용 가능한 기록</text>

  <!-- Three principle cards -->
  <!-- Card 1 -->
  <rect x="60" y="116" width="246" height="184" rx="12" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="100" cy="156" r="18" fill="#2a1818" stroke="#5a2a2a" stroke-width="1"/>
  <text x="100" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#cc6666">01</text>
  <text x="142" y="161" font-size="14" font-weight="700" fill="#e8e8e8">실패 먼저</text>
  <text x="86" y="208" font-size="12" fill="#888">성공한 결과보다</text>
  <text x="86" y="228" font-size="12" fill="#888">실패한 맥락과 원인을</text>
  <text x="86" y="248" font-size="12" fill="#888">먼저 기록한다.</text>
  <text x="86" y="278" font-size="11" fill="#555">시행착오가 자산이 된다</text>

  <!-- Card 2 -->
  <rect x="318" y="116" width="246" height="184" rx="12" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="358" cy="156" r="18" fill="#1a2230" stroke="#2a3f5a" stroke-width="1"/>
  <text x="358" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#7799cc">02</text>
  <text x="400" y="161" font-size="14" font-weight="700" fill="#e8e8e8">데이터 우선</text>
  <text x="344" y="208" font-size="12" fill="#888">"빨라졌다" 대신</text>
  <text x="344" y="228" font-size="12" fill="#888">측정한 숫자와 기준을</text>
  <text x="344" y="248" font-size="12" fill="#888">함께 적는다.</text>
  <text x="344" y="278" font-size="11" fill="#555">근거가 있어야 재현된다</text>

  <!-- Card 3 -->
  <rect x="576" y="116" width="246" height="184" rx="12" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="616" cy="156" r="18" fill="#182a1a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="616" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#66cc88">03</text>
  <text x="658" y="161" font-size="14" font-weight="700" fill="#e8e8e8">바로 활용</text>
  <text x="602" y="208" font-size="12" fill="#888">다음 사람이 그대로</text>
  <text x="602" y="228" font-size="12" fill="#888">쓸 수 있도록 코드와</text>
  <text x="602" y="248" font-size="12" fill="#888">체크리스트를 남긴다.</text>
  <text x="602" y="278" font-size="11" fill="#555">읽고 끝나면 가치 없다</text>

  <!-- Bottom note -->
  <line x1="60" y1="340" x2="820" y2="340" stroke="#222" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-size="12" fill="#777">매 글마다 — 이미지 1개 이상 · 코드 또는 다이어그램 1개 이상 · 결정 맥락 공유</text>
  <text x="440" y="408" text-anchor="middle" font-size="11" fill="#555">읽는 사람의 시간을 아끼는 것이 가장 정확한 기여이다</text>
</svg>
