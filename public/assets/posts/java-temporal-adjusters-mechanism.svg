<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">with(adjuster) — 날짜 보정의 위임 구조</text>

  <!-- Source box -->
  <rect x="60" y="100" width="200" height="70" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">원본 LocalDate</text>
  <text x="160" y="152" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-12</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="135" x2="336" y2="135" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="298" y="115" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">with(...)</text>

  <!-- Adjuster box -->
  <rect x="340" y="88" width="240" height="94" rx="8" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="460" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">TemporalAdjuster</text>
  <text x="460" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">@FunctionalInterface</text>
  <text x="460" y="164" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Temporal -&gt; Temporal</text>

  <!-- Arrow 2 -->
  <line x1="580" y1="135" x2="656" y2="135" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="618" y="115" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">새 객체</text>

  <!-- Result box -->
  <rect x="660" y="100" width="160" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="740" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">새 LocalDate</text>
  <text x="740" y="152" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-30</text>

  <!-- Code box -->
  <rect x="60" y="222" width="760" height="184" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">LocalDate date = LocalDate.of(<tspan fill="#b5cea8">2026</tspan>, <tspan fill="#b5cea8">6</tspan>, <tspan fill="#b5cea8">12</tspan>);</text>
  <text x="76" y="277" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 내장 adjuster — 이번 달 마지막 날</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">date.with(TemporalAdjusters.lastDayOfMonth());</text>
  <text x="76" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 2026-06-30</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 람다로 커스텀 adjuster 정의 가능</text>
  <text x="76" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">TemporalAdjuster nextPayday = t -&gt;</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    t.with(ChronoField.DAY_OF_MONTH, <tspan fill="#b5cea8">25</tspan>);</text>
</svg>
