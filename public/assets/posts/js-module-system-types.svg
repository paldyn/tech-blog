<svg height="500" width="880" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">CommonJS vs ES Module</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Column headers -->
  <rect x="20" y="66" width="415" height="36" fill="#1a1a2e" rx="6"/>
  <text x="227" y="89" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">CommonJS (CJS)</text>

  <rect x="445" y="66" width="415" height="36" fill="#0d1f0d" rx="6"/>
  <text x="652" y="89" fill="#86efac" font-size="13" font-weight="600" text-anchor="middle">ES Module (ESM)</text>

  <!-- Section: 사용 문법 -->
  <text x="20" y="124" fill="#555" font-size="11">사용 문법</text>
  <line x1="20" y1="128" x2="860" y2="128" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="134" width="415" height="72" fill="#111" rx="6"/>
  <rect x="32" y="145" width="391" height="50" fill="#0d0d0d" rx="4"/>
  <text x="44" y="161" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const fs = <tspan fill="#f59e0b">require</tspan>('fs')</text>
  <text x="44" y="179" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'"><tspan fill="#f59e0b">module.exports</tspan> = { add, PI }</text>

  <rect x="445" y="134" width="415" height="72" fill="#111" rx="6"/>
  <rect x="457" y="145" width="391" height="50" fill="#0d0d0d" rx="4"/>
  <text x="469" y="161" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'"><tspan fill="#86efac">import</tspan> fs <tspan fill="#86efac">from</tspan> 'fs'</text>
  <text x="469" y="179" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'"><tspan fill="#86efac">export</tspan> const add = (a, b) =&gt; a + b</text>

  <!-- Section: 로딩 방식 -->
  <text x="20" y="222" fill="#555" font-size="11">로딩 방식</text>
  <line x1="20" y1="226" x2="860" y2="226" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="232" width="415" height="56" fill="#111" rx="6"/>
  <text x="36" y="252" fill="#e8e8e8" font-size="12">동기(Synchronous)</text>
  <text x="36" y="270" fill="#888" font-size="11">런타임 시 실행되며 조건부·반복문 안에서도 호출 가능</text>

  <rect x="445" y="232" width="415" height="56" fill="#111" rx="6"/>
  <text x="461" y="252" fill="#e8e8e8" font-size="12">정적(Static) / 비동기 지원</text>
  <text x="461" y="270" fill="#888" font-size="11">파일 최상단 고정, 정적 분석 가능 — import() 동적 로딩도 지원</text>

  <!-- Section: 실행 시점 -->
  <text x="20" y="304" fill="#555" font-size="11">분석 시점</text>
  <line x1="20" y1="308" x2="860" y2="308" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="314" width="415" height="56" fill="#111" rx="6"/>
  <text x="36" y="334" fill="#f87171" font-size="12">런타임 평가</text>
  <text x="36" y="352" fill="#888" font-size="11">모듈 그래프를 실행 중에 구성 — 트리 쉐이킹 어려움</text>

  <rect x="445" y="314" width="415" height="56" fill="#111" rx="6"/>
  <text x="461" y="334" fill="#86efac" font-size="12">컴파일 타임 정적 분석</text>
  <text x="461" y="352" fill="#888" font-size="11">번들러가 사용되지 않는 export를 제거(트리 쉐이킹) 가능</text>

  <!-- Section: this / 스코프 -->
  <text x="20" y="386" fill="#555" font-size="11">최상위 this / 스코프</text>
  <line x1="20" y1="390" x2="860" y2="390" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="396" width="415" height="56" fill="#111" rx="6"/>
  <text x="36" y="416" fill="#e8e8e8" font-size="12">module.exports 객체</text>
  <text x="36" y="434" fill="#888" font-size="11">최상위 this === module.exports  ·  .js 확장자 기본</text>

  <rect x="445" y="396" width="415" height="56" fill="#111" rx="6"/>
  <text x="461" y="416" fill="#e8e8e8" font-size="12">undefined</text>
  <text x="461" y="434" fill="#888" font-size="11">.mjs 확장자 또는 package.json "type": "module" 선언 필요</text>

  <!-- Footer note -->
  <text x="440" y="476" fill="#444" font-size="10" text-anchor="middle">Node.js는 두 형식을 모두 지원  ·  브라우저는 ESM만 지원  ·  Bun·Deno는 ESM 우선</text>
</svg>
