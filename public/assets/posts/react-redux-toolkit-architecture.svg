<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Redux Toolkit 아키텍처</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">단방향 데이터 흐름 — Action → Reducer → State → View</text>

  <!-- Cycle diagram -->
  <!-- View -->
  <rect x="60" y="104" width="160" height="70" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">View</text>
  <text x="140" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useSelector 구독</text>
  <text x="140" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useDispatch 사용</text>

  <!-- Arrow View → Action -->
  <line x1="220" y1="139" x2="298" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="259" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">dispatch</text>

  <!-- Action -->
  <rect x="300" y="104" width="160" height="70" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="380" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">Action</text>
  <text x="380" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">createSlice 자동 생성</text>
  <text x="380" y="166" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">{ type, payload }</text>

  <!-- Arrow Action → Store -->
  <line x1="460" y1="139" x2="538" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Store/Reducer -->
  <rect x="540" y="104" width="160" height="70" rx="10" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="620" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Store / Reducer</text>
  <text x="620" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">configureStore</text>
  <text x="620" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">createSlice reducer</text>

  <!-- Arrow Store → State -->
  <line x1="700" y1="139" x2="778" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- State -->
  <rect x="780" y="104" width="60" height="70" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="810" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">State</text>
  <text x="810" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새로운</text>
  <text x="810" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상태</text>

  <!-- Return arrow: State → View (curved bottom) -->
  <path d="M 810 174 Q 810 220 440 220 Q 140 220 140 174" stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="440" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">useSelector → re-render</text>

  <!-- Code section -->
  <rect x="60" y="258" width="760" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Redux Toolkit 최소 구성</text>
  <text x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> &#123; createSlice, configureStore &#125; <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'@reduxjs/toolkit'</tspan>;</text>
  <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> counterSlice = createSlice(&#123;</text>
  <text x="76" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  name: <tspan fill="#ce9178">'counter'</tspan>, initialState: &#123; value: <tspan fill="#b5cea8">0</tspan> &#125;,</text>
  <text x="76" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  reducers: &#123;</text>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    increment: state =&gt; &#123; state.value += <tspan fill="#b5cea8">1</tspan>; &#125;, <tspan fill="#9aa4b8">// Immer로 직접 수정 OK</tspan></text>
  <text x="76" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    decrement: state =&gt; &#123; state.value -= <tspan fill="#b5cea8">1</tspan>; &#125;,</text>
  <text x="76" y="403" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;,</text>
  <text x="76" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;);</text>
  <text x="76" y="439" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> &#123; increment, decrement &#125; = counterSlice.actions;</text>
  <text x="76" y="457" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> store = configureStore(&#123; reducer: &#123; counter: counterSlice.reducer &#125; &#125;);</text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// Redux DevTools, Immer, thunk 미들웨어 자동 포함</text>
</svg>
