<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Anonymous Volume 생명주기</text>

  <!-- Scenario A: docker run –rm -->
  <text x="240" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8c53a" text-anchor="middle">--rm 플래그 있음</text>

  <rect x="60" y="96" width="160" height="72" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너 실행</text>
  <text x="140" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">-v /data 또는 VOLUME</text>

  <line x1="220" y1="132" x2="258" y2="132" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="266,132 254,126 254,138" fill="#7ec8e3"/>

  <rect x="266" y="96" width="160" height="72" fill="#0f1f2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="346" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">익명 볼륨 생성</text>
  <text x="346" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">해시 이름 자동 부여</text>

  <line x1="426" y1="132" x2="464" y2="132" stroke="#e05555" stroke-width="2"/>
  <polygon points="472,132 460,126 460,138" fill="#e05555"/>

  <rect x="472" y="96" width="160" height="72" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="552" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">컨테이너 종료</text>
  <text x="552" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">볼륨도 함께 삭제</text>

  <!-- Scenario B: docker rm -->
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">--rm 플래그 없음</text>

  <rect x="60" y="240" width="160" height="72" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="140" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너 실행</text>
  <text x="140" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">-v /data 또는 VOLUME</text>

  <line x1="220" y1="276" x2="258" y2="276" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="266,276 254,270 254,282" fill="#7ec8e3"/>

  <rect x="266" y="240" width="160" height="72" fill="#0f1f2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="346" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">익명 볼륨 생성</text>
  <text x="346" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">해시 이름 자동 부여</text>

  <line x1="426" y1="276" x2="464" y2="276" stroke="#888" stroke-width="2"/>
  <polygon points="472,276 460,270 460,282" fill="#888"/>

  <rect x="472" y="240" width="160" height="72" fill="#111318" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="552" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">컨테이너 삭제</text>
  <text x="552" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c53a" text-anchor="middle">볼륨은 남는다 (고아)</text>

  <!-- Warning box -->
  <rect x="660" y="240" width="180" height="72" fill="#1a1500" rx="8" stroke="#e8c53a" stroke-width="1.5"/>
  <text x="750" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c53a" text-anchor="middle">⚠ 고아 볼륨</text>
  <text x="750" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이름이 없어서</text>
  <text x="750" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">찾기 어려움</text>

  <line x1="632" y1="276" x2="658" y2="276" stroke="#e8c53a" stroke-width="2"/>
  <polygon points="660,276 648,270 648,282" fill="#e8c53a"/>

  <!-- Cleanup note -->
  <rect x="60" y="342" width="760" height="40" fill="#111318" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">고아 익명 볼륨 정리: docker volume prune  →  미사용 볼륨 일괄 삭제</text>
</svg>
