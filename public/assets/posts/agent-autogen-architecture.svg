<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">AutoGen v0.4 아키텍처</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">메시지 기반 비동기 멀티 에이전트 — 에이전트는 메시지를 주고받으며 협업</text>

  <!-- AutoGen Core layer -->
  <rect x="40" y="90" width="800" height="140" rx="8" fill="#0f0f1a" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">AutoGen Core (메시지 런타임)</text>

  <!-- Agent boxes in core -->
  <rect x="64" y="124" width="160" height="90" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="144" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">AssistantAgent</text>
  <text x="144" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LLM 기반 응답</text>
  <text x="144" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도구 호출 지원</text>
  <text x="144" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">on_message() 핸들러</text>

  <rect x="260" y="124" width="160" height="90" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">UserProxyAgent</text>
  <text x="340" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람 대리 에이전트</text>
  <text x="340" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 실행 가능</text>
  <text x="340" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">human_input_mode</text>

  <rect x="456" y="124" width="160" height="90" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="536" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">CodeExecutor</text>
  <text x="536" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Python/Shell 실행</text>
  <text x="536" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Docker 샌드박스</text>
  <text x="536" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">안전 실행 환경</text>

  <rect x="652" y="124" width="160" height="90" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="732" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Custom Agent</text>
  <text x="732" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BaseAgent 상속</text>
  <text x="732" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커스텀 로직</text>
  <text x="732" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">자유로운 확장</text>

  <!-- Message flow arrows -->
  <line x1="224" y1="169" x2="258" y2="169" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="258" y1="185" x2="224" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="420" y1="169" x2="454" y2="169" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="454" y1="185" x2="420" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="616" y1="169" x2="650" y2="169" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="185" x2="616" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Chat Patterns (middle) -->
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a855">대화 패턴</text>

  <rect x="60" y="280" width="220" height="80" rx="6" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="170" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">TwoAgentChat</text>
  <text x="170" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1:1 대화 (가장 단순)</text>
  <text x="170" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">initiate_chat()</text>
  <text x="170" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">종료 조건: max_turns / "TERMINATE"</text>

  <rect x="330" y="280" width="220" height="80" rx="6" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">GroupChat</text>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">N:N 그룹 대화</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GroupChatManager 조율</text>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">speaker_selection_method: auto/round_robin</text>

  <rect x="600" y="280" width="220" height="80" rx="6" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="710" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Swarm (v0.4)</text>
  <text x="710" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">핸드오프 기반 라우팅</text>
  <text x="710" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">OpenAI Swarm 스타일</text>
  <text x="710" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">context_variables 공유</text>

  <!-- Code example -->
  <rect x="60" y="384" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># AssistantAgent + UserProxy 1:1 대화</text>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">assistant = AssistantAgent(</text>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                          name=</text>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                               "assistant"</text>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                          , llm_config=llm_cfg)</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">user_proxy = UserProxyAgent(</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                            name=</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                 "user"</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                       , human_input_mode=</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                                          "NEVER"</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                                 )</text>
  <text x="80" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">user_proxy.initiate_chat(assistant, message=</text>
  <text x="80" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                             "피보나치 수열 Python"</text>
  <text x="80" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                                    )</text>
</svg>
