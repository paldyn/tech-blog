<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프로그래밍 방식 트랜잭션 — TransactionTemplate</text>

  <!-- ── Left Code Block ── -->
  <text x="70" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">TransactionTemplate — 콜백 방식</text>

  <rect x="70" y="88" width="360" height="318" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="86" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// Bean 주입 후 사용</text>
  <text x="86" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">@Service</text>
  <text x="86" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">public class <tspan fill="#ffffff">OrderService {</tspan></text>
  <text x="86" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">  private final <tspan fill="#ffffff">TransactionTemplate tx;</tspan></text>
  <text x="86" y="206" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">  public <tspan fill="#ffffff">Long placeOrder(Order o) {</tspan></text>
  <text x="86" y="224" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">    return <tspan fill="#ffffff">tx.execute(status -> {</tspan></text>
  <text x="86" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      Long id = repo.save(o);</text>
  <text x="86" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">      if <tspan fill="#ffffff">(o.isInvalid()) {</tspan></text>
  <text x="86" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        status.setRollbackOnly();</text>
  <text x="86" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">        return null<tspan fill="#ffffff">;</tspan></text>
  <text x="86" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      }</text>
  <text x="86" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">      return <tspan fill="#ffffff">id;</tspan></text>
  <text x="86" y="350" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    });</text>
  <text x="86" y="368" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  }</text>
  <text x="86" y="386" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">}</text>

  <!-- ── Right: Low-level API + Comparison ── -->
  <text x="450" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">선언적 vs 프로그래밍 방식 비교</text>

  <!-- Comparison table -->
  <rect x="450" y="88" width="360" height="30" rx="6" fill="#111827"/>
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">항목</text>
  <text x="580" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#7777cc">@Transactional</text>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#55c555">Template</text>

  <line x1="450" y1="118" x2="810" y2="118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">코드량</text>
  <text x="580" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">적음</text>
  <text x="710" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">많음</text>

  <line x1="450" y1="142" x2="810" y2="142" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">경계 제어</text>
  <text x="580" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">메서드 단위</text>
  <text x="710" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">코드 블록</text>

  <line x1="450" y1="166" x2="810" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">세밀한 제어</text>
  <text x="580" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">어려움</text>
  <text x="710" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">쉬움</text>

  <line x1="450" y1="190" x2="810" y2="190" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">루프 내 TX</text>
  <text x="580" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">복잡</text>
  <text x="710" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">자연스러움</text>

  <line x1="450" y1="214" x2="810" y2="214" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">주 사용처</text>
  <text x="580" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">서비스 레이어</text>
  <text x="710" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">배치 · 인프라</text>

  <!-- TransactionStatus box -->
  <rect x="450" y="252" width="360" height="82" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="466" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">TransactionStatus 주요 메서드</text>
  <text x="466" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">isNewTransaction()  — 새 트랜잭션 여부</text>
  <text x="466" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">setRollbackOnly()   — 롤백 전용 마킹</text>
  <text x="466" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">hasSavepoint()      — 세이브포인트 여부</text>

  <!-- Best practice note -->
  <rect x="450" y="352" width="360" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="466" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">권장 사용 전략</text>
  <text x="466" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">대부분: @Transactional 선언적 방식 사용</text>
  <text x="466" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">루프 내 개별 TX / 조건부 롤백: TransactionTemplate</text>

  <!-- Bottom note -->
  <text x="440" y="434"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555" text-anchor="middle">두 방식 모두 내부적으로 PlatformTransactionManager를 사용하므로 동일한 트랜잭션 의미론 보장</text>
</svg>
