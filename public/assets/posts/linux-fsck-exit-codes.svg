<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fsck 종료 코드와 자동화 활용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">fsck 결과를 스크립트에서 판별하는 비트마스크 종료 코드</text>
  <!-- Exit codes table -->
  <rect x="60" y="90" width="760" height="30" fill="#111827" rx="4"/>
  <text x="100" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">종료 코드</text>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">의미</text>
  <text x="560" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">스크립트 처리</text>
  <rect x="60" y="120" width="760" height="168" fill="none" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">0</text>
  <text x="240" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">오류 없음 — 정상</text>
  <text x="560" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">마운트 진행 가능</text>
  <text x="100" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">1</text>
  <text x="240" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">오류 발견·수정됨</text>
  <text x="560" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">재부팅 권장</text>
  <text x="100" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a020">2</text>
  <text x="240" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a020">시스템 재부팅 필요</text>
  <text x="560" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">즉시 reboot</text>
  <text x="100" y="211" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">4</text>
  <text x="240" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수정되지 않은 오류</text>
  <text x="560" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수동 개입 필요</text>
  <text x="100" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">8</text>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">동작 오류</text>
  <text x="560" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">실행 자체 실패</text>
  <text x="100" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">16</text>
  <text x="240" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용법 오류</text>
  <text x="560" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">명령어 인수 확인</text>
  <text x="100" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">복합</text>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">위 코드의 OR 비트 합산</text>
  <text x="560" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">if (( rc &amp; 4 )); then ... fi</text>
  <!-- Script snippet -->
  <text x="60" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">e2fsck -fp /dev/sdb1; rc=$?; (( rc &amp; 4 )) &amp;&amp; echo "수동 수정 필요"</text>
</svg>
