<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">레거시 컴포넌트 교체 전략</text>

  <!-- Step 1: 현황 파악 -->
  <rect x="32" y="76" width="234" height="196" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="32" y="76" width="234" height="44" rx="10" fill="#0d1428"/>
  <rect x="32" y="108" width="234" height="12" fill="#0d1428"/>
  <text x="52" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 1</text>
  <text x="149" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">현황 파악</text>
  <text x="52" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="66" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사용 컴포넌트 목록 추출</text>
  <text x="52" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="66" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">폐기 예정 API 확인</text>
  <text x="52" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="66" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">영향 범위 분석</text>
  <text x="149" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" opacity="0.5" text-anchor="middle">ANALYZE</text>

  <!-- Arrow 1→2 -->
  <line x1="268" y1="174" x2="308" y2="174" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: 교체 계획 -->
  <rect x="310" y="76" width="234" height="196" rx="10" fill="#110a20" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="310" y="76" width="234" height="44" rx="10" fill="#160d28"/>
  <rect x="310" y="108" width="234" height="12" fill="#160d28"/>
  <text x="330" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 2</text>
  <text x="427" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">교체 계획</text>
  <text x="330" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="344" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">우선순위 결정</text>
  <text x="330" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="344" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대체 컴포넌트 선정</text>
  <text x="330" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="344" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">테스트 시나리오 작성</text>
  <text x="427" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" opacity="0.5" text-anchor="middle">PLAN</text>

  <!-- Arrow 2→3 -->
  <line x1="546" y1="174" x2="586" y2="174" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: 순차 교체 -->
  <rect x="588" y="76" width="260" height="196" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="588" y="76" width="260" height="44" rx="10" fill="#0d220d"/>
  <rect x="588" y="108" width="260" height="12" fill="#0d220d"/>
  <text x="608" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 3</text>
  <text x="718" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">순차 교체</text>
  <text x="608" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="622" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">폼 단위 교체</text>
  <text x="608" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="622" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">회귀 테스트 실행</text>
  <text x="608" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">•</text>
  <text x="622" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">검증 완료 후 배포</text>
  <text x="718" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" opacity="0.5" text-anchor="middle">EXECUTE</text>

  <!-- Divider -->
  <line x1="32" y1="308" x2="848" y2="308" stroke="#1a1a1a" stroke-width="1"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">API 교체 매핑</text>

  <!-- Risk / mapping indicators -->
  <rect x="32" y="352" width="254" height="60" rx="8" fill="#0a1420" stroke="#7ec8e3" stroke-width="1"/>
  <text x="54" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">createComponent</text>
  <text x="54" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">  →  addChild</text>

  <rect x="314" y="352" width="252" height="60" rx="8" fill="#0f0a1e" stroke="#7777cc" stroke-width="1"/>
  <text x="334" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">getFormRef</text>
  <text x="334" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">  →  getForm</text>

  <rect x="594" y="352" width="254" height="60" rx="8" fill="#081a08" stroke="#55c555" stroke-width="1"/>
  <text x="614" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">setURL</text>
  <text x="614" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">  →  setServiceURL</text>

  <!-- bottom note -->
  <rect x="32" y="432" width="816" height="32" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">교체 작업은 반드시 폼(Form) 단위로 분리하여 점진적으로 진행하세요. 한 번에 전체 교체는 위험합니다.</text>
</svg>
