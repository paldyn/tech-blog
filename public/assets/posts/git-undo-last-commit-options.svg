<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">마지막 커밋을 되돌리는 세 갈래</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">상황에 맞는 도구를 고르는 것이 핵심</text>

  <!-- amend -->
  <rect x="60" y="110" width="240" height="180" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="140" font-size="16" font-weight="600" fill="#55c555">amend</text>
  <text x="80" y="168" font-size="13" fill="#ffffff">직전 커밋을 고쳐 쓴다</text>
  <text x="80" y="192" font-size="13" fill="#888">메시지·내용 수정</text>
  <text x="80" y="234" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git commit</text>
  <text x="80" y="254" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">  --amend</text>
  <text x="80" y="278" font-size="12" fill="#9aa4b8">아직 안 푸쉬했을 때</text>

  <!-- reset -->
  <rect x="320" y="110" width="240" height="180" rx="10" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="140" font-size="16" font-weight="600" fill="#7ec8e3">reset</text>
  <text x="340" y="168" font-size="13" fill="#ffffff">커밋 자체를 제거</text>
  <text x="340" y="192" font-size="13" fill="#888">히스토리에서 삭제</text>
  <text x="340" y="234" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git reset</text>
  <text x="340" y="254" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">  --soft HEAD~1</text>
  <text x="340" y="278" font-size="12" fill="#9aa4b8">로컬 정리에 적합</text>

  <!-- revert -->
  <rect x="580" y="110" width="240" height="180" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="600" y="140" font-size="16" font-weight="600" fill="#e05555">revert</text>
  <text x="600" y="168" font-size="13" fill="#ffffff">취소 커밋을 새로 추가</text>
  <text x="600" y="192" font-size="13" fill="#888">히스토리 보존</text>
  <text x="600" y="234" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git revert</text>
  <text x="600" y="254" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">  HEAD</text>
  <text x="600" y="278" font-size="12" fill="#9aa4b8">이미 푸쉬했을 때</text>

  <text x="60" y="322" font-size="13" fill="#888">공유된 히스토리는 revert, 로컬 전용 히스토리는 amend·reset</text>
</svg>
