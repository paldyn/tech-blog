<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시크릿 관리 방식 비교</text>

  <!-- Native K8s Secret (left) -->
  <rect x="50" y="64" width="250" height="290" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <rect x="50" y="64" width="250" height="40" rx="8" fill="#3a1515"/>
  <rect x="50" y="96" width="250" height="8" rx="0" fill="#3a1515"/>
  <text x="175" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Native K8s Secret</text>
  <text x="66" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠ base64 인코딩 (암호화 아님)</text>
  <text x="66" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠ etcd에 평문 저장 (기본)</text>
  <text x="66" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠ RBAC으로 접근 제어 한계</text>
  <text x="66" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠ Git에 커밋 시 노출 위험</text>
  <text x="66" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보완 방법:</text>
  <text x="66" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ Encryption at Rest 설정</text>
  <text x="66" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ RBAC 최소 권한</text>
  <text x="66" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ Sealed Secrets 사용</text>
  <text x="66" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ ESO 연동</text>
  <text x="175" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">단순 / 기본 제공</text>

  <!-- External Vault (center) -->
  <rect x="330" y="64" width="250" height="290" rx="8" fill="#0f1a10" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="330" y="64" width="250" height="40" rx="8" fill="#153520"/>
  <rect x="330" y="96" width="250" height="8" rx="0" fill="#153520"/>
  <text x="455" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">HashiCorp Vault</text>
  <text x="346" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 강력한 암호화 엔진</text>
  <text x="346" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 동적 시크릿 발급</text>
  <text x="346" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 세분화 정책 (ACL)</text>
  <text x="346" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 감사 로그 (Audit Log)</text>
  <text x="346" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 자동 시크릿 로테이션</text>
  <text x="346" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">K8s 연동:</text>
  <text x="346" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Vault Agent Injector</text>
  <text x="346" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Vault Secrets Operator</text>
  <text x="346" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• External Secrets Operator</text>
  <text x="455" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">고기능 / 복잡도 높음</text>

  <!-- Cloud Secrets (right) -->
  <rect x="610" y="64" width="250" height="290" rx="8" fill="#0f1225" stroke="#2a3a6e" stroke-width="1.5"/>
  <rect x="610" y="64" width="250" height="40" rx="8" fill="#152040"/>
  <rect x="610" y="96" width="250" height="8" rx="0" fill="#152040"/>
  <text x="735" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Cloud Secrets Manager</text>
  <text x="626" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 완전 관리형 서비스</text>
  <text x="626" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ IAM 연동 (IRSA/Workload ID)</text>
  <text x="626" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 자동 로테이션 기본 제공</text>
  <text x="626" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ CloudTrail/Activity Log</text>
  <text x="626" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">서비스:</text>
  <text x="626" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• AWS Secrets Manager</text>
  <text x="626" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• GCP Secret Manager</text>
  <text x="626" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Azure Key Vault</text>
  <text x="626" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• ESO로 K8s 연동</text>
  <text x="735" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">클라우드 종속 / 운영 간편</text>

  <!-- Bottom note -->
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">세 방식은 상호 배타적이 아님 — ESO로 Vault/Cloud를 K8s Secret으로 동기화 가능</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Sealed Secrets는 GitOps 친화적 방식으로 암호화된 형태로 Git에 저장</text>
</svg>
