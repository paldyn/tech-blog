<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파일 업로드 · 다운로드 처리 흐름</text>
  <text x="440" y="64" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">MultipartFile 수신 → 검증 → 저장 / 스트리밍 다운로드</text>

  <!-- Upload flow (left column) -->
  <rect x="50" y="84" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#555"/>
  <text x="230" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">업로드 요청 (multipart/form-data)</text>

  <!-- Arrow upload 1 -->
  <line x1="230" y1="120" x2="230" y2="134" stroke="#555" stroke-width="2"/>
  <polygon points="218,134 242,134 230,146" fill="#555"/>

  <rect x="50" y="146" width="360" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="169" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">MultipartResolver 파싱</text>
  <text x="50" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" opacity="0.6">StandardServletMultipartResolver (기본)</text>

  <!-- Arrow upload 2 -->
  <line x1="230" y1="182" x2="230" y2="196" stroke="#555" stroke-width="2"/>
  <polygon points="218,196 242,196 230,208" fill="#555"/>

  <rect x="50" y="208" width="360" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="231" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#80dd80">파일 검증</text>
  <text x="50" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" opacity="0.6">크기 · MIME 타입 · 확장자 체크</text>

  <!-- Arrow upload 3 -->
  <line x1="230" y1="244" x2="230" y2="258" stroke="#555" stroke-width="2"/>
  <polygon points="218,258 242,258 230,270" fill="#555"/>

  <rect x="50" y="270" width="360" height="36" rx="6" fill="#100c22" stroke="#9988dd" stroke-width="1.5"/>
  <text x="230" y="293" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c4b8f0">저장 (로컬 디스크 / S3)</text>
  <text x="50" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd" opacity="0.6">UUID 파일명 · 원본명 DB 저장</text>

  <!-- Arrow upload 4 -->
  <line x1="230" y1="306" x2="230" y2="320" stroke="#555" stroke-width="2"/>
  <polygon points="218,320 242,320 230,332" fill="#555"/>

  <rect x="50" y="332" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#555"/>
  <text x="230" y="355" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">파일 URL / ID 반환</text>

  <!-- Upload label -->
  <text x="230" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">업로드 흐름</text>

  <!-- Divider -->
  <line x1="450" y1="84" x2="450" y2="440" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Download flow (right column) -->
  <rect x="470" y="84" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#555"/>
  <text x="650" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">다운로드 요청 (GET /files/{id})</text>

  <!-- Arrow download 1 -->
  <line x1="650" y1="120" x2="650" y2="134" stroke="#555" stroke-width="2"/>
  <polygon points="638,134 662,134 650,146" fill="#555"/>

  <rect x="470" y="146" width="360" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="169" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#80dd80">파일 메타데이터 조회 (DB)</text>
  <text x="470" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" opacity="0.6">파일 경로 · 원본명 · MIME 타입</text>

  <!-- Arrow download 2 -->
  <line x1="650" y1="182" x2="650" y2="196" stroke="#555" stroke-width="2"/>
  <polygon points="638,196 662,196 650,208" fill="#555"/>

  <rect x="470" y="208" width="360" height="36" rx="6" fill="#100c22" stroke="#9988dd" stroke-width="1.5"/>
  <text x="650" y="231" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c4b8f0">Resource 로드</text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd" opacity="0.6">FileSystemResource · UrlResource</text>

  <!-- Arrow download 3 -->
  <line x1="650" y1="244" x2="650" y2="258" stroke="#555" stroke-width="2"/>
  <polygon points="638,258 662,258 650,270" fill="#555"/>

  <rect x="470" y="270" width="360" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="293" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ResponseEntity&lt;Resource&gt; 반환</text>
  <text x="470" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" opacity="0.6">Content-Disposition · Content-Type 헤더</text>

  <!-- Arrow download 4 -->
  <line x1="650" y1="306" x2="650" y2="320" stroke="#555" stroke-width="2"/>
  <polygon points="638,320 662,320 650,332" fill="#555"/>

  <rect x="470" y="332" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#555"/>
  <text x="650" y="355" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">스트리밍 전송 (바이트 스트림)</text>

  <!-- Download label -->
  <text x="650" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">다운로드 흐름</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">대용량 파일은 StreamingResponseBody로 메모리 없이 직접 스트리밍</text>
</svg>
