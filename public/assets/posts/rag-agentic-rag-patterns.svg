<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Agentic RAG 패턴 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">단순 RAG → 라우터 RAG → 에이전트 RAG 진화</text>

  <!-- Simple RAG -->
  <rect x="60" y="90" width="220" height="36" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">단순 RAG</text>
  <rect x="60" y="132" width="220" height="120" rx="6" fill="#111" stroke="#333"/>
  <text x="170" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Query → 단일 벡터 검색</text>
  <text x="170" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 고정 컨텍스트 → LLM</text>
  <text x="170" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">구현 단순 · 저비용</text>
  <text x="170" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">유연성 없음 · 복잡 질문 한계</text>
  <text x="170" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단순 FAQ · 정적 문서 검색</text>

  <!-- Router RAG -->
  <rect x="330" y="90" width="220" height="36" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">라우터 RAG</text>
  <rect x="330" y="132" width="220" height="120" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Query 분류 → 적합한 검색기</text>
  <text x="440" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선택 (벡터/SQL/웹)</text>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">다양한 데이터 소스 활용</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">라우팅 규칙 사전 정의 필요</text>
  <text x="440" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복수 데이터 소스 · 구조화 데이터</text>

  <!-- Agentic RAG -->
  <rect x="600" y="90" width="220" height="36" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Agentic RAG</text>
  <rect x="600" y="132" width="220" height="120" rx="6" fill="#111" stroke="#333"/>
  <text x="710" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">에이전트가 도구를 자율 선택</text>
  <text x="710" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">멀티 스텝 · 피드백 루프</text>
  <text x="710" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">높은 유연성 · 복잡 질문 처리</text>
  <text x="710" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">비용·지연시간 증가 · 예측 어려움</text>
  <text x="710" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리서치 에이전트 · 복잡 업무 자동화</text>

  <!-- Code block -->
  <rect x="60" y="276" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># LangGraph로 Agentic RAG 상태 머신 구성</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">graph.add_node(</text>
  <text x="184" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"agent"</text>
  <text x="232" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, agent_node)</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">graph.add_node(</text>
  <text x="184" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"tools"</text>
  <text x="232" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, ToolNode(tools))</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">                                         # 조건부 엣지: 도구 호출시 tools, 완료시 END</text>
</svg>
