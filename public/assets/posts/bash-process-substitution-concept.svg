<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">프로세스 치환 개념</text>

  <defs>
    <marker id="psArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Pipe comparison -->
  <rect x="60" y="64" width="760" height="120" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="88" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">파이프 vs 프로세스 치환</text>

  <rect x="76" y="98" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="118" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 파이프: while이 서브셸에서 실행</text>
  <text x="92" y="136" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">find</tspan><tspan fill="#ffffff"> . | </tspan><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> IFS= </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r f; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="92" y="154" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#e05555"># ✗ while 내 변수 변경이 바깥에서 안 보임</text>

  <rect x="426" y="98" width="378" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="442" y="118" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 프로세스 치환: while이 현재 셸</text>
  <text x="442" y="136" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> IFS= </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r f; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan><tspan fill="#7ec8e3" font-weight="600">done</tspan><tspan fill="#ffffff"> &lt;(</tspan><tspan fill="#7ec8e3" font-weight="600">find</tspan><tspan fill="#ffffff"> .)</tspan></text>
  <text x="442" y="154" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#55c555"># ✓ 변수가 현재 셸에서 보임</text>

  <!-- FD diagram -->
  <rect x="60" y="200" width="760" height="110" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="224" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">내부 동작 — 명명된 파이프(FIFO)</text>

  <rect x="76" y="234" width="200" height="60" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="176" y="258" text-anchor="middle" font-size="13" fill="#e8e8e8">cmd1 (서브프로세스)</text>
  <text x="176" y="276" text-anchor="middle" font-size="12" fill="#888">stdout → /dev/fd/63</text>

  <line x1="276" y1="264" x2="380" y2="264" stroke="#7ec8e3" stroke-width="2" marker-end="url(#psArr)"/>
  <text x="328" y="258" text-anchor="middle" font-size="12" fill="#7ec8e3">/dev/fd/63</text>

  <rect x="380" y="234" width="200" height="60" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="258" text-anchor="middle" font-size="13" fill="#e8e8e8">현재 셸 명령</text>
  <text x="480" y="276" text-anchor="middle" font-size="12" fill="#888">파일처럼 경로 사용</text>

  <!-- Usage examples -->
  <rect x="60" y="326" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="346" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># &lt;(cmd) — 명령 출력을 파일처럼</text>
  <text x="76" y="364" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">diff</tspan><tspan fill="#ffffff"> &lt;(sort file1.txt) &lt;(sort file2.txt)</tspan></text>
  <text x="76" y="382" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">comm</tspan><tspan fill="#ffffff"> -23 &lt;(sort a.txt) &lt;(sort b.txt)</tspan></text>
  <text x="76" y="400" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="418" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># &gt;(cmd) — 명령에 쓰기</text>
  <text x="76" y="436" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">tee</tspan><tspan fill="#ffffff"> &gt;(gzip &gt; log.gz) &gt;(wc -l) &lt; input.txt</tspan></text>
</svg>
