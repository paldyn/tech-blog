<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React 19: ref를 일반 props로 전달</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">forwardRef 없이 ref를 props처럼 받을 수 있다</text>

  <!-- Before: forwardRef required -->
  <rect x="60" y="96" width="360" height="36" rx="8" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Before — React 18 이하</text>

  <rect x="60" y="140" width="360" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// forwardRef 래퍼 필수</text>
  <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> MyInput = forwardRef&lt;</text>
  <text x="76" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  HTMLInputElement, Props</text>
  <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&gt;((props, ref) =&gt; &#123;</text>
  <text x="76" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">input</tspan> ref=&#123;ref&#125; &#123;...props&#125; /&gt;;</text>
  <text x="76" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;);</text>
  <text x="76" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 사용: &lt;MyInput ref={inputRef} /&gt;</text>
  <text x="76" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ref가 props로 자동 안 들어옴</text>
  <text x="76" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// displayName, TypeScript 복잡해짐</text>

  <!-- After: ref as prop -->
  <rect x="460" y="96" width="360" height="36" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="119" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">After — React 19</text>

  <rect x="460" y="140" width="360" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 일반 함수 컴포넌트로 충분</text>
  <text x="476" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> MyInput(&#123; ref, ...props &#125;: &#123;</text>
  <text x="476" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ref?: React.Ref&lt;HTMLInputElement&gt;;</text>
  <text x="476" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  [key: <tspan fill="#7ec8e3" font-weight="600">string</tspan>]: <tspan fill="#7ec8e3" font-weight="600">unknown</tspan>;</text>
  <text x="476" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;) &#123;</text>
  <text x="476" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">input</tspan> ref=&#123;ref&#125; &#123;...props&#125; /&gt;;</text>
  <text x="476" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="476" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 사용: &lt;MyInput ref={inputRef} /&gt;</text>
  <text x="476" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// forwardRef 래퍼 불필요!</text>

  <!-- Migration note -->
  <rect x="60" y="334" width="760" height="120" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">React 19 마이그레이션 — forwardRef 제거</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// React 19에서 forwardRef는 여전히 동작하지만 deprecated 예정</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">// codemod: npx </tspan>react-codemod@latest <tspan fill="#ce9178">forwardRef</tspan></text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// → forwardRef 래퍼를 자동으로 제거해줌</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// useImperativeHandle은 그대로 사용 가능 (ref prop을 통해)</text>
  <text x="76" y="445" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// ref를 props 디스트럭처링 맨 마지막에 (또는 별도 prop으로) 받는 것을 권장</text>
</svg>
