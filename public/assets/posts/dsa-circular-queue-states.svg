<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">원형 큐 상태 전이 (capacity = 5)</text>

  <!-- ─── State helper macro: each state is 5 cells ─── -->
  <!-- State 1: empty (front=0, rear=0) -->
  <text x="110" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">① 초기 (빈 상태)</text>
  <text x="110" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">front=0, rear=0</text>

  <rect x="60"  y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="106" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="152" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="198" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="244" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="80"  y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">F R</text>
  <text x="80"  y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[0]</text>

  <!-- State 2: enqueue A,B,C (front=0, rear=3) -->
  <text x="395" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">② enqueue(A,B,C)</text>
  <text x="395" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">front=0, rear=3</text>

  <rect x="346" y="108" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="366" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">A</text>
  <rect x="392" y="108" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="412" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">B</text>
  <rect x="438" y="108" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="458" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">C</text>
  <rect x="484" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="530" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="366" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">F</text>
  <text x="366" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[0]</text>
  <text x="504" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">R</text>
  <text x="504" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[3]</text>

  <!-- State 3: dequeue A,B → front=2 -->
  <text x="730" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">③ dequeue × 2</text>
  <text x="730" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">front=2, rear=3</text>

  <rect x="682" y="108" width="40" height="40" rx="5" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="702" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333">A</text>
  <rect x="728" y="108" width="40" height="40" rx="5" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="748" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333">B</text>
  <rect x="774" y="108" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="794" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">C</text>
  <rect x="820" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="636" y="108" width="40" height="40" rx="5" fill="none" stroke="#2a3a5e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="794" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">F</text>
  <text x="794" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[2]</text>
  <text x="840" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">R</text>
  <text x="840" y="173" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[3]</text>

  <!-- State 4: wrap-around — enqueue D, E → rear wraps to 0 then 1 -->
  <text x="110" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">④ enqueue(D,E) — 래핑!</text>
  <text x="110" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">front=2, rear=0</text>

  <rect x="60"  y="242" width="40" height="40" rx="5" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="1.5"/>
  <text x="80"  y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">E</text>
  <rect x="106" y="242" width="40" height="40" rx="5" fill="#1a0d0d" stroke="#4a2a2a" stroke-width="1"/>
  <text x="126" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333">A</text>
  <rect x="152" y="242" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="172" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">C</text>
  <rect x="198" y="242" width="40" height="40" rx="5" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="218" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">D</text>
  <rect x="244" y="242" width="40" height="40" rx="5" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="1.5"/>
  <text x="264" y="267" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">E</text>
  <!-- wait, E should be at index 4 with rear=0... let me re-think -->
  <!-- Actually: after enqueue(D): rear=(3+1)%5=4, after enqueue(E): rear=(4+1)%5=0 -->
  <!-- So: [idx0: empty, idx1: empty, idx2: C(front), idx3: D, idx4: E, rear=0] -->

  <!-- Labels -->
  <text x="80"  y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">R[0]</text>
  <text x="172" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">F[2]</text>

  <!-- wrap arrow -->
  <path d="M 284 262 C 284 310, 80 310, 80 284" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <text x="182" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">(rear+1)%5 = 0 으로 래핑</text>

  <!-- Code block -->
  <rect x="350" y="210" width="470" height="210" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="366" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">class</text>
  <text x="407" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> CircularQueue:</text>
  <text x="366" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">    def</text>
  <text x="406" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> __init__(self, cap):</text>
  <text x="366" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        self.data = [None]*cap</text>
  <text x="366" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        self.cap = cap</text>
  <text x="366" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        self.front = self.rear = 0</text>
  <text x="366" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">    def</text>
  <text x="406" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> enqueue(self, val):</text>
  <text x="366" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        next_r = (self.rear+1) % self.cap</text>
  <text x="366" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        if next_r == self.front: raise</text>
  <text x="366" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        self.data[self.rear] = val</text>
  <text x="366" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        self.rear = next_r</text>

  <!-- bottom note -->
  <rect x="60" y="380" width="278" height="44" rx="6" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">모든 연산 O(1), 공간 O(n)</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">실제 용량 = capacity - 1</text>
</svg>
