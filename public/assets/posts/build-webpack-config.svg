<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">webpack.config.js 전체 구조</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">mode · entry · output · optimization · resolve 핵심 옵션</text>

  <rect x="60" y="96" width="400" height="282" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// webpack.config.js</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export default </tspan><tspan fill="#ffffff">{</tspan></text>
  
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  mode: </tspan><tspan fill="#ce9178">'production'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  entry: </tspan><tspan fill="#ce9178">'./src/index.ts'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  output: {</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    filename: </tspan><tspan fill="#ce9178">'[name].[contenthash].js'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    path: path.resolve(__dirname, </tspan><tspan fill="#ce9178">'dist'</tspan><tspan fill="#ffffff">),</tspan></text>

  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    clean: </tspan><tspan fill="#7ec8e3">true</tspan></text>
  
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  },</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  optimization: {</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    splitChunks: {</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      chunks: </tspan><tspan fill="#ce9178">'all'</tspan><tspan fill="#ffffff">} },</tspan></text>

  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  resolve: { extensions: [</tspan><tspan fill="#ce9178">'.ts'</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#ce9178">'.js'</tspan><tspan fill="#ffffff">] },</tspan></text>

  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>

  <!-- Right: Key concepts -->
  <text x="500" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">핵심 개념</text>

  <rect x="500" y="120" width="320" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="516" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">[contenthash]</text>
  <text x="516" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">내용 기반 해시 — 캐시 무효화 자동화</text>

  <rect x="500" y="186" width="320" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="516" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">splitChunks</text>
  <text x="516" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">공통 모듈 자동 분리 → 캐시 효율 향상</text>

  <rect x="500" y="252" width="320" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="516" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">Tree Shaking</text>
  <text x="516" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">mode: production에서 자동 활성화</text>

  <rect x="500" y="318" width="320" height="56" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="516" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">HMR (Hot Module Replacement)</text>
  <text x="516" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">개발 서버에서 페이지 새로고침 없이 교체</text>

  <text x="60" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">Loader는 역순 실행: css-loader → style-loader 순서로 배열에 배치</text>
</svg>
