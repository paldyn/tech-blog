<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Stream 재사용 불가 — IllegalStateException</text>

  <!-- Wrong usage header -->
  <text x="215" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">잘못된 사용 (재사용 시도)</text>
  <text x="655" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">올바른 사용 (매번 새 스트림)</text>

  <!-- Wrong code -->
  <rect x="60" y="90" width="330" height="178" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 스트림을 변수에 저장 후 재사용</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Stream</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; s = list.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">long</tspan><tspan fill="#ffffff"> cnt = s.</tspan><tspan font-weight="600" fill="#7ec8e3">count</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 이미 소비된 스트림 재사용!</text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; res = s.</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">filter</tspan><tspan fill="#ffffff">(x -> x.</tspan><tspan font-weight="600" fill="#7ec8e3">startsWith</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">toList</tspan><tspan fill="#ffffff">()); </tspan><tspan fill="#e05555">// 예외!</tspan></text>
  <text x="76" y="255" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">IllegalStateException: stream closed</text>

  <!-- Correct code -->
  <rect x="460" y="90" width="360" height="178" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 매번 새 스트림 생성</text>
  <text x="476" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">long</tspan><tspan fill="#ffffff"> cnt = list.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">().</tspan><tspan font-weight="600" fill="#7ec8e3">count</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="476" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 필요할 때마다 새 스트림 생성</text>
  <text x="476" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; res = list.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="476" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">filter</tspan><tspan fill="#ffffff">(x -> x.</tspan><tspan font-weight="600" fill="#7ec8e3">startsWith</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="476" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">toList</tspan><tspan fill="#ffffff">()); </tspan><tspan fill="#55c555">// OK</tspan></text>
  <text x="476" y="255" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">새 스트림은 항상 새 파이프라인</text>

  <!-- State diagram -->
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">스트림 생명주기</text>

  <!-- State boxes -->
  <rect x="60" y="310" width="160" height="48" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">생성 (Created)</text>
  <text x="140" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">아직 미소비</text>

  <line x1="220" y1="334" x2="278" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="249" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">중간 연산</text>

  <rect x="280" y="310" width="160" height="48" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="360" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">지연 (Lazy)</text>
  <text x="360" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">종료 전 미실행</text>

  <line x1="440" y1="334" x2="498" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="469" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">종료 연산</text>

  <rect x="500" y="310" width="160" height="48" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">소비 (Consumed)</text>
  <text x="580" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재사용 불가</text>

  <rect x="680" y="310" width="140" height="48" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="750" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">새 스트림 생성</text>
  <text x="750" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.stream() 재호출</text>

  <line x1="660" y1="334" x2="678" y2="334" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">종료 연산 호출 후 스트림은 closed 상태로 전환 — 이후 어떤 연산도 IllegalStateException 발생</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">재사용이 필요하다면 Supplier&lt;Stream&lt;T&gt;&gt; 패턴으로 팩토리 제공: () -&gt; list.stream()</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">또는 결과를 중간 컬렉션에 저장 후 다시 스트림 생성</text>
</svg>
