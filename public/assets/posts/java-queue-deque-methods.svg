<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Queue / Deque 메서드 대응표</text>

  <!-- Column headers -->
  <rect x="60" y="64" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">동작</text>
  <text x="290" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">실패 시 예외 (throw)</text>
  <text x="490" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">실패 시 null/false (safe)</text>
  <text x="710" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">Deque 양방향</text>
  <line x1="200" y1="64" x2="200" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="380" y1="64" x2="380" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="64" x2="600" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: 삽입 -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">삽입 (tail)</text>
  <text x="290" y="131" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">add(e)</text>
  <text x="490" y="131" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">offer(e)</text>
  <text x="710" y="131" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">addFirst/Last, offerFirst/Last</text>
  <line x1="200" y1="104" x2="200" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="380" y1="104" x2="380" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="104" x2="600" y2="148" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 2: 조회 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">조회 (head, 제거 안 함)</text>
  <text x="290" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">element()</text>
  <text x="490" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">peek()</text>
  <text x="710" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">peekFirst / peekLast</text>
  <line x1="200" y1="148" x2="200" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="380" y1="148" x2="380" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="148" x2="600" y2="192" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 3: 제거 -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">제거 (head)</text>
  <text x="290" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">remove()</text>
  <text x="490" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">poll()</text>
  <text x="710" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pollFirst / pollLast</text>
  <line x1="200" y1="192" x2="200" y2="236" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="380" y1="192" x2="380" y2="236" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="192" x2="600" y2="236" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 4: Stack 관련 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스택 push / pop</text>
  <text x="290" y="263" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">push(e) = addFirst</text>
  <text x="490" y="263" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">pop() = removeFirst</text>
  <text x="710" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">Deque로 스택 대체 가능</text>
  <line x1="200" y1="236" x2="200" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="380" y1="236" x2="380" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="236" x2="600" y2="280" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Best practice box -->
  <rect x="60" y="298" width="760" height="84" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">ArrayDeque 권장 이유</text>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Queue 용도: ArrayDeque.offer/poll — LinkedList보다 캐시 지역성 우수</text>
  <text x="440" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Stack 용도: ArrayDeque.push/pop — Stack 클래스보다 빠르고 캡슐화 우수</text>
  <text x="440" y="375" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">null 비허용 | 동기화 없음 (단일 스레드용) | 멀티스레드: LinkedBlockingDeque 사용</text>
</svg>
