<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">seek/tell 실전 활용</text>

  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이진 파일 구조 파싱</text>

  <rect x="60" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># WAV 파일 헤더 읽기 예시</text>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(<ttml:tspan fill="#ce9178">"audio.wav"</ttml:tspan>, <ttml:tspan fill="#ce9178">"rb"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 파일 크기 확인</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.seek(<ttml:tspan fill="#b5cea8">0</ttml:tspan>, <ttml:tspan fill="#b5cea8">2</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    size = f.tell()</text>
  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.seek(<ttml:tspan fill="#b5cea8">0</ttml:tspan>)  <ttml:tspan fill="#9aa4b8"># 처음으로 되돌리기</ttml:tspan></text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # RIFF 시그니처 (4바이트)</text>
  <text xml:space="preserve" x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    sig = f.read(<ttml:tspan fill="#b5cea8">4</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    assert sig == b<ttml:tspan fill="#ce9178">"RIFF"</ttml:tspan></text>
  <text xml:space="preserve" x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 샘플 레이트 (24번 위치)</text>
  <text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.seek(<ttml:tspan fill="#b5cea8">24</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    sr = <ttml:tspan font-weight="600" fill="#7ec8e3">int</ttml:tspan>.from_bytes(f.read(<ttml:tspan fill="#b5cea8">4</ttml:tspan>),</text>
  <text xml:space="preserve" x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                          <ttml:tspan fill="#ce9178">"little"</ttml:tspan>)</text>

  <rect x="450" y="68" width="370" height="26" rx="4" fill="#2a1a4a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">텍스트 파일 제자리 수정</text>

  <rect x="450" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># r+로 열어 일부 교체</text>
  <text xml:space="preserve" x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(<ttml:tspan fill="#ce9178">"data.txt"</ttml:tspan>, <ttml:tspan fill="#ce9178">"r+"</ttml:tspan>,</text>
  <text xml:space="preserve" x="466" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="466" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    content = f.read()</text>
  <text xml:space="preserve" x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    new = content.replace(</text>
  <text xml:space="preserve" x="466" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        <ttml:tspan fill="#ce9178">"OLD"</ttml:tspan>, <ttml:tspan fill="#ce9178">"NEW"</ttml:tspan>)</text>
  <text xml:space="preserve" x="466" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.seek(<ttml:tspan fill="#b5cea8">0</ttml:tspan>)       <ttml:tspan fill="#9aa4b8"># 처음으로</ttml:tspan></text>
  <text xml:space="preserve" x="466" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(new)    <ttml:tspan fill="#9aa4b8"># 덮어쓰기</ttml:tspan></text>
  <text xml:space="preserve" x="466" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.truncate()    <ttml:tspan fill="#9aa4b8"># 나머지 잘라냄</ttml:tspan></text>
  <text xml:space="preserve" x="466" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># truncate 없으면 이전 내용</text>
  <text xml:space="preserve" x="466" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 잔재가 파일 끝에 남음</text>
  <text xml:space="preserve" x="466" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 단순 교체는 pathlib 권장:</text>
  <text xml:space="preserve" x="466" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Path(p).write_text(new_content)</text>
</svg>
