<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">풍선 터뜨리기 — 구간 DP 예제</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">nums=[3,1,5,8], 경계값 1 추가 → [1,3,1,5,8,1]</text>

  <!-- Balloon array -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">핵심 아이디어: k가 구간 [i..j]에서 마지막으로 터지는 풍선</text>
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">k를 마지막으로 터뜨리면 → 그 시점 이웃은 arr[i-1]과 arr[j+1]</text>

  <!-- Visual: balloon sequence with padding -->
  <rect x="60" y="130" width="50" height="40" fill="#1a1a3a" rx="5" stroke="#7777cc" stroke-width="1.5"/>
  <text x="85" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">1</text>
  <text x="85" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">경계</text>

  <rect x="120" y="130" width="50" height="40" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">3</text>
  <text x="145" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">i=1</text>

  <rect x="180" y="130" width="50" height="40" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="205" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">1</text>
  <text x="205" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">i=2</text>

  <rect x="240" y="130" width="50" height="40" fill="#2a3a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="265" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">5</text>
  <text x="265" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">k=3</text>

  <rect x="300" y="130" width="50" height="40" fill="#1a2a3a" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="325" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">8</text>
  <text x="325" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">i=4</text>

  <rect x="360" y="130" width="50" height="40" fill="#1a1a3a" rx="5" stroke="#7777cc" stroke-width="1.5"/>
  <text x="385" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">1</text>
  <text x="385" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">경계</text>

  <!-- Explanation box -->
  <rect x="60" y="200" width="360" height="82" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">k=3 (값=5)이 [1..4] 구간에서 마지막이면:</text>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">  점수 = arr[0]*arr[3]*arr[5] = 1*5*1 = 5</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  + dp[1][2] (왼쪽 부분 최적)</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  + dp[4][4] (오른쪽 부분 최적)</text>

  <!-- Code box -->
  <rect x="460" y="90" width="380" height="296" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 풍선 터뜨리기 (LC 312)</text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def maxCoins(nums):</text>
  <text x="476" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    arr = [1] + nums + [1]</text>
  <text x="476" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    n = len(arr)</text>
  <text x="476" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [[0]*n for _ in range(n)]</text>
  <text x="476" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for L in range(1, n-1):</text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for i in range(1, n-1-L+1):</text>
  <text x="476" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            j = i + L - 1</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">            for k in range(i, j+1):</text>
  <text x="476" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                gain = arr[i-1]*arr[k]*arr[j+1]</text>
  <text x="476" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                left = dp[i][k-1] if k&gt;i else 0</text>
  <text x="476" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                right= dp[k+1][j] if k&lt;j else 0</text>
  <text x="476" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                dp[i][j]=max(dp[i][j],gain+left+right)</text>
  <text x="476" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp[1][n-2]</text>
  <text x="476" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># [3,1,5,8] → 167</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="380" height="70" fill="#1a3a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">maxCoins([3,1,5,8]) = 167</text>
  <text x="250" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최적 순서: 1→5→3→8 (1+30+15+120=166? 검증필요)</text>
  <text x="250" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시간 O(n³), 공간 O(n²)</text>
</svg>
