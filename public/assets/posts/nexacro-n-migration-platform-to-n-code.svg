  <text x="78" y="90"  font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// migrate-check.js</text>
  <text x="78" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Platform → N 호환성 사전 점검</text>
  <text x="78" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text x="107" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> aDeprecated = [</text>
  <text x="78" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "setURL"</text>
  <text x="170" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="186" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">         // → setServiceURL</text>
  <text x="78" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "getFormRef"</text>
  <text x="194" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="210" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">      // → getForm</text>
  <text x="78" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "createComponent"</text>
  <text x="250" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="262" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // → addChild</text>
  <text x="78" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "XComp_oncreate"</text>
  <text x="250" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="262" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // → onload 이벤트</text>
  <text x="78" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">];</text>
  <text x="78" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="149" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> checkDeprecated(sCode) {</text>
  <text x="78" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  var</text>
  <text x="112" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> aFound = [];</text>
  <text x="78" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  aDeprecated.</text>
  <text x="172" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">forEach</text>
  <text x="224" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="232" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="295" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(api) {</text>
  <text x="78" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="108" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (sCode.</text>
  <text x="169" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">indexOf</text>
  <text x="228" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(api) &gt;= </text>
  <text x="298" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="308" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) aFound.</text>
  <text x="381" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">push</text>
  <text x="414" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(api);</text>
  <text x="78" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }); </text>
  <text x="131" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="182" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> aFound; }</text>
