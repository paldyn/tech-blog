<svg width="880" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">구간 스케줄링 — 타임라인</text>

  <!-- Axis label -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">시간 축 (0 ~ 12)</text>

  <!-- Time axis -->
  <line x1="80" y1="110" x2="820" y2="110" stroke="#444" stroke-width="1.5"/>

  <!-- Time ticks 0-12 -->
  <line x1="80" y1="105" x2="80" y2="115" stroke="#444" stroke-width="1"/>
  <text x="80" y="128" text-anchor="middle" font-size="11" fill="#888">0</text>
  <line x1="140" y1="105" x2="140" y2="115" stroke="#444" stroke-width="1"/>
  <text x="140" y="128" text-anchor="middle" font-size="11" fill="#888">1</text>
  <line x1="200" y1="105" x2="200" y2="115" stroke="#444" stroke-width="1"/>
  <text x="200" y="128" text-anchor="middle" font-size="11" fill="#888">2</text>
  <line x1="260" y1="105" x2="260" y2="115" stroke="#444" stroke-width="1"/>
  <text x="260" y="128" text-anchor="middle" font-size="11" fill="#888">3</text>
  <line x1="320" y1="105" x2="320" y2="115" stroke="#444" stroke-width="1"/>
  <text x="320" y="128" text-anchor="middle" font-size="11" fill="#888">4</text>
  <line x1="380" y1="105" x2="380" y2="115" stroke="#444" stroke-width="1"/>
  <text x="380" y="128" text-anchor="middle" font-size="11" fill="#888">5</text>
  <line x1="440" y1="105" x2="440" y2="115" stroke="#444" stroke-width="1"/>
  <text x="440" y="128" text-anchor="middle" font-size="11" fill="#888">6</text>
  <line x1="500" y1="105" x2="500" y2="115" stroke="#444" stroke-width="1"/>
  <text x="500" y="128" text-anchor="middle" font-size="11" fill="#888">7</text>
  <line x1="560" y1="105" x2="560" y2="115" stroke="#444" stroke-width="1"/>
  <text x="560" y="128" text-anchor="middle" font-size="11" fill="#888">8</text>
  <line x1="620" y1="105" x2="620" y2="115" stroke="#444" stroke-width="1"/>
  <text x="620" y="128" text-anchor="middle" font-size="11" fill="#888">9</text>
  <line x1="680" y1="105" x2="680" y2="115" stroke="#444" stroke-width="1"/>
  <text x="680" y="128" text-anchor="middle" font-size="11" fill="#888">10</text>
  <line x1="740" y1="105" x2="740" y2="115" stroke="#444" stroke-width="1"/>
  <text x="740" y="128" text-anchor="middle" font-size="11" fill="#888">11</text>
  <line x1="800" y1="105" x2="800" y2="115" stroke="#444" stroke-width="1"/>
  <text x="800" y="128" text-anchor="middle" font-size="11" fill="#888">12</text>

  <!-- Intervals: 1 unit = 60px, start at x=80 -->
  <!-- A: [1,4] → x=140 to x=320, width=180 → SELECTED -->
  <rect x="140" y="148" width="180" height="30" rx="5" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="230" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">A  [1,4]</text>

  <!-- B: [3,5] → x=260 to x=380 → REJECTED (overlaps A) -->
  <rect x="260" y="190" width="120" height="30" rx="5" fill="#1a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="320" y="210" text-anchor="middle" font-size="13" fill="#555">B  [3,5]</text>

  <!-- C: [0,6] → x=80 to x=440 → REJECTED (too long) -->
  <rect x="80" y="232" width="360" height="30" rx="5" fill="#1a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="260" y="252" text-anchor="middle" font-size="13" fill="#555">C  [0,6]</text>

  <!-- D: [5,7] → x=380 to x=500 → SELECTED -->
  <rect x="380" y="274" width="120" height="30" rx="5" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">D  [5,7]</text>

  <!-- E: [6,9] → x=440 to x=620 → REJECTED (overlaps D) -->
  <rect x="440" y="316" width="180" height="30" rx="5" fill="#1a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="530" y="336" text-anchor="middle" font-size="13" fill="#555">E  [6,9]</text>

  <!-- F: [8,11] → x=560 to x=740 → SELECTED -->
  <rect x="560" y="358" width="180" height="30" rx="5" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">F  [8,11]</text>

  <!-- Legend -->
  <rect x="80" y="418" width="20" height="14" rx="3" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="108" y="430" font-size="13" fill="#55c555">선택됨 (3개)</text>
  <rect x="240" y="418" width="20" height="14" rx="3" fill="#1a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="268" y="430" font-size="13" fill="#888">제외됨 (3개)</text>

  <!-- Sorting note -->
  <text x="440" y="418" font-size="13" fill="#888">정렬 기준: 종료 시간 (end time)</text>
  <text x="440" y="438" font-size="13" fill="#7ec8e3">A(4) → B(5) → D(7) → E(9) → F(11)</text>
  <text x="440" y="458" font-size="13" fill="#e8e8e8">탐욕 선택: A, D, F → 3개 비겹침 구간</text>
</svg>
