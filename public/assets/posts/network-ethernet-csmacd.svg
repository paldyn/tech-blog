<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSMA/CD — 충돌 감지 및 회피</text>

  <!-- CSMA/CD flowchart -->
  <!-- Start -->
  <rect x="340" y="66" width="200" height="46" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">전송할 데이터 있음</text>

  <line x1="440" y1="112" x2="440" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Carrier sense -->
  <rect x="290" y="130" width="300" height="46" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c" text-anchor="middle">CS: 채널 감지</text>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(Carrier Sense)</text>

  <line x1="440" y1="176" x2="440" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Decision: Channel free? -->
  <path d="M 440 194 L 560 220 L 440 246 L 320 220 Z" fill="#2a1a0a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">채널 사용 중?</text>

  <!-- Yes: wait -->
  <line x1="560" y1="220" x2="700" y2="220" stroke="#e05555" stroke-width="2"/>
  <text x="630" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">사용 중</text>
  <rect x="700" y="196" width="120" height="48" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">대기</text>
  <text x="760" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(Random Backoff)</text>
  <!-- Loop back up -->
  <path d="M 760 244 L 760 270 L 440 270 L 440 246" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- No: transmit -->
  <line x1="440" y1="246" x2="440" y2="264" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">비어있음</text>

  <rect x="340" y="272" width="200" height="46" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">전송 시작</text>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Multiple Access</text>

  <line x1="440" y1="318" x2="440" y2="336" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>

  <!-- Collision detect -->
  <path d="M 440 336 L 540 354 L 440 372 L 340 354 Z" fill="#2a0a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">충돌 감지?</text>

  <!-- No collision: success -->
  <line x1="340" y1="354" x2="200" y2="354" stroke="#55c555" stroke-width="2"/>
  <text x="270" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">없음</text>
  <rect x="100" y="330" width="100" height="48" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">전송 완료</text>

  <!-- Collision: jam + backoff -->
  <line x1="440" y1="372" x2="440" y2="390" stroke="#e05555" stroke-width="2" marker-end="url(#arr-d)"/>
  <text x="458" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">감지됨!</text>
  <rect x="340" y="390" width="200" height="46" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">CD: JAM 신호 전송</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">지수 백오프 후 재시도</text>
</svg>
