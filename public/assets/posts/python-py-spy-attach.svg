<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="260" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">코드 수정 없이 바깥에서 들여다본다</text>

  <defs>
    <marker id="psarr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="520" y="96" width="300" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="670" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">실행 중인 파이썬 프로세스</text>
  <text x="670" y="152" font-size="12" fill="#9aa4b8" text-anchor="middle">PID 12345 · 멈추지 않고 계속 실행</text>
  <text x="670" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">운영 서버에서도 그대로</text>

  <rect x="60" y="110" width="300" height="72" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="138" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">py-spy (별도 프로세스)</text>
  <text xml:space="preserve" x="210" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">py-spy top --pid 12345</text>

  <line x1="360" y1="146" x2="516" y2="146" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#psarr)"/>
  <text x="438" y="132" font-size="12" fill="#888" text-anchor="middle">스택 샘플링</text>

  <rect x="60" y="208" width="760" height="38" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="78" y="232" font-size="13" fill="#55c555">대상 코드에 import도, 데코레이터도 필요 없다 — 오버헤드가 거의 없어 운영에서도 안전</text>
</svg>
