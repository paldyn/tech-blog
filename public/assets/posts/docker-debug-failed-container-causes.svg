<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 실패 원인 분류</text>

  <!-- Center box -->
  <rect x="330" y="160" width="220" height="70" rx="10" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">컨테이너 실패</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Exited / CrashLoop</text>

  <!-- Cause boxes -->
  <!-- Startup error -->
  <rect x="40" y="68" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">시작 오류</text>
  <text x="140" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ENTRYPOINT/CMD 오류</text>
  <text x="140" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일/퍼미션 없음</text>
  <text x="140" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ExitCode: 1, 2, 126, 127</text>

  <!-- Config error -->
  <rect x="40" y="190" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">설정 오류</text>
  <text x="140" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">환경변수 누락</text>
  <text x="140" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시크릿/설정파일 경로 오류</text>
  <text x="140" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ExitCode: 1</text>

  <!-- OOM -->
  <rect x="40" y="312" width="200" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">OOM Killed</text>
  <text x="140" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메모리 제한 초과</text>
  <text x="140" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cgroup OOM Killer 작동</text>
  <text x="140" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ExitCode: 137</text>

  <!-- Dep failure -->
  <rect x="640" y="68" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">의존성 실패</text>
  <text x="740" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB/Redis 연결 불가</text>
  <text x="740" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네트워크 격리 문제</text>
  <text x="740" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ExitCode: 1</text>

  <!-- Healthcheck fail -->
  <rect x="640" y="190" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">헬스체크 실패</text>
  <text x="740" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">unhealthy 상태</text>
  <text x="740" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재시작 정책에 따라 재실행</text>
  <text x="740" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker inspect 로 확인</text>

  <!-- Crash / signal -->
  <rect x="640" y="312" width="200" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">프로세스 크래시</text>
  <text x="740" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Segfault, SIGABRT</text>
  <text x="740" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코어 덤프 발생</text>
  <text x="740" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ExitCode: 139</text>

  <!-- Arrows -->
  <line x1="240" y1="108" x2="330" y2="175" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="240" y1="230" x2="330" y2="195" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="240" y1="352" x2="330" y2="215" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="640" y1="108" x2="550" y2="175" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="640" y1="230" x2="550" y2="195" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="640" y1="352" x2="550" y2="215" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
</svg>
