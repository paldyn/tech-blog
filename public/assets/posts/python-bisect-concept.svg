<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">bisect — 정렬된 리스트에서 삽입 위치 탐색</text>

  <!-- Sorted list visualization -->
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">정렬된 리스트: [1, 3, 5, 5, 7, 9]</text>

  <!-- Cells -->
  <rect x="130" y="96" width="80" height="52" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="170" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8e8e8">1</text>
  <text x="170" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=0</text>

  <rect x="220" y="96" width="80" height="52" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="260" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8e8e8">3</text>
  <text x="260" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=1</text>

  <rect x="310" y="96" width="80" height="52" rx="6" fill="#0d1926" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#7ec8e3">5</text>
  <text x="350" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=2</text>

  <rect x="400" y="96" width="80" height="52" rx="6" fill="#0d1926" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#7ec8e3">5</text>
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=3</text>

  <rect x="490" y="96" width="80" height="52" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="530" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8e8e8">7</text>
  <text x="530" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=4</text>

  <rect x="580" y="96" width="80" height="52" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="620" y="127" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8e8e8">9</text>
  <text x="620" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">i=5</text>

  <!-- bisect_left arrow -->
  <line x1="350" y1="160" x2="350" y2="195" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="350,198 345,188 355,188" fill="#7ec8e3"/>
  <rect x="260" y="200" width="180" height="36" rx="6" fill="#0d1926" stroke="#7ec8e3"/>
  <text x="350" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">bisect_left(a, 5) = 2</text>
  <text x="350" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">5 이전 첫 위치</text>

  <!-- bisect_right arrow -->
  <line x1="440" y1="160" x2="490" y2="195" stroke="#e05555" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="490,198 480,190 485,182" fill="#e05555"/>
  <rect x="416" y="200" width="180" height="36" rx="6" fill="#1a0d0d" stroke="#e05555"/>
  <text x="506" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">bisect_right(a, 5) = 4</text>
  <text x="506" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">5 다음 첫 위치</text>

  <!-- Summary table -->
  <rect x="60" y="276" width="760" height="100" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">bisect_left vs bisect_right (bisect)</text>

  <text x="200" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">bisect_left(a, x)</text>
  <text x="200" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">x보다 크거나 같은 첫 위치</text>
  <text x="200" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기존 x 앞에 삽입</text>

  <text x="640" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">bisect_right(a, x) = bisect(a, x)</text>
  <text x="640" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">x보다 큰 첫 위치</text>
  <text x="640" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기존 x 뒤에 삽입</text>
</svg>
