<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">dynamic import 코드 스플리팅</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">컴포넌트 청크 분리 &amp; 지연 로드 흐름</text>

  <!-- Initial bundle -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">초기 번들</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">main.js (~핵심 코드만)</text>
  <text x="160" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">즉시 다운로드</text>

  <!-- Defs -->
  <defs>
    <marker id="darr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="darr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Arrow: bundle -> triggers -->
  <line x1="260" y1="140" x2="316" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#darr1)"/>
  <text x="288" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">렌더</text>

  <!-- User actions box -->
  <rect x="318" y="100" width="200" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="418" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">트리거 발생</text>
  <text x="418" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버튼 클릭 / 스크롤</text>
  <text x="418" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건 충족</text>

  <!-- Arrow: trigger -> chunk -->
  <line x1="518" y1="140" x2="574" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#darr2)"/>
  <text x="546" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fetch</text>

  <!-- Chunk box -->
  <rect x="576" y="100" width="244" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="698" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">청크 파일 로드</text>
  <text x="698" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">chart.js.chunk / modal.chunk</text>
  <text x="698" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">필요할 때만 다운로드</text>

  <!-- dynamic options -->
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">dynamic() 주요 옵션</text>

  <rect x="60" y="248" width="220" height="80" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">loading</text>
  <text x="170" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로딩 중 표시할</text>
  <text x="170" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">폴백 컴포넌트</text>

  <rect x="300" y="248" width="220" height="80" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="410" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">ssr</text>
  <text x="410" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">false → SSR 비활성</text>
  <text x="410" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(클라이언트 전용)</text>

  <rect x="540" y="248" width="280" height="80" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">import()</text>
  <text x="680" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동적으로 불러올</text>
  <text x="680" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴포넌트 경로</text>

  <!-- bottom info -->
  <rect x="60" y="356" width="760" height="60" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">적합한 사용처</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차트 라이브러리 · 모달/다이얼로그 · 리치 텍스트 에디터 · 지도 컴포넌트 · 브라우저 전용 API</text>
</svg>
