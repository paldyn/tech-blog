<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">SELECT의 논리적 실행 순서 (Logical Processing Order)</text>

  <!-- Pipeline stages - vertical -->
  <!-- Step 1: FROM -->
  <rect x="60" y="70" width="160" height="44" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">① FROM / JOIN</text>
  <text x="140" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">원본 행 집합 구성</text>

  <!-- Arrow down -->
  <line x1="140" y1="114" x2="140" y2="138" stroke="#444" stroke-width="2"/>
  <polygon points="134,138 140,150 146,138" fill="#444"/>

  <!-- Step 2: WHERE -->
  <rect x="60" y="150" width="160" height="44" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">② WHERE</text>
  <text x="140" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">행 필터링</text>

  <line x1="140" y1="194" x2="140" y2="218" stroke="#444" stroke-width="2"/>
  <polygon points="134,218 140,230 146,218" fill="#444"/>

  <!-- Step 3: GROUP BY -->
  <rect x="60" y="230" width="160" height="44" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">③ GROUP BY</text>
  <text x="140" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">그룹화</text>

  <line x1="140" y1="274" x2="140" y2="298" stroke="#444" stroke-width="2"/>
  <polygon points="134,298 140,310 146,298" fill="#444"/>

  <!-- Step 4: HAVING -->
  <rect x="60" y="310" width="160" height="44" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">④ HAVING</text>
  <text x="140" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">그룹 필터링</text>

  <line x1="140" y1="354" x2="140" y2="378" stroke="#444" stroke-width="2"/>
  <polygon points="134,378 140,390 146,378" fill="#444"/>

  <!-- Step 5: SELECT -->
  <rect x="60" y="390" width="160" height="44" rx="8" fill="#071a07" stroke="#55c555" stroke-width="2"/>
  <text x="140" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle" xml:space="preserve">⑤ SELECT</text>
  <text x="140" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">컬럼 선택·표현식 평가</text>

  <line x1="140" y1="434" x2="140" y2="458" stroke="#55c555" stroke-width="2"/>
  <polygon points="134,458 140,470 146,458" fill="#55c555"/>

  <!-- Step 6: ORDER BY / LIMIT -->
  <rect x="60" y="470" width="160" height="28" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="489" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle" xml:space="preserve">⑥ ORDER BY · LIMIT</text>

  <!-- Right side: code + notes -->
  <rect x="280" y="70" width="560" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="296" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 작성 순서 vs 논리적 실행 순서</text>
  <text x="296" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="346" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> dept, COUNT(*) cnt  </text>
  <text x="560" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">← ⑤ 실행</text>
  <text x="296" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="338" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">   employees       </text>
  <text x="560" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">← ① 실행</text>
  <text x="296" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="346" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  hire_year >= </text>
  <text x="476" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2020</text>
  <text x="510" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    ← ② 실행</text>
  <text x="296" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">GROUP BY</text>
  <text x="368" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> dept        </text>
  <text x="560" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">← ③ 실행</text>
  <text x="296" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">HAVING</text>
  <text x="350" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  COUNT(*) >= </text>
  <text x="466" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="490" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    ← ④ 실행</text>
  <text x="296" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ORDER BY</text>
  <text x="368" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> cnt DESC    </text>
  <text x="560" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">← ⑥ 실행</text>
  <text x="296" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LIMIT</text>
  <text x="338" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">5</text>
  <text x="356" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                   ← ⑥ 실행</text>

  <!-- Notes -->
  <rect x="280" y="288" width="260" height="80" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="296" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">WHERE에서 별칭 사용 불가</text>
  <text x="296" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">SELECT cnt → WHERE cnt &gt; 3</text>
  <text x="296" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" xml:space="preserve">✗ 에러 — SELECT보다 먼저 실행됨</text>

  <rect x="560" y="288" width="280" height="80" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1"/>
  <text x="576" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">ORDER BY에서 별칭 사용 가능</text>
  <text x="576" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">SELECT COUNT(*) cnt</text>
  <text x="576" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">ORDER BY cnt DESC → ✓ 정상</text>

  <rect x="280" y="386" width="560" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="296" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- HAVING vs WHERE 위치 이해</text>
  <text x="296" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- WHERE: 그룹화 전 행 필터 (인덱스 활용 가능)</text>
  <text x="296" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- HAVING: 그룹화 후 집계 필터 (집계함수 사용 가능)</text>
  <text x="296" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">HAVING</text>
  <text x="350" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> SUM(amount) &gt; </text>
  <text x="488" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10000</text>
  <text x="544" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"> -- 집계 후 필터</text>

  <!-- Footer -->
  <text x="440" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
