<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Initializr — build.gradle 생성 예시</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Web + JPA + Lombok + H2 선택 시 자동 생성되는 Gradle 빌드 파일</text>

  <!-- Code block -->
  <rect x="60" y="82" width="760" height="290" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- filename -->
  <text x="76" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// build.gradle (Groovy DSL)</text>

  <text x="76" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">plugins {</text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    id <text fill="#ce9178">'org.springframework.boot'</text> version <text fill="#b5cea8">'3.3.0'</text></text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    id <text fill="#ce9178">'io.spring.dependency-management'</text> version <text fill="#b5cea8">'1.1.4'</text></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    id <text fill="#ce9178">'java'</text></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">group = <text fill="#ce9178">'com.example'</text></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">version = <text fill="#ce9178">'0.0.1-SNAPSHOT'</text></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">java { sourceCompatibility = <text fill="#7ec8e3">JavaVersion</text>.VERSION_21 }</text>

  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">dependencies {</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    implementation <text fill="#ce9178">'org.springframework.boot:spring-boot-starter-web'</text></text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    implementation <text fill="#ce9178">'org.springframework.boot:spring-boot-starter-data-jpa'</text></text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    compileOnly     <text fill="#ce9178">'org.projectlombok:lombok'</text></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    runtimeOnly     <text fill="#ce9178">'com.h2database:h2'</text></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    testImplementation <text fill="#ce9178">'org.springframework.boot:spring-boot-starter-test'</text></text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
