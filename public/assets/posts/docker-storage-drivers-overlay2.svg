<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="asd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">overlay2 레이어 구조</text>

  <!-- Layers stack (bottom to top) -->
  <!-- Base layer -->
  <rect x="200" y="370" width="480" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Base Layer (lower dir)</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FROM ubuntu:22.04 — 읽기 전용</text>

  <!-- Layer 2 -->
  <rect x="200" y="302" width="480" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Image Layer 2 (lower dir)</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">RUN apt-get install nginx — 읽기 전용</text>

  <!-- Layer 3 -->
  <rect x="200" y="234" width="480" height="52" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Image Layer 3 (lower dir)</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">COPY conf /etc/nginx — 읽기 전용</text>

  <!-- Container layer -->
  <rect x="200" y="166" width="480" height="52" rx="6" fill="#0f2015" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Container Layer (upper dir)</text>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">쓰기 가능 — 컨테이너 종료 시 삭제</text>

  <!-- Merged view -->
  <rect x="200" y="98" width="480" height="52" rx="6" fill="#2a1535" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Merged View (컨테이너가 보는 파일시스템)</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OverlayFS가 upper + lower 합성</text>

  <!-- Arrows -->
  <line x1="440" y1="166" x2="440" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#asd)"/>
  <line x1="440" y1="234" x2="440" y2="218" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="440" y1="302" x2="440" y2="286" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="440" y1="370" x2="440" y2="354" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- CoW note -->
  <rect x="60" y="166" width="120" height="52" rx="6" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">CoW 쓰기</text>
  <text x="120" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">파일 수정 시 upper로 복사</text>

  <path d="M 180 192 L 200 192" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#asd)"/>

  <!-- Whiteout note -->
  <rect x="700" y="166" width="120" height="52" rx="6" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="760" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">Whiteout</text>
  <text x="760" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">파일 삭제 시 마커 생성</text>

  <path d="M 680 192 L 700 192" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#asd)"/>
</svg>
