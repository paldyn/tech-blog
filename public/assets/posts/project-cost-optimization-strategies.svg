<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">LLM 비용 최적화 전략 6가지</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">전략별 예상 절감률 — 중복 적용 시 누적 효과</text>

  <!-- Card 1: Prompt Caching -->
  <rect x="60" y="96" width="240" height="120" rx="10" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">프롬프트 캐싱</text>
  <text x="180" y="144" text-anchor="middle" font-size="12" fill="#888">Anthropic cache_control</text>
  <text x="180" y="163" text-anchor="middle" font-size="12" fill="#888">반복 컨텍스트 재사용</text>
  <!-- Badge -->
  <rect x="110" y="177" width="140" height="28" rx="14" fill="#1a1a3a"/>
  <text x="180" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">최대 90% 절감</text>

  <!-- Card 2: Model Routing -->
  <rect x="320" y="96" width="240" height="120" rx="10" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">모델 라우팅</text>
  <text x="440" y="144" text-anchor="middle" font-size="12" fill="#888">단순 쿼리 → Haiku</text>
  <text x="440" y="163" text-anchor="middle" font-size="12" fill="#888">복잡 쿼리 → Opus</text>
  <!-- Badge -->
  <rect x="360" y="177" width="160" height="28" rx="14" fill="#0d1f0d"/>
  <text x="440" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">70–80% 절감</text>

  <!-- Card 3: Response Caching -->
  <rect x="580" y="96" width="240" height="120" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">응답 캐싱</text>
  <text x="700" y="144" text-anchor="middle" font-size="12" fill="#888">Redis + 임베딩 유사도</text>
  <text x="700" y="163" text-anchor="middle" font-size="12" fill="#888">반복 쿼리 LLM 미호출</text>
  <!-- Badge -->
  <rect x="624" y="177" width="152" height="28" rx="14" fill="#0a1f2a"/>
  <text x="700" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">40–60% 절감</text>

  <!-- Card 4: Batch API -->
  <rect x="60" y="256" width="240" height="120" rx="10" fill="#111827" stroke="#e8a000" stroke-width="1.5"/>
  <text x="180" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">배치 API</text>
  <text x="180" y="304" text-anchor="middle" font-size="12" fill="#888">Anthropic / OpenAI Batch</text>
  <text x="180" y="323" text-anchor="middle" font-size="12" fill="#888">비실시간 요청 묶음 처리</text>
  <!-- Badge -->
  <rect x="100" y="337" width="160" height="28" rx="14" fill="#1a1200"/>
  <text x="180" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#e8a000">50% 즉시 할인</text>

  <!-- Card 5: Token Reduction -->
  <rect x="320" y="256" width="240" height="120" rx="10" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">토큰 절약</text>
  <text x="440" y="304" text-anchor="middle" font-size="12" fill="#888">시스템 프롬프트 압축</text>
  <text x="440" y="323" text-anchor="middle" font-size="12" fill="#888">출력 포맷 제약</text>
  <!-- Badge -->
  <rect x="360" y="337" width="160" height="28" rx="14" fill="#1a1008"/>
  <text x="440" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">20–30% 절감</text>

  <!-- Card 6: Smaller Models -->
  <rect x="580" y="256" width="240" height="120" rx="10" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">소형 모델 선택</text>
  <text x="700" y="304" text-anchor="middle" font-size="12" fill="#888">벤치마크 기반 선별</text>
  <text x="700" y="323" text-anchor="middle" font-size="12" fill="#888">도메인별 파인튜닝</text>
  <!-- Badge -->
  <rect x="616" y="337" width="168" height="28" rx="14" fill="#1a0808"/>
  <text x="700" y="356" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">80–95% 절감</text>

  <!-- Cumulative note -->
  <rect x="60" y="412" width="760" height="72" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">전략 조합 시 누적 효과</text>
  <text x="440" y="458" text-anchor="middle" font-size="13" fill="#888">프롬프트 캐싱 + 모델 라우팅 + 배치 API 조합 → 실제 사용 사례에서 총비용의</text>
  <text x="440" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">80% 이상 절감 달성 가능</text>

  <!-- Bottom label -->
  <text x="440" y="508" text-anchor="middle" font-size="12" fill="#555">절감률은 워크로드 특성에 따라 달라집니다 — 실측 후 적용 권장</text>
</svg>
