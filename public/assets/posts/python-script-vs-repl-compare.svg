<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스크립트 vs REPL 비교</text>

  <!-- Header row -->
  <rect x="60" y="64" width="370" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="245" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">스크립트 (.py 파일)</text>

  <rect x="450" y="64" width="370" height="44" rx="6" fill="#0d2d1a" stroke="#166534" stroke-width="1.5"/>
  <text x="635" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">REPL (대화형 셸)</text>

  <!-- Row 1 -->
  <rect x="60" y="116" width="370" height="60" rx="4" fill="#0d1117"/>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">실행 방식</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">python script.py</text>

  <rect x="450" y="116" width="370" height="60" rx="4" fill="#0d1117"/>
  <text x="470" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">실행 방식</text>
  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">python (또는 python3)</text>

  <!-- Row 2 -->
  <rect x="60" y="180" width="370" height="60" rx="4" fill="#111827"/>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">코드 저장</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파일에 저장, 재사용 가능</text>

  <rect x="450" y="180" width="370" height="60" rx="4" fill="#111827"/>
  <text x="470" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">코드 저장</text>
  <text x="470" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">세션 종료 시 사라짐</text>

  <!-- Row 3 -->
  <rect x="60" y="244" width="370" height="60" rx="4" fill="#0d1117"/>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">피드백</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전체 실행 후 결과 확인</text>

  <rect x="450" y="244" width="370" height="60" rx="4" fill="#0d1117"/>
  <text x="470" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">피드백</text>
  <text x="470" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">한 줄 입력 → 즉시 결과</text>

  <!-- Row 4 -->
  <rect x="60" y="308" width="370" height="60" rx="4" fill="#111827"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">주요 용도</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">실제 프로그램, 자동화 스크립트</text>

  <rect x="450" y="308" width="370" height="60" rx="4" fill="#111827"/>
  <text x="470" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">주요 용도</text>
  <text x="470" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">실험, 탐색, 빠른 테스트</text>

  <line x1="60" y1="116" x2="430" y2="116" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="450" y1="116" x2="820" y2="116" stroke="#166534" stroke-width="1"/>
  <rect x="60" y="116" width="370" height="252" rx="0" fill="none" stroke="#1e293b" stroke-width="1"/>
  <rect x="450" y="116" width="370" height="252" rx="0" fill="none" stroke="#1e293b" stroke-width="1"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">실무: 탐색 → REPL, 완성 → 스크립트로 옮기기</text>
</svg>
