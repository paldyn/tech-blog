<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">mTLS 적용 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">마이크로서비스 간 mTLS 제로트러스트 통신</text>

  <defs>
    <marker id="muArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="muArrR" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 서비스 A -->
  <rect x="60" y="150" width="160" height="64" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">서비스 A</text>
  <text x="140" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트 인증서</text>
  <text x="140" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">svc-a.pem</text>

  <!-- 서비스 B -->
  <rect x="360" y="88" width="160" height="64" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">서비스 B</text>
  <text x="440" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버+클라 인증서</text>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">svc-b.pem</text>

  <!-- 서비스 C -->
  <rect x="360" y="230" width="160" height="64" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">서비스 C</text>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버+클라 인증서</text>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">svc-c.pem</text>

  <!-- 서비스 D (인증 실패) -->
  <rect x="660" y="150" width="160" height="64" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">인증 실패 서비스</text>
  <text x="740" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증서 없음</text>
  <text x="740" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또는 만료됨</text>

  <!-- 화살표: A→B (성공) -->
  <line x1="220" y1="170" x2="360" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#muArr)"/>
  <text x="283" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">mTLS ✓</text>

  <!-- 화살표: A→C (성공) -->
  <line x1="220" y1="192" x2="360" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#muArr)"/>
  <text x="283" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">mTLS ✓</text>

  <!-- 화살표: D→B (실패) -->
  <line x1="660" y1="172" x2="520" y2="128" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="595" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">거부 ✗</text>

  <!-- Internal CA -->
  <rect x="340" y="324" width="200" height="44" rx="8" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c44a">Internal CA</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 서비스 인증서 발급/관리</text>

  <!-- CA에서 서비스들로 점선 -->
  <line x1="440" y1="324" x2="440" y2="294" stroke="#e8c44a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="390" y1="324" x2="200" y2="214" stroke="#e8c44a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="490" y1="324" x2="440" y2="152" stroke="#e8c44a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
