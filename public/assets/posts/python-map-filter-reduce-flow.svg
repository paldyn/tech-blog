<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">map · filter · reduce 처리 흐름</text>

  <!-- Input list -->
  <rect x="60" y="90" width="160" height="48" rx="8" fill="#131825" stroke="#1e2433"/>
  <text x="140" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 리스트</text>
  <text x="140" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">[1, 2, 3, 4, 5]</text>

  <!-- Arrow down to map -->
  <line x1="140" y1="138" x2="140" y2="170" stroke="#555" stroke-width="2"/>
  <polygon points="140,174 135,164 145,164" fill="#555"/>

  <!-- map box -->
  <rect x="60" y="174" width="160" height="60" rx="8" fill="#0d1926" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">map()</text>
  <text x="140" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 요소에 함수 적용</text>

  <!-- map output -->
  <rect x="60" y="262" width="160" height="40" rx="6" fill="#0f1a0f" stroke="#55c555"/>
  <text x="140" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">[1, 4, 9, 16, 25]</text>
  <line x1="140" y1="234" x2="140" y2="262" stroke="#555" stroke-width="2"/>
  <polygon points="140,262 135,252 145,252" fill="#555"/>
  <text x="300" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">x² 적용 결과</text>

  <!-- Second input -->
  <rect x="360" y="90" width="160" height="48" rx="8" fill="#131825" stroke="#1e2433"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 리스트</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">[1, 2, 3, 4, 5]</text>

  <line x1="440" y1="138" x2="440" y2="170" stroke="#555" stroke-width="2"/>
  <polygon points="440,174 435,164 445,164" fill="#555"/>

  <!-- filter box -->
  <rect x="360" y="174" width="160" height="60" rx="8" fill="#1a0d1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">filter()</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건 통과 요소만 유지</text>

  <!-- filter output -->
  <rect x="360" y="262" width="160" height="40" rx="6" fill="#0f1a0f" stroke="#55c555"/>
  <text x="440" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">[2, 4]</text>
  <line x1="440" y1="234" x2="440" y2="262" stroke="#555" stroke-width="2"/>
  <polygon points="440,262 435,252 445,252" fill="#555"/>
  <text x="530" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">짝수만 통과</text>

  <!-- Third input -->
  <rect x="660" y="90" width="160" height="48" rx="8" fill="#131825" stroke="#1e2433"/>
  <text x="740" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 리스트</text>
  <text x="740" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">[1, 2, 3, 4, 5]</text>

  <line x1="740" y1="138" x2="740" y2="170" stroke="#555" stroke-width="2"/>
  <polygon points="740,174 735,164 745,164" fill="#555"/>

  <!-- reduce box -->
  <rect x="660" y="174" width="160" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="740" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#b5cea8">reduce()</text>
  <text x="740" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">누적해서 단일값으로</text>

  <!-- reduce output -->
  <rect x="660" y="262" width="160" height="40" rx="6" fill="#0f1a0f" stroke="#55c555"/>
  <text x="740" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">15</text>
  <line x1="740" y1="234" x2="740" y2="262" stroke="#555" stroke-width="2"/>
  <polygon points="740,262 735,252 745,252" fill="#555"/>
  <text x="740" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">합산 결과 (1+2+3+4+5)</text>

  <!-- Bottom comparison table -->
  <rect x="60" y="360" width="760" height="72" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">반환 타입 비교</text>
  <text x="190" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">map → map 객체 (이터레이터)</text>
  <text x="440" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">filter → filter 객체 (이터레이터)</text>
  <text x="690" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">reduce → 단일 스칼라 값</text>
  <text x="440" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">list()로 변환해야 리스트로 사용 가능 (map·filter)</text>
</svg>
