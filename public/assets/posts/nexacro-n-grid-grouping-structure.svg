  <text x="650" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Grid 그룹 표시</text>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">GroupBand 밴드 활용</text>
  <line x1="490" y1="148" x2="818" y2="148" stroke="#253555" stroke-width="1"/>

  <!-- Head -->
  <rect x="472" y="148" width="356" height="30" fill="#1a2744"/>
  <text x="560" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">성명</text>
  <text x="720" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">급여</text>
  <line x1="472" y1="178" x2="828" y2="178" stroke="#253555" stroke-width="1"/>

  <!-- Group header: 개발팀 -->
  <rect x="472" y="178" width="356" height="28" fill="#1d3a22"/>
  <text x="492" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">▶ 개발팀</text>
  <text x="820" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="end">2명</text>
  <line x1="472" y1="206" x2="828" y2="206" stroke="#2a5a2a" stroke-width="1"/>

  <!-- 개발팀 rows -->
  <rect x="472" y="206" width="356" height="28" fill="#0e1420"/>
  <text x="560" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">홍길동</text>
  <text x="800" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,500,000</text>
  <line x1="472" y1="234" x2="828" y2="234" stroke="#1a2030" stroke-width="1"/>
  <rect x="472" y="234" width="356" height="28" fill="#111827"/>
  <text x="560" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="800" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,200,000</text>

  <!-- Group header: 기획팀 -->
  <line x1="472" y1="262" x2="828" y2="262" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="472" y="262" width="356" height="28" fill="#1d3a22"/>
  <text x="492" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">▶ 기획팀</text>
  <text x="820" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="end">1명</text>
  <line x1="472" y1="290" x2="828" y2="290" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="472" y="290" width="356" height="28" fill="#0e1420"/>
  <text x="560" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="800" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,800,000</text>

  <!-- Group header: 영업팀 -->
  <line x1="472" y1="318" x2="828" y2="318" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="472" y="318" width="356" height="28" fill="#1d3a22"/>
  <text x="492" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">▶ 영업팀</text>
  <text x="820" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="end">1명</text>
  <line x1="472" y1="346" x2="828" y2="346" stroke="#2a5a2a" stroke-width="1"/>
  <rect x="472" y="346" width="356" height="28" fill="#0e1420"/>
  <text x="560" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">박민수</text>
  <text x="800" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,600,000</text>

  <text x="650" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">GroupBand가 NGROUP 행을 그룹 헤더로 렌더링</text>

  <!-- Bottom note -->
  <text x="440" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">ds.group("컬럼") 호출 후 Grid를 바인딩하면 그룹 구조가 자동 표시됩니다</text>
</svg>
