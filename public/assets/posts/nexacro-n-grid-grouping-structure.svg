  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">▶ 영업팀</text>
  <text x="368" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NGROUP</text>

  <rect x="62" y="334" width="318" height="24" fill="#0e1420" rx="3"/>
  <text x="96" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">박민수 / 3,600,000</text>
