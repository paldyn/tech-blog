  <text x="220" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">NGROUP 행이 그룹 헤더 역할</text>

  <!-- Arrow -->
  <polygon points="396,207 434,207 434,197 460,215 434,233 434,223 396,223" fill="#1e2433"/>
  <polygon points="398,209 436,209 436,199 458,215 436,231 436,221 398,221" fill="#7ec8e3"/>
