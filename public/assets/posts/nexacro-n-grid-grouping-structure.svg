<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 그룹핑 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dataset.group() + Grid GroupBand 연동</text>

  <!-- Left: Dataset structure after group() -->
  <rect x="50" y="90" width="340" height="310" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="220" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">ds_emp.group("dept_cd")</text>
  <text x="220" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">그룹 적용 후 Dataset 행 구조</text>
  <line x1="70" y1="148" x2="370" y2="148" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Group rows -->
  <rect x="62" y="154" width="318" height="28" fill="#1d3a22" rx="4"/>
