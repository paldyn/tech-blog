  <text x="368" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NGROUP</text>

  <rect x="62" y="186" width="318" height="24" fill="#0e1420" rx="3"/>
  <text x="96" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">홍길동 / 4,500,000</text>
  <text x="368" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NORMAL</text>

  <rect x="62" y="214" width="318" height="24" fill="#0e1420" rx="3"/>
  <text x="96" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이영희 / 4,200,000</text>
  <text x="368" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NORMAL</text>

  <rect x="62" y="242" width="318" height="28" fill="#1d3a22" rx="4"/>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">▶ 기획팀</text>
  <text x="368" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NGROUP</text>

  <rect x="62" y="274" width="318" height="24" fill="#111827" rx="3"/>
  <text x="96" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">김철수 / 3,800,000</text>
  <text x="368" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">ROWTYPE: NORMAL</text>

