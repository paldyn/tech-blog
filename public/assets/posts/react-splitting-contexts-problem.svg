<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">단일 Context: 불필요한 리렌더 문제</text>

  <!-- Left: BigContext -->
  <rect x="60" y="76" width="300" height="220" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">BigContext (단일)</text>
  <rect x="80" y="116" width="260" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">user: { name, email }</text>
  <text x="210" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">인증 상태</text>
  <rect x="80" y="170" width="260" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">theme: 'dark'</text>
  <text x="210" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">UI 테마</text>
  <rect x="80" y="224" width="260" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">cart: [item1, item2]</text>
  <text x="210" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">장바구니</text>

  <!-- Arrows to consumers -->
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <line x1="360" y1="138" x2="490" y2="110" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrW)"/>
  <line x1="360" y1="186" x2="490" y2="186" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrW)"/>
  <line x1="360" y1="246" x2="490" y2="262" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- Right: 3 consumer components -->
  <rect x="490" y="80" width="280" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">UserProfile (user 사용)</text>
  <text x="630" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">⚠ cart 변경 시에도 리렌더!</text>

  <rect x="490" y="156" width="280" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ThemeToggle (theme 사용)</text>
  <text x="630" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">⚠ user 변경 시에도 리렌더!</text>

  <rect x="490" y="232" width="280" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">CartBadge (cart 사용)</text>
  <text x="630" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">⚠ theme 변경 시에도 리렌더!</text>

  <!-- Bottom annotation -->
  <rect x="60" y="318" width="760" height="48" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">Context value가 하나의 객체이므로 어느 필드 하나만 바뀌어도</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555" text-anchor="middle">모든 useContext(BigContext) 구독 컴포넌트가 리렌더된다</text>
</svg>
