<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 옵티마이저 힌트 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">힌트는 CBO 결정을 재정의하는 마지막 수단 — 반드시 이유를 주석으로 남긴다</text>

  <!-- Category 1: Access Path -->
  <rect x="60" y="90" width="360" height="170" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">접근 경로 (Access Path)</text>
  <line x1="70" y1="118" x2="410" y2="118" stroke="#2a3a50" stroke-width="1"/>
  <text x="76" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FULL(t)        — Full Table Scan 강제</text>
  <text x="76" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">INDEX(t idx)   — 인덱스 스캔 강제</text>
  <text x="76" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NO_INDEX(t idx)— 해당 인덱스 제외</text>
  <text x="76" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">INDEX_FFS(t)   — Index Fast Full Scan</text>
  <text x="76" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">INDEX_SS(t)    — Index Skip Scan</text>
  <text x="76" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ROWID(t)       — ROWID 직접 접근</text>

  <!-- Category 2: Join Method -->
  <rect x="460" y="90" width="360" height="170" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">조인 방법 (Join Method)</text>
  <line x1="470" y1="118" x2="810" y2="118" stroke="#2a3a50" stroke-width="1"/>
  <text x="476" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">USE_NL(t)   — Nested Loops Join 강제</text>
  <text x="476" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">USE_HASH(t) — Hash Join 강제</text>
  <text x="476" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">USE_MERGE(t)— Sort-Merge Join 강제</text>
  <text x="476" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NO_USE_NL / NO_USE_HASH / NO_USE_MERGE</text>
  <text x="476" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">LEADING(t1 t2 t3) — 조인 순서 지정</text>
  <text x="476" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ORDERED         — FROM 절 순서로 조인</text>

  <!-- Category 3: Query Transform -->
  <rect x="60" y="276" width="360" height="150" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">쿼리 변환 (Query Transform)</text>
  <line x1="70" y1="304" x2="410" y2="304" stroke="#2a3a50" stroke-width="1"/>
  <text x="76" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UNNEST          — 서브쿼리 인라인화</text>
  <text x="76" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NO_MERGE        — Inline View 분리 유지</text>
  <text x="76" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">PUSH_PRED       — 조건 뷰 내부로 push</text>
  <text x="76" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">MATERIALIZE     — CTE를 임시 테이블로</text>
  <text x="76" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">INLINE          — CTE를 인라인으로</text>

  <!-- Category 4: Parallelism + misc -->
  <rect x="460" y="276" width="360" height="150" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">병렬·기타</text>
  <line x1="470" y1="304" x2="810" y2="304" stroke="#2a3a50" stroke-width="1"/>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">PARALLEL(t 4)   — 병렬도 4로 실행</text>
  <text x="476" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NO_PARALLEL(t)  — 병렬 비활성화</text>
  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">APPEND          — Direct Path Insert</text>
  <text x="476" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CACHE(t)        — 전체 블록 캐시 유지</text>
  <text x="476" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">QB_NAME(qb)     — 쿼리 블록 이름 지정</text>

  <!-- Bottom warning -->
  <rect x="60" y="442" width="760" height="60" fill="#1a1010" rx="8" stroke="#3a1a1a" stroke-width="1"/>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">힌트 사용 전 체크리스트</text>
  <text x="220" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">통계가 최신인가?</text>
  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">다른 방법(인덱스·통계)은 시도했는가?</text>
  <text x="680" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">힌트 이유를 주석으로 남겼는가?</text>
</svg>
