<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 280" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <!-- Background -->
  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VQA 평가 자동화 코드</text>
  <text x="440" y="62" font-size="13" fill="#888" text-anchor="middle">lmms-eval 프레임워크를 활용한 MMBench 평가 실행</text>

  <!-- Code box -->
  <rect x="60" y="80" width="760" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1.5" rx="6"/>

  <!-- Line 1 -->
  <text x="80" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> lmms_eval </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> evaluator</tspan>
  </text>
  <!-- Line 2 -->
  <text x="80" y="121" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> lmms_eval.models </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> get_model</tspan>
  </text>
  <!-- Line 3: blank -->
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff"> </tspan>
  </text>
  <!-- Line 4: comment -->
  <text x="80" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 모델 로드</tspan>
  </text>
  <!-- Line 5 -->
  <text x="80" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">model </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#ffffff"> get_model(</tspan>
    <tspan fill="#ce9178">"llava"</tspan>
    <tspan fill="#ffffff">, model_args={</tspan>
  </text>
  <!-- Line 6 -->
  <text x="80" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#ce9178">"model_path"</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#ce9178">"llava-hf/llava-1.5-7b-hf"</tspan>
  </text>
  <!-- Line 7 -->
  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">})</tspan>
  </text>
  <!-- Line 8: comment -->
  <text x="420" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># MMBench 평가 실행</tspan>
  </text>
  <!-- Line 9 -->
  <text x="420" y="121" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">results </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#ffffff"> evaluator.simple_evaluate(</tspan>
  </text>
  <!-- Line 10 -->
  <text x="420" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    model</tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#ffffff">model, tasks</tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#ffffff">[</tspan>
    <tspan fill="#ce9178">"mmbench_en"</tspan>
    <tspan fill="#ffffff">],</tspan>
  </text>
  <!-- Line 11 -->
  <text x="420" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    num_fewshot</tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">, batch_size</tspan>
    <tspan fill="#7ec8e3" font-weight="600">=</tspan>
    <tspan fill="#b5cea8">8</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <!-- Line 12 -->
  <text x="420" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">)</tspan>
  </text>
  <!-- Line 13: comment -->
  <text x="420" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 결과 출력</tspan>
  </text>
  <!-- Line 14 -->
  <text x="420" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> task, result </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> results[</tspan>
    <tspan fill="#ce9178">"results"</tspan>
    <tspan fill="#ffffff">].items():</tspan>
  </text>
  <!-- Line 15 -->
  <text x="420" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">print</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#ce9178">f"{task}: {result['acc']:.4f}"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>

  <!-- Vertical divider -->
  <line x1="406" y1="90" x2="406" y2="248" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
