<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">SharedArrayBuffer · 멀티 스레드 메모리 공유</text>

  <!-- Main Thread box -->
  <rect x="60" y="72" width="210" height="108" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">Main Thread</text>
  <rect x="78" y="108" width="174" height="22" rx="4" fill="#0a1520"/>
  <text x="165" y="124" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">new SharedArrayBuffer(32)</text>
  <text x="165" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">sab을 생성하고 Worker에 전달</text>

  <!-- Worker 1 box -->
  <rect x="335" y="72" width="210" height="108" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">Worker 1</text>
  <rect x="353" y="108" width="174" height="22" rx="4" fill="#0a1520"/>
  <text x="440" y="124" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">new Int32Array(sab)</text>
  <text x="440" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Atomics.add(view, 0, 1)</text>

  <!-- Worker 2 box -->
  <rect x="610" y="72" width="210" height="108" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="715" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc">Worker 2</text>
  <rect x="628" y="108" width="174" height="22" rx="4" fill="#0a1520"/>
  <text x="715" y="124" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">new Int32Array(sab)</text>
  <text x="715" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Atomics.wait(view, 0, 0)</text>

  <!-- Arrows to SAB -->
  <line x1="165" y1="180" x2="165" y2="238"
    stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"
    marker-end="url(#arr-blue)"/>
  <line x1="440" y1="180" x2="440" y2="238"
    stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"
    marker-end="url(#arr-green)"/>
  <line x1="715" y1="180" x2="715" y2="238"
    stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"
    marker-end="url(#arr-purple)"/>

  <!-- SharedArrayBuffer -->
  <rect x="60" y="248" width="760" height="106" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="90" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e8e8e8">SharedArrayBuffer</text>
  <text x="790" y="274" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">byteLength: 32</text>

  <!-- Memory cells -->
  <rect x="82" y="284" width="44" height="38" rx="4" fill="#160808" stroke="#e05555" stroke-width="1"/>
  <text x="104" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">01</text>
  <text x="104" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">+0</text>

  <rect x="132" y="284" width="44" height="38" rx="4" fill="#160808" stroke="#e05555" stroke-width="1"/>
  <text x="154" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">00</text>
  <text x="154" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">+1</text>

  <rect x="182" y="284" width="44" height="38" rx="4" fill="#160808" stroke="#e05555" stroke-width="1"/>
  <text x="204" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">00</text>
  <text x="204" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">+2</text>

  <rect x="232" y="284" width="44" height="38" rx="4" fill="#160808" stroke="#e05555" stroke-width="1"/>
  <text x="254" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">00</text>
  <text x="254" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">+3</text>

  <text x="310" y="310" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#9aa4b8">···</text>

  <text x="82" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">← Int32Array 뷰: index 0 = 4바이트(+0~+3) — 복사 없이 같은 메모리를 공유</text>

  <!-- Security footer -->
  <rect x="60" y="372" width="760" height="30" rx="6" fill="#140e00" stroke="#5a4000" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#c8902a">보안 필수: Cross-Origin-Opener-Policy: same-origin  +  Cross-Origin-Embedder-Policy: require-corp</text>
</svg>
