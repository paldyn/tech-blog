<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">map · filter · reduce 코드 예제</text>

  <!-- Left: map + filter -->
  <text x="70" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">map() · filter()</text>
  <rect x="60" y="92" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># map: 각 요소를 제곱</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">nums = [1, 2, 3, 4, 5]</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">squared = <tspan fill="#7ec8e3">list</tspan>(<tspan fill="#7ec8e3">map</tspan>(<tspan fill="#7ec8e3">lambda</tspan> x: x**2, nums))</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># [1, 4, 9, 16, 25]</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># filter: 짝수만 추출</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">evens = <tspan fill="#7ec8e3">list</tspan>(<tspan fill="#7ec8e3">filter</tspan>(<tspan fill="#7ec8e3">lambda</tspan> x: x%2==0, nums))</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># [2, 4]</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 함수 객체를 직접 전달도 가능</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">words = [<tspan fill="#ce9178">"hi"</tspan>, <tspan fill="#ce9178">""</tspan>, <tspan fill="#ce9178">"bye"</tspan>, <tspan fill="#ce9178">""</tspan>]</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">non_empty = <tspan fill="#7ec8e3">list</tspan>(<tspan fill="#7ec8e3">filter</tspan>(<tspan fill="#7ec8e3">None</tspan>, words))</text>

  <!-- Right: reduce + comprehension comparison -->
  <text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#b5cea8">reduce() · 컴프리헨션 비교</text>
  <rect x="460" y="92" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from functools <tspan fill="#7ec8e3">import</tspan> reduce</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"/>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 합산: reduce</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">total = reduce(<tspan fill="#7ec8e3">lambda</tspan> acc,x: acc+x, nums)</text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 15</text>
  <text x="476" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 초깃값 제공 (빈 시퀀스 안전)</text>
  <text x="476" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">total = reduce(<tspan fill="#7ec8e3">lambda</tspan> a,b: a+b, [], <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 0  ← 초깃값 반환</text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 파이써닉 대안: 리스트 컴프리헨션</text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">squared = [x**2 <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> nums]</text>

  <!-- Bottom tip -->
  <rect x="60" y="334" width="760" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Python 스타일 가이드 권장사항</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">map · filter는 가독성이 중요하다면 <tspan font-weight="600" fill="#7ec8e3">리스트 컴프리헨션</tspan>으로 대체 권장</text>
  <text x="80" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">reduce는 합산·최댓값에는 <tspan font-weight="600" fill="#b5cea8">sum() · max()</tspan>가 더 명확. 복잡한 누산에만 사용</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">map·filter는 이터레이터 반환 → list() 변환 시 메모리 한 번에 적재</text>
</svg>
