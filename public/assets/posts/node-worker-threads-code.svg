<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">Worker Thread 생성 패턴</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">main.js (왼쪽) ↔ worker.js (오른쪽)</text>

  <!-- Left: main.js -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">main.js</text>
  <rect x="60" y="112" width="370" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="140" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// main.js</text>
  <text x="76" y="158" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">import</text>
  <text x="121" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">{ Worker } </text>
  <text x="215" y="158" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">from</text>
  <text x="248" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> 'worker_threads'</text>

  <text x="76" y="194" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="116" y="194" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> worker = </text>
  <text x="187" y="194" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">new</text>
  <text x="213" y="194" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> Worker(</text>
  <text x="76" y="212" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  './worker.js'</text>
  <text x="76" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  { workerData: { n: </text>
  <text x="255" y="230" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">40</text>
  <text x="271" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> } }</text>
  <text x="76" y="248" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">);</text>

  <text x="76" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">worker.on(</text>
  <text x="156" y="284" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'message'</text>
  <text x="228" y="284" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">, (v) =&gt; {</text>
  <text x="76" y="302" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  console.log(</text>
  <text x="181" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'결과:'</text>
  <text x="225" y="302" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">, v);</text>
  <text x="76" y="320" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">});</text>
  <text x="76" y="338" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">worker.on(</text>
  <text x="156" y="338" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">'error'</text>
  <text x="204" y="338" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">, console.error);</text>

  <!-- Right: worker.js -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">worker.js</text>
  <rect x="450" y="112" width="370" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="466" y="140" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// worker.js</text>
  <text x="466" y="158" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">import</text>
  <text x="511" y="158" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> { parentPort, workerData }</text>
  <text x="466" y="176" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  from</text>
  <text x="502" y="176" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> 'worker_threads'</text>

  <text x="466" y="212" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">function</text>
  <text x="522" y="212" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> fib(n) {</text>
  <text x="466" y="230" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  if</text>
  <text x="488" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> (n &lt;= </text>
  <text x="535" y="230" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">1</text>
  <text x="541" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">)</text>
  <text x="551" y="230" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">return</text>
  <text x="591" y="230" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> n;</text>
  <text x="466" y="248" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  return</text>
  <text x="510" y="248" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> fib(n-</text>
  <text x="561" y="248" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">1</text>
  <text x="567" y="248" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">)+fib(n-</text>
  <text x="627" y="248" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">2</text>
  <text x="633" y="248" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">);</text>
  <text x="466" y="266" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">}</text>

  <text x="466" y="302" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">// CPU 집약 작업 — 메인 스레드 블로킹 없음</text>
  <text x="466" y="320" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">const</text>
  <text x="506" y="320" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> result = fib(workerData.n);</text>
  <text x="466" y="338" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">parentPort.postMessage(result);</text>

  <!-- Bottom note -->
  <text x="440" y="435" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">worker_threads: CPU 집약 작업을 별도 스레드에서 처리 — 이벤트 루프 블로킹 방지</text>
</svg>
