<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">this 바인딩 결정 규칙</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">우선순위: new > 명시적 > 암묵적 > 기본</text>

  <!-- Four binding rules in boxes -->
  <!-- Rule 1: new -->
  <rect x="60" y="96" width="370" height="90" rx="8" fill="#0d001a" stroke="#7777cc" stroke-width="2"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" font-weight="700">① new 바인딩 (최우선)</text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">const obj = </text>
  <text x="170" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">new</text>
  <text x="196" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> Foo();  </text>
  <text x="280" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// this → 새 객체</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새로 생성된 인스턴스가 this. class의 constructor와 동일</text>

  <!-- Rule 2: Explicit -->
  <rect x="460" y="96" width="360" height="90" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="2"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="700">② 명시적 바인딩</text>
  <text x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fn.call(obj)  fn.apply(obj)</text>
  <text x="480" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fn.bind(obj)()</text>
  <text x="480" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 번째 인수로 this를 직접 지정</text>

  <!-- Rule 3: Implicit -->
  <rect x="60" y="210" width="370" height="90" rx="8" fill="#001a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="700">③ 암묵적 바인딩</text>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">obj.method();</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점 앞의 객체(컨텍스트 객체)가 this. 참조를 분리하면 소실됨</text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">const f = obj.method; f(); // this 소실!</text>

  <!-- Rule 4: Default -->
  <rect x="460" y="210" width="360" height="90" rx="8" fill="#1a1a0a" stroke="#e8a000" stroke-width="2"/>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a000" font-weight="700">④ 기본 바인딩 (최하위)</text>
  <text x="480" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function fn() { this... }</text>
  <text x="480" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fn(); </text>
  <text x="530" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// this: 전역/undefined</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비엄격: window/globalThis, 엄격: undefined</text>

  <!-- Priority arrow -->
  <text x="440" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444">우선순위 ↓</text>
  <line x1="440" y1="170" x2="440" y2="210" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#333">↓</text>

  <!-- Decision flowchart -->
  <rect x="60" y="320" width="760" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">this 결정 흐름</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">new로 호출?</text>
  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">→ YES: this = 새 인스턴스</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">→ NO: call/apply/bind?</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">          → YES: this = 지정 객체</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">          → NO: obj.fn() 형태?</text>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">                    → YES: this = obj</text>
  <text x="380" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">                    → NO: 기본 바인딩</text>
  <text x="380" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a000">                              → 비엄격: globalThis</text>
  <text x="380" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">                              → 엄격모드: undefined</text>
  <text x="380" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">+ 화살표 함수는 위 규칙 모두 무시 → 선언 시점 외부 this 캡처</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
