<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">sqlite3 — Connection · Cursor · Row</text>

  <!-- Connection box -->
  <rect x="60" y="72" width="220" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Connection</text>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">sqlite3.connect('db.sqlite3')</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트랜잭션 관리</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">commit() / rollback()</text>

  <!-- Arrow conn → cursor -->
  <line x1="280" y1="122" x2="358" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="319" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cursor()</text>

  <!-- Cursor box -->
  <rect x="360" y="72" width="220" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Cursor</text>
  <text x="380" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">execute(sql, params)</text>
  <text x="380" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">executemany()</text>
  <text x="380" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fetchone() / fetchall()</text>

  <!-- Arrow cursor → row -->
  <line x1="580" y1="122" x2="658" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="619" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fetchall()</text>

  <!-- Row box -->
  <rect x="660" y="72" width="160" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">Row</text>
  <text x="680" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">row['name']</text>
  <text x="680" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">row[0]</text>
  <text x="680" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dict(row)</text>

  <!-- Transaction flow -->
  <rect x="60" y="200" width="760" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">트랜잭션 패턴 (with 문 권장)</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">with sqlite3.connect('db.sqlite3') as conn:   # 성공 시 commit, 예외 시 rollback</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">    conn.execute("INSERT INTO users (name, age) VALUES (?, ?)", ('Alice', 30))</text>

  <!-- Type mapping -->
  <rect x="60" y="308" width="760" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Python ↔ SQLite 타입 매핑</text>
  <text x="100" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">None → NULL</text>
  <text x="250" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">int → INTEGER</text>
  <text x="410" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">float → REAL</text>
  <text x="560" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">str → TEXT</text>
  <text x="680" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">bytes → BLOB</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">⚠ SQL 인젝션 방지: ? 플레이스홀더 필수 — 문자열 포매팅으로 쿼리 구성 절대 금지</text>
</svg>
