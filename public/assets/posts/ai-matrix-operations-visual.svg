<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">행렬 곱셈 시각화 (Matrix Multiplication)</text>

  <!-- Matrix A -->
  <text x="140" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">행렬 A (2×3)</text>
  <rect x="60" y="96" width="164" height="100" rx="6" fill="#0e1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <!-- Row 1 -->
  <text x="100" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">1</text>
  <text x="142" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">2</text>
  <text x="184" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">3</text>
  <!-- Row 2 -->
  <text x="100" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">4</text>
  <text x="142" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">5</text>
  <text x="184" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">6</text>

  <!-- × sign -->
  <text x="250" y="152" text-anchor="middle" font-size="24" font-weight="700" fill="#555">×</text>

  <!-- Matrix B -->
  <text x="360" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">행렬 B (3×2)</text>
  <rect x="280" y="96" width="164" height="140" rx="6" fill="#0e2010" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">7</text>
  <text x="362" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">8</text>
  <text x="404" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555"> </text>
  <text x="320" y="158" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">9</text>
  <text x="362" y="158" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">10</text>
  <text x="320" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">11</text>
  <text x="366" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">12</text>
  <text x="320" y="212" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555"> </text>

  <!-- = sign -->
  <text x="470" y="152" text-anchor="middle" font-size="24" font-weight="700" fill="#555">=</text>

  <!-- Matrix C (result) -->
  <text x="610" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">결과 C (2×2)</text>
  <rect x="510" y="96" width="200" height="100" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="580" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">58</text>
  <text x="666" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">64</text>
  <text x="580" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">139</text>
  <text x="666" y="172" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">154</text>

  <!-- Formula explanation -->
  <rect x="60" y="220" width="656" height="56" rx="6" fill="#111"/>
  <text x="388" y="243" text-anchor="middle" font-size="13" fill="#e8e8e8">C[0][0] = A의 1행 · B의 1열 = 1×7 + 2×9 + 3×11 = 58</text>
  <text x="388" y="263" text-anchor="middle" font-size="13" fill="#e8e8e8">C[0][1] = A의 1행 · B의 2열 = 1×8 + 2×10 + 3×12 = 64</text>

  <!-- Shape rule -->
  <rect x="60" y="294" width="760" height="46" rx="6" fill="#1a1a2e"/>
  <text x="440" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">행렬 곱셈 형태(shape) 규칙</text>
  <text x="440" y="333" text-anchor="middle" font-size="13" fill="#aaa">(m × k) @ (k × n) = (m × n)   ← 안쪽 두 차원이 같아야 한다!</text>

  <!-- 5 AI operations -->
  <text x="440" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#888">AI에서 행렬 연산이 쓰이는 5가지 핵심 사례</text>

  <rect x="60" y="378" width="142" height="70" rx="6" fill="#111"/>
  <text x="131" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">① FC 레이어</text>
  <text x="131" y="414" text-anchor="middle" font-size="11" fill="#666">y = Wx + b</text>
  <text x="131" y="430" text-anchor="middle" font-size="10" fill="#555">선형 변환</text>
  <text x="131" y="444" text-anchor="middle" font-size="10" fill="#555">핵심 연산</text>

  <rect x="212" y="378" width="142" height="70" rx="6" fill="#111"/>
  <text x="283" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">② Attention</text>
  <text x="283" y="414" text-anchor="middle" font-size="11" fill="#666">QK^T / √d</text>
  <text x="283" y="430" text-anchor="middle" font-size="10" fill="#555">토큰 간</text>
  <text x="283" y="444" text-anchor="middle" font-size="10" fill="#555">관계 계산</text>

  <rect x="364" y="378" width="142" height="70" rx="6" fill="#111"/>
  <text x="435" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">③ 임베딩 검색</text>
  <text x="435" y="414" text-anchor="middle" font-size="11" fill="#666">q · K^T</text>
  <text x="435" y="430" text-anchor="middle" font-size="10" fill="#555">유사도</text>
  <text x="435" y="444" text-anchor="middle" font-size="10" fill="#555">일괄 계산</text>

  <rect x="516" y="378" width="142" height="70" rx="6" fill="#111"/>
  <text x="587" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">④ 역전파</text>
  <text x="587" y="414" text-anchor="middle" font-size="11" fill="#666">∂L/∂W =</text>
  <text x="587" y="430" text-anchor="middle" font-size="11" fill="#666">δ · x^T</text>
  <text x="587" y="444" text-anchor="middle" font-size="10" fill="#555">그래디언트</text>

  <rect x="668" y="378" width="152" height="70" rx="6" fill="#111"/>
  <text x="744" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">⑤ 배치 처리</text>
  <text x="744" y="414" text-anchor="middle" font-size="11" fill="#666">병렬 행렬곱</text>
  <text x="744" y="430" text-anchor="middle" font-size="10" fill="#555">GPU 효율</text>
  <text x="744" y="444" text-anchor="middle" font-size="10" fill="#555">극대화</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
