<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">합성 데이터 생성 방법</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Synthetic Data Generation Approaches</text>

  <!-- Column Headers -->
  <rect x="60" y="94" width="226" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="173" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">규칙 기반</text>

  <rect x="327" y="94" width="226" height="44" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">통계·수식 기반</text>

  <rect x="594" y="94" width="226" height="44" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="707" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">딥러닝 기반</text>

  <!-- Column 1: 규칙 기반 -->
  <rect x="60" y="156" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="173" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Faker / Mimesis</text>
  <text x="173" y="198" text-anchor="middle" font-size="12" fill="#888">이름·주소·전화번호 등</text>
  <text x="173" y="213" text-anchor="middle" font-size="12" fill="#888">템플릿 기반 랜덤 생성</text>

  <rect x="60" y="232" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="173" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">규칙 엔진</text>
  <text x="173" y="274" text-anchor="middle" font-size="12" fill="#888">도메인 제약 조건 정의</text>
  <text x="173" y="289" text-anchor="middle" font-size="12" fill="#888">IF-THEN 규칙 적용</text>

  <rect x="60" y="308" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="173" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">시뮬레이션</text>
  <text x="173" y="350" text-anchor="middle" font-size="12" fill="#888">물리·금융 모델 시뮬</text>
  <text x="173" y="365" text-anchor="middle" font-size="12" fill="#888">확정적·재현 가능</text>

  <!-- Column 2: 통계 기반 -->
  <rect x="327" y="156" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">SDV (Synthetic Data Vault)</text>
  <text x="440" y="198" text-anchor="middle" font-size="12" fill="#888">통계 분포 학습 후 샘플링</text>
  <text x="440" y="213" text-anchor="middle" font-size="12" fill="#888">관계형 데이터 지원</text>

  <rect x="327" y="232" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Copula 모델</text>
  <text x="440" y="274" text-anchor="middle" font-size="12" fill="#888">변수 간 상관관계 보존</text>
  <text x="440" y="289" text-anchor="middle" font-size="12" fill="#888">Gaussian Copula 등</text>

  <rect x="327" y="308" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">SMOTE / ADASYN</text>
  <text x="440" y="350" text-anchor="middle" font-size="12" fill="#888">소수 클래스 오버샘플링</text>
  <text x="440" y="365" text-anchor="middle" font-size="12" fill="#888">분류 불균형 해소</text>

  <!-- Column 3: 딥러닝 기반 -->
  <rect x="594" y="156" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="707" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">GAN (CTGAN, TVAE)</text>
  <text x="707" y="198" text-anchor="middle" font-size="12" fill="#888">생성자·판별자 경쟁 학습</text>
  <text x="707" y="213" text-anchor="middle" font-size="12" fill="#888">표 형식 데이터 특화</text>

  <rect x="594" y="232" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="707" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Diffusion Model</text>
  <text x="707" y="274" text-anchor="middle" font-size="12" fill="#888">이미지·텍스트 합성</text>
  <text x="707" y="289" text-anchor="middle" font-size="12" fill="#888">고품질 생성 가능</text>

  <rect x="594" y="308" width="226" height="64" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="707" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">LLM 기반 생성</text>
  <text x="707" y="350" text-anchor="middle" font-size="12" fill="#888">지시 기반 데이터 생성</text>
  <text x="707" y="365" text-anchor="middle" font-size="12" fill="#888">Instruction Tuning용</text>

  <!-- Bottom legend -->
  <text x="60" y="420" font-size="12" fill="#888">장점</text>
  <rect x="88" y="410" width="8" height="8" rx="2" fill="#7777cc"/>
  <text x="104" y="420" font-size="12" fill="#888">단순·빠름·결정론적</text>

  <rect x="290" y="410" width="8" height="8" rx="2" fill="#55c555"/>
  <text x="306" y="420" font-size="12" fill="#888">분포 보존·확장성</text>

  <rect x="480" y="410" width="8" height="8" rx="2" fill="#e05555"/>
  <text x="496" y="420" font-size="12" fill="#888">현실성↑·다양성↑</text>

  <text x="60" y="450" font-size="12" fill="#888">적합 용도</text>
  <text x="173" y="450" text-anchor="middle" font-size="12" fill="#7777cc">테스트 데이터</text>
  <text x="440" y="450" text-anchor="middle" font-size="12" fill="#55c555">프라이버시 보호</text>
  <text x="707" y="450" text-anchor="middle" font-size="12" fill="#e05555">부족 데이터 보완</text>

  <text x="60" y="478" font-size="12" fill="#555">* 실제 데이터 통계적 특성 일치 여부는 항상 검증 필요</text>
</svg>
