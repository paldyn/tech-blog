<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">합성 데이터 생성 코드 예시</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Faker + SDV (Synthetic Data Vault)</text>

  <!-- Left panel: Faker -->
  <text x="80" y="104" font-size="14" font-weight="600" fill="#7ec8e3">Faker — 규칙 기반 합성 데이터</text>
  <rect x="60" y="114" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="112" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> faker </text>
  <text x="154" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="196" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> Faker</text>
  <text x="76" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="118" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> pandas </text>
  <text x="184" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">as</text>
  <text x="202" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> pd</text>

  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">fake = Faker(</text>
  <text x="178" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">'ko_KR'</text>
  <text x="228" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">)</text>

  <text x="76" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">rows = []</text>
  <text x="76" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">for</text>
  <text x="102" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> _ </text>
  <text x="124" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="142" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> range(</text>
  <text x="190" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" xml:space="preserve">1000</text>
  <text x="218" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">):</text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    rows.append({</text>
  <text x="76" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        'name'</text>
  <text x="140" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: fake.name(),</text>
  <text x="76" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">        'phone'</text>
  <text x="146" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: fake.phone_number()})</text>
  <text x="76" y="300" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">df = pd.DataFrame(rows)</text>

  <!-- Right panel: SDV -->
  <text x="474" y="104" font-size="14" font-weight="600" fill="#55c555">SDV — 통계 분포 기반 합성 데이터</text>
  <rect x="454" y="114" width="366" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="506" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> sdv.single_table </text>
  <text x="654" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="470" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    GaussianCopulaSynthesizer</text>
  <text x="470" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 실제 데이터로 메타데이터 생성</text>
  <text x="470" y="198" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">synthesizer = GaussianCopula</text>
  <text x="470" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    Synthesizer(metadata)</text>
  <text x="470" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 실제 데이터로 학습</text>
  <text x="470" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">synthesizer.fit(real_df)</text>
  <text x="470" y="278" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 합성 데이터 생성</text>
  <text x="470" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">synthetic_df = synthesizer.sample(</text>
  <text x="470" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" xml:space="preserve">                                    </text>

  <!-- Quality check boxes -->
  <text x="60" y="336" font-size="14" font-weight="600" fill="#e8e8e8">합성 데이터 품질 검증 항목</text>
  <rect x="60" y="350" width="180" height="54" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">통계적 유사성</text>
  <text x="150" y="391" text-anchor="middle" font-size="12" fill="#888">분포·평균·분산 비교</text>

  <rect x="260" y="350" width="180" height="54" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">프라이버시 보호</text>
  <text x="350" y="391" text-anchor="middle" font-size="12" fill="#888">식별 위험도 평가</text>

  <rect x="460" y="350" width="180" height="54" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">다운스트림 성능</text>
  <text x="550" y="391" text-anchor="middle" font-size="12" fill="#888">모델 학습 후 비교</text>

  <rect x="660" y="350" width="160" height="54" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="371" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">현실성 점수</text>
  <text x="740" y="391" text-anchor="middle" font-size="12" fill="#888">판별자 모델 평가</text>

  <text x="60" y="428" font-size="12" fill="#555">* SDV sdmetrics 라이브러리로 통계적 유사도·프라이버시 위험 자동 측정 가능</text>
</svg>
