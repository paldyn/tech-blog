<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SameSite 속성 동작 비교</text>
    <!-- Column headers -->
    <text x="170" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">SameSite=None</text>
    <text x="440" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#dd9955">SameSite=Lax</text>
    <text x="710" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">SameSite=Strict</text>
    <!-- Row: 같은 사이트 -->
    <text x="60" y="115" font-size="11" fill="#888">같은 사이트 요청</text>
    <text x="170" y="115" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="440" y="115" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="710" y="115" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <line x1="60" y1="125" x2="820" y2="125" stroke="#222" stroke-width="1"/>
    <!-- Row: 최상위 탐색 GET -->
    <text x="60" y="153" font-size="11" fill="#888">크로스사이트 링크 클릭</text>
    <text x="170" y="153" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="440" y="153" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="710" y="153" text-anchor="middle" font-size="12" fill="#e05555">✗ 차단</text>
    <line x1="60" y1="163" x2="820" y2="163" stroke="#222" stroke-width="1"/>
    <!-- Row: 이미지 로드 -->
    <text x="60" y="191" font-size="11" fill="#888">크로스사이트 이미지 로드</text>
    <text x="170" y="191" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="440" y="191" text-anchor="middle" font-size="12" fill="#e05555">✗ 차단</text>
    <text x="710" y="191" text-anchor="middle" font-size="12" fill="#e05555">✗ 차단</text>
    <line x1="60" y1="201" x2="820" y2="201" stroke="#222" stroke-width="1"/>
    <!-- Row: form POST -->
    <text x="60" y="229" font-size="11" fill="#888">크로스사이트 form POST</text>
    <text x="170" y="229" text-anchor="middle" font-size="12" fill="#55c555">✓ 전송</text>
    <text x="440" y="229" text-anchor="middle" font-size="12" fill="#e05555">✗ 차단</text>
    <text x="710" y="229" text-anchor="middle" font-size="12" fill="#e05555">✗ 차단</text>
    <line x1="60" y1="239" x2="820" y2="239" stroke="#222" stroke-width="1"/>
    <!-- Row: CSRF 공격 차단 -->
    <text x="60" y="267" font-size="11" fill="#888">CSRF 공격 차단</text>
    <text x="170" y="267" text-anchor="middle" font-size="12" fill="#e05555">✗ 취약</text>
    <text x="440" y="267" text-anchor="middle" font-size="12" fill="#dd9955">△ 부분 방어</text>
    <text x="710" y="267" text-anchor="middle" font-size="12" fill="#55c555">✓ 완전 방어</text>
    <!-- Usage summary boxes -->
    <rect x="60" y="290" width="240" height="90" rx="6" fill="#1a0a0a" stroke="#aa3a3a" stroke-width="1"/>
    <text x="180" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">None</text>
    <text x="180" y="332" text-anchor="middle" font-size="11" fill="#888">크로스사이트 서드파티</text>
    <text x="180" y="350" text-anchor="middle" font-size="11" fill="#888">쿠키에 사용</text>
    <text x="180" y="368" text-anchor="middle" font-size="10" fill="#666">Secure 속성 필수</text>
    <rect x="320" y="290" width="240" height="90" rx="6" fill="#1a1a0a" stroke="#aa8a3a" stroke-width="1"/>
    <text x="440" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#dd9955">Lax (기본값)</text>
    <text x="440" y="332" text-anchor="middle" font-size="11" fill="#888">일반 세션 쿠키에 적합</text>
    <text x="440" y="350" text-anchor="middle" font-size="11" fill="#888">OAuth 리다이렉트 허용</text>
    <text x="440" y="368" text-anchor="middle" font-size="10" fill="#666">Chrome 80+ 브라우저 기본값</text>
    <rect x="580" y="290" width="240" height="90" rx="6" fill="#0a1a0a" stroke="#3aaa3a" stroke-width="1"/>
    <text x="700" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Strict</text>
    <text x="700" y="332" text-anchor="middle" font-size="11" fill="#888">고보안 세션 쿠키에 적합</text>
    <text x="700" y="350" text-anchor="middle" font-size="11" fill="#888">단, 외부 링크 클릭 시</text>
    <text x="700" y="368" text-anchor="middle" font-size="10" fill="#666">로그인 세션 미포함 주의</text>
    <text x="440" y="406" text-anchor="middle" font-size="11" fill="#555">SameSite 기준: 등록 가능 도메인 (eTLD+1) — example.com과 sub.example.com은 동일 사이트</text>
  </g>
</svg>
