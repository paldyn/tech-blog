<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrAC" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">am 충돌 시 세 갈래의 선택</text>

  <rect x="340" y="90" width="200" height="60" rx="10" fill="#10151f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="118" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">패치 적용 충돌</text>
  <text x="440" y="138" font-size="12" fill="#888" text-anchor="middle">git am 중단됨</text>

  <rect x="60" y="240" width="220" height="80" rx="10" fill="#10151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="270" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">--continue</text>
  <text x="170" y="292" font-size="12" fill="#888" text-anchor="middle">충돌 해결 후</text>
  <text x="170" y="310" font-size="12" fill="#888" text-anchor="middle">다음 패치로 진행</text>

  <rect x="330" y="240" width="220" height="80" rx="10" fill="#10151f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="270" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">--skip</text>
  <text x="440" y="292" font-size="12" fill="#888" text-anchor="middle">현재 패치 건너뛰고</text>
  <text x="440" y="310" font-size="12" fill="#888" text-anchor="middle">나머지 계속</text>

  <rect x="600" y="240" width="220" height="80" rx="10" fill="#10151f" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="270" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">--abort</text>
  <text x="710" y="292" font-size="12" fill="#888" text-anchor="middle">전체 취소하고</text>
  <text x="710" y="310" font-size="12" fill="#888" text-anchor="middle">원래 상태로 복귀</text>

  <path d="M 400 150 L 200 238" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrAC)"/>
  <path d="M 440 150 L 440 238" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrAC)"/>
  <path d="M 480 150 L 685 238" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrAC)"/>

  <text x="60" y="190" font-size="13" fill="#888">--3way 옵션을 함께 쓰면 공통 조상을 활용해 자동 병합 성공률을 높일 수 있습니다.</text>
</svg>
