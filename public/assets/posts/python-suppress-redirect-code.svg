<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">suppress / redirect_stdout 코드 예제</text>

  <!-- Left code: suppress -->
  <rect x="60" y="62" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="245" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">suppress</text>

  <text xml:space="preserve" x="80" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="116" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> contextlib </text>
  <text xml:space="preserve" x="226" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="276" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> suppress</text>
  <text xml:space="preserve" x="80" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="130" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> os</text>

  <text xml:space="preserve" x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; try/except pass 대신</text>
  <text xml:space="preserve" x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="113" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> suppress(FileNotFoundError):</text>

  <text xml:space="preserve" x="80" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    os.remove(</text>
  <text xml:space="preserve" x="192" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"temp.txt"</text>
  <text xml:space="preserve" x="280" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text xml:space="preserve" x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 여러 예외 동시 억제</text>
  <text xml:space="preserve" x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="113" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> suppress(</text>

  <text xml:space="preserve" x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        FileNotFoundError,</text>
  <text xml:space="preserve" x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        PermissionError,</text>
  <text xml:space="preserve" x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        ):</text>
  <text xml:space="preserve" x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    os.remove(</text>
  <text xml:space="preserve" x="192" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"protected.txt"</text>
  <text xml:space="preserve" x="318" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <!-- Right code: redirect -->
  <rect x="450" y="62" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="635" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">redirect_stdout</text>

  <text xml:space="preserve" x="470" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="506" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> contextlib </text>
  <text xml:space="preserve" x="616" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="470" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    redirect_stdout</text>
  <text xml:space="preserve" x="470" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="520" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> io</text>

  <text xml:space="preserve" x="470" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 출력을 메모리 버퍼로 캡처</text>
  <text xml:space="preserve" x="470" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">buf = io.StringIO()</text>
  <text xml:space="preserve" x="470" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="503" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> redirect_stdout(buf):</text>

  <text xml:space="preserve" x="470" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    print(</text>
  <text xml:space="preserve" x="534" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"캡처된 텍스트"</text>
  <text xml:space="preserve" x="660" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text xml:space="preserve" x="470" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">output = buf.getvalue()</text>
  <text xml:space="preserve" x="470" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; '캡처된 텍스트\n'</text>

  <text xml:space="preserve" x="470" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 파일에 직접 리다이렉트</text>
  <text xml:space="preserve" x="470" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="503" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> open(</text>
  <text xml:space="preserve" x="541" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"out.txt"</text>
  <text xml:space="preserve" x="608" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="624" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"w"</text>
  <text xml:space="preserve" x="648" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text>
  <text xml:space="preserve" x="665" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="685" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> f,</text>
  <text xml:space="preserve" x="470" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">     </text>
  <text xml:space="preserve" x="475" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">redirect_stdout(f):</text>
  <text xml:space="preserve" x="470" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    print(</text>
  <text xml:space="preserve" x="534" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"파일에 기록"</text>
  <text xml:space="preserve" x="630" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
</svg>
