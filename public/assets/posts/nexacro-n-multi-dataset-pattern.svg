<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">복수 Dataset 동시 처리 패턴</text>

  <!-- Pattern 1: Multi-in + Multi-out -->
  <rect x="60" y="72" width="360" height="360" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">다중 출력 — 한 번에 여러 DS 수신</text>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목록 + 페이징 + 집계 동시 수신</text>

  <!-- Client datasets -->
  <rect x="78" y="130" width="140" height="34" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="148" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">dsMain (목록)</text>

  <rect x="78" y="178" width="140" height="34" fill="#0d1520" rx="4" stroke="#55c555"/>
  <text x="148" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">dsPager (페이징)</text>

  <rect x="78" y="226" width="140" height="34" fill="#0d1520" rx="4" stroke="#7777cc"/>
  <text x="148" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">dsSummary (집계)</text>

  <!-- Labels -->
  <text x="78" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">outDatasets:</text>

  <!-- Arrow from server -->
  <polygon points="224,196 194,186 194,206" fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="194" y1="196" x2="280" y2="196" stroke="#e05555" stroke-width="2"/>
  <text x="237" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">서버 응답</text>

  <!-- Server DS boxes -->
  <text x="282" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 반환:</text>
  <rect x="282" y="130" width="118" height="34" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="341" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">dsResult</text>

  <rect x="282" y="178" width="118" height="34" fill="#0d1520" rx="4" stroke="#55c555"/>
  <text x="341" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">dsPager</text>

  <rect x="282" y="226" width="118" height="34" fill="#0d1520" rx="4" stroke="#7777cc"/>
  <text x="341" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">dsTotal</text>

  <!-- outDatasets mapping string -->
  <rect x="78" y="278" width="322" height="48" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="240" y="298" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"dsResult=dsMain</text>
  <text x="240" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178"> dsPager=dsPager dsTotal=dsSummary"</text>

  <rect x="78" y="340" width="322" height="72" fill="#0d1520" rx="4" stroke="#3a4a6e"/>
  <text x="240" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">서버 Java</text>
  <text x="94" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">res.addDataset("dsResult", list);</text>
  <text x="94" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">res.addDataset("dsPager", pager);</text>
  <text x="94" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">res.addDataset("dsTotal", total);</text>

  <!-- Pattern 2: Multi-in -->
  <rect x="460" y="72" width="360" height="360" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">다중 입력 — 마스터·디테일 저장</text>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">헤더 + 라인 동시 전송</text>

  <!-- Labels -->
  <text x="478" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">inDatasets:</text>

  <rect x="478" y="130" width="150" height="34" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="553" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">dsMaster (헤더)</text>

  <rect x="478" y="178" width="150" height="34" fill="#0d1520" rx="4" stroke="#7777cc"/>
  <text x="553" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">dsDetail (라인)</text>

  <!-- Arrow to server -->
  <polygon points="644,196 674,186 674,206" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="636" y1="196" x2="674" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <text x="655" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">전송</text>

  <!-- Server boxes -->
  <text x="680" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 수신:</text>
  <rect x="680" y="130" width="120" height="34" fill="#0d1520" rx="4" stroke="#7ec8e3"/>
  <text x="740" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">dsOrder (헤더)</text>

  <rect x="680" y="178" width="120" height="34" fill="#0d1520" rx="4" stroke="#7777cc"/>
  <text x="740" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">dsLine (라인)</text>

  <!-- inDatasets string -->
  <rect x="478" y="228" width="322" height="36" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="639" y="250" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"dsOrder=dsMaster dsLine=dsDetail"</text>

  <!-- Server code -->
  <rect x="478" y="278" width="322" height="88" fill="#0d1520" rx="4" stroke="#3a4a6e"/>
  <text x="639" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">서버 Java — 트랜잭션 처리</text>
  <text x="494" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">NexacroDataSet dsOrder =</text>
  <text x="494" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  req.getDataset("dsOrder");</text>
  <text x="494" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">NexacroDataSet dsLine =</text>
  <text x="494" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  req.getDataset("dsLine");</text>

  <!-- Bottom note -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공백으로 구분된 복수 매핑 — 한 번의 트랜잭션으로 여러 Dataset 교환 가능</text>
</svg>
