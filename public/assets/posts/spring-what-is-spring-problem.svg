<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370">
  <rect width="880" height="370" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 이전 vs Spring 도입</text>

  <!-- Left label -->
  <text x="245" y="74"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Spring 없이 (수동 조립)</text>

  <!-- Right label -->
  <text x="635" y="74"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Spring 사용 (자동 주입)</text>

  <!-- Left code box -->
  <rect x="60" y="86" width="370" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// 의존성 직접 생성·조립</text>
  <text x="76" y="129" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">HikariConfig</tspan><tspan fill="#ffffff"> cfg = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> HikariConfig();</tspan>
  </text>
  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">cfg.setJdbcUrl(</tspan><tspan fill="#ce9178">"jdbc:mysql://..."</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">DataSource</tspan><tspan fill="#ffffff"> ds = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> HikariDataSource(cfg);</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UserRepository</tspan><tspan fill="#ffffff"> repo =</tspan>
  </text>
  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> UserRepositoryImpl(ds);</tspan>
  </text>
  <text x="76" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UserService</tspan><tspan fill="#ffffff"> svc =</tspan>
  </text>
  <text x="76" y="243" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> UserServiceImpl(repo);</tspan>
  </text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// 변경 시 전체 코드 수정 필요</text>
  <text x="76" y="281" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// 테스트하기도 어려움</text>

  <!-- VS separator -->
  <line x1="435" y1="100" x2="435" y2="284" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="196"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#555" text-anchor="middle">VS</text>

  <!-- Right code box -->
  <rect x="450" y="86" width="370" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">@Service</tspan>
  </text>
  <text x="466" y="129" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> UserServiceImpl {</tspan>
  </text>
  <text x="466" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
  </text>
  <text x="466" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  @Autowired</tspan>
  </text>
  <text x="466" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  private</tspan><tspan fill="#ffffff"> UserRepository repo;</tspan>
  </text>
  <text x="466" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
  </text>
  <text x="466" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">  // Spring이 자동으로 주입</text>
  <text x="466" y="243" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">  // 인터페이스만 선언하면 됨</text>
  <text x="466" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="466" y="281" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// 변경 → 설정만 수정하면 됨</text>

  <!-- Bottom annotation -->
  <text x="440" y="325"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Spring은 객체 생성·조립 책임을 컨테이너로 이전하여 개발자가 비즈니스 로직에 집중하게 합니다</text>
</svg>
