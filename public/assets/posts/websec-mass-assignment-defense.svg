<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">&#xB9E4;&#xC2A4; &#xC5B4;&#xC0AC;&#xC778;&#xBA3C;&#xD2B8;: &#xBC29;&#xC5B4; &#xC804;&#xB7B5;</text>

  <!-- BAD label -->
  <text x="210" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">&#x274C; BAD &#x2014; &#xC9C1;&#xC811; &#xBC14;&#xC778;&#xB529;</text>

  <!-- GOOD label -->
  <text x="650" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">&#x2705; GOOD &#x2014; &#xD5C8;&#xC6A9; &#xD544;&#xB4DC; &#xBA85;&#xC2DC;</text>

  <!-- BAD code box -->
  <rect x="20" y="94" width="400" height="200" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="36" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &#x274C; &#xC704;&#xD5D8;: &#xBAA8;&#xB4E0; &#xD544;&#xB4DC; &#xBC14;&#xC778;&#xB529;</text>
  <text x="36" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">app</text><text x="66" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.post(</text><text x="128" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'/user'</text><text x="196" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="36" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  async </text><text x="107" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">(req, res) =&gt; {</text>
  <text x="36" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">    user.update(req.body)</text>
  <text x="36" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="36" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="36" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" xml:space="preserve">&#x26A0; isAdmin, role &#xB4F1; &#xBBFC;&#xAC10; &#xD544;&#xB4DC;&#xAE4C;&#xC9C0; &#xB370;&#xC774;&#xD130; &#xBC14;&#xC778;&#xB529;</text>
  <text x="36" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" xml:space="preserve">&#x26A0; &#xAD8C;&#xD55C; &#xC0C1;&#xC2B9; &#xACF5;&#xACA9; &#xAC00;&#xB2A5;</text>

  <!-- GOOD code box -->
  <rect x="460" y="94" width="400" height="200" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &#x2705; &#xC548;&#xC804;: &#xD5C8;&#xC6A9; &#xBAA9;&#xB85D; &#xC9C0;&#xC815;</text>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="538" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">allowed = [</text><text x="646" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'name'</text><text x="700" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'email'</text><text x="538" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">]</text>
  <text x="476" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="538" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">data = pick(req.body, allowed)</text>
  <text x="476" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">user.update(data)</text>
  <text x="476" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">&#x2713; &#xD5C8;&#xC6A9;&#xB41C; &#xD544;&#xB4DC;&#xB9CC; &#xD544;&#xD130;&#xB9C1;&#xD558;&#xC5EC; &#xC5C5;&#xB370;&#xC774;&#xD2B8;</text>
  <text x="476" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">&#x2713; isAdmin, role &#xD544;&#xB4DC; &#xBB34;&#xC2DC;&#xB428;</text>

  <!-- Divider -->
  <line x1="440" y1="94" x2="440" y2="294" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Summary boxes -->
  <rect x="20" y="320" width="400" height="80" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">&#xCC28;&#xB2E8;&#xD574;&#xC57C; &#xD560; &#xC704;&#xD5D8;</text>
  <text x="220" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">&#xBBFC;&#xAC10; &#xD544;&#xB4DC; (isAdmin, role, password)</text>
  <text x="220" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">&#xC5FC;&#xACA9;&#xD55C; Allowlist &#xC815;&#xCC45; &#xD544;&#xC694;</text>

  <rect x="460" y="320" width="400" height="80" rx="8" fill="#051a05" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">&#xD3F0;&#xC2A4; &#xD6C4; &#xD1B5;&#xC81C;</text>
  <text x="660" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">pick(), allowedFields &#xD328;&#xD134; &#xC0AC;&#xC6A9;</text>
  <text x="660" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">ORM &#xC218;&#xC900;&#xC758; attr_accessible &#xB4F1; &#xD65C;&#xC6A9;</text>

  <!-- Bottom tip -->
  <rect x="20" y="420" width="840" height="44" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">&#xD575;&#xC2EC; &#xC6D0;&#xCE59;: req.body&#xB97C; &#xC9C1;&#xC811; &#xC0AC;&#xC6A9;&#xD558;&#xC9C0; &#xB9D0;&#xACE0; &#xD56D;&#xC0C1; &#xD5C8;&#xC6A9; &#xBAA9;&#xB85D;(Allowlist)&#xB97C; &#xBA85;&#xC2DC;&#xC801;&#xC73C;&#xB85C; &#xC815;&#xC758;&#xD560; &#xAC83;</text>
