<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">로그 레벨 체계</text>

  <!-- ERROR -->
  <rect x="60" y="62" width="760" height="54" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="82" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#e05555">ERROR</text>
  <text x="230" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">서비스 중단 수준 오류. 즉시 대응 필요</text>
  <text x="150" y="102" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e05555">레벨 1</text>
  <text x="230" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#9aa4b8">예: 트랜잭션 실패, 세션 만료, DB 연결 끊김</text>

  <!-- WARN -->
  <rect x="60" y="126" width="760" height="54" rx="6" fill="#241a05" stroke="#e0a030" stroke-width="1.5"/>
  <text x="150" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#e0a030">WARN</text>
  <text x="230" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">잠재적 문제. 운영 모니터링 대상</text>
  <text x="150" y="166" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e0a030">레벨 2</text>
  <text x="230" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#9aa4b8">예: 빈 Dataset 응답, 재시도 성공, 느린 응답</text>

  <!-- INFO -->
  <rect x="60" y="190" width="760" height="54" rx="6" fill="#0d1e35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="210" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7ec8e3">INFO</text>
  <text x="230" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">정상 동작 기록. 운영 환경 기본 레벨</text>
  <text x="150" y="230" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">레벨 3</text>
  <text x="230" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#9aa4b8">예: 화면 초기화, 트랜잭션 시작/완료</text>

  <!-- DEBUG -->
  <rect x="60" y="254" width="760" height="54" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#55c555">DEBUG</text>
  <text x="230" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">개발 단계 상세 기록. 운영 환경 비활성화</text>
  <text x="150" y="294" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#55c555">레벨 4</text>
  <text x="230" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#9aa4b8">예: 변수 값, Dataset 행 수, 분기 조건</text>

  <!-- TRACE -->
  <rect x="60" y="318" width="760" height="54" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7777cc">TRACE</text>
  <text x="230" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">함수 진입/종료 추적. 성능 분석용</text>
  <text x="150" y="358" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7777cc">레벨 5</text>
  <text x="230" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#9aa4b8">예: fn_enter / fn_exit, 루프 반복 횟수</text>
</svg>
