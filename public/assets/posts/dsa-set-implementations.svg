<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">집합 (Set) 구현 방식 비교</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">HashSet vs TreeSet — 순서와 성능의 트레이드오프</text>

    <!-- HashSet column -->
    <rect x="60" y="90" width="360" height="46" fill="#1a2544" stroke="#7ec8e3" stroke-width="2" rx="6"/>
    <text x="240" y="118" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">HashSet (해시 기반)</text>

    <rect x="60" y="148" width="360" height="260" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <!-- Operations -->
    <text x="80" y="175" font-size="13" font-weight="600" fill="#e8e8e8">자료구조</text>
    <text x="400" y="175" font-size="13" fill="#7ec8e3" text-anchor="end">해시 테이블</text>
    <line x1="80" y1="183" x2="400" y2="183" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="205" font-size="13" font-weight="600" fill="#e8e8e8">삽입/삭제/검색</text>
    <text x="400" y="205" font-size="13" fill="#55c555" text-anchor="end">O(1) 평균</text>
    <line x1="80" y1="213" x2="400" y2="213" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="235" font-size="13" font-weight="600" fill="#e8e8e8">순서 보장</text>
    <text x="400" y="235" font-size="13" fill="#e05555" text-anchor="end">없음</text>
    <line x1="80" y1="243" x2="400" y2="243" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="265" font-size="13" font-weight="600" fill="#e8e8e8">범위 쿼리</text>
    <text x="400" y="265" font-size="13" fill="#e05555" text-anchor="end">불가</text>
    <line x1="80" y1="273" x2="400" y2="273" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="295" font-size="13" font-weight="600" fill="#e8e8e8">메모리</text>
    <text x="400" y="295" font-size="13" fill="#e8e8e8" text-anchor="end">해시 테이블 오버헤드</text>
    <line x1="80" y1="303" x2="400" y2="303" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="325" font-size="13" font-weight="600" fill="#e8e8e8">Python 대응</text>
    <text x="400" y="325" font-size="13" fill="#7ec8e3" text-anchor="end">set, frozenset</text>
    <line x1="80" y1="333" x2="400" y2="333" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="355" font-size="13" font-weight="600" fill="#e8e8e8">Java 대응</text>
    <text x="400" y="355" font-size="13" fill="#7ec8e3" text-anchor="end">HashSet, LinkedHashSet</text>
    <line x1="80" y1="363" x2="400" y2="363" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="80" y="385" font-size="13" fill="#888">적합한 용도: 빠른 멤버십 확인</text>
    <text x="80" y="401" font-size="13" fill="#888">중복 제거, 교집합·합집합</text>

    <!-- TreeSet column -->
    <rect x="460" y="90" width="360" height="46" fill="#1a3a1e" stroke="#55c555" stroke-width="2" rx="6"/>
    <text x="640" y="118" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">TreeSet (트리 기반)</text>

    <rect x="460" y="148" width="360" height="260" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <!-- Operations -->
    <text x="480" y="175" font-size="13" font-weight="600" fill="#e8e8e8">자료구조</text>
    <text x="800" y="175" font-size="13" fill="#55c555" text-anchor="end">Red-Black Tree</text>
    <line x1="480" y1="183" x2="800" y2="183" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="205" font-size="13" font-weight="600" fill="#e8e8e8">삽입/삭제/검색</text>
    <text x="800" y="205" font-size="13" fill="#7ec8e3" text-anchor="end">O(log n)</text>
    <line x1="480" y1="213" x2="800" y2="213" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="235" font-size="13" font-weight="600" fill="#e8e8e8">순서 보장</text>
    <text x="800" y="235" font-size="13" fill="#55c555" text-anchor="end">정렬 순서</text>
    <line x1="480" y1="243" x2="800" y2="243" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="265" font-size="13" font-weight="600" fill="#e8e8e8">범위 쿼리</text>
    <text x="800" y="265" font-size="13" fill="#55c555" text-anchor="end">가능 (subSet 등)</text>
    <line x1="480" y1="273" x2="800" y2="273" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="295" font-size="13" font-weight="600" fill="#e8e8e8">메모리</text>
    <text x="800" y="295" font-size="13" fill="#e8e8e8" text-anchor="end">포인터 + 색 정보</text>
    <line x1="480" y1="303" x2="800" y2="303" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="325" font-size="13" font-weight="600" fill="#e8e8e8">Python 대응</text>
    <text x="800" y="325" font-size="13" fill="#55c555" text-anchor="end">sortedcontainers.SortedSet</text>
    <line x1="480" y1="333" x2="800" y2="333" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="355" font-size="13" font-weight="600" fill="#e8e8e8">Java 대응</text>
    <text x="800" y="355" font-size="13" fill="#55c555" text-anchor="end">TreeSet</text>
    <line x1="480" y1="363" x2="800" y2="363" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="480" y="385" font-size="13" fill="#888">적합한 용도: 정렬된 반복</text>
    <text x="480" y="401" font-size="13" fill="#888">범위 검색, first/last 조회</text>
  </g>
</svg>
