<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RNN vs LSTM vs Transformer 비교</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="40" rx="4" fill="#111" stroke="#333"/>
  <text x="190" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">항목</text>
  <text x="390" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">RNN</text>
  <text x="550" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">LSTM/GRU</text>
  <text x="730" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Transformer</text>

  <!-- Rows -->
  <rect x="60" y="110" width="760" height="40" rx="0" fill="#0d1117" stroke="#1e2433"/>
  <text x="190" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기울기 소실</text>
  <text x="390" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">심각</text>
  <text x="550" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">완화</text>
  <text x="730" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">없음</text>

  <rect x="60" y="152" width="760" height="40" rx="0" fill="#111" stroke="#1e2433"/>
  <text x="190" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">병렬 학습</text>
  <text x="390" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="550" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="730" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">완전 병렬</text>

  <rect x="60" y="194" width="760" height="40" rx="0" fill="#0d1117" stroke="#1e2433"/>
  <text x="190" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">장거리 의존성</text>
  <text x="390" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">약함</text>
  <text x="550" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">중간</text>
  <text x="730" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 거리</text>

  <rect x="60" y="236" width="760" height="40" rx="0" fill="#111" stroke="#1e2433"/>
  <text x="190" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">메모리 효율</text>
  <text x="390" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">낮음</text>
  <text x="550" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">중간</text>
  <text x="730" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">O(n²) KV</text>

  <rect x="60" y="278" width="760" height="40" rx="0" fill="#0d1117" stroke="#1e2433"/>
  <text x="190" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스트리밍 추론</text>
  <text x="390" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 상태</text>
  <text x="550" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 상태</text>
  <text x="730" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">KV-Cache</text>

  <!-- Column dividers -->
  <line x1="300" y1="68" x2="300" y2="320" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="68" x2="470" y2="320" stroke="#333" stroke-width="1"/>
  <line x1="640" y1="68" x2="640" y2="320" stroke="#333" stroke-width="1"/>

  <!-- Conclusion -->
  <rect x="60" y="334" width="760" height="42" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">2017년 Transformer 등장 이후 대부분의 NLP 태스크에서 RNN 계열 대체</text>
</svg>
