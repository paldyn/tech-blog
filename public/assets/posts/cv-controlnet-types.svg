<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ControlNet 유형별 제어 방식</text>

  <!-- OpenPose -->
  <rect x="40" y="75" width="180" height="120" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">OpenPose</text>
  <text x="130" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인체 관절 좌표</text>
  <text x="130" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">18개 키포인트</text>
  <text x="130" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">인물 포즈 제어</text>
  <text x="130" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">댄스·패션 촬영</text>

  <!-- Canny -->
  <rect x="235" y="75" width="180" height="120" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="325" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Canny Edge</text>
  <text x="325" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">엣지 검출 맵</text>
  <text x="325" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">구도·윤곽 보존</text>
  <text x="325" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">스케치 → 일러스트</text>
  <text x="325" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">로고 스타일 변환</text>

  <!-- Depth -->
  <rect x="430" y="75" width="180" height="120" rx="8" fill="#0f1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="520" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Depth Map</text>
  <text x="520" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">깊이 추정 맵</text>
  <text x="520" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">3D 공간감 보존</text>
  <text x="520" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">실내 재디자인</text>
  <text x="520" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">건축 시각화</text>

  <!-- Normal Map -->
  <rect x="625" y="75" width="215" height="120" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="732" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Normal Map</text>
  <text x="732" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">표면 법선 벡터</text>
  <text x="732" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">표면 재질·조명 보존</text>
  <text x="732" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">3D 모델 렌더링 제어</text>
  <text x="732" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">게임 에셋 생성</text>

  <!-- Second row -->
  <!-- Scribble -->
  <rect x="40" y="215" width="180" height="110" rx="8" fill="#111" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="130" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">Scribble/Lineart</text>
  <text x="130" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">손그림 스케치</text>
  <text x="130" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">낙서 → 정교한 이미지</text>
  <text x="130" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">아이 그림 업스케일</text>

  <!-- Segmentation -->
  <rect x="235" y="215" width="180" height="110" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="325" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Segmentation</text>
  <text x="325" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">의미론적 분할 맵</text>
  <text x="325" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">장면 레이아웃 제어</text>
  <text x="325" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">배경 교체·편집</text>

  <!-- IP-Adapter -->
  <rect x="430" y="215" width="180" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">IP-Adapter</text>
  <text x="520" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이미지 프롬프트</text>
  <text x="520" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">스타일 참조 이미지</text>
  <text x="520" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">얼굴 아이덴티티 보존</text>

  <!-- T2I-Adapter -->
  <rect x="625" y="215" width="215" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="732" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">T2I-Adapter</text>
  <text x="732" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">경량 제어 어댑터</text>
  <text x="732" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">ControlNet보다 4배 작음</text>
  <text x="732" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">다중 조건 결합 용이</text>

  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">여러 ControlNet을 동시에 적용해 조건을 결합할 수 있음 (conditioning_scale 가중치 조절)</text>
</svg>
