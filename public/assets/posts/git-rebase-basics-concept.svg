<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git rebase 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">커밋을 떼어내 새 베이스 위에 재적용</text>

  <!-- BEFORE label -->
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rebase 전</text>

  <!-- C1 -->
  <circle cx="100" cy="155" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <!-- C2 -->
  <circle cx="200" cy="155" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>
  <!-- C3 (main) -->
  <circle cx="320" cy="155" r="22" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="320" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">C3</text>

  <!-- main label -->
  <rect x="292" y="188" width="56" height="22" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">main</text>
  <line x1="320" y1="188" x2="320" y2="177" stroke="#7777cc" stroke-width="1.5"/>

  <!-- F1, F2 on feature (branching from C2) -->
  <circle cx="280" cy="95" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="280" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F1</text>
  <circle cx="380" cy="95" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F2</text>

  <!-- feature label -->
  <rect x="346" y="56" width="68" height="22" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">feature</text>
  <line x1="380" y1="78" x2="380" y2="117" stroke="#55c555" stroke-width="1.5"/>

  <!-- Arrows before -->
  <line x1="122" y1="155" x2="176" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="176,150 186,155 176,160" fill="#555"/>
  <line x1="222" y1="155" x2="296" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="296,150 306,155 296,160" fill="#555"/>
  <line x1="218" y1="143" x2="258" y2="107" stroke="#555" stroke-width="2"/>
  <polygon points="255,100 265,106 257,114" fill="#555"/>
  <line x1="302" y1="95" x2="356" y2="95" stroke="#55c555" stroke-width="2"/>
  <polygon points="356,90 366,95 356,100" fill="#55c555"/>

  <!-- Arrow down for rebase -->
  <line x1="440" y1="240" x2="440" y2="270" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="433,270 440,285 447,270" fill="#e8e8e8"/>

  <rect x="310" y="214" width="260" height="26" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">git rebase main</text>

  <!-- AFTER label -->
  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rebase 후</text>

  <!-- C1 after -->
  <circle cx="100" cy="362" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <!-- C2 after -->
  <circle cx="200" cy="362" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>
  <!-- C3 after (main) -->
  <circle cx="320" cy="362" r="22" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="320" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">C3</text>

  <!-- F1', F2' after (new commits) -->
  <circle cx="430" cy="362" r="22" fill="#1a1a0a" stroke="#e0aa55" stroke-width="2.5"/>
  <text x="430" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0aa55">F1'</text>
  <circle cx="540" cy="362" r="22" fill="#1a1a0a" stroke="#e0aa55" stroke-width="2.5"/>
  <text x="540" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0aa55">F2'</text>

  <!-- feature label after -->
  <rect x="508" y="394" width="64" height="22" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">feature</text>
  <line x1="540" y1="394" x2="540" y2="384" stroke="#55c555" stroke-width="1.5"/>

  <!-- Arrows after -->
  <line x1="122" y1="362" x2="176" y2="362" stroke="#555" stroke-width="2"/>
  <polygon points="176,357 186,362 176,367" fill="#555"/>
  <line x1="222" y1="362" x2="296" y2="362" stroke="#555" stroke-width="2"/>
  <polygon points="296,357 306,362 296,367" fill="#555"/>
  <line x1="342" y1="362" x2="406" y2="362" stroke="#555" stroke-width="2"/>
  <polygon points="406,357 416,362 406,367" fill="#555"/>
  <line x1="452" y1="362" x2="516" y2="362" stroke="#555" stroke-width="2"/>
  <polygon points="516,357 526,362 516,367" fill="#555"/>

  <!-- Note: F1, F2 are gone (ghosted) -->
  <text x="680" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">기존 F1, F2는</text>
  <text x="680" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">새 SHA-1 로 교체됨</text>
  <text x="680" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0aa55">(다른 커밋 객체)</text>
</svg>
