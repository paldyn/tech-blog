<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Draft PR vs Ready PR</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">같은 변경이라도 상태에 따라 가능한 동작이 다르다</text>

  <!-- Left: Draft -->
  <rect x="60" y="96" width="360" height="280" rx="10" fill="#101010" stroke="#888888" stroke-width="1.5"/>
  <rect x="84" y="120" width="120" height="28" rx="14" fill="#1a1a1a" stroke="#888888" stroke-width="1.2"/>
  <text x="144" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#aaaaaa">○ Draft</text>

  <text x="84" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 변경 미리 공유 가능</text>
  <text x="84" y="216"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ CI 워크플로우 실행</text>
  <text x="84" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 코멘트로 토론</text>
  <text x="84" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">✗ 리뷰 요청 알림 안 감</text>
  <text x="84" y="312"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">✗ 머지 버튼 비활성</text>
  <text x="84" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">✗ 코드 오너 자동 요청 보류</text>

  <!-- Right: Ready -->
  <rect x="460" y="96" width="360" height="280" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <rect x="484" y="120" width="160" height="28" rx="14" fill="#071a07" stroke="#55c555" stroke-width="1.2"/>
  <text x="564" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">● Ready for review</text>

  <text x="484" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 변경 미리 공유 가능</text>
  <text x="484" y="216"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ CI 워크플로우 실행</text>
  <text x="484" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 코멘트로 토론</text>
  <text x="484" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 리뷰어에게 알림 전송</text>
  <text x="484" y="312"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 조건 충족 시 머지 가능</text>
  <text x="484" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">✓ 코드 오너 자동 요청</text>
</svg>
