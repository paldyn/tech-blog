<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b87ce8"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr4" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">L7 로드 밸런서 — URL 기반 콘텐츠 라우팅</text>

  <!-- Client -->
  <rect x="50" y="190" width="120" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="110" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">클라이언트</text>

  <!-- L7 Load Balancer -->
  <rect x="240" y="80" width="180" height="272" rx="10" fill="#180d22" stroke="#7a3a9a" stroke-width="2"/>
  <text x="330" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#b87ce8">L7 로드 밸런서</text>
  <line x1="260" y1="130" x2="400" y2="130" stroke="#3a1a5a" stroke-width="1"/>
  <text x="330" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/api/*</text>
  <text x="330" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/images/*</text>
  <text x="330" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/ws/*</text>
  <text x="330" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">그 외 /*</text>
  <text x="330" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Host 헤더, Cookie, Method,</text>
  <text x="330" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Source IP 등으로도 라우팅 가능</text>

  <!-- Backend pools -->
  <!-- API servers -->
  <rect x="610" y="80" width="220" height="52" rx="8" fill="#0b1a0b" stroke="#2a7a2a" stroke-width="1.5"/>
  <text x="720" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">API 서버 풀  /api/*</text>

  <!-- Image servers -->
  <rect x="610" y="162" width="220" height="52" rx="8" fill="#1a0f0b" stroke="#7a5a2a" stroke-width="1.5"/>
  <text x="720" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">이미지 서버 풀  /images/*</text>

  <!-- WebSocket servers -->
  <rect x="610" y="244" width="220" height="52" rx="8" fill="#0b0f1a" stroke="#2a5a7a" stroke-width="1.5"/>
  <text x="720" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">WebSocket 서버  /ws/*</text>

  <!-- Web servers -->
  <rect x="610" y="326" width="220" height="52" rx="8" fill="#1a0f20" stroke="#6a3a8a" stroke-width="1.5"/>
  <text x="720" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b87ce8">웹 서버 풀  /*</text>

  <!-- Arrow: Client → LB -->
  <line x1="170" y1="216" x2="240" y2="216" stroke="#b87ce8" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="204" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#b87ce8">HTTPS</text>

  <!-- Arrows: LB → pools -->
  <line x1="420" y1="152" x2="610" y2="106" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="420" y1="178" x2="610" y2="188" stroke="#e0a055" stroke-width="2" marker-end="url(#arr4)"/>
  <line x1="420" y1="204" x2="610" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="420" y1="230" x2="610" y2="352" stroke="#b87ce8" stroke-width="2" marker-end="url(#arr1)"/>
</svg>
