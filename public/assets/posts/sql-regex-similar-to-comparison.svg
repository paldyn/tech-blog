<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">패턴 매칭 방법 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">LIKE · SIMILAR TO · 정규식 (REGEXP / ~ )</text>

  <!-- Table container -->
  <rect x="60" y="88" width="760" height="282" rx="6" fill="#0e1117" stroke="#1e2433"/>

  <!-- Header bg -->
  <rect x="61" y="88" width="758" height="36" rx="5" fill="#161b27"/>
  <rect x="61" y="108" width="758" height="16" fill="#161b27"/>

  <!-- Column dividers -->
  <line x1="195" y1="88" x2="195" y2="370" stroke="#1e2433"/>
  <line x1="400" y1="88" x2="400" y2="370" stroke="#1e2433"/>
  <line x1="595" y1="88" x2="595" y2="370" stroke="#1e2433"/>

  <!-- Header separator -->
  <line x1="60" y1="124" x2="820" y2="124" stroke="#1e2433"/>

  <!-- Row separators -->
  <line x1="60" y1="164" x2="820" y2="164" stroke="#252b3a"/>
  <line x1="60" y1="204" x2="820" y2="204" stroke="#252b3a"/>
  <line x1="60" y1="244" x2="820" y2="244" stroke="#252b3a"/>
  <line x1="60" y1="284" x2="820" y2="284" stroke="#252b3a"/>
  <line x1="60" y1="324" x2="820" y2="324" stroke="#252b3a"/>

  <!-- Headers -->
  <text x="127" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">항목</text>
  <text x="297" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">LIKE</text>
  <text x="497" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">SIMILAR TO</text>
  <text x="707" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">REGEXP / ~</text>

  <!-- Row 1: 와일드카드 -->
  <text x="80" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">와일드카드</text>
  <text x="297" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">% (0+자), _ (1자)</text>
  <text x="497" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">%, _, *, +, ?, |, ()</text>
  <text x="707" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">POSIX 정규식 전체</text>

  <!-- Row 2: 표준 -->
  <text x="80" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 여부</text>
  <text x="297" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SQL 표준</text>
  <text x="497" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SQL:1999 표준</text>
  <text x="707" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">비표준(DB별 상이)</text>

  <!-- Row 3: 지원 DB -->
  <text x="80" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지원 DB</text>
  <text x="297" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">모든 DB</text>
  <text x="497" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PostgreSQL</text>
  <text x="707" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PostgreSQL, MySQL</text>
  <text x="707" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Oracle, SQL Server</text>

  <!-- Row 4: 인덱스 -->
  <text x="80" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 활용</text>
  <text x="297" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">전위 패턴만 가능</text>
  <text x="497" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">일반적으로 불가</text>
  <text x="707" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">GIN/GiST 트리거 필요</text>

  <!-- Row 5: 대소문자 -->
  <text x="80" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대소문자</text>
  <text x="297" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">DB/collation 종속</text>
  <text x="497" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">대소문자 구분</text>
  <text x="707" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">플래그로 제어 가능</text>

  <!-- Row 6: 사용 예 -->
  <text x="80" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예시 패턴</text>
  <text x="297" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">'abc%', '_bc'</text>
  <text x="497" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">'(abc|def)%'</text>
  <text x="707" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">'^[0-9]{3}-'</text>

  <!-- Note -->
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">LIKE 'abc%' 는 B-Tree 인덱스 사용 가능 (전위 고정, % 앞에 와일드카드 없음)</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">정규식 검색에 인덱스를 사용하려면 PostgreSQL GIN + pg_trgm 확장이 필요</text>
</svg>
