<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">GitHub Copilot 작동 구조</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">How GitHub Copilot Works</text>

  <defs>
    <marker id="coparr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="coparr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Editor -->
  <rect x="40" y="110" width="160" height="120" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">IDE / Editor</text>
  <text x="120" y="162" text-anchor="middle" font-size="12" fill="#888">VS Code, JetBrains</text>
  <text x="120" y="180" text-anchor="middle" font-size="12" fill="#888">Neovim, etc.</text>
  <text x="120" y="200" text-anchor="middle" font-size="12" fill="#888">Copilot 익스텐션</text>
  <text x="120" y="218" text-anchor="middle" font-size="12" fill="#888">설치 후 활성화</text>

  <!-- Arrow 1: Editor -> Context Builder -->
  <line x1="200" y1="170" x2="244" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#coparr)"/>
  <text x="222" y="160" text-anchor="middle" font-size="11" fill="#7ec8e3">코드 컨텍스트</text>

  <!-- Context Builder -->
  <rect x="244" y="110" width="170" height="120" rx="8" fill="#1a2020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="329" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Context Builder</text>
  <text x="329" y="162" text-anchor="middle" font-size="12" fill="#888">현재 파일</text>
  <text x="329" y="180" text-anchor="middle" font-size="12" fill="#888">열린 탭</text>
  <text x="329" y="198" text-anchor="middle" font-size="12" fill="#888">커서 위치</text>
  <text x="329" y="216" text-anchor="middle" font-size="12" fill="#888">언어·프레임워크</text>

  <!-- Arrow 2 -->
  <line x1="414" y1="170" x2="458" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#coparr)"/>
  <text x="436" y="160" text-anchor="middle" font-size="11" fill="#7ec8e3">프롬프트</text>

  <!-- Copilot Service -->
  <rect x="458" y="100" width="180" height="140" rx="8" fill="#142214" stroke="#55c555" stroke-width="1.5"/>
  <text x="548" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Copilot Service</text>
  <text x="548" y="152" text-anchor="middle" font-size="12" fill="#888">GitHub 서버</text>
  <text x="548" y="170" text-anchor="middle" font-size="12" fill="#888">GPT-4o / Codex</text>
  <text x="548" y="188" text-anchor="middle" font-size="12" fill="#888">기반 모델</text>
  <text x="548" y="208" text-anchor="middle" font-size="12" fill="#888">FIM (Fill-In-Middle)</text>
  <text x="548" y="226" text-anchor="middle" font-size="12" fill="#888">방식 추론</text>

  <!-- Arrow 3 -->
  <line x1="638" y1="170" x2="682" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#coparr2)"/>
  <text x="660" y="160" text-anchor="middle" font-size="11" fill="#55c555">제안 코드</text>

  <!-- Suggestion -->
  <rect x="682" y="110" width="158" height="120" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="761" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Suggestion</text>
  <text x="761" y="162" text-anchor="middle" font-size="12" fill="#888">인라인 자동완성</text>
  <text x="761" y="180" text-anchor="middle" font-size="12" fill="#888">Ghost Text로 표시</text>
  <text x="761" y="198" text-anchor="middle" font-size="12" fill="#888">Tab 키로 수락</text>
  <text x="761" y="216" text-anchor="middle" font-size="12" fill="#888">Esc로 거절</text>

  <!-- Modes section -->
  <text x="60" y="276" font-size="14" font-weight="600" fill="#e8e8e8">Copilot 기능 모드</text>

  <rect x="60" y="292" width="180" height="84" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Inline Completion</text>
  <text x="150" y="334" text-anchor="middle" font-size="12" fill="#888">코드 입력 중 자동</text>
  <text x="150" y="352" text-anchor="middle" font-size="12" fill="#888">완성 제안 (FIM)</text>
  <text x="150" y="368" text-anchor="middle" font-size="12" fill="#888">가장 기본 기능</text>

  <rect x="258" y="292" width="180" height="84" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="348" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Copilot Chat</text>
  <text x="348" y="334" text-anchor="middle" font-size="12" fill="#888">자연어 질문·설명</text>
  <text x="348" y="352" text-anchor="middle" font-size="12" fill="#888">@workspace, #file</text>
  <text x="348" y="368" text-anchor="middle" font-size="12" fill="#888">컨텍스트 참조</text>

  <rect x="456" y="292" width="180" height="84" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Copilot Edits</text>
  <text x="546" y="334" text-anchor="middle" font-size="12" fill="#888">멀티파일 수정</text>
  <text x="546" y="352" text-anchor="middle" font-size="12" fill="#888">리팩토링·버그 수정</text>
  <text x="546" y="368" text-anchor="middle" font-size="12" fill="#888">diff 형식으로 표시</text>

  <rect x="654" y="292" width="186" height="84" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="747" y="314" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Copilot Agent</text>
  <text x="747" y="334" text-anchor="middle" font-size="12" fill="#888">자율 태스크 실행</text>
  <text x="747" y="352" text-anchor="middle" font-size="12" fill="#888">터미널·파일 조작</text>
  <text x="747" y="368" text-anchor="middle" font-size="12" fill="#888">PR 생성까지</text>

  <text x="60" y="400" font-size="12" fill="#555">* FIM(Fill-In-Middle): 커서 앞·뒤 코드를 프롬프트로 주어 중간 코드를 생성하는 방식</text>
</svg>
