<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker vs Podman — 기능 비교</text>

  <!-- Header row -->
  <rect x="60" y="62" width="250" height="36" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="185" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">항목</text>

  <rect x="320" y="62" width="240" height="36" rx="4" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Docker</text>

  <rect x="570" y="62" width="250" height="36" rx="4" fill="#0a1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="695" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Podman</text>

  <!-- Row 1 -->
  <rect x="60" y="104" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="185" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데몬 필요 여부</text>
  <rect x="320" y="104" width="240" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">필요 (dockerd 상시 실행)</text>
  <rect x="570" y="104" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="695" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">불필요 (데몬리스)</text>

  <!-- Row 2 -->
  <rect x="60" y="144" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="185" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">rootless 지원</text>
  <rect x="320" y="144" width="240" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#f5c542" text-anchor="middle">가능 (별도 설정 필요)</text>
  <rect x="570" y="144" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="695" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">기본 지원</text>

  <!-- Row 3 -->
  <rect x="60" y="184" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="185" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Pod 지원</text>
  <rect x="320" y="184" width="240" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">없음 (Compose 사용)</text>
  <rect x="570" y="184" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="695" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
