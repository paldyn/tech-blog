  <!-- Row 4 -->
  <rect x="60" y="224" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="185" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Docker Compose</text>
  <rect x="320" y="224" width="240" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">네이티브 지원</text>
  <rect x="570" y="224" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="695" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">podman-compose / quadlet</text>

  <!-- Row 5 -->
  <rect x="60" y="264" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="185" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이미지 빌드</text>
  <rect x="320" y="264" width="240" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">docker build (BuildKit)</text>
  <rect x="570" y="264" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="695" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">buildah 통합</text>

  <!-- Row 6 -->
  <rect x="60" y="304" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="185" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">명령어 호환성</text>
  <rect x="320" y="304" width="240" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">기준 (Docker CLI)</text>
  <rect x="570" y="304" width="250" height="34" rx="3" fill="#0d1117" stroke="#222" stroke-width="1"/>
  <text x="695" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">alias docker=podman 가능</text>

  <!-- Row 7 -->
  <rect x="60" y="344" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="185" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">생태계</text>
  <rect x="320" y="344" width="240" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">대규모 (Docker Hub 등)</text>
  <rect x="570" y="344" width="250" height="34" rx="3" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="695" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">Red Hat / RHEL 중심</text>

  <!-- Bottom label -->
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">명령어 호환 — Docker 워크플로우 그대로 Podman 전환 가능, 보안 강화 환경에서 선호</text>
</svg>
