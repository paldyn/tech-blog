<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">sysctl 명령 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">런타임 조회·수정·영구 적용</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="285" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">## 조회</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sysctl</tspan><tspan fill="#ffffff"> vm.swappiness          </tspan><tspan fill="#9aa4b8"># 단일 파라미터</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sysctl</tspan><tspan fill="#ffffff"> -a                    </tspan><tspan fill="#9aa4b8"># 전체 출력</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sysctl</tspan><tspan fill="#ffffff"> -a | grep tcp         </tspan><tspan fill="#9aa4b8"># TCP 관련만</tspan></text>

  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">## 런타임 수정 (재부팅 시 초기화)</text>
  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sudo sysctl</tspan><tspan fill="#ffffff"> -w vm.swappiness=10</tspan></text>
  <text x="76" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8"># 동일 효과 — /proc/sys 직접 쓰기</tspan></text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> 10 &gt; /proc/sys/vm/swappiness</tspan></text>

  <text x="76" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">## 영구 적용 (재부팅 후에도 유지)</text>
  <text x="76" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8"># /etc/sysctl.d/99-custom.conf 에 작성 후:</tspan></text>
  <text x="76" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sudo sysctl</tspan><tspan fill="#ffffff"> --system          </tspan><tspan fill="#9aa4b8"># 모든 conf 파일 로드</tspan></text>
  <text x="76" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">sudo sysctl</tspan><tspan fill="#ffffff"> -p /etc/sysctl.d/99-custom.conf</tspan></text>
</svg>
