<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">namedtuple 메서드 · 활용 패턴</text>

  <!-- Left: _replace, _asdict, _fields -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">특수 메서드</text>
  <rect x="60" y="88" width="370" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p = Person(<tspan fill="#ce9178">"Alice"</tspan>, <tspan fill="#b5cea8">30</tspan>, <tspan fill="#ce9178">"Seoul"</tspan>)</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># _replace: 일부 필드만 교체 (새 객체 반환)</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p2 = p._replace(age=<tspan fill="#b5cea8">31</tspan>)</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Person(name='Alice', age=31, city='Seoul')</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># _asdict: OrderedDict로 변환</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p._asdict()</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'name':'Alice','age':30,'city':'Seoul'}</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># _fields: 필드 이름 튜플</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Person._fields  <tspan fill="#6a8aa0"># ('name','age','city')</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Person._make([<tspan fill="#ce9178">"Bob"</tspan>, <tspan fill="#b5cea8">25</tspan>, <tspan fill="#ce9178">"Busan"</tspan>])</text>

  <!-- Right: defaults + typing.NamedTuple -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">기본값 · typing.NamedTuple</text>
  <rect x="450" y="88" width="370" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># defaults: 오른쪽 필드부터 기본값 지정</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Point = namedtuple(<tspan fill="#ce9178">'Point'</tspan>, [<tspan fill="#ce9178">'x'</tspan>,<tspan fill="#ce9178">'y'</tspan>,<tspan fill="#ce9178">'z'</tspan>],</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">                   defaults=[<tspan fill="#b5cea8">0</tspan>])</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Point(<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>)  <tspan fill="#6a8aa0"># Point(x=1, y=2, z=0)</tspan></text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># typing.NamedTuple: 타입 힌트 포함</text>
  <text x="466" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</tspan> typing <tspan fill="#7ec8e3">import</tspan> NamedTuple</text>
  <text x="466" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class</tspan> Point(NamedTuple):</text>
  <text x="466" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x: <tspan fill="#7ec8e3">float</tspan></text>
  <text x="466" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    y: <tspan fill="#7ec8e3">float</tspan></text>
  <text x="466" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    z: <tspan fill="#7ec8e3">float</tspan> = <tspan fill="#b5cea8">0.0</tspan>  <tspan fill="#6a8aa0"># 기본값</tspan></text>
  <text x="466" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p = Point(<tspan fill="#b5cea8">1.0</tspan>, <tspan fill="#b5cea8">2.0</tspan>)</text>
  <text x="466" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 더 많은 기능 필요 → dataclass 고려</text>

  <!-- Bottom -->
  <rect x="60" y="368" width="760" height="36" rx="6" fill="#1a1a0d" stroke="#b5cea8"/>
  <text x="440" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">불변성이 중요하고 필드가 적다면 namedtuple · 메서드·뮤터블이 필요하면 dataclass</text>
</svg>
