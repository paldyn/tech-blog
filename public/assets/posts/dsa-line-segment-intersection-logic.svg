<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">판정 로직: 네 외적 부호 + 일직선 예외</text>

  <!-- main case box -->
  <rect x="60" y="84" width="370" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="76" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">일반 교차 (proper)</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">d1 = ccw(C,D,A)</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">d2 = ccw(C,D,B)</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">d3 = ccw(A,B,C)</tspan><tspan fill="#9aa4b8">  d4 = ccw(A,B,D)</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600">d1·d2 &lt; 0  and  d3·d4 &lt; 0</tspan></text>

  <!-- collinear box -->
  <rect x="460" y="84" width="360" height="120" rx="6" fill="#000000" stroke="#e8a855" stroke-width="2"/>
  <text x="476" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a855" font-weight="600">일직선/끝점 (degenerate)</text>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># di == 0 이면 점이 직선 위</tspan></text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">on_segment(C,D,A)?</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 바운딩 박스 안에 있는지</tspan></text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8a855" font-weight="600">min≤좌표≤max 로 확인</tspan></text>

  <!-- bounding box quick reject -->
  <rect x="60" y="226" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">사전 빠른 기각 (bounding box)</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">두 선분의 x·y 구간이 겹치지 않으면 → 외적 볼 것 없이 교차 안 함</tspan></text>

  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정수 좌표면 모든 판정이 정수 외적·비교만으로 끝나 부동소수 오차가 없다</text>
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">교점 좌표가 필요하면 그때만 분수/실수로 계산한다</text>
</svg>
