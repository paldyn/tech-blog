<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrh" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컴포넌트 렌더링 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">특수 파일들이 실제로 중첩되는 순서</text>

  <!-- Nested boxes showing hierarchy -->
  <!-- layout (outermost) -->
  <rect x="60" y="90" width="760" height="320" rx="10" fill="#0a1020" stroke="#3b4a6e" stroke-width="2"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">layout.tsx</text>
  <text x="680" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 감싸기 · 상태 유지</text>

  <!-- template inside layout -->
  <rect x="100" y="126" width="680" height="256" rx="8" fill="#0a1a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="120" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">template.tsx (선택)</text>
  <text x="580" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이동마다 초기화</text>

  <!-- loading inside template -->
  <rect x="140" y="162" width="600" height="192" rx="6" fill="#101814" stroke="#3a5030" stroke-width="1"/>
  <text x="160" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">loading.tsx → &lt;Suspense&gt; 래핑</text>

  <!-- error inside loading -->
  <rect x="180" y="196" width="520" height="140" rx="6" fill="#180a0a" stroke="#4a2020" stroke-width="1"/>
  <text x="200" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e05555">error.tsx → &lt;ErrorBoundary&gt; 래핑</text>

  <!-- page (innermost) -->
  <rect x="220" y="230" width="440" height="88" rx="6" fill="#0a0a18" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="440" y="262" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7777cc">page.tsx</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 페이지 콘텐츠</text>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 안쪽에서 렌더링</text>

  <!-- Bottom label -->
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">바깥에서 안쪽 순서로: layout → template → loading → error → page</text>
</svg>
