<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 7 0 L 14 10 L 0 10 z" fill="#7777cc" transform="rotate(180 7 7)"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">특수 파일 중첩 구조</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">app/ 라우트 세그먼트 렌더링 순서</text>

  <!-- Root layout -->
  <rect x="180" y="90" width="520" height="56" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">app/layout.tsx</text>
  <text x="440" y="135" text-anchor="middle" font-size="12" fill="#888">루트 레이아웃 (html, body 포함)</text>

  <line x1="440" y1="146" x2="440" y2="168" stroke="#7777cc" stroke-width="2"/>
  <polygon points="434,162 446,162 440,172" fill="#7777cc"/>

  <!-- Segment layout -->
  <rect x="220" y="175" width="440" height="56" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">blog/layout.tsx</text>
  <text x="440" y="220" text-anchor="middle" font-size="12" fill="#888">세그먼트 레이아웃 (선택적)</text>

  <line x1="440" y1="231" x2="440" y2="253" stroke="#55c555" stroke-width="2"/>
  <polygon points="434,247 446,247 440,257" fill="#55c555"/>

  <!-- Loading / Error / Template (inline) -->
  <rect x="260" y="260" width="100" height="50" rx="6" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">loading</text>
  <text x="310" y="298" text-anchor="middle" font-size="10" fill="#888">.tsx</text>

  <rect x="375" y="260" width="130" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">page.tsx</text>
  <text x="440" y="298" text-anchor="middle" font-size="10" fill="#888">실제 페이지 UI</text>

  <rect x="520" y="260" width="100" height="50" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="570" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">error</text>
  <text x="570" y="298" text-anchor="middle" font-size="10" fill="#888">.tsx</text>

  <!-- not-found -->
  <rect x="340" y="330" width="200" height="50" rx="6" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#ce9178">not-found.tsx</text>
  <text x="440" y="368" text-anchor="middle" font-size="11" fill="#888">notFound() 호출 시</text>

  <!-- Legend -->
  <text x="440" y="420" text-anchor="middle" font-size="13" fill="#888">렌더링 순서: layout → template → loading → error → page</text>
  <text x="440" y="445" text-anchor="middle" font-size="12" fill="#666">외부 레이아웃이 먼저 렌더링되고 내부 page가 children으로 삽입</text>
</svg>
