<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">플랜 캐시 라이프사이클</text>

  <!-- SQL Query -->
  <rect x="60" y="80" width="180" height="54" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SQL 쿼리 수신</text>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배치 / Proc / Adhoc</text>

  <!-- Arrow -->
  <line x1="240" y1="107" x2="290" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Hash lookup -->
  <rect x="292" y="80" width="200" height="54" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="392" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">해시 버킷 탐색</text>
  <text x="392" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">쿼리 텍스트 해시 비교</text>

  <!-- Cache HIT -->
  <line x1="490" y1="85" x2="558" y2="85" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="523" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">HIT</text>

  <rect x="560" y="68" width="260" height="54" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">캐시된 플랜 재사용</text>
  <text x="690" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴파일 비용 제로 → 즉시 실행</text>

  <!-- Cache MISS -->
  <line x1="392" y1="134" x2="392" y2="164" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="408" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">MISS</text>

  <!-- Compile -->
  <rect x="292" y="166" width="200" height="54" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="392" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">컴파일 (옵티마이저)</text>
  <text x="392" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">통계 참조 · 실행 계획 생성</text>

  <!-- Arrow to store -->
  <line x1="490" y1="193" x2="558" y2="193" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Plan Store -->
  <rect x="560" y="166" width="260" height="54" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="690" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">플랜 캐시 저장</text>
  <text x="690" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stolen Memory 영역에 보관</text>

  <!-- Eviction -->
  <line x1="690" y1="220" x2="690" y2="260" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="560" y="262" width="260" height="54" rx="8" fill="#1a1a0a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="690" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a040" text-anchor="middle">플랜 에이징/제거</text>
  <text x="690" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메모리 압박 / use_count 낮은 플랜</text>

  <!-- Code block -->
  <rect x="60" y="345" width="760" height="112" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 플랜 캐시 현황 (상위 쿼리)</text>
  <text xml:space="preserve" x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT TOP</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">15</tspan><tspan fill="#ffffff"> qs.execution_count, qs.total_worker_time/</tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff"> cpu_ms,</tspan></text>
  <text xml:space="preserve" x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       qp.size_in_bytes/</tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#ffffff"> plan_kb,</tspan></text>
  <text xml:space="preserve" x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       </tspan><tspan fill="#7ec8e3" font-weight="600">SUBSTRING</tspan><tspan fill="#ffffff">(qt.text, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff">) sql_text</tspan></text>
  <text xml:space="preserve" x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> sys.dm_exec_query_stats qs </tspan><tspan fill="#7ec8e3" font-weight="600">CROSS APPLY</tspan><tspan fill="#ffffff"> sys.dm_exec_sql_text(qs.sql_handle) qt</tspan></text>
  <text xml:space="preserve" x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">CROSS APPLY</tspan><tspan fill="#ffffff"> sys.dm_exec_cached_plans cp </tspan><tspan fill="#7ec8e3" font-weight="600">JOIN</tspan><tspan fill="#ffffff"> sys.dm_exec_query_plan(qs.plan_handle) qp </tspan><tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">=</ttml><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>
</svg>
