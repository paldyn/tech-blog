<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a" rx="12">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="44" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">튜플 타입 구조</text>

  <!-- Subtitle -->
  <text x="44" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">고정된 길이와 타입을 가지는 배열 — 각 위치마다 타입이 다르다</text>

  <!-- Position boxes row -->
  <!-- Box 0 -->
  <rect x="44" y="100" width="160" height="60" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="124" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">Position 0</text>
  <text x="124" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">string</text>

  <!-- Box 1 -->
  <rect x="224" y="100" width="160" height="60" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="304" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">Position 1</text>
  <text x="304" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">number</text>

  <!-- Box 2 -->
  <rect x="404" y="100" width="160" height="60" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="484" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">Position 2</text>
  <text x="484" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">boolean</text>

  <!-- Labels under boxes -->
  <text x="124" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이름</text>
  <text x="304" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">나이</text>
  <text x="484" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">활성화</text>

  <!-- Code box -->
  <rect x="44" y="198" width="792" height="222" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- Line 1 -->
  <text x="60" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 기본 튜플 선언</text>
  <!-- Line 2 -->
  <text x="60" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Point = [</tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">];</tspan></text>
  <!-- Line 3 -->
  <text x="60" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Entry = [</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">];</tspan></text>
  <!-- Line 4 (blank) -->
  <!-- Line 5 -->
  <text x="60" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 명명된 튜플 (TS 4.0+)</text>
  <!-- Line 6 -->
  <text x="60" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> RGB = [red: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">, green: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">, blue: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">];</tspan></text>
  <!-- Line 7 (blank) -->
  <!-- Line 8 -->
  <text x="60" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 옵셔널 요소</text>
  <!-- Line 9 -->
  <text x="60" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Pair = [</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">?];</tspan></text>
  <!-- Line 10 (blank) -->
  <!-- Line 11 -->
  <text x="60" y="377" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> p: Point = [</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">];</tspan></text>
  <!-- Line 12 -->
  <text x="60" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [x, y] = p;  </tspan><tspan fill="#9aa4b8">// 분해 할당</tspan></text>
</svg>
