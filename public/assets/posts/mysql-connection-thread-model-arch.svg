<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Thread-per-Connection 모델</text>

  <!-- Clients -->
  <rect x="60" y="75" width="130" height="44" rx="6" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="125" y="103" text-anchor="middle" font-size="13" fill="#e8e8e8">클라이언트 1</text>
  <rect x="60" y="133" width="130" height="44" rx="6" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="125" y="161" text-anchor="middle" font-size="13" fill="#e8e8e8">클라이언트 2</text>
  <rect x="60" y="191" width="130" height="44" rx="6" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="125" y="219" text-anchor="middle" font-size="13" fill="#e8e8e8">클라이언트 3</text>
  <rect x="60" y="249" width="130" height="44" rx="6" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="125" y="277" text-anchor="middle" font-size="13" fill="#e8e8e8">클라이언트 N</text>

  <!-- Arrows client -> MySQL -->
  <line x1="190" y1="97" x2="260" y2="110" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,104 272,110 260,116" fill="#7ec8e3"/>
  <line x1="190" y1="155" x2="260" y2="148" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,142 272,148 260,154" fill="#7ec8e3"/>
  <line x1="190" y1="213" x2="260" y2="213" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,207 272,213 260,219" fill="#7ec8e3"/>
  <line x1="190" y1="271" x2="260" y2="278" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,272 272,278 260,284" fill="#7ec8e3"/>

  <!-- MySQL Server box -->
  <rect x="272" y="68" width="330" height="268" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <rect x="272" y="68" width="330" height="32" rx="8" fill="#1e2d4a"/>
  <rect x="272" y="84" width="330" height="16" fill="#1e2d4a"/>
  <text x="437" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">MySQL Server</text>

  <!-- Connection Handler -->
  <rect x="288" y="112" width="140" height="36" rx="5" fill="#16213e" stroke="#2a3a5a"/>
  <text x="358" y="135" text-anchor="middle" font-size="13" fill="#e8e8e8">Connection Thread 1</text>
  <rect x="288" y="158" width="140" height="36" rx="5" fill="#16213e" stroke="#2a3a5a"/>
  <text x="358" y="181" text-anchor="middle" font-size="13" fill="#e8e8e8">Connection Thread 2</text>
  <rect x="288" y="204" width="140" height="36" rx="5" fill="#16213e" stroke="#2a3a5a"/>
  <text x="358" y="227" text-anchor="middle" font-size="13" fill="#e8e8e8">Connection Thread 3</text>
  <rect x="288" y="250" width="140" height="36" rx="5" fill="#16213e" stroke="#2a3a5a"/>
  <text x="358" y="273" text-anchor="middle" font-size="13" fill="#e8e8e8">Connection Thread N</text>

  <!-- Shared resources -->
  <rect x="444" y="112" width="144" height="174" rx="5" fill="#0f2a1a" stroke="#1e4a2a"/>
  <text x="516" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">공유 자원</text>
  <text x="516" y="158" text-anchor="middle" font-size="12" fill="#888">InnoDB Buffer Pool</text>
  <text x="516" y="178" text-anchor="middle" font-size="12" fill="#888">Query Cache (제거됨)</text>
  <text x="516" y="198" text-anchor="middle" font-size="12" fill="#888">Table Cache</text>
  <text x="516" y="218" text-anchor="middle" font-size="12" fill="#888">Thread Cache</text>
  <text x="516" y="238" text-anchor="middle" font-size="12" fill="#888">Global Mutex</text>
  <text x="516" y="258" text-anchor="middle" font-size="12" fill="#888">Redo Log Buffer</text>
  <text x="516" y="278" text-anchor="middle" font-size="12" fill="#888">Binlog Buffer</text>

  <!-- Thread per connection label -->
  <text x="358" y="304" text-anchor="middle" font-size="12" fill="#7777cc">연결 1개 = 스레드 1개</text>

  <!-- Arrow to storage -->
  <line x1="602" y1="200" x2="668" y2="200" stroke="#55c555" stroke-width="2"/>
  <polygon points="668,194 680,200 668,206" fill="#55c555"/>

  <!-- Storage Engine -->
  <rect x="680" y="120" width="150" height="160" rx="8" fill="#111827" stroke="#2a2a40"/>
  <rect x="680" y="120" width="150" height="30" rx="8" fill="#1e3a2a"/>
  <rect x="680" y="136" width="150" height="14" fill="#1e3a2a"/>
  <text x="755" y="141" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Storage Engine</text>
  <text x="755" y="170" text-anchor="middle" font-size="13" fill="#e8e8e8">InnoDB</text>
  <text x="755" y="192" text-anchor="middle" font-size="12" fill="#888">(default)</text>
  <text x="755" y="216" text-anchor="middle" font-size="13" fill="#e8e8e8">MyISAM</text>
  <text x="755" y="238" text-anchor="middle" font-size="12" fill="#888">(legacy)</text>
  <text x="755" y="262" text-anchor="middle" font-size="13" fill="#e8e8e8">Memory</text>

  <!-- Thread cache box -->
  <rect x="60" y="365" width="760" height="110" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="390" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Thread Cache — thread_cache_size 파라미터</text>
  <text x="200" y="418" text-anchor="middle" font-size="13" fill="#888">연결 해제 시</text>
  <text x="200" y="438" text-anchor="middle" font-size="13" fill="#888">스레드를 캐시에 보관</text>
  <text x="440" y="418" text-anchor="middle" font-size="13" fill="#7ec8e3">새 연결 요청 시</text>
  <text x="440" y="438" text-anchor="middle" font-size="13" fill="#7ec8e3">캐시된 스레드 재사용</text>
  <text x="680" y="418" text-anchor="middle" font-size="13" fill="#55c555">OS 스레드 생성</text>
  <text x="680" y="438" text-anchor="middle" font-size="13" fill="#55c555">비용 절감</text>
</svg>
