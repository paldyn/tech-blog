<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">flushSync: 배칭 우회 — 언제 필요한가</text>

  <!-- Normal batching (left) -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">일반 배칭 (비동기, React 18)</text>
  <rect x="60" y="84" width="360" height="200" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="96" width="328" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="116" fill="#7ec8e3" font-weight="600">async function</tspan><tspan fill="#ffffff"> handleSubmit() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> data = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> api.save(form);</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  setIsLoading(</tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  setData(data);</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  setError(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">  // React 18: 세 setState 배칭</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">  // → 리렌더 1번</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- flushSync (right) -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">flushSync: 즉시 DOM 동기화</text>
  <rect x="460" y="84" width="360" height="200" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="476" y="96" width="328" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="492" y="116" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { flushSync } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'react-dom'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleClick() {</tspan>
    <tspan x="492" dy="18" fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">flushSync</tspan><tspan fill="#ffffff">(() =&gt; {</tspan>
    <tspan x="492" dy="18" fill="#ffffff">    setCount(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="18" fill="#ffffff">  }); </tspan><tspan fill="#9aa4b8">// DOM 즉시 업데이트</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">  // 이후 DOM 읽기 가능</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> el = ref.current.scrollHeight;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Bottom usage note -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">flushSync 사용 케이스</text>
  <text x="440" y="340" text-anchor="middle" font-size="12" fill="#888">setState 직후 DOM을 즉시 읽어야 할 때 (예: 스크롤 위치 계산, 애니메이션 시작점 측정)</text>
  <text x="440" y="358" text-anchor="middle" font-size="12" fill="#e05555">주의: flushSync는 성능에 영향 — 꼭 필요한 경우에만, 내부 중첩 호출 금지</text>
</svg>
