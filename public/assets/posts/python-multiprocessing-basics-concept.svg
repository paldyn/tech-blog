<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">멀티스레딩 vs 멀티프로세싱</text>

  <!-- Threading column -->
  <rect x="60" y="64" width="360" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">threading (스레드)</text>
  <text x="240" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">하나의 프로세스 내 공유 메모리</text>

  <rect x="60" y="130" width="360" height="280" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>

  <rect x="80" y="148" width="320" height="60" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">하나의 Python 프로세스</text>
  <text x="240" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">힙 메모리 공유</text>

  <rect x="90" y="222" width="80" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Thread 1</text>

  <rect x="180" y="222" width="80" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="220" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Thread 2</text>

  <rect x="270" y="222" width="80" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="310" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Thread 3</text>

  <text x="240" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">GIL — 한 번에 하나만 실행</text>

  <text x="240" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+ 낮은 메모리, 빠른 생성</text>
  <text x="240" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+ 데이터 공유 용이</text>
  <text x="240" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">- CPU 바운드 병렬화 불가</text>
  <text x="240" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">- 경쟁 조건 주의 필요</text>
  <text x="240" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">→ I/O 바운드에 적합</text>

  <!-- Multiprocessing column -->
  <rect x="460" y="64" width="360" height="50" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">multiprocessing (프로세스)</text>
  <text x="640" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">별도 프로세스, 독립 메모리</text>

  <rect x="460" y="130" width="360" height="280" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>

  <rect x="470" y="148" width="155" height="136" rx="4" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="547" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Process 1</text>
  <text x="547" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 GIL</text>
  <text x="547" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 메모리</text>
  <text x="547" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CPU Core 0</text>
  <text x="547" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">실행 중</text>

  <rect x="635" y="148" width="175" height="136" rx="4" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="722" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Process 2</text>
  <text x="722" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 GIL</text>
  <text x="722" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 메모리</text>
  <text x="722" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CPU Core 1</text>
  <text x="722" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">실행 중</text>

  <text x="640" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+ 진정한 병렬 실행 (멀티코어)</text>
  <text x="640" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+ GIL 제약 없음</text>
  <text x="640" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">- 높은 메모리, 느린 생성</text>
  <text x="640" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">- IPC 필요 (Queue, Pipe)</text>
  <text x="640" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ CPU 바운드에 적합</text>

  <!-- Bottom note -->
  <rect x="160" y="432" width="560" height="30" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스 간 통신: multiprocessing.Queue / Pipe / Manager / shared memory</text>
</svg>
