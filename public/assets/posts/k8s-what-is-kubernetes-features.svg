<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kubernetes 핵심 기능 6가지</text>

  <!-- Row 1 -->
  <rect x="60" y="80" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">&#x1F504; 자가 치유 (Self-healing)</text>
  <text x="180" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">컨테이너 충돌 시 자동 재시작</text>
  <text x="180" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">unhealthy Pod 교체</text>

  <rect x="320" y="80" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">&#x2197; 자동 스케일링</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">HPA: CPU/메모리 기반 Pod 증감</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">VPA: 리소스 자동 조정</text>

  <rect x="580" y="80" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">&#x1F504; 롤링 업데이트</text>
  <text x="700" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">무중단 점진적 배포</text>
  <text x="700" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">롤백 지원</text>

  <!-- Row 2 -->
  <rect x="60" y="200" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">&#x1F310; 서비스 디스커버리</text>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">DNS 기반 서비스 탐색</text>
  <text x="180" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">로드 밸런싱 내장</text>

  <rect x="320" y="200" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">&#x1F5C4; 스토리지 오케스트레이션</text>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">PV/PVC 추상화</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">클라우드 스토리지 연동</text>

  <rect x="580" y="200" width="240" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="700" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">&#x1F510; 시크릿 관리</text>
  <text x="700" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">ConfigMap / Secret</text>
  <text x="700" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">앱 설정 중앙 관리</text>

  <!-- Bottom note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">선언형(Declarative) 방식으로 원하는 상태를 기술하면 K8s가 자동으로 유지</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">CNCF Graduated Project &#x2014; Cloud-Native Computing Foundation</text>
</svg>
