<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle SQL Plan Management (SPM)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">플랜 기준선(Baseline)을 통한 실행 계획 안정화</text>

  <!-- Flow: SQL execution with SPM -->
  <!-- Step 1: SQL parse -->
  <rect x="60" y="96" width="160" height="50" fill="#1e2433" rx="8"/>
  <text x="140" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① SQL 파싱</text>
  <text x="140" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CBO 플랜 생성</text>

  <!-- Arrow -->
  <polygon points="228,116 240,121 228,126" fill="#7777cc"/>
  <line x1="220" y1="121" x2="228" y2="121" stroke="#7777cc" stroke-width="2"/>

  <!-- Step 2: SPM lookup -->
  <rect x="240" y="96" width="180" height="50" fill="#1e2433" rx="8"/>
  <text x="330" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② SPM 조회</text>
  <text x="330" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SQL Baseline 존재?</text>

  <!-- YES branch -->
  <polygon points="428,116 440,121 428,126" fill="#55c555"/>
  <line x1="420" y1="121" x2="428" y2="121" stroke="#55c555" stroke-width="2"/>
  <text x="444" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">YES</text>

  <!-- Step 3a: Compare with baseline -->
  <rect x="440" y="96" width="200" height="50" fill="#1a3020" rx="8" stroke="#2a5a30" stroke-width="1"/>
  <text x="540" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ Baseline 플랜</text>
  <text x="540" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수락된 플랜 사용</text>

  <polygon points="648,116 660,121 648,126" fill="#55c555"/>
  <line x1="640" y1="121" x2="648" y2="121" stroke="#55c555" stroke-width="2"/>

  <rect x="660" y="96" width="160" height="50" fill="#1a3020" rx="8" stroke="#2a5a30" stroke-width="1"/>
  <text x="740" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">④ 실행</text>
  <text x="740" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">안정된 플랜</text>

  <!-- NO branch -->
  <line x1="330" y1="146" x2="330" y2="176" stroke="#e05555" stroke-width="2"/>
  <polygon points="325,168 335,168 330,178" fill="#e05555"/>
  <text x="344" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">NO</text>

  <rect x="200" y="180" width="260" height="50" fill="#1a1010" rx="8" stroke="#3a1a1a" stroke-width="1"/>
  <text x="330" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">CBO 생성 플랜 사용</text>
  <text x="330" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Baseline 없음 → 일반 실행</text>

  <!-- SPM Repository -->
  <rect x="60" y="256" width="760" height="180" fill="#111620" rx="10" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">SQL Management Base (SMB)</text>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SYSAUX 테이블스페이스 내 영구 저장</text>

  <!-- Three components inside SMB -->
  <rect x="80" y="312" width="190" height="100" fill="#1e2433" rx="6"/>
  <text x="175" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SQL Plan Baselines</text>
  <text x="175" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">수락된 플랜 목록</text>
  <text x="175" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ENABLED=YES</text>
  <text x="175" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ACCEPTED=YES</text>

  <rect x="345" y="312" width="190" height="100" fill="#1e2433" rx="6"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SQL Plan History</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">검증 대기 플랜</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ACCEPTED=NO</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동·수동 검증</text>

  <rect x="610" y="312" width="190" height="100" fill="#1e2433" rx="6"/>
  <text x="705" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SQL Profiles</text>
  <text x="705" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">보정 통계 정보</text>
  <text x="705" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Tuning Advisor 생성</text>
  <text x="705" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">플랜 변경 없이 보정</text>

  <!-- Bottom note -->
  <rect x="60" y="452" width="760" height="50" fill="#111" rx="6"/>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SPM 라이프사이클: 캡처 → 검증 → 수락 → 진화</text>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 플랜은 History에 먼저 저장 → 기준선보다 빠를 때만 Baseline으로 자동 승격(SPM 진화)</text>
</svg>
