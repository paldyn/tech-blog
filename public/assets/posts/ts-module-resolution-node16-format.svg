<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일별 모듈 형식 판정 — Node16/NodeNext</text>

  <!-- Top box -->
  <rect x="290" y="72" width="300" height="52" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">이 파일은 ESM인가 CJS인가?</text>

  <!-- Arrows from top box to condition boxes -->
  <line x1="380" y1="124" x2="186" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="124" x2="440" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="124" x2="694" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Condition boxes -->
  <rect x="60" y="192" width="220" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">.mts / .mjs</text>

  <rect x="330" y="192" width="220" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">.cts / .cjs</text>

  <rect x="600" y="192" width="220" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">.ts / .tsx / .js</text>

  <!-- Arrows down -->
  <line x1="170" y1="248" x2="170" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="248" x2="440" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="710" y1="248" x2="710" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result boxes -->
  <rect x="60" y="290" width="220" height="76" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">항상 ESM</text>

  <rect x="330" y="290" width="220" height="76" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">항상 CJS</text>

  <rect x="600" y="290" width="220" height="76" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">가장 가까운 package.json</text>
  <text x="710" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">"type":"module" → ESM, 없으면 CJS</text>

  <!-- Bottom note -->
  <rect x="60" y="396" width="760" height="42" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">tsc는 Node와 동일한 규칙으로 형식을 판정하고, 그 형식에 맞는 import 규칙을 강제한다</text>
</svg>
