<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mypy vs pyright</text>

  <!-- mypy -->
  <rect x="60" y="80" width="360" height="190" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">mypy</text>
  <text x="84" y="140" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 파이썬으로 구현, 사실상 표준</text>
  <text x="84" y="164" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· pip install mypy 로 설치</text>
  <text x="84" y="188" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 설정은 pyproject.toml / mypy.ini</text>
  <text x="84" y="212" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 대형 코드베이스에서 다소 느림</text>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· CI 표준 검사기로 널리 채택</text>

  <!-- pyright -->
  <rect x="460" y="80" width="360" height="190" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">pyright</text>
  <text x="484" y="140" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· TypeScript 구현, 매우 빠름</text>
  <text x="484" y="164" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· VS Code Pylance의 엔진</text>
  <text x="484" y="188" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 실시간 편집기 피드백에 강점</text>
  <text x="484" y="212" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· strict 모드가 더 엄격함</text>
  <text x="484" y="236" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 타입 좁히기 추론이 정교함</text>
</svg>
