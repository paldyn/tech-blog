<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">resolv.conf &amp; resolved.conf 설정</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">DNS 설정 파일 위치와 주요 옵션</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2433" stroke-width="1"/>

  <!-- Left: /etc/resolv.conf -->
  <rect x="60" y="98" width="360" height="198" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">/etc/resolv.conf</text>
  <line x1="76" y1="128" x2="404" y2="128" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># systemd-resolved가 관리</text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">nameserver</tspan> <tspan fill="#b5cea8">127.0.0.53</tspan></text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">options</tspan> edns0 trust-ad</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 수동 설정 시 심볼릭 링크 해제</text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">nameserver</tspan> <tspan fill="#b5cea8">8.8.8.8</tspan></text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">nameserver</tspan> <tspan fill="#b5cea8">1.1.1.1</tspan></text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">search</tspan> example.com</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">options</tspan> ndots:<tspan fill="#b5cea8">5</tspan> timeout:<tspan fill="#b5cea8">2</tspan></text>

  <!-- Right: /etc/systemd/resolved.conf -->
  <rect x="460" y="98" width="360" height="260" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="476" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">/etc/systemd/resolved.conf</text>
  <line x1="476" y1="128" x2="804" y2="128" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">[Resolve]</text>
  <text x="476" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">DNS</tspan>=<tspan fill="#ce9178">8.8.8.8 1.1.1.1</tspan></text>
  <text x="476" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">FallbackDNS</tspan>=<tspan fill="#ce9178">8.8.4.4 9.9.9.9</tspan></text>
  <text x="476" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">DNSSEC</tspan>=<tspan fill="#ce9178">allow-downgrade</tspan></text>
  <text x="476" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">DNSOverTLS</tspan>=<tspan fill="#ce9178">opportunistic</tspan></text>
  <text x="476" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 캐시 상태 확인</text>
  <text x="476" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">resolvectl</tspan> status</text>
  <text x="476" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">resolvectl</tspan> query example.com</text>
  <text x="476" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"><tspan fill="#7ec8e3">resolvectl</tspan> flush-caches</text>
</svg>
