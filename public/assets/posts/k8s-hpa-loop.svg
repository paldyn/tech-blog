<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HPA 스케일링 제어 루프</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">15초마다 메트릭 수집 → 목표값 비교 → Deployment 스케일 조정</text>

  <!-- Step 1: Metrics Server -->
  <rect x="60" y="98" width="180" height="72" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Metrics Server</text>
  <text x="150" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubelet에서 CPU/메모리</text>
  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭 집계</text>

  <line x1="240" y1="134" x2="296" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 2: HPA Controller -->
  <rect x="296" y="98" width="200" height="72" fill="#1a1420" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="396" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">HPA Controller</text>
  <text x="396" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">현재값 / 목표값 비교</text>
  <text x="396" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">필요 replica 수 계산</text>

  <line x1="496" y1="134" x2="556" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Step 3: Scale Decision -->
  <rect x="556" y="98" width="180" height="72" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="646" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">스케일 결정</text>
  <text x="646" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">min ≤ desired ≤ max</text>
  <text x="646" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">stabilization window 적용</text>

  <line x1="736" y1="134" x2="796" y2="134" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Step 4: Deployment -->
  <rect x="796" y="98" width="64" height="72" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="828" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dep.</text>
  <text x="828" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">replicas</text>
  <text x="828" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">업데이트</text>

  <!-- Formula box -->
  <rect x="60" y="200" width="760" height="80" fill="#0a1015" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">스케일링 공식</text>
  <text x="440" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e8e8e8" text-anchor="middle">desiredReplicas = ceil(currentReplicas × (currentMetric / desiredMetric))</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예: 현재 2개 · CPU 80% · 목표 50% → ceil(2 × 80/50) = ceil(3.2) = 4개</text>

  <!-- Stabilization Windows -->
  <rect x="60" y="298" width="360" height="80" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1"/>
  <text x="240" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">Scale-Down 안정화 (기본 300초)</text>
  <text x="240" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최근 5분 중 최대 replica 수 사용</text>
  <text x="240" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">순간 spike 후 급격한 축소 방지</text>

  <rect x="440" y="298" width="380" height="80" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Scale-Up 안정화 (기본 0초)</text>
  <text x="630" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">즉시 스케일 업 (기본값)</text>
  <text x="630" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">behavior.scaleUp.stabilizationWindowSeconds 조정 가능</text>

  <!-- Code block -->
  <rect x="60" y="396" width="760" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="127" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff"> minReplicas: 2  maxReplicas: 10</text>
  <text x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  metrics: [{type: Resource, resource: {name: cpu, target: {averageUtilization: 50}}}]</text>
</svg>
