<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OAuth 2.0 Authorization Code Flow</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">가장 안전한 OAuth 2.0 흐름</text>

  <!-- Participants -->
  <rect x="60" y="100" width="140" height="48" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">사용자</text>

  <rect x="370" y="100" width="140" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">앱 서버</text>

  <rect x="680" y="100" width="140" height="48" rx="8" fill="#2a1a0a" stroke="#e0a055" stroke-width="1.5"/>
  <text x="750" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">인가 서버</text>
  <text x="750" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Google, GitHub 등)</text>

  <!-- Step lines -->
  <!-- 1: User -> App: 로그인 요청 -->
  <line x1="200" y1="148" x2="368" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="284" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">① 로그인 요청</text>

  <!-- 2: App -> AuthServer: 인가 요청 redirect -->
  <line x1="510" y1="148" x2="678" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="594" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">② Redirect (state, code_challenge)</text>

  <!-- 3: AuthServer -> User: 로그인 페이지 -->
  <line x1="678" y1="168" x2="200" y2="168" stroke="#e0a055" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">③ 로그인 페이지 표시</text>

  <!-- 4: User -> AuthServer: 로그인 -->
  <line x1="200" y1="200" x2="678" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">④ 자격증명 제출 + 권한 동의</text>

  <!-- 5: AuthServer -> App: code -->
  <line x1="678" y1="232" x2="510" y2="232" stroke="#e0a055" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="594" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">⑤ Authorization Code + state</text>

  <!-- 6: App -> AuthServer: code exchange -->
  <line x1="510" y1="256" x2="678" y2="256" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="594" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⑥ code + client_secret 교환 (백채널)</text>

  <!-- 7: AuthServer -> App: tokens -->
  <line x1="678" y1="288" x2="510" y2="288" stroke="#e0a055" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="594" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">⑦ Access Token + Refresh Token</text>

  <!-- 8: App -> User: 로그인 완료 -->
  <line x1="368" y1="308" x2="200" y2="308" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="284" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⑧ 로그인 완료 (세션 생성)</text>

  <!-- Key points box -->
  <rect x="60" y="340" width="760" height="148" rx="8" fill="#111" stroke="#3a4a3e" stroke-width="1"/>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">Authorization Code Flow 보안 포인트</text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="100" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">code는 단 1회 사용 (수십 초 내 만료)</text>
  <text x="460" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="480" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">state 파라미터로 CSRF 방어</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="100" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">token은 백채널(서버간) 교환 → 브라우저 노출 없음</text>
  <text x="460" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="480" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">PKCE 추가로 code 가로채기 방어</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗</text>
  <text x="100" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Implicit Flow 사용 금지 (Access Token URL 노출)</text>
  <text x="460" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗</text>
  <text x="480" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">redirect_uri 미검증 시 코드 탈취 가능</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗</text>
  <text x="100" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">state 미검증 시 CSRF 공격 가능</text>
  <text x="460" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗</text>
  <text x="480" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">client_secret를 SPA/앱에 내장 금지</text>
</svg>
