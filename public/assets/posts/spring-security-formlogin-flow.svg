<svg xmlns="http://www.w3.org/2000/svg" width="880" height="510" viewBox="0 0 880 510">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">폼 로그인 인증 처리 흐름</text>

  <!-- ===== 왼쪽 열: 메인 인증 체인 (x:70→390, centered at 230) ===== -->

  <!-- Box 1: HTTP POST /login -->
  <rect x="70" y="70" width="320" height="54" rx="8" fill="#1a1a2e" stroke="#555577" stroke-width="1.5"/>
  <text x="230" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">HTTP POST /login</text>
  <text x="230" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브라우저에서 폼 제출</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="124" x2="230" y2="152"
        stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: UsernamePasswordAuthenticationFilter -->
  <rect x="50" y="154" width="360" height="54" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">UsernamePasswordAuthenticationFilter</text>
  <text x="230" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">토큰 생성 후 AuthenticationManager에 위임</text>

  <!-- Arrow 2→3 -->
  <line x1="230" y1="208" x2="230" y2="236"
        stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: ProviderManager -->
  <rect x="70" y="238" width="320" height="54" rx="8" fill="#0f1820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">ProviderManager</text>
  <text x="230" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AuthenticationManager 기본 구현체</text>

  <!-- Arrow 3→4 -->
  <line x1="230" y1="292" x2="230" y2="320"
        stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: DaoAuthenticationProvider -->
  <rect x="60" y="322" width="340" height="54" rx="8" fill="#0f1820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">DaoAuthenticationProvider</text>
  <text x="230" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">UserDetailsService + PasswordEncoder 검증</text>

  <!-- Arrow 4→5 -->
  <line x1="230" y1="376" x2="230" y2="404"
        stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 5: UserDetailsService -->
  <rect x="70" y="406" width="320" height="54" rx="8" fill="#0f1820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="428" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">UserDetailsService</text>
  <text x="230" y="446" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">loadUserByUsername() → DB 조회</text>

  <!-- ===== 오른쪽 열: 결과 박스 (x:510→800, centered at 655) ===== -->

  <!-- Box A: 인증 성공 (y=154, aligned with Filter) -->
  <rect x="510" y="154" width="300" height="54" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">인증 성공</text>
  <text x="660" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SecurityContextHolder 저장 → 리다이렉트</text>

  <!-- Box B: 인증 실패 (y=380, below DaoAuth level) -->
  <rect x="510" y="380" width="300" height="54" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">인증 실패</text>
  <text x="660" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AuthenticationException → /login?error</text>

  <!-- ===== 결과 연결 화살표 ===== -->

  <!-- Filter → 인증 성공 (solid green, horizontal) -->
  <line x1="410" y1="181" x2="510" y2="181"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="460" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">성공</text>

  <!-- ProviderManager → 인증 실패 (dashed red, elbow) -->
  <path d="M 390,265 H 455 V 407 H 510"
        stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-r)"/>
  <text x="420" y="251" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">실패 시 예외</text>
</svg>
