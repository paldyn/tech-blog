<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RRF (Reciprocal Rank Fusion) 스코어링</text>

  <!-- BM25 results column -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">BM25 순위</text>

  <rect x="100" y="86" width="240" height="44" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="156" y="107" font-size="13" fill="#e8e8e8">1위</text>
  <text x="220" y="107" text-anchor="middle" font-size="12" fill="#888">문서 A</text>
  <text x="320" y="107" text-anchor="end" font-size="11" fill="#7777cc">1/(60+1)=0.016</text>

  <rect x="100" y="138" width="240" height="44" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="156" y="159" font-size="13" fill="#e8e8e8">2위</text>
  <text x="220" y="159" text-anchor="middle" font-size="12" fill="#888">문서 C</text>
  <text x="320" y="159" text-anchor="end" font-size="11" fill="#7777cc">1/(60+2)=0.016</text>

  <rect x="100" y="190" width="240" height="44" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="156" y="211" font-size="13" fill="#e8e8e8">3위</text>
  <text x="220" y="211" text-anchor="middle" font-size="12" fill="#888">문서 B</text>
  <text x="320" y="211" text-anchor="end" font-size="11" fill="#7777cc">1/(60+3)=0.016</text>

  <!-- Vector results column -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">벡터 검색 순위</text>

  <rect x="540" y="86" width="240" height="44" rx="6" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="596" y="107" font-size="13" fill="#e8e8e8">1위</text>
  <text x="660" y="107" text-anchor="middle" font-size="12" fill="#888">문서 B</text>
  <text x="762" y="107" text-anchor="end" font-size="11" fill="#55c555">1/(60+1)=0.016</text>

  <rect x="540" y="138" width="240" height="44" rx="6" fill="#0f2418" stroke="#55c555" stroke-width="1"/>
  <text x="596" y="159" font-size="13" fill="#e8e8e8">2위</text>
  <text x="660" y="159" text-anchor="middle" font-size="12" fill="#888">문서 A</text>
  <text x="762" y="159" text-anchor="end" font-size="11" fill="#55c555">1/(60+2)=0.016</text>

  <rect x="540" y="190" width="240" height="44" rx="6" fill="#0f2418" stroke="#55c555" stroke-width="1"/>
  <text x="596" y="211" font-size="13" fill="#e8e8e8">3위</text>
  <text x="660" y="211" text-anchor="middle" font-size="12" fill="#888">문서 D</text>
  <text x="762" y="211" text-anchor="end" font-size="11" fill="#55c555">1/(60+3)=0.016</text>

  <!-- RRF result -->
  <text x="440" y="274" text-anchor="middle" font-size="13" fill="#888">최종 RRF 통합 스코어 (합산)</text>

  <rect x="160" y="286" width="560" height="44" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="312" font-size="13" fill="#e8e8e8">1위: 문서 A</text>
  <text x="440" y="312" text-anchor="middle" font-size="13" fill="#e8e8e8">2위: 문서 B</text>
  <text x="650" y="312" font-size="13" fill="#e8e8e8">3위: 문서 C</text>
  <text x="710" y="312" font-size="11" fill="#e05555">두 시스템 모두 상위권</text>

  <!-- Legend connector lines -->
  <line x1="340" y1="108" x2="380" y2="108" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="500" y1="108" x2="540" y2="108" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="112" text-anchor="middle" font-size="11" fill="#888">+</text>
</svg>
