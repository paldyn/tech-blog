<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Spring Cloud Config Server 아키텍처</text>
  <text x="440" y="74" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">Git 백엔드 기반 중앙 설정 서버 — 프로파일·라벨별 분리 제공</text>

  <!-- Left box: Git Repository -->
  <rect x="40" y="104" width="190" height="290" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="135" y="130" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">Git 저장소</text>
  <text x="135" y="150" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">설정 파일 백엔드</text>

  <line x1="60" y1="162" x2="210" y2="162" stroke="#2a2a3a" stroke-width="1"/>

  <rect x="60" y="172" width="150" height="28" rx="4" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="135" y="190" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">application.yml</text>

  <rect x="60" y="208" width="150" height="28" rx="4" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="135" y="226" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">order-service.yml</text>

  <rect x="60" y="244" width="150" height="28" rx="4" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="135" y="262" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">order-service-dev.yml</text>

  <rect x="60" y="280" width="150" height="28" rx="4" fill="#1a1a2e" stroke="#4a5568" stroke-width="1"/>
  <text x="135" y="298" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">order-service-prod.yml</text>

  <rect x="60" y="316" width="150" height="56" rx="4" fill="#0e1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="336" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">브랜치 = 환경(label)</text>
  <text x="135" y="352" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">main / develop / feature</text>
  <text x="135" y="368" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Git push → 자동 갱신</text>

  <!-- Arrow: Git → Config Server -->
  <line x1="230" y1="248" x2="298" y2="248"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="264" y="234" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">clone/pull</text>

  <!-- Center box: Config Server -->
  <rect x="300" y="94" width="280" height="300" rx="10" fill="#0f1929" stroke="#2d5a8e" stroke-width="2"/>
  <text x="440" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
