  <text x="440" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">@EnableConfigServer</text>

  <line x1="320" y1="152" x2="560" y2="152" stroke="#2d5a8e" stroke-width="1"/>

  <rect x="320" y="162" width="240" height="44" rx="5" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="181" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">/{application}/{profile}</text>
  <text x="440" y="198" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">REST API로 설정 제공</text>

  <rect x="320" y="214" width="240" height="44" rx="5" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="233" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">우선순위 병합</text>
  <text x="440" y="250" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">{service}-{profile} &gt; {service} &gt; application</text>

  <rect x="320" y="266" width="240" height="44" rx="5" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="285" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">암호화/복호화 지원</text>
  <text x="440" y="302" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">{cipher}AES_KEY 형식</text>

  <rect x="320" y="318" width="240" height="44" rx="5" fill="#162030" stroke="#2d5a8e" stroke-width="1"/>
  <text x="440" y="337" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">다중 백엔드 지원</text>
  <text x="440" y="354" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Git · SVN · 로컬 파일 · Vault</text>

  <!-- Arrow: Config Server → Services -->
  <line x1="580" y1="248" x2="648" y2="248"
    stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="614" y="234" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">설정 배포</text>

  <!-- Refresh arrow (Services → Config Server) -->
  <path d="M 648 272 Q 614 290 580 272"
    stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-d)"/>
  <text x="614" y="300" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">@RefreshScope</text>

  <!-- Right box: Services -->
  <rect x="650" y="104" width="200" height="290" rx="8" fill="#0e1c0e" stroke="#1e5c1e" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">마이크로서비스</text>
  <text x="750" y="150" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">기동 시 설정 자동 로드</text>

  <rect x="668" y="164" width="164" height="42" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="750" y="183" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">order-service</text>
  <text x="750" y="199" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">profile: dev</text>

  <rect x="668" y="216" width="164" height="42" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="750" y="235" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">user-service</text>
  <text x="750" y="251" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">profile: prod</text>

  <rect x="668" y="268" width="164" height="42" rx="5" fill="#162016" stroke="#2d6e2d" stroke-width="1"/>
  <text x="750" y="287" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">product-service</text>
  <text x="750" y="303" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">profile: dev</text>

  <rect x="668" y="320" width="164" height="52" rx="5" fill="#0e1020" stroke="#1e5c1e" stroke-width="1"/>
  <text x="750" y="340" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">재시작 없이</text>
  <text x="750" y="356" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">설정 동적 갱신</text>
  <text x="750" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">/actuator/refresh</text>

  <!-- Bottom note -->
  <text x="440" y="432" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">모든 서비스의 설정을 Git 한 곳에서 관리 — 환경별 설정 분리와 이력 추적이 가능하다</text>
</svg>
