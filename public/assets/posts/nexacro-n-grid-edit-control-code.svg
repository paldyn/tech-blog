<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GridColumn edittype 설정 예시</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">XML 선언 및 스크립트 동적 변경</text>

  <!-- Left: XML declaration -->
  <rect x="60" y="96" width="360" height="34" fill="#1a1a2e" rx="4"/>
  <text x="240" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">XML 선언 (디자인 타임)</text>

  <rect x="60" y="135" width="360" height="264" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"><!-- 텍스트 입력 열 --></text>
  <text x="76" y="177" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">&lt;Column</text>
  <text x="90" y="195" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">id=<tspan fill="#ce9178">"colName"</tspan></text>
  <text x="90" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">edittype=<tspan fill="#ce9178">"normal"</tspan><tspan fill="#7ec8e3">/&gt;</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"><!-- 콤보 선택 열 --></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">&lt;Column</text>
  <text x="90" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">id=<tspan fill="#ce9178">"colCode"</tspan></text>
  <text x="90" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">edittype=<tspan fill="#ce9178">"combo"</tspan></text>
  <text x="90" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">codecolumn=<tspan fill="#ce9178">"CODE"</tspan></text>
  <text x="90" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">datacolumn=<tspan fill="#ce9178">"NAME"</tspan><tspan fill="#7ec8e3">/&gt;</tspan></text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"><!-- 날짜 선택 열 --></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">&lt;Column</text>
  <text x="90" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">id=<tspan fill="#ce9178">"colDate"</tspan> edittype=<tspan fill="#ce9178">"date"</tspan><tspan fill="#7ec8e3">/&gt;</tspan></text>

  <!-- Arrow -->
  <polygon points="450,265 480,255 480,261 820,261 820,255 850,265 820,275 820,269 480,269 480,275" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="650" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">스크립트로 동적 변경</text>

  <!-- Right: Script -->
  <rect x="460" y="96" width="360" height="34" fill="#1a1a2e" rx="4"/>
  <text x="640" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">런타임 동적 변경</text>

  <rect x="460" y="135" width="360" height="264" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 컬럼 객체 참조</text>
  <text x="476" y="177" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text>
  <text x="504" y="177" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> oCol = grd.getColumnById(</text>
  <text x="476" y="195" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "colCode"</text>
  <text x="476" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// edittype 변경</text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">oCol.edittype = <tspan fill="#ce9178">"normal"</tspan>;</text>
  <text x="476" y="285" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 편집 가능 여부 제어</text>
  <text x="476" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">oCol.edittype = <tspan fill="#ce9178">"none"</tspan>;</text>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 체크박스 ON값 설정</text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">oCol.checkedvalue = <tspan fill="#ce9178">"Y"</tspan>;</text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">oCol.uncheckedvalue = <tspan fill="#ce9178">"N"</tspan>;</text>
  <text x="476" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 변경 즉시 적용</text>
  <text x="476" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grd.setColumnEditable(</text>
  <text x="476" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">  0</tspan><tspan fill="#ffffff">, true);</tspan></text>

  <!-- Bottom note -->
  <rect x="60" y="418" width="360" height="38" fill="#0d1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">combo는 bindingcodedataset 연결 필수</text>
</svg>
