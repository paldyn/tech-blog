<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">URLSearchParams 메서드</text>

  <!-- 메서드 테이블 -->
  <rect x="60" y="72" width="760" height="240" fill="#111827" rx="8" stroke="#1e2433"/>

  <!-- 헤더 -->
  <rect x="60" y="72" width="760" height="32" fill="#1a2235" rx="8"/>
  <text x="160" y="93" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">메서드</text>
  <text x="540" y="93" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">설명</text>

  <!-- rows -->
  <text x="100" y="121" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.get(key)</text>
  <text x="320" y="121" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">첫 번째 값 반환 (없으면 null)</text>

  <text x="100" y="145" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.getAll(key)</text>
  <text x="320" y="145" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">같은 키의 모든 값 배열</text>

  <text x="100" y="169" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.set(key, val)</text>
  <text x="320" y="169" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">값 설정 (기존 동일 키 모두 대체)</text>

  <text x="100" y="193" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.append(key, val)</text>
  <text x="320" y="193" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">값 추가 (기존 키 유지)</text>

  <text x="100" y="217" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.delete(key)</text>
  <text x="320" y="217" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">키와 모든 연결 값 삭제</text>

  <text x="100" y="241" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.has(key)</text>
  <text x="320" y="241" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">키 존재 여부 (boolean)</text>

  <text x="100" y="265" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.sort()</text>
  <text x="320" y="265" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">키 기준 사전식 정렬 (in-place)</text>

  <text x="100" y="289" fill="#7777cc" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">.toString()</text>
  <text x="320" y="289" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">쿼리 문자열로 직렬화 (? 미포함)</text>

  <text x="100" y="301" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">이터러블: .keys() · .values() · .entries() · for..of</text>

  <!-- 코드 블록 -->
  <rect x="60" y="332" width="760" height="88" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="358" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="358" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> sp = new URLSearchParams(</text>
  <text x="320" y="358" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'q=hi&amp;lang=ko&amp;lang=en'</text>
  <text x="528" y="358" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="376" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">sp.getAll(</text>
  <text x="172" y="376" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'lang'</text>
  <text x="218" y="376" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);  </text>
  <text x="260" y="376" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// ['ko', 'en']</text>
  <text x="80" y="394" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">sp.append(</text>
  <text x="172" y="394" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'sort'</text>
  <text x="218" y="394" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, </text>
  <text x="232" y="394" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'desc'</text>
  <text x="278" y="394" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); sp.toString();</text>
  <text x="440" y="394" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'q=hi&amp;lang=ko&amp;lang=en&amp;sort=desc'</text>
</svg>
