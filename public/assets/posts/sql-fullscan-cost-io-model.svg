<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">풀스캔 I/O 모델</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Sequential I/O — 모든 블록을 순서대로 읽음</text>

  <!-- Disk storage representation -->
  <rect x="60" y="90" width="760" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디스크 / 버퍼 풀</text>

  <!-- Data blocks -->
  <rect x="100" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 1</text>
  <rect x="172" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="202" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 2</text>
  <rect x="244" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="274" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 3</text>
  <rect x="316" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="346" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 4</text>
  <rect x="388" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="418" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 5</text>

  <!-- Dots -->
  <text x="470" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">···</text>

  <rect x="508" y="100" width="60" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="538" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">블록 N</text>

  <!-- Arrow showing sequential read -->
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">━━━━━━━━━━━━━━━━ 순차 읽기 (Sequential Read) ━━━━━━━━━━━━━━━━▶</text>

  <!-- Cost formula box -->
  <rect x="60" y="210" width="760" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">풀스캔 비용 공식</text>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8">Cost = N_blocks × seq_page_cost</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">N_blocks = (행 수 × 평균 행 크기) ÷ 블록 크기(8KB)</text>

  <!-- Threshold comparison -->
  <rect x="60" y="310" width="360" height="130" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">풀스캔이 유리한 경우</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 선택도 &gt; 5~10% (많은 행 반환)</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 테이블이 작아 버퍼 풀에 상주</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 인덱스 힙 접근 비용 &gt; 풀스캔</text>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 파티션 전체 집계</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 순차 I/O 최적화 가능 환경</text>

  <rect x="460" y="310" width="360" height="130" rx="8" fill="#1f0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">인덱스 스캔이 유리한 경우</text>
  <text x="480" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 선택도 &lt; 1~5% (소수 행 반환)</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 대용량 테이블 점(Point) 조회</text>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 범위 조회 (날짜, ID 범위)</text>
  <text x="480" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• ORDER BY + LIMIT 쿼리</text>
  <text x="480" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• Covering Index 가능 시</text>
</svg>
