<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python이란 무엇인가?</text>
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">읽기 쉽고 간결한 고수준 범용 프로그래밍 언어</text>

  <!-- Center Python logo area -->
  <rect x="340" y="108" width="200" height="68" rx="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#4a90d9" text-anchor="middle">Python</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">범용 · 고수준 · 인터프리터</text>

  <!-- Feature boxes row 1 -->
  <rect x="60" y="216" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="150" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">간결한 문법</text>
  <text x="150" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">의사코드에 가까운</text>
  <text x="150" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">직관적인 표현</text>

  <rect x="260" y="216" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="350" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">동적 타이핑</text>
  <text x="350" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">런타임 타입 결정</text>
  <text x="350" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빠른 프로토타이핑</text>

  <rect x="460" y="216" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="550" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">멀티 패러다임</text>
  <text x="550" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">절차적 · OOP · 함수형</text>
  <text x="550" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모두 지원</text>

  <rect x="660" y="216" width="160" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="740" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">광대한 생태계</text>
  <text x="740" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">50만+ 패키지</text>
  <text x="740" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PyPI 라이브러리</text>

  <!-- Feature boxes row 2 -->
  <rect x="60" y="316" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="150" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">인터프리터 방식</text>
  <text x="150" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴파일 없이 바로</text>
  <text x="150" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실행 가능</text>

  <rect x="260" y="316" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="350" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">크로스 플랫폼</text>
  <text x="350" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Windows · macOS</text>
  <text x="350" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Linux 동일 동작</text>

  <rect x="460" y="316" width="180" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="550" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">자동 메모리 관리</text>
  <text x="550" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가비지 컬렉션</text>
  <text x="550" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메모리 자동 해제</text>

  <rect x="660" y="316" width="160" height="72" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="740" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">오픈소스</text>
  <text x="740" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">무료 · 자유로운</text>
  <text x="740" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배포 가능</text>

  <!-- Code example -->
  <rect x="60" y="416" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Python: 간결함의 예시</text>
  <text x="76" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">numbers</tspan>
    <tspan fill="#ffffff"> = [</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">4</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">5</tspan>
    <tspan fill="#ffffff">]</tspan>
  </text>
  <text x="76" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">evens</tspan>
    <tspan fill="#ffffff"> = [</tspan>
    <tspan fill="#7ec8e3" font-weight="600">x</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> x </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> numbers </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> x % </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff"> == </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">]  </tspan>
    <tspan fill="#9aa4b8"># [2, 4]</tspan>
  </text>
</svg>
