<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ULID · Snowflake ID 비트 구조</text>

  <!-- ULID Section -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">ULID — 128bit (26자 Crockford Base32)</text>

  <!-- ULID bit segments -->
  <rect x="60" y="96" width="300" height="40" rx="4" fill="#1a3040" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">타임스탬프 48bit</text>

  <rect x="368" y="96" width="452" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="594" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">랜덤 80bit</text>

  <text x="210" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ms 단위 유닉스 타임스탬프</text>
  <text x="594" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">충돌 확률 극히 낮음 (80bit 엔트로피)</text>

  <!-- ULID code example -->
  <rect x="60" y="168" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- PostgreSQL 예시 (pgulid 확장 또는 애플리케이션에서 생성)</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> orders (</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id   <tspan font-weight="600" fill="#7ec8e3">TEXT</tspan> <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> <tspan font-weight="600" fill="#7ec8e3">DEFAULT</tspan> gen_ulid() );</text>

  <!-- Snowflake Section -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Snowflake ID — 64bit (INT8 / BIGINT)</text>

  <!-- Snowflake bit segments -->
  <rect x="60" y="284" width="20" height="40" rx="2" fill="#333340" stroke="#888" stroke-width="1"/>
  <text x="70" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">1</text>

  <rect x="86" y="284" width="328" height="40" rx="2" fill="#1a3040" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">타임스탬프 41bit (ms)</text>

  <rect x="420" y="284" width="160" height="40" rx="2" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="500" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">노드 ID 10bit</text>

  <rect x="586" y="284" width="234" height="40" rx="2" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="703" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">시퀀스 12bit</text>

  <!-- labels -->
  <text x="70" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">부호</text>
  <text x="250" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">약 69년 범위</text>
  <text x="500" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최대 1024 노드</text>
  <text x="703" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ms당 4096개</text>

  <!-- Snowflake code example -->
  <rect x="60" y="358" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- Twitter/X, Discord, Instagram 등에서 사용</text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> posts (</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id   <tspan font-weight="600" fill="#7ec8e3">BIGINT</tspan> <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> );</text>
</svg>
