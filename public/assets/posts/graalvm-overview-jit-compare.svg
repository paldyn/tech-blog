<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Graal JIT vs HotSpot C2 &amp; Truffle 동작 원리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">같은 JVMCI 인터페이스 위에서 C2 대신 Graal 컴파일러가 작동</text>

  <!-- Left column header -->
  <text x="210" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">HotSpot C2 (기존)</text>

  <!-- Right column header -->
  <text x="660" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">Graal JIT (신규)</text>

  <!-- Left: C2 box -->
  <rect x="60" y="114" width="300" height="96" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">C2 컴파일러</text>
  <text x="84" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">C++로 구현 — 수정·기여 어려움</text>
  <text x="84" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공격적 최적화 but 유지보수 부담</text>
  <text x="84" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HotSpot 내부에 고정 탑재</text>

  <!-- VS separator -->
  <text x="440" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#888">vs</text>

  <!-- Right: Graal box -->
  <rect x="520" y="114" width="300" height="96" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="544" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Graal 컴파일러</text>
  <text x="544" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java로 구현 — 자기 자신으로 컴파일 가능</text>
  <text x="544" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">부분 탈출 분석(PEA) 등 고급 최적화</text>
  <text x="544" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVMCI로 JVM에 플러그인</text>

  <!-- Divider -->
  <line x1="60" y1="230" x2="820" y2="230" stroke="#222" stroke-width="1"/>

  <!-- Truffle section -->
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Truffle — 언어 구현 프레임워크</text>

  <!-- Truffle flow boxes -->
  <rect x="60" y="270" width="180" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">언어 소스</text>
  <text x="150" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JS · Python · Ruby</text>

  <line x1="240" y1="304" x2="268" y2="304" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="270" y="270" width="180" height="68" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="360" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">AST 인터프리터</text>
  <text x="360" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Truffle API로 작성</text>

  <line x1="450" y1="304" x2="478" y2="304" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="480" y="270" width="180" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Graal JIT</text>
  <text x="570" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">핫 AST를 네이티브로</text>

  <line x1="660" y1="304" x2="688" y2="304" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="690" y="270" width="130" height="68" rx="8" fill="#0d2011" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">네이티브 코드</text>
  <text x="755" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">고성능 실행</text>

  <!-- Code box: JVMCI enable -->
  <rect x="60" y="360" width="380" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Graal JIT 활성화 (JDK 21+)</text>
  <text x="76" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">-XX:+UnlockExperimentalVMOptions</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">-XX:+UseJVMCICompiler</text>
  <text x="76" y="437" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># GraalVM JDK는 기본 활성화</text>

  <!-- When to use box -->
  <rect x="460" y="360" width="360" height="96" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">언제 GraalVM을 선택할까?</text>
  <text x="484" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">장기 실행 서비스 — Graal JIT 피크 성능</text>
  <text x="484" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">컨테이너·서버리스 — Native Image</text>
  <text x="484" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">폴리글랏 필요 시 — Truffle 생태계</text>
</svg>
