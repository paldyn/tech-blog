<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Anthropic SDK — messages.create() 구조</text>

  <!-- Request box -->
  <rect x="60" y="70" width="360" height="240" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">요청 파라미터</text>

  <!-- model -->
  <rect x="76" y="108" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">model</text>
  <text x="168" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"claude-sonnet-4-6"</text>

  <!-- messages -->
  <rect x="76" y="150" width="328" height="56" rx="4" fill="#0d1a2b" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">messages</text>
  <text x="176" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">[{"role": </text>
  <text x="296" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="340" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">,</text>
  <text x="192" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  "content": </text>
  <text x="310" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"..."}]</text>

  <!-- system -->
  <rect x="76" y="214" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">system</text>
  <text x="164" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"You are a helpful assistant."</text>

  <!-- max_tokens -->
  <rect x="76" y="256" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">max_tokens</text>
  <text x="200" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">1024</text>

  <!-- Arrow -->
  <line x1="420" y1="190" x2="458" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="439" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
