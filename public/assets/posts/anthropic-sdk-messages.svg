  <rect x="476" y="108" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#1a3a1a" stroke-width="1"/>
  <text x="492" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">id</text>
  <text x="524" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"msg_01XFDUDYJgAACzvnptvVoYEL"</text>

  <!-- content -->
  <rect x="476" y="150" width="328" height="56" rx="4" fill="#0d1a2b" stroke="#1a3a1a" stroke-width="1"/>
  <text x="492" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">content</text>
  <text x="568" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">[TextBlock(type=</text>
  <text x="724" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"text"</text>
  <text x="764" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">,</text>
  <text x="568" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  text=</text>
  <text x="624" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"답변 내용...")]</text>

  <!-- stop_reason -->
  <rect x="476" y="214" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#1a3a1a" stroke-width="1"/>
  <text x="492" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">stop_reason</text>
  <text x="604" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">"end_turn"</text>

  <!-- usage -->
  <rect x="476" y="256" width="328" height="34" rx="4" fill="#0d1a2b" stroke="#1a3a1a" stroke-width="1"/>
  <text x="492" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">usage</text>
  <text x="548" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">Usage(input_tokens=</text>
  <text x="724" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="736" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">, ...)</text>

  <!-- Models row -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">주요 모델 ID</text>

  <rect x="60" y="352" width="230" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="175" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#c77ec8" text-anchor="middle">claude-opus-4-7</text>
  <text x="175" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">가장 강력 · 복잡한 태스크</text>

  <rect x="310" y="352" width="260" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">claude-sonnet-4-6</text>
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">성능·속도·비용 균형</text>

  <rect x="590" y="352" width="230" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="705" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">claude-haiku-4-5-20251001</text>
  <text x="705" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빠른 응답 · 저비용</text>

  <!-- Code block -->
  <rect x="60" y="432" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="124" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> anthropic</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">client = anthropic.Anthropic()</text>
  <text x="76" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">msg = client.messages.create(model=</text>
  <text x="384" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"claude-sonnet-4-6"</text>
  <text x="524" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, max_tokens=</text>
  <text x="656" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">1024</text>
  <text x="682" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, messages=[...])</text>
</svg>
