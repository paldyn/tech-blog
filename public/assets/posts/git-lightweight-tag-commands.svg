<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Lightweight 태그 주요 명령어
  </text>

  <!-- Create -->
  <rect x="60" y="75" width="360" height="80" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">생성</text>
  <text x="84" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="173" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> v1.0.0</text>
  <text x="84" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="173" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> v1.0.0 abc1234</text>

  <!-- List -->
  <rect x="460" y="75" width="360" height="80" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="484" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">목록 조회</text>
  <text x="484" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="573" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">            # 전체</text>
  <text x="484" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="573" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -l "v1.*"</text>

  <!-- Verify -->
  <rect x="60" y="185" width="360" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">확인</text>
  <text x="84" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git show</text>
  <text x="197" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> v1.0.0</text>
  <text x="84" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text>
  <text x="236" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -t v1.0.0</text>

  <!-- Delete -->
  <rect x="460" y="185" width="360" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="484" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">삭제</text>
  <text x="484" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="573" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -d v1.0.0</text>
  <text x="484" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git push</text>
  <text x="581" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> origin --delete v1.0.0</text>

  <!-- Difference note -->
  <rect x="60" y="295" width="760" height="70" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Lightweight vs Annotated 핵심 차이</text>
  <text x="84" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Lightweight: refs 파일(커밋 SHA만 저장) · 메타데이터 없음 · git describe 미참여</text>
  <text x="84" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Annotated:   별도 tag 객체 생성 · tagger/date/message 포함 · GPG 서명 가능</text>
</svg>
