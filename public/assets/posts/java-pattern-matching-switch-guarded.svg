<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Guarded Pattern (when절)과 sealed class</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">case 패턴 + when 조건 / sealed 완전성 검사</text>

  <!-- Left: Guarded Pattern -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Guarded Pattern (when 절)</text>
  <rect x="60" y="116" width="360" height="216" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">String</text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> classify(Object o) {</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    return switch</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> (o) {</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Integer i </tspan><tspan fill="#7ec8e3">when</tspan><tspan> i > 0</tspan></text>
  <text x="76" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            -> <tspan fill="#ce9178">"양수"</tspan><tspan>;</tspan></text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Integer i </tspan><tspan fill="#7ec8e3">when</tspan><tspan> i &lt; 0</tspan></text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            -> <tspan fill="#ce9178">"음수"</tspan><tspan>;</tspan></text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Integer i </tspan></text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            -> <tspan fill="#ce9178">"영"</tspan><tspan>;</tspan></text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        default</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> -> </tspan><tspan fill="#ce9178">"기타"</tspan><tspan>;</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    };</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right: sealed class + 완전성 -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">sealed class + 완전성 검사</text>
  <rect x="460" y="116" width="360" height="216" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">sealed</text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"><tspan dx="6"> interface</tspan></text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Shape</tspan></text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    permits</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Circle, Rect, Tri {}</tspan></text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// default 없어도 컴파일 OK</text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">double</text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> area(Shape s) {</tspan></text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    return switch</text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> (s) {</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Circle c -> PI*c.r*c.r;</tspan></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Rect r   -> r.w * r.h;</tspan></text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        case</text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan dx="6"> Tri t   -> t.b*t.h/2;</tspan></text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    }; <tspan fill="#9aa4b8">// 3개 모두 처리 → OK</tspan></text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Bottom: when 절 평가 흐름 다이어그램 -->
  <rect x="60" y="358" width="760" height="88" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">when 절 평가 순서</text>

  <!-- Steps -->
  <rect x="90" y="390" width="130" height="36" rx="6" fill="#0a1220" stroke="#7ec8e3"/>
  <text x="155" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">① 타입 일치?</text>

  <polygon points="228,408 246,403 246,413" fill="#7ec8e3"/>
  <line x1="220" y1="408" x2="246" y2="408" stroke="#7ec8e3" stroke-width="2"/>

  <rect x="250" y="390" width="150" height="36" rx="6" fill="#0a1220" stroke="#7777cc"/>
  <text x="325" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">② when 조건 평가</text>

  <polygon points="408,408 426,403 426,413" fill="#7ec8e3"/>
  <line x1="400" y1="408" x2="426" y2="408" stroke="#7ec8e3" stroke-width="2"/>

  <rect x="430" y="390" width="130" height="36" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="495" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">③ true → 매칭</text>

  <polygon points="568,408 586,403 586,413" fill="#e05555"/>
  <line x1="560" y1="408" x2="586" y2="408" stroke="#e05555" stroke-width="2"/>

  <rect x="590" y="390" width="140" height="36" rx="6" fill="#1a0a0a" stroke="#e05555"/>
  <text x="660" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">false → 다음 case</text>
</svg>
