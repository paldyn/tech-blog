<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">에러 메시지 해부하기</text>
  <text x="60" y="70" font-size="14" fill="#7ec8e3">긴 메시지도 구조만 알면 절반은 읽힌다</text>

  <rect x="60" y="90" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">error <tspan fill="#e05555" font-weight="600">TS2322</tspan>: Type <tspan fill="#ce9178">'string'</tspan> is not</text>
  <text x="76" y="146" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  assignable to type <tspan fill="#b5cea8">'number'</tspan>.</text>

  <rect x="60" y="196" width="240" height="76" rx="8" fill="#15171c" stroke="#e05555" stroke-width="1.2"/>
  <text x="80" y="222" font-size="13" font-weight="600" fill="#e8e8e8">TS2322</text>
  <text x="80" y="242" font-size="12" fill="#9aa4b8">에러 코드 — 문서·검색의</text>
  <text x="80" y="260" font-size="12" fill="#9aa4b8">핵심 키워드</text>

  <rect x="320" y="196" width="240" height="76" rx="8" fill="#15171c" stroke="#ce9178" stroke-width="1.2"/>
  <text x="340" y="222" font-size="13" font-weight="600" fill="#e8e8e8">'string'</text>
  <text x="340" y="242" font-size="12" fill="#9aa4b8">소스 — 내가 넣으려는</text>
  <text x="340" y="260" font-size="12" fill="#9aa4b8">값의 타입</text>

  <rect x="580" y="196" width="240" height="76" rx="8" fill="#15171c" stroke="#55c555" stroke-width="1.2"/>
  <text x="600" y="222" font-size="13" font-weight="600" fill="#e8e8e8">'number'</text>
  <text x="600" y="242" font-size="12" fill="#9aa4b8">타깃 — 받는 쪽이</text>
  <text x="600" y="260" font-size="12" fill="#9aa4b8">기대하는 타입</text>
</svg>
