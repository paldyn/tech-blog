<svg width="880" height="440" viewBox="0 0 880 440"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">기계 번역: Transformer 기반 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">인코더-디코더 구조와 교차 어텐션</text>

  <!-- Source text -->
  <rect x="40" y="90" width="170" height="48" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="111" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">소스 문장 (KO)</text>
  <text x="125" y="129" text-anchor="middle" fill="#e8e8e8" font-size="12">"나는 학교에 간다"</text>

  <!-- Arrow -->
  <polygon points="220,112 248,112 248,106 264,114 248,122 248,116 220,116" fill="#555"/>

  <!-- Encoder -->
  <rect x="264" y="82" width="150" height="260" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="2"/>
  <text x="339" y="108" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="700">인코더</text>

  <rect x="280" y="118" width="118" height="36" rx="5" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="339" y="132" text-anchor="middle" fill="#7777cc" font-size="11">Self-Attention</text>
  <text x="339" y="147" text-anchor="middle" fill="#888" font-size="10">양방향 문맥 파악</text>

  <polygon points="339,158 329,158 329,164 319,164 339,176 359,164 349,164 349,158" fill="#555"/>

  <rect x="280" y="178" width="118" height="36" rx="5" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="339" y="193" text-anchor="middle" fill="#7777cc" font-size="11">Add &amp; Norm</text>
  <text x="339" y="208" text-anchor="middle" fill="#888" font-size="10">잔차 연결</text>

  <polygon points="339,218 329,218 329,224 319,224 339,236 359,224 349,224 349,218" fill="#555"/>

  <rect x="280" y="238" width="118" height="36" rx="5" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="339" y="253" text-anchor="middle" fill="#7777cc" font-size="11">Feed-Forward</text>
  <text x="339" y="268" text-anchor="middle" fill="#888" font-size="10">비선형 변환</text>

  <text x="339" y="300" text-anchor="middle" fill="#888" font-size="11">× N 레이어</text>

  <rect x="280" y="308" width="118" height="28" rx="5" fill="#2a1a5e" stroke="#7777cc" stroke-width="1"/>
  <text x="339" y="327" text-anchor="middle" fill="#e8e8e8" font-size="11">컨텍스트 벡터</text>

  <!-- Cross Attention Arrow -->
  <polygon points="424,322 452,322 452,316 468,322 452,328 452,322 424,324" fill="#e8c84e"/>
  <text x="446" y="310" text-anchor="middle" fill="#e8c84e" font-size="10">교차 어텐션</text>

  <!-- Decoder -->
  <rect x="468" y="82" width="150" height="290" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="543" y="108" text-anchor="middle" fill="#55c555" font-size="14" font-weight="700">디코더</text>

  <rect x="484" y="118" width="118" height="36" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="543" y="133" text-anchor="middle" fill="#55c555" font-size="11">Masked Self-Attn</text>
  <text x="543" y="147" text-anchor="middle" fill="#888" font-size="10">자동회귀: 미래 마스킹</text>

  <polygon points="543,158 533,158 533,164 523,164 543,176 563,164 553,164 553,158" fill="#555"/>

  <rect x="484" y="178" width="118" height="36" rx="5" fill="#1a3a1a" stroke="#e8c84e" stroke-width="1.5"/>
  <text x="543" y="193" text-anchor="middle" fill="#e8c84e" font-size="11">Cross-Attention</text>
  <text x="543" y="208" text-anchor="middle" fill="#888" font-size="10">소스 문맥 참조</text>

  <polygon points="543,218 533,218 533,224 523,224 543,236 563,224 553,224 553,218" fill="#555"/>

  <rect x="484" y="238" width="118" height="36" rx="5" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="543" y="253" text-anchor="middle" fill="#55c555" font-size="11">Feed-Forward</text>
  <text x="543" y="268" text-anchor="middle" fill="#888" font-size="10">비선형 변환</text>

  <text x="543" y="300" text-anchor="middle" fill="#888" font-size="11">× N 레이어</text>

  <rect x="484" y="308" width="118" height="28" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="543" y="327" text-anchor="middle" fill="#55c555" font-size="11">다음 토큰 확률</text>

  <!-- Arrow to output -->
  <polygon points="628,322 656,322 656,316 672,322 656,328 656,322 628,324" fill="#555"/>

  <!-- Output -->
  <rect x="672" y="306" width="168" height="44" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="756" y="325" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">타겟 문장 (EN)</text>
  <text x="756" y="343" text-anchor="middle" fill="#e8e8e8" font-size="12">"I go to school"</text>

  <!-- MT systems row -->
  <text x="440" y="398" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">주요 다국어 번역 모델</text>

  <rect x="40" y="408" width="160" height="26" rx="5" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="425" text-anchor="middle" fill="#7777cc" font-size="12">Helsinki-NLP (Opus-MT)</text>

  <rect x="215" y="408" width="150" height="26" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="290" y="425" text-anchor="middle" fill="#55c555" font-size="12">NLLB-200 (Meta)</text>

  <rect x="380" y="408" width="150" height="26" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="455" y="425" text-anchor="middle" fill="#7ec8e3" font-size="12">mBART-50 (Meta)</text>

  <rect x="545" y="408" width="140" height="26" rx="5" fill="#1a1a0f" stroke="#e8c84e" stroke-width="1"/>
  <text x="615" y="425" text-anchor="middle" fill="#e8c84e" font-size="12">Google Translate</text>

  <rect x="700" y="408" width="140" height="26" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="770" y="425" text-anchor="middle" fill="#e05555" font-size="12">DeepL / Papago</text>
</svg>
