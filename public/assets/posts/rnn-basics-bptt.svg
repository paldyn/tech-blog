<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">BPTT: 시간을 통한 역전파</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Backpropagation Through Time</text>

  <!-- Time steps: t=1, t=2, t=3, t=4 -->
  <!-- Forward pass arrows (top) -->
  <!-- Cell boxes -->
  <rect x="80" y="160" width="120" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell t=1</text>

  <rect x="270" y="160" width="120" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="330" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell t=2</text>

  <rect x="460" y="160" width="120" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="520" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell t=3</text>

  <rect x="650" y="160" width="120" height="80" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="710" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Cell t=4</text>

  <!-- Forward pass: h connections (top path) -->
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">순전파 →</text>
  <!-- h0 to cell1 -->
  <line x1="40" y1="200" x2="78" y2="200" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="78,194 90,200 78,206" fill="#55c555"/>
  <text x="30" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">h0</text>
  <!-- cell1 to cell2 -->
  <line x1="200" y1="200" x2="268" y2="200" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="268,194 280,200 268,206" fill="#55c555"/>
  <!-- cell2 to cell3 -->
  <line x1="390" y1="200" x2="458" y2="200" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="458,194 470,200 458,206" fill="#55c555"/>
  <!-- cell3 to cell4 -->
  <line x1="580" y1="200" x2="648" y2="200" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="648,194 660,200 648,206" fill="#55c555"/>
  <!-- h4 out -->
  <line x1="770" y1="200" x2="840" y2="200" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="838,194 850,200 838,206" fill="#55c555"/>

  <!-- Losses above cells -->
  <text x="140" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">L1</text>
  <line x1="140" y1="148" x2="140" y2="158" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="330" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">L2</text>
  <line x1="330" y1="148" x2="330" y2="158" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="520" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">L3</text>
  <line x1="520" y1="148" x2="520" y2="158" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="710" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">L4</text>
  <line x1="710" y1="148" x2="710" y2="158" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Backward pass (bottom path, orange dashed arrows) -->
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">← 역전파 (기울기 누적)</text>
  <!-- Backward arrows below cells -->
  <line x1="648" y1="270" x2="582" y2="270" stroke="#e05555" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="582,264 570,270 582,276" fill="#e05555"/>
  <line x1="458" y1="270" x2="392" y2="270" stroke="#e05555" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="392,264 380,270 392,276" fill="#e05555"/>
  <line x1="268" y1="270" x2="202" y2="270" stroke="#e05555" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="202,264 190,270 202,276" fill="#e05555"/>
  <!-- Connecting cell bottom to backward path -->
  <line x1="140" y1="240" x2="140" y2="270" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="330" y1="240" x2="330" y2="270" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="240" x2="520" y2="270" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="710" y1="240" x2="710" y2="270" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Gradient labels -->
  <text x="615" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∂L/∂h3</text>
  <text x="425" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∂L/∂h2</text>
  <text x="235" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∂L/∂h1</text>

  <!-- Info box -->
  <rect x="60" y="350" width="760" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">기울기 소실 위험: 역전파가 길어질수록 ∂h_t/∂h_1 = ∏ W_h · diag(tanh') → 0 또는 폭발</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시퀀스가 길수록 초기 타임스텝의 기울기가 기하급수적으로 감쇠 → LSTM·GRU로 해결</text>
</svg>
