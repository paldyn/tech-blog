<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">조건부 타입 — T extends U ? A : B</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">타입 수준의 if/else — 컴파일 시점에 평가된다</text>

  <!-- Flow diagram: T → check → A or B -->
  <!-- Input T -->
  <rect x="60" y="110" width="120" height="60" rx="8" fill="#111520" stroke="#7ec8e3"/>
  <text x="120" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">T</text>
  <text x="120" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 매개변수</text>

  <!-- Arrow to check -->
  <line x1="180" y1="140" x2="216" y2="140" stroke="#888" stroke-width="2"/>
  <polygon points="216,134 229,140 216,146" fill="#888"/>

  <!-- Check diamond -->
  <polygon points="270,100 370,140 270,180 170,140" fill="#111520" stroke="#7777cc" stroke-width="1.5"/>
  <!-- Clip the above and redo properly -->
  <polygon points="300,104 380,140 300,176 220,140" fill="#111520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">T extends</text>
  <text x="300" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">U?</text>

  <!-- Yes arrow (right) -->
  <line x1="380" y1="140" x2="440" y2="140" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,134 453,140 440,146" fill="#55c555"/>
  <text x="414" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">yes</text>

  <rect x="453" y="110" width="130" height="60" rx="8" fill="#111520" stroke="#55c555"/>
  <text x="518" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">A</text>
  <text x="518" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">true 분기</text>

  <!-- No arrow (down) -->
  <line x1="300" y1="176" x2="300" y2="220" stroke="#e05555" stroke-width="2"/>
  <polygon points="294,220 300,233 306,220" fill="#e05555"/>
  <text x="318" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">no</text>

  <rect x="230" y="233" width="140" height="60" rx="8" fill="#111520" stroke="#e05555"/>
  <text x="300" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">B</text>
  <text x="300" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">false 분기</text>

  <!-- Code examples on right -->
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">조건부 타입 예시</text>
  <rect x="487" y="110" width="333" height="154" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <!-- Adjust x to not overlap with the flow diagram -->
  <rect x="620" y="110" width="200" height="154" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="636" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">type</text><text x="660" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> IsArray&lt;T&gt; =</text>
  <text x="636" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  T </text><text x="654" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">extends</text><text x="697" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3"> any</text><text x="720" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">[]</text>
  <text x="636" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    ? </text><text x="663" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">true</text>
  <text x="636" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    : </text><text x="660" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">false</text><text x="693" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">;</text>
  <text x="636" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">IsArray&lt;</text><text x="683" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">number</text><text x="719" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">[]&gt;</text>
  <text x="636" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  // true</text>
  <text x="636" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">IsArray&lt;</text><text x="683" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">string</text><text x="712" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">&gt;</text>
  <text x="636" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  // false</text>

  <!-- Bottom: infer keyword -->
  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">infer — 조건부 타입 내에서 타입 추출</text>
  <rect x="60" y="338" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ReturnType 직접 구현</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">type</text><text x="104" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ReturnType&lt;T&gt; = T </text><text x="247" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">extends</text><text x="290" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (...args: </text><text x="360" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">any</text><text x="384" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[]) =&gt; </text><text x="430" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">infer</text><text x="462" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> R ? R : </text><text x="514" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">never</text><text x="550" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ReturnType&lt;</text><text x="144" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typeof</text><text x="179" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Math.random&gt;; </text><text x="303" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// number</text>
</svg>
