<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CPU · 메모리 리소스 제한 구조</text>

  <!-- CPU section -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">CPU 제한</text>

  <rect x="60" y="100" width="220" height="90" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">--cpus=N</text>
  <text x="170" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">사용 가능한 CPU 코어 수</text>
  <text x="170" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--cpus=1.5 → 1.5 코어</text>
  <text x="170" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CFS 쿼터 방식</text>

  <rect x="300" y="100" width="220" height="90" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">--cpu-shares=N</text>
  <text x="410" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">상대적 CPU 비중</text>
  <text x="410" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 1024, 512면 절반</text>
  <text x="410" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">경합 시에만 작동</text>

  <rect x="540" y="100" width="280" height="90" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">--cpuset-cpus=N</text>
  <text x="680" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">특정 CPU 코어 고정</text>
  <text x="680" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--cpuset-cpus=0-1</text>
  <text x="680" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">0번, 1번 코어만 사용</text>

  <!-- Divider -->
  <line x1="60" y1="212" x2="820" y2="212" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Memory section -->
  <text x="60" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e0a055">메모리 제한</text>

  <rect x="60" y="254" width="220" height="100" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">--memory=N</text>
  <text x="170" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">물리 메모리 상한</text>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">초과 시 OOM Kill</text>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">512m, 1g 단위</text>

  <rect x="300" y="254" width="220" height="100" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="410" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">--memory-swap=N</text>
  <text x="410" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">메모리+스왑 총 상한</text>
  <text x="410" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">-1 이면 무제한 스왑</text>
  <text x="410" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">0이면 memory와 동일</text>

  <rect x="540" y="254" width="280" height="100" fill="#150a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">--memory-reservation=N</text>
  <text x="680" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">소프트 상한 (권고치)</text>
  <text x="680" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호스트 메모리 부족 시 적용</text>
  <text x="680" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">평상시는 초과 가능</text>

  <!-- Divider -->
  <line x1="60" y1="376" x2="820" y2="376" stroke="#2a2a3a" stroke-width="1"/>

  <!-- OOM flow -->
  <text x="60" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">메모리 초과 흐름</text>

  <rect x="60" y="418" width="144" height="44" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="132" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">메모리 초과</text>
  <text x="132" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--memory 도달</text>

  <text x="214" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#555" text-anchor="middle">→</text>

  <rect x="228" y="418" width="144" height="44" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="300" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">OOM Killer</text>
  <text x="300" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">커널이 프로세스 종료</text>

  <text x="382" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#555" text-anchor="middle">→</text>

  <rect x="396" y="418" width="144" height="44" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="468" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">컨테이너 종료</text>
  <text x="468" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">exit code 137</text>

  <text x="550" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#555" text-anchor="middle">→</text>

  <rect x="564" y="418" width="220" height="44" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="1"/>
  <text x="674" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">restart 정책에 따라 재시작</text>
  <text x="674" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">on-failure/always</text>
</svg>
