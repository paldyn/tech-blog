<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ar2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ar3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">.git/refs/ 디렉터리 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">refs는 SHA를 담은 텍스트 파일이다</text>

  <!-- Directory tree -->
  <rect x="60" y="94" width="280" height="280" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="200" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">.git/</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  HEAD</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  packed-refs</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">  refs/</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">  ├── heads/</text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  │   ├── main</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  │   └── feature/login</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  ├── tags/</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  │   └── v1.0.0</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">  └── remotes/</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">      └── origin/</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">          └── main</text>

  <!-- Arrows from refs -->
  <line x1="340" y1="220" x2="420" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="340" y1="280" x2="420" y2="340" stroke="#55c555" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="340" y1="340" x2="420" y2="420" stroke="#7777cc" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- File content boxes -->
  <rect x="420" y="196" width="380" height="56" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="610" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">refs/heads/main 파일 내용</text>
  <text x="610" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">abc123def456789…  (commit SHA)</text>

  <rect x="420" y="316" width="380" height="56" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="610" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">refs/tags/v1.0.0 파일 내용</text>
  <text x="610" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">ttt999fff…  (tag 오브젝트 SHA)</text>

  <rect x="420" y="396" width="380" height="56" fill="#0d0d1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="610" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">refs/remotes/origin/main 파일 내용</text>
  <text x="610" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">fff000aaa…  (원격 commit SHA)</text>

  <!-- Note -->
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">모든 ref 파일은 SHA-1 해시 40자 + 줄바꿈으로 구성된 단순 텍스트</text>
</svg>
