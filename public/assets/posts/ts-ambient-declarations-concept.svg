<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">앰비언트 선언 — 이미 존재하는 것에 타입 입히기</text>

  <!-- Left: runtime world -->
  <rect x="60" y="86" width="330" height="200" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="225" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">런타임엔 있지만 TS는 모르는 것</text>

  <rect x="76" y="126" width="298" height="40" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" xml:space="preserve">CDN 스크립트가 만든 전역 변수</text>
  <rect x="76" y="174" width="298" height="40" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" xml:space="preserve">빌드 도구가 주입한 상수</text>
  <rect x="76" y="222" width="298" height="40" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" xml:space="preserve">서버가 페이지에 심어둔 데이터</text>

  <!-- Arrow -->
  <line x1="392" y1="186" x2="470" y2="186" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="431" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">declare</text>

  <!-- Right: declaration -->
  <rect x="474" y="86" width="346" height="200" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="647" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">존재를 선언하면 타입이 생긴다</text>

  <rect x="490" y="126" width="314" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// globals.d.ts</text>
  <text x="506" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare const API_URL:</text>
  <text x="506" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  string;</text>
  <text x="506" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare function gtag(</text>
  <text x="506" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  ...args: unknown[]</text>
  <text x="506" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">): void;</text>

  <!-- Bottom note -->
  <rect x="60" y="320" width="760" height="64" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">declare는 컴파일 출력에 한 줄도 남지 않는다</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구현 없이 타입 검사만 통과시키는 약속 — 선언이 거짓이면 런타임에서 터진다</text>
</svg>
