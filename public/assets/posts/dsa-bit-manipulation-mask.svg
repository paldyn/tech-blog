<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비트마스크 DP — 부분 집합 순회</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">집합 {A,B,C,D} 의 4비트 마스크로 모든 부분 집합 표현</text>

  <!-- 4-bit mask visualization -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">비트 위치와 원소 매핑</text>

  <rect x="60" y="112" width="60" height="52" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="90" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">비트3</text>
  <text x="90" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">D</text>

  <rect x="134" y="112" width="60" height="52" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="164" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">비트2</text>
  <text x="164" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">C</text>

  <rect x="208" y="112" width="60" height="52" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="238" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">비트1</text>
  <text x="238" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">B</text>

  <rect x="282" y="112" width="60" height="52" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="312" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">비트0</text>
  <text x="312" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">A</text>

  <!-- Examples -->
  <text x="60" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">마스크 예시 (0~15 각 값이 하나의 부분 집합)</text>

  <rect x="60" y="208" width="760" height="48" fill="#111" stroke="#2a3a4a" stroke-width="1" rx="6"/>
  <text x="100" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">mask</text>
  <text x="100" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0000</text>
  <text x="190" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0001</text>
  <text x="190" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{A}</text>
  <text x="280" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0011</text>
  <text x="280" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{A,B}</text>
  <text x="380" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0101</text>
  <text x="380" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{A,C}</text>
  <text x="480" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0111</text>
  <text x="480" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{A,B,C}</text>
  <text x="590" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1010</text>
  <text x="590" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{B,D}</text>
  <text x="700" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1111</text>
  <text x="700" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">{A,B,C,D}</text>

  <!-- TSP with bitmask code -->
  <text x="60" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">비트마스크 DP — TSP (외판원 문제) 핵심 코드</text>
  <rect x="60" y="292" width="500" height="148" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># dp[visited][city] = 최소 비용</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">dp = [[INF]*(n) for _ in range(1&lt;&lt;n)]</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">dp[1][0] = 0  </text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">for</text>
  <text x="105" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> mask in range(1&lt;&lt;n):</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  for</text>
  <text x="109" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> u in range(n):</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">    for</text>
  <text x="113" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> v in range(n):</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      dp[mask|(1&lt;&lt;v)][v] = min(...)</text>

  <!-- Use case summary -->
  <rect x="580" y="292" width="240" height="148" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="700" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">비트마스크 DP 활용</text>
  <text x="596" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">TSP</text>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(2^n · n²)</text>
  <text x="596" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">집합 커버링</text>
  <text x="680" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(2^n · n)</text>
  <text x="596" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">작업 배정</text>
  <text x="672" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(2^n · n)</text>
  <text x="596" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">n ≤ 20 적합</text>
  <text x="596" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(n=20: 2^20 ≈ 1M)</text>
</svg>
