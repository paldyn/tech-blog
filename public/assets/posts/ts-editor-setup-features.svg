<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VS Code TypeScript IntelliSense 기능</text>
  <!-- 6 feature boxes 2x3 -->
  <!-- Row 1 -->
  <rect x="60" y="70" width="236" height="120" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="178" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">자동완성</text>
  <text x="178" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성 목록, 메서드 시그니처,</text>
  <text x="178" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 자동 임포트 지원.</text>
  <text x="178" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">Ctrl+Space 수동 트리거</text>
  <rect x="322" y="70" width="236" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">인라인 타입 힌트</text>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수 옆에 추론된 타입</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">회색으로 표시됩니다.</text>
  <text x="440" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">마우스 호버 타입 팝업</text>
  <rect x="584" y="70" width="236" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="702" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">오류 하이라이팅</text>
  <text x="702" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 오류를 빨간 물결선으로</text>
  <text x="702" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">즉시 표시합니다.</text>
  <text x="702" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">저장 없이 실시간 표시</text>
  <!-- Row 2 -->
  <rect x="60" y="210" width="236" height="120" rx="8" fill="#0a1818" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="178" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">정의로 이동</text>
  <text x="178" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수·타입 정의 파일로</text>
  <text x="178" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">즉시 이동합니다.</text>
  <text x="178" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">F12 / Ctrl+Click</text>
  <rect x="322" y="210" width="236" height="120" rx="8" fill="#1a1a0a" stroke="#f0db4f" stroke-width="1.5"/>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f0db4f">심볼 이름 변경</text>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수·함수 이름을 전체</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로젝트에서 안전하게 변경.</text>
  <text x="440" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#f0db4f">F2 (Rename Symbol)</text>
  <rect x="584" y="210" width="236" height="120" rx="8" fill="#0a1010" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">코드 액션</text>
  <text x="702" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 임포트, 누락 속성</text>
  <text x="702" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추가, 타입 수정 제안.</text>
  <text x="702" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Ctrl+. (Quick Fix)</text>
  <!-- Setting note -->
  <rect x="60" y="352" width="760" height="72" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">VS Code settings.json 권장 설정</text>
  <text x="440" y="398" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">"editor.inlayHints.enabled": "on"  |  "typescript.preferences.importModuleSpecifier": "relative"</text>
  <text x="440" y="416" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">"editor.formatOnSave": true  |  "typescript.updateImportsOnFileMove.enabled": "always"</text>
</svg>
