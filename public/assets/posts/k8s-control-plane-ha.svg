<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨트롤 플레인 HA 구성</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">프로덕션: Control Plane 3대 이상 + etcd 클러스터</text>

  <!-- LB -->
  <rect x="365" y="90" width="150" height="56" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Load Balancer</text>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">kubectl 진입점</text>

  <!-- Master 1 -->
  <rect x="60" y="186" width="220" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Control Plane 1</text>
  <text x="170" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">API Server (Leader)</text>
  <text x="170" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">etcd (Leader)</text>
  <text x="170" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Scheduler, CM</text>
  <text x="170" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">(Active)</text>

  <!-- Master 2 -->
  <rect x="330" y="186" width="220" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Control Plane 2</text>
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">API Server</text>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">etcd (Follower)</text>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Scheduler, CM</text>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(Standby)</text>

  <!-- Master 3 -->
  <rect x="600" y="186" width="220" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Control Plane 3</text>
  <text x="710" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">API Server</text>
  <text x="710" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">etcd (Follower)</text>
  <text x="710" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Scheduler, CM</text>
  <text x="710" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(Standby)</text>

  <!-- LB to Masters -->
  <line x1="415" y1="148" x2="230" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="148" x2="440" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="465" y1="148" x2="650" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- etcd Raft replication line -->
  <line x1="282" y1="248" x2="328" y2="248" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="552" y1="248" x2="598" y2="248" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">etcd Raft 복제 (과반수 쓰기 동의)</text>

  <!-- Worker Nodes -->
  <rect x="60" y="330" width="760" height="60" rx="8" fill="#0d110d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Worker Nodes (N대)</text>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">kubelet + kube-proxy + Container Runtime · 실제 파드 실행</text>
</svg>
