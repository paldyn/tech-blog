<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CIDR 주소 집약 (Route Aggregation / Supernetting)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">연속된 여러 네트워크를 하나의 더 큰 프리픽스로 합쳐 라우팅 테이블 크기를 줄임</text>

  <defs>
    <marker id="agg1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Before aggregation -->
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">집약 전 (4개 라우팅 항목)</text>
  <rect x="80" y="116" width="280" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.0.0/24   → 다음 홉 A</text>
  <rect x="80" y="146" width="280" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.1.0/24   → 다음 홉 A</text>
  <rect x="80" y="176" width="280" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.2.0/24   → 다음 홉 A</text>
  <rect x="80" y="206" width="280" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.3.0/24   → 다음 홉 A</text>

  <!-- Arrow -->
  <line x1="380" y1="175" x2="440" y2="175" stroke="#55c555" stroke-width="2.5" marker-end="url(#agg1)"/>
  <text x="410" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">집약</text>

  <!-- After aggregation -->
  <text x="450" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">집약 후 (1개 라우팅 항목)</text>
  <rect x="450" y="116" width="380" height="50" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="470" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" xml:space="preserve">192.168.0.0/22   → 다음 홉 A</text>
  <text x="470" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">(0.0~3.255 전체 포함, 1024 호스트)</text>

  <!-- Calculation box -->
  <rect x="80" y="270" width="760" height="146" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">집약 가능 여부 확인 — 공통 비트 찾기</text>
  <text x="100" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.0.0  →  11000000.10101000.00000000.00000000</text>
  <text x="100" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.1.0  →  11000000.10101000.00000001.00000000</text>
  <text x="100" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.2.0  →  11000000.10101000.00000010.00000000</text>
  <text x="100" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">192.168.3.0  →  11000000.10101000.00000011.00000000</text>
  <text x="100" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">공통 22비트: 11000000.10101000.000000 → 192.168.0.0/22</text>
</svg>
