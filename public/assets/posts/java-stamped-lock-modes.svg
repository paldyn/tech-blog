<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrsl" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrsl2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrsl3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c44a"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StampedLock 3가지 모드</text>

  <!-- Write mode -->
  <rect x="60" y="70" width="230" height="130" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="175" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Write Mode</text>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• writeLock() 반환 stamp</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 배타 락 (다른 스레드 블록)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-Message,sans-serif"
        font-size="11" fill="#888">• unlockWrite(stamp)로 해제</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 재진입 불가!</text>

  <!-- Read mode -->
  <rect x="325" y="70" width="230" height="130" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Read Mode</text>
  <text x="345" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• readLock() 반환 stamp</text>
  <text x="345" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 여러 스레드 동시 읽기</text>
  <text x="345" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• unlockRead(stamp)로 해제</text>
  <text x="345" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 재진입 불가!</text>

  <!-- Optimistic Read mode -->
  <rect x="590" y="70" width="230" height="130" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="705" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Optimistic Read</text>
  <text x="610" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• tryOptimisticRead() — 락 없음</text>
  <text x="610" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• validate(stamp)로 일관성 확인</text>
  <text x="610" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 실패 시 Read Lock으로 폴백</text>
  <text x="610" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">• 쓰기 없는 경우 최고 성능</text>

  <!-- Lock conversion arrows -->
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">락 변환 (Lock Conversion)</text>

  <rect x="60" y="244" width="760" height="220" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>

  <!-- Read→Write upgrade -->
  <rect x="80" y="264" width="200" height="42" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Read Lock</text>
  <text x="180" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">readLock()</text>

  <path d="M 280 285 L 358 285" stroke="#e8c44a" stroke-width="2" marker-end="url(#arrsl3)"/>
  <text x="319" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e8c44a">tryConvertToWriteLock</text>

  <rect x="360" y="264" width="200" height="42" rx="6" fill="#1f0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="460" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Write Lock</text>
  <text x="460" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">쓰기 후 다운그레이드 가능</text>

  <text x="620" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">반환값 != 0 → 성공</text>
  <text x="620" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">반환값 == 0 → 실패 (직접 writeLock)</text>

  <!-- Optimistic Read pattern code -->
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">낙관적 읽기 패턴</text>
  <rect x="80" y="352" width="710" height="98" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">long</text>
  <text x="128" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> stamp = sl.tryOptimisticRead(); </text>
  <text x="359.2" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 락 없음</text>
  <text x="96" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">copyFields();   </text>
  <text x="244" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 로컬 변수로 복사 (필수)</text>
  <text x="96" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">if</text>
  <text x="116" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> (!sl.validate(stamp)) {</text>
  <text x="96" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    stamp = sl.readLock(); </text>
  <text x="96" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    try</text>
  <text x="139.4" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> { copyFields(); } </text>
  <text x="96" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    finally</text>
  <text x="168.3" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> { sl.unlockRead(stamp); }</text>
</svg>
