<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이더넷 표준 발전사</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">10Mbps에서 400Gbps까지 — IEEE 802.3 계열</text>

  <!-- timeline line -->
  <line x1="60" y1="180" x2="820" y2="180" stroke="#333" stroke-width="2"/>

  <!-- milestones -->
  <!-- 10BASE-T -->
  <circle cx="120" cy="180" r="8" fill="#555" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="120" y1="172" x2="120" y2="130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="60" y="95" width="120" height="34" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">10BASE-T</text>
  <text x="120" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">10 Mbps (1990)</text>
  <text x="120" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">UTP Cat3</text>

  <!-- 100BASE-TX -->
  <circle cx="260" cy="180" r="8" fill="#55c555" stroke="#55c555" stroke-width="2"/>
  <line x1="260" y1="188" x2="260" y2="230" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="200" y="232" width="120" height="34" rx="5" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="260" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Fast Ethernet</text>
  <text x="260" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">100 Mbps (1995)</text>
  <text x="260" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Cat5</text>

  <!-- Gigabit -->
  <circle cx="420" cy="180" r="8" fill="#e8c44a" stroke="#e8c44a" stroke-width="2"/>
  <line x1="420" y1="172" x2="420" y2="130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="360" y="95" width="120" height="34" rx="5" fill="#1a1500" stroke="#e8c44a" stroke-width="1"/>
  <text x="420" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">Gigabit Eth</text>
  <text x="420" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1 Gbps (1999)</text>
  <text x="420" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Cat5e/광</text>

  <!-- 10GbE -->
  <circle cx="580" cy="180" r="8" fill="#e05555" stroke="#e05555" stroke-width="2"/>
  <line x1="580" y1="188" x2="580" y2="230" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="520" y="232" width="120" height="34" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="580" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">10 GbE</text>
  <text x="580" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">10 Gbps (2002)</text>
  <text x="580" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Cat6a/광</text>

  <!-- 100GbE / 400GbE -->
  <circle cx="750" cy="180" r="8" fill="#7777cc" stroke="#7777cc" stroke-width="2"/>
  <line x1="750" y1="172" x2="750" y2="130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="680" y="95" width="140" height="34" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="750" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">100G / 400G</text>
  <text x="750" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터센터용</text>
  <text x="750" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">광섬유 전용</text>

  <!-- code box: CSMA/CD -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">CSMA/CD (Carrier Sense Multiple Access / Collision Detection)</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">감지(Sense) → 충돌 없으면 전송 → 충돌 감지 시 재전송</text>
</svg>
