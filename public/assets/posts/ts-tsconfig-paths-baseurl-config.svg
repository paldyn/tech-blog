<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">baseUrl와 paths 설정</text>

  <rect x="60" y="78" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="80" y="104" fill="#9aa4b8">// tsconfig.json</tspan>
    <tspan x="80" y="124" fill="#ffffff">{ </tspan><tspan fill="#ce9178">"compilerOptions"</tspan><tspan fill="#ffffff">: {</tspan>
    <tspan x="80" y="144" fill="#ce9178">    "baseUrl"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"."</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="80" y="164" fill="#ce9178">    "paths"</tspan><tspan fill="#ffffff">: {</tspan>
    <tspan x="80" y="184" fill="#ce9178">      "@/*"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"src/*"</tspan><tspan fill="#ffffff">],</tspan>
    <tspan x="80" y="204" fill="#ce9178">      "@ui/*"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"src/components/*"</tspan><tspan fill="#ffffff">]</tspan>
    <tspan x="80" y="224" fill="#ffffff">    }</tspan>
    <tspan x="80" y="244" fill="#ffffff">} }</tspan>
  </text>
</svg>
