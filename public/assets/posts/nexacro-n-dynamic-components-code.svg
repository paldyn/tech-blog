<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">createComponent 코드 예시</text>

  <!-- Left: Static + Button 동적 생성 -->
  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">Static · Button 동적 생성</text>
  <rect x="60" y="92" width="360" height="340" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_createLabel</ttml></tspan>(sText, nY) {</text>
  <text x="76" y="132" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // ① 객체 생성</text>
  <text x="76" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oStatic</ttml></tspan> = new Static(this);</text>
  <text x="76" y="168" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // ② 속성 설정</text>
  <text x="76" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_left(<tspan fill="#b5cea8">10</ttml></tspan>);</text>
  <text x="76" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_top(nY);</text>
  <text x="76" y="222" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_width(<tspan fill="#b5cea8">120</ttml></tspan>);</text>
  <text x="76" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_height(<tspan fill="#b5cea8">24</ttml></tspan>);</text>
  <text x="76" y="258" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_text(sText);</text>
  <text x="76" y="276" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.set_font(</text>
  <text x="76" y="294" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "bold 12px Arial");</text>
  <text x="76" y="312" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // ③ div_container에 부착</text>
  <text x="76" y="330" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.div_container.addChild(</text>
  <text x="76" y="348" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "stc_" + nY,</text>
  <text x="76" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oStatic);</text>
  <text x="76" y="384" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oStatic.show();</text>
  <text x="76" y="402" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: Edit + 이벤트 연결 -->
  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">Edit 동적 생성 + 이벤트 등록</text>
  <rect x="460" y="92" width="360" height="340" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_createEdit</ttml></tspan>(sCol, nY) {</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oEdit</ttml></tspan> = new Edit(this);</text>
  <text x="476" y="150" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_left(<tspan fill="#b5cea8">140</ttml></tspan>);</text>
  <text x="476" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_top(nY);</text>
  <text x="476" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_width(<tspan fill="#b5cea8">200</ttml></tspan>);</text>
  <text x="476" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_height(<tspan fill="#b5cea8">24</ttml></tspan>);</text>
  <text x="476" y="222" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // Dataset 바인딩</text>
  <text x="476" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_enableevent(<tspan fill="#7ec8e3">true</ttml></ttml></tspan>);</text>
  <text x="476" y="258" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.set_bindcolumn(</text>
  <text x="476" y="276" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "ds_master:" + sCol);</text>
  <text x="476" y="294" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 이벤트 핸들러 등록</text>
  <text x="476" y="312" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.addEventHandler(</text>
  <text x="476" y="330" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "onchange",</text>
  <text x="476" y="348" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    fn_editChange, this);</text>
  <text x="476" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.div_form.addChild(</text>
  <text x="476" y="384" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "edt_" + sCol, oEdit);</text>
  <text x="476" y="402" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oEdit.show();</text>
  <text x="476" y="420" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
</svg>
