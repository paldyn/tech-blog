<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ResNet 잔차 블록 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Basic Block vs Bottleneck Block</text>

  <!-- Basic Block (left) -->
  <text x="200" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Basic Block (ResNet-18/34)</text>

  <!-- Input x -->
  <rect x="150" y="120" width="100" height="36" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="200" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">입력 x</text>

  <!-- Skip connection line (goes right) -->
  <line x1="250" y1="138" x2="310" y2="138" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="310" y1="138" x2="310" y2="340" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="310" y1="340" x2="258" y2="340" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Skip</text>
  <text x="330" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Connection</text>

  <!-- Down arrow -->
  <polygon points="200,165 194,156 206,156" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="200" y1="156" x2="200" y2="180" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Conv 3x3 -->
  <rect x="140" y="180" width="120" height="44" fill="#101828" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Conv 3×3</text>
  <text x="200" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BN → ReLU</text>

  <polygon points="200,233 194,224 206,224" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="200" y1="224" x2="200" y2="248" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Conv 3x3 2 -->
  <rect x="140" y="248" width="120" height="44" fill="#101828" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Conv 3×3</text>
  <text x="200" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BN</text>

  <polygon points="200,301 194,292 206,292" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="200" y1="292" x2="200" y2="322" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Add node -->
  <circle cx="200" cy="340" r="18" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">+</text>
  <polygon points="200,367 194,358 206,358" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <line x1="200" y1="358" x2="200" y2="382" stroke="#55c555" stroke-width="2"/>

  <!-- ReLU -->
  <rect x="150" y="382" width="100" height="36" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">ReLU → 출력</text>

  <!-- Bottleneck Block (right) -->
  <text x="620" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Bottleneck Block (ResNet-50/101/152)</text>

  <!-- Input x -->
  <rect x="570" y="120" width="100" height="36" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">입력 x (256ch)</text>

  <!-- Skip line -->
  <line x1="670" y1="138" x2="730" y2="138" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="730" y1="138" x2="730" y2="396" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="730" y1="396" x2="678" y2="396" stroke="#55c555" stroke-width="2"/>

  <polygon points="620,165 614,156 626,156" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="620" y1="156" x2="620" y2="175" stroke="#ce9178" stroke-width="2"/>

  <!-- 1x1 Conv (reduce) -->
  <rect x="560" y="175" width="120" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">Conv 1×1</text>
  <text x="620" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">256→64 · BN · ReLU</text>

  <polygon points="620,228 614,219 626,219" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="620" y1="219" x2="620" y2="238" stroke="#ce9178" stroke-width="2"/>

  <!-- 3x3 Conv -->
  <rect x="560" y="238" width="120" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">Conv 3×3</text>
  <text x="620" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">64→64 · BN · ReLU</text>

  <polygon points="620,291 614,282 626,282" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="620" y1="282" x2="620" y2="300" stroke="#ce9178" stroke-width="2"/>

  <!-- 1x1 Conv (expand) -->
  <rect x="560" y="300" width="120" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">Conv 1×1</text>
  <text x="620" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">64→256 · BN</text>

  <polygon points="620,353 614,344 626,344" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="620" y1="344" x2="620" y2="378" stroke="#ce9178" stroke-width="2"/>

  <!-- Add node -->
  <circle cx="620" cy="396" r="18" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">+</text>
  <polygon points="620,423 614,414 626,414" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <line x1="620" y1="414" x2="620" y2="438" stroke="#55c555" stroke-width="2"/>

  <rect x="570" y="438" width="100" height="14" fill="#0d1a0d" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">ReLU → 출력</text>

  <!-- Center comparison -->
  <rect x="370" y="190" width="155" height="200" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="447" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">파라미터 비교</text>
  <line x1="385" y1="222" x2="510" y2="222" stroke="#3a4a6e" stroke-width="1"/>

  <text x="385" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Basic Block</text>
  <text x="385" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3×3×64×64 × 2</text>
  <text x="385" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">= 73,728</text>

  <line x1="385" y1="292" x2="510" y2="292" stroke="#3a4a6e" stroke-width="1"/>

  <text x="385" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">Bottleneck</text>
  <text x="385" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1×1×256×64</text>
  <text x="385" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">+ 3×3×64×64</text>
  <text x="385" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">+ 1×1×64×256</text>
  <text x="385" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">= 69,632</text>
</svg>
