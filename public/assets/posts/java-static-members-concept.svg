<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">static 멤버 — 클래스 레벨 vs 인스턴스 레벨</text>

  <!-- 클래스 레벨 영역 -->
  <rect x="60" y="68" width="360" height="230" rx="10" fill="#0d1726" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">클래스 레벨 (static)</text>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Method Area (메타스페이스)</text>

  <!-- static 필드 박스 -->
  <rect x="84" y="128" width="312" height="52" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">static 필드</text>
  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클래스 당 하나 · 모든 인스턴스 공유</text>

  <!-- static 메서드 박스 -->
  <rect x="84" y="192" width="312" height="52" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">static 메서드</text>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인스턴스 없이 호출 가능 · this 없음</text>

  <!-- static 초기화 블록 박스 -->
  <rect x="84" y="256" width="312" height="30" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">static { } 초기화 블록 — 클래스 로딩 시 1회 실행</text>

  <!-- 인스턴스 레벨 영역 -->
  <rect x="460" y="68" width="360" height="230" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">인스턴스 레벨</text>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Heap (각 객체별)</text>

  <!-- 인스턴스 필드 박스 -->
  <rect x="484" y="128" width="312" height="52" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">인스턴스 필드</text>
  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">new 할 때마다 독립 복사본 생성</text>

  <!-- 인스턴스 메서드 박스 -->
  <rect x="484" y="192" width="312" height="52" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">인스턴스 메서드</text>
  <text x="640" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">this 참조 사용 가능 · 다형성 대상</text>

  <!-- 인스턴스 초기화 박스 -->
  <rect x="484" y="256" width="312" height="30" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{ } 인스턴스 초기화 블록 — new 마다 실행</text>

  <!-- 메모리 구조 -->
  <line x1="60" y1="322" x2="820" y2="322" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">메모리 구조 — static 필드는 하나만 존재</text>

  <!-- Method Area 박스 -->
  <rect x="60" y="366" width="180" height="140" rx="8" fill="#0d1726" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Method Area</text>
  <rect x="76" y="400" width="148" height="32" rx="4" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">counter = 0</text>
  <text x="150" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Counter.class 로드 시 생성</text>
  <text x="150" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JVM 종료 전까지 유지</text>
  <text x="150" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">단 하나의 복사본</text>

  <!-- Heap 인스턴스 1 -->
  <rect x="290" y="366" width="160" height="140" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Heap: obj1</text>
  <rect x="306" y="400" width="128" height="32" rx="4" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="370" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">name = "Alice"</text>
  <text x="370" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">counter 참조 →</text>

  <!-- 화살표: obj1 → Method Area -->
  <line x1="306" y1="454" x2="244" y2="432" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Heap 인스턴스 2 -->
  <rect x="490" y="366" width="160" height="140" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Heap: obj2</text>
  <rect x="506" y="400" width="128" height="32" rx="4" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">name = "Bob"</text>
  <text x="570" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">counter 참조 →</text>

  <!-- 화살표: obj2 → Method Area -->
  <line x1="506" y1="454" x2="244" y2="432" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- 설명 텍스트 -->
  <rect x="686" y="366" width="174" height="140" rx="8" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="773" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">obj1.counter++</text>
  <text x="773" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">obj2.counter 도</text>
  <text x="773" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">같이 1 증가</text>
  <text x="773" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 참조가 동일한</text>
  <text x="773" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메모리 위치를 가리킴</text>
</svg>
