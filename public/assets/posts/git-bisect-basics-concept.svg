<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git bisect — 이진 탐색으로 버그 커밋 찾기</text>

  <!-- Commit timeline -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">커밋 이력 (전체 16개)</text>

  <!-- Commit circles - older to newer -->
  <!-- C1 to C16 -->
  <circle cx="90" cy="155" r="18" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">C1</text>

  <line x1="108" y1="155" x2="128" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="148" cy="155" r="18" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="148" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">C2</text>

  <line x1="166" y1="155" x2="186" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="206" cy="155" r="18" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="206" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">C3</text>

  <line x1="224" y1="155" x2="244" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="264" cy="155" r="18" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="264" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">C4</text>

  <line x1="282" y1="155" x2="302" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <!-- C5 - bug introduced here -->
  <circle cx="322" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="2.5"/>
  <text x="322" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" font-weight="700" text-anchor="middle">C5</text>
  <text x="322" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">← 버그 도입</text>

  <line x1="340" y1="155" x2="360" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="380" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="380" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C6</text>

  <line x1="398" y1="155" x2="418" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="438" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="438" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C7</text>

  <line x1="456" y1="155" x2="476" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="496" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="496" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C8</text>

  <line x1="514" y1="155" x2="534" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="554" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="554" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C9</text>

  <line x1="572" y1="155" x2="592" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="612" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="612" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C10</text>

  <line x1="630" y1="155" x2="650" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="670" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="670" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C11</text>

  <line x1="688" y1="155" x2="708" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="728" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="728" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C12</text>

  <line x1="746" y1="155" x2="766" y2="155" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <circle cx="786" cy="155" r="18" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="786" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">HEAD</text>

  <!-- Labels -->
  <text x="90" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">good</text>
  <text x="786" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">bad</text>

  <!-- Bisect steps visualization -->
  <text x="60" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">이진 탐색 단계 (최대 log₂(16) = 4번)</text>

  <!-- Step 1 -->
  <rect x="60" y="250" width="760" height="56" rx="8" fill="#0e1620" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">Step 1</text>
  <text x="140" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">중간 커밋 C8 체크아웃 →</text>
  <text x="340" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600">bad</text>
  <text x="390" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 버그 있음, 탐색 범위: C1–C7</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">Step 2</text>
  <text x="140" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">중간 커밋 C4 체크아웃 →</text>
  <text x="340" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">good</text>
  <text x="390" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 버그 없음, 탐색 범위: C5–C7</text>

  <!-- Step 3 & 4 -->
  <rect x="60" y="318" width="760" height="56" rx="8" fill="#0e1620" stroke="#2a3a5a" stroke-width="1"/>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">Step 3</text>
  <text x="140" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">중간 커밋 C6 체크아웃 →</text>
  <text x="340" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600">bad</text>
  <text x="390" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 버그 있음, 탐색 범위: C5</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">결과</text>
  <text x="140" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">C5가 버그를 도입한 커밋으로 확정 →</text>
  <text x="470" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">16개 커밋을 단 4번만에 탐색!</text>

  <!-- Complexity box -->
  <rect x="60" y="390" width="760" height="62" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">선형 탐색: N번 (커밋 16개 → 최대 16번 테스트)</text>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">이진 탐색: log₂(N)번 (커밋 16개 → 최대  4번 테스트)</text>
</svg>
