<svg xmlns="http://www.w3.org/2020/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">변환 오류와 안전한 처리</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">ValueError · TypeError · 방어적 변환 패턴</text>

  <rect x="60" y="100" width="760" height="252" rx="10" fill="#111520" stroke="#3a4a6e"/>
  <rect x="80" y="116" width="720" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 흔한 오류</tspan></text>
  <text x="96" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"3.14"</tspan><tspan fill="#ffffff">)     </tspan><tspan fill="#e05555"># ValueError: not a valid integer</tspan></text>
  <text x="96" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#e05555"># ValueError</tspan></text>
  <text x="96" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">])      </tspan><tspan fill="#e05555"># TypeError</tspan></text>
  <text x="96" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 안전한 변환 패턴</tspan></text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> safe_int(s, default=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">try</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff">(s)</tspan></text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">except</tspan><tspan fill="#ffffff"> (ValueError, TypeError):</tspan></text>
  <text x="96" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> default</tspan></text>
  <text x="96" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"></tspan></text>
  <text x="96" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">safe_int(</tspan><tspan fill="#ce9178">"42"</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#9aa4b8"># 42</tspan><tspan fill="#ffffff">    safe_int(</tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 0</tspan></text>
</svg>
