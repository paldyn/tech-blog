<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 470"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계형 모델의 3대 무결성 규칙</text>

  <!-- ── Box 1: Entity Integrity ── -->
  <rect x="60" y="76" width="234" height="320" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="60" y="76" width="234" height="46" rx="8" fill="#1a1a0a"/>
  <rect x="60" y="104" width="234" height="18" fill="#1a1a0a"/>
  <text x="177" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#e8c555">개체 무결성</text>
  <text x="177" y="117" text-anchor="middle" font-size="10" fill="#888">Entity Integrity</text>

  <text x="177" y="160" text-anchor="middle" font-size="38" fill="#e8c555">🔑</text>
  <text x="177" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">기본 키 규칙</text>
  <text x="177" y="218" text-anchor="middle" font-size="11" fill="#888">기본 키는 NULL 불가</text>
  <text x="177" y="235" text-anchor="middle" font-size="11" fill="#888">모든 튜플에서 유일해야 함</text>

  <line x1="76" y1="252" x2="278" y2="252" stroke="#222" stroke-width="1"/>

  <text x="84" y="272" font-size="11" fill="#e05555">✗  id = NULL</text>
  <text x="84" y="290" font-size="11" fill="#e05555">✗  id = 1 (이미 존재)</text>
  <text x="84" y="316" font-size="11" fill="#55c555">✓  id = 4 (새 값, NOT NULL)</text>
  <text x="84" y="334" font-size="11" fill="#55c555">✓  id = 5 (새 값, NOT NULL)</text>
  <text x="84" y="362" font-size="11" fill="#555">→ PRIMARY KEY 제약이</text>
  <text x="84" y="378" font-size="11" fill="#555">   자동으로 이를 강제함</text>

  <!-- ── Box 2: Referential Integrity ── -->
  <rect x="323" y="76" width="234" height="320" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="323" y="76" width="234" height="46" rx="8" fill="#0a1a0a"/>
  <rect x="323" y="104" width="234" height="18" fill="#0a1a0a"/>
  <text x="440" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">참조 무결성</text>
  <text x="440" y="117" text-anchor="middle" font-size="10" fill="#888">Referential Integrity</text>

  <text x="440" y="160" text-anchor="middle" font-size="38" fill="#55c555">🔗</text>
  <text x="440" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">외래 키 규칙</text>
  <text x="440" y="218" text-anchor="middle" font-size="11" fill="#888">FK 값은 참조 대상 PK에</text>
  <text x="440" y="235" text-anchor="middle" font-size="11" fill="#888">반드시 존재해야 함</text>

  <line x1="339" y1="252" x2="541" y2="252" stroke="#222" stroke-width="1"/>

  <text x="339" y="272" font-size="11" fill="#e05555">✗  dept_id = 99  (없는 부서)</text>
  <text x="339" y="290" font-size="11" fill="#e05555">✗  dept_id = -1  (없는 부서)</text>
  <text x="339" y="316" font-size="11" fill="#55c555">✓  dept_id = 10  (존재)</text>
  <text x="339" y="334" font-size="11" fill="#55c555">✓  dept_id = NULL  (허용 시)</text>
  <text x="339" y="362" font-size="11" fill="#555">→ FOREIGN KEY … REFERENCES</text>
  <text x="339" y="378" font-size="11" fill="#555">   로 DB가 자동 검증함</text>

  <!-- ── Box 3: Domain Integrity ── -->
  <rect x="586" y="76" width="234" height="320" rx="8" fill="#0d0d0d" stroke="#333"/>
  <rect x="586" y="76" width="234" height="46" rx="8" fill="#0a0a1a"/>
  <rect x="586" y="104" width="234" height="18" fill="#0a0a1a"/>
  <text x="703" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">도메인 무결성</text>
  <text x="703" y="117" text-anchor="middle" font-size="10" fill="#888">Domain Integrity</text>

  <text x="703" y="160" text-anchor="middle" font-size="38" fill="#7ec8e3">📐</text>
  <text x="703" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">도메인 규칙</text>
  <text x="703" y="218" text-anchor="middle" font-size="11" fill="#888">속성 값은 해당 도메인</text>
  <text x="703" y="235" text-anchor="middle" font-size="11" fill="#888">(허용 범위) 안에 있어야 함</text>

  <line x1="602" y1="252" x2="804" y2="252" stroke="#222" stroke-width="1"/>

  <text x="602" y="272" font-size="11" fill="#e05555">✗  age = -5  (범위 위반)</text>
  <text x="602" y="290" font-size="11" fill="#e05555">✗  status = 'X'  (허용 외 값)</text>
  <text x="602" y="316" font-size="11" fill="#55c555">✓  age = 30  (허용 범위)</text>
  <text x="602" y="334" font-size="11" fill="#55c555">✓  status = 'A'  (허용 값)</text>
  <text x="602" y="362" font-size="11" fill="#555">→ CHECK, NOT NULL, 타입</text>
  <text x="602" y="378" font-size="11" fill="#555">   제약 조건으로 강제함</text>

  <!-- Footer -->
  <text x="440" y="430" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
