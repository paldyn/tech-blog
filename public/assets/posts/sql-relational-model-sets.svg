<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">관계형 모델 — 도메인과 릴레이션</text>

  <!-- Domain boxes -->
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">도메인(Domain) — 허용 가능한 값의 집합</text>

  <rect x="60" y="98" width="220" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">고객ID 도메인</text>
  <text x="170" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">{ C001, C002, C003, ... }</text>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">VARCHAR(10), 고객 식별용</text>
  <text x="170" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">값은 유한 집합</text>

  <rect x="330" y="98" width="220" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">나이 도메인</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">{ 0, 1, 2, ..., 150 }</text>
  <text x="440" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">INTEGER, 0~150 범위</text>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타입 + CHECK 제약</text>

  <rect x="600" y="98" width="220" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">도시 도메인</text>
  <text x="710" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">{ 서울, 부산, 대구, ... }</text>
  <text x="710" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">VARCHAR(50)</text>
  <text x="710" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">문자열 집합</text>

  <!-- Cross product arrow -->
  <text x="440" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">카르테시안 곱(Cartesian Product): D1 × D2 × D3</text>
  <line x1="440" y1="230" x2="440" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Relation table -->
  <rect x="130" y="252" width="620" height="180" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="130" y="252" width="620" height="24" rx="6" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">고객 릴레이션(Relation) — 카르테시안 곱의 부분집합</text>

  <line x1="130" y1="276" x2="750" y2="276" stroke="#2a3a5a" stroke-width="1"/>
  <text x="220" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">고객ID (PK)</text>
  <text x="380" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이름</text>
  <text x="520" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">나이</text>
  <text x="660" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도시</text>

  <line x1="130" y1="298" x2="750" y2="298" stroke="#1e1e3e" stroke-width="1"/>
  <text x="220" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">C001</text>
  <text x="380" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">홍길동</text>
  <text x="520" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">25</text>
  <text x="660" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">서울</text>

  <line x1="130" y1="320" x2="750" y2="320" stroke="#1e1e3e" stroke-width="1"/>
  <text x="220" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">C002</text>
  <text x="380" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">이순신</text>
  <text x="520" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">30</text>
  <text x="660" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">부산</text>

  <line x1="130" y1="342" x2="750" y2="342" stroke="#1e1e3e" stroke-width="1"/>
  <text x="220" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">C003</text>
  <text x="380" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">강감찬</text>
  <text x="520" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">45</text>
  <text x="660" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">대구</text>

  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 행(튜플)은 도메인 값의 조합 — 집합이므로 순서 없음, 중복 없음</text>

  <!-- Key properties -->
  <rect x="60" y="432" width="760" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a5e" stroke-width="1"/>
  <text x="440" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">릴레이션의 성질: 순서 무관 · 중복 튜플 없음 · 원자 값(1NF) · 열도 순서 없음</text>
</svg>
