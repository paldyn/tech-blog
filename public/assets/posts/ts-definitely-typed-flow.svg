<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">@types 패키지가 내 에디터까지 오는 길</text>

  <!-- Row 1 -->
  <rect x="160" y="80" width="560" height="56" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">DefinitelyTyped 모노레포 (GitHub)</text>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수천 개 패키지의 .d.ts를 커뮤니티가 작성·리뷰·관리</text>

  <line x1="440" y1="136" x2="440" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 2 -->
  <rect x="160" y="166" width="560" height="56" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">자동 퍼블리셔가 npm에 배포</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">types/lodash 디렉터리 → @types/lodash 패키지</text>

  <line x1="440" y1="222" x2="440" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 3 -->
  <rect x="160" y="252" width="560" height="56" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">npm install -D @types/lodash</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타입은 빌드에만 필요하므로 devDependencies로 설치</text>

  <line x1="440" y1="308" x2="440" y2="336" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 4 -->
  <rect x="160" y="338" width="560" height="56" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">tsc가 node_modules/@types를 자동 인식</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">import _ from "lodash" 가 곧바로 타입을 갖는다</text>

  <!-- Bottom note -->
  <rect x="60" y="414" width="760" height="42" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">라이브러리 코드와 타입의 작성자가 다르다 — 버전 어긋남에 주의해야 하는 이유</text>
</svg>
