<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">업스트림 설정 흐름</text>

  <!-- Before: no upstream -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">업스트림 없음 (설정 전)</text>

  <rect x="80" y="96" width="140" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">feature/x</text>

  <text x="264" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#e05555" text-anchor="middle">?</text>

  <rect x="300" y="96" width="160" height="44" rx="8" fill="#1a1a2a" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="380" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">origin/???</text>

  <rect x="80" y="158" width="380" height="32" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="270" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">git push  →  fatal: no upstream</text>

  <!-- Divider -->
  <line x1="60" y1="216" x2="820" y2="216" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- After: upstream set -->
  <text x="220" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">업스트림 설정 후</text>

  <rect x="80" y="258" width="140" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">feature/x</text>

  <!-- Arrow: tracks -->
  <line x1="220" y1="280" x2="295" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>
  <text x="257" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">tracks</text>

  <rect x="296" y="258" width="185" height="44" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="388" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">origin/feature/x</text>

  <rect x="80" y="322" width="380" height="32" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="270" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">git push / pull  →  자동 대상 인식</text>

  <!-- Right: Setup commands -->
  <rect x="500" y="70" width="320" height="260" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">업스트림 설정 방법</text>

  <text x="520" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. push -u 로 동시 설정</text>
  <text x="520" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="553" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">push -u origin feature/x</text>

  <text x="520" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. 직접 설정</text>
  <text x="520" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="553" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">branch --set-upstream-to \</text>
  <text x="520" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    origin/feature/x</text>

  <text x="520" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. 업스트림 제거</text>
  <text x="520" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="553" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">branch --unset-upstream</text>

  <text x="520" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 4. 설정 확인</text>
  <text x="520" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="553" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">branch -vv</text>

  <!-- Bottom note -->
  <rect x="60" y="380" width="760" height="44" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">업스트림이 설정된 브랜치에서 git push / git pull 은</text>
  <text x="440" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">remote와 브랜치 이름 없이 실행 가능</text>
</svg>
