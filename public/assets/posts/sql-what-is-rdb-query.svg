<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SQL로 테이블 조회하기</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">JOIN으로 두 테이블을 연결해 데이터를 가져오는 과정</text>

  <!-- Code block left -->
  <rect x="60" y="100" width="360" height="226" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 고객별 총 주문 금액</text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    c.name,</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="130" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SUM</text>
  <text x="166" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(o.amount) </text>
  <text x="76" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    customers c</text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">JOIN</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    orders o</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        ON</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        c.id = o.cust_id</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">GROUP BY</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    c.name;</text>

  <!-- Arrow center -->
  <line x1="430" y1="213" x2="468" y2="213" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="468,213 454,206 454,220" fill="#55c555"/>
  <text x="449" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">결과</text>

  <!-- Result table right -->
  <rect x="480" y="100" width="340" height="226" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="480" y="100" width="340" height="36" fill="#1e2433" rx="8"/>
  <rect x="480" y="124" width="340" height="12" fill="#1e2433"/>
  <text x="650" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">쿼리 결과</text>
  <!-- header -->
  <rect x="480" y="136" width="340" height="28" fill="#0f1724"/>
  <text x="530" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">name</text>
  <text x="700" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">SUM(amount)</text>
  <line x1="480" y1="164" x2="820" y2="164" stroke="#3a4a6e" stroke-width="1"/>
  <!-- row 1 -->
  <text x="530" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">김민준</text>
  <text x="700" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">57,000</text>
  <line x1="480" y1="194" x2="820" y2="194" stroke="#3a4a6e" stroke-width="1"/>
  <!-- row 2 -->
  <text x="530" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이서연</text>
  <text x="700" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">88,000</text>
  <line x1="480" y1="224" x2="820" y2="224" stroke="#3a4a6e" stroke-width="1"/>
  <!-- row 3 -->
  <text x="530" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">박지호</text>
  <text x="700" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">30,000</text>

  <!-- Bottom annotation -->
  <rect x="60" y="355" width="760" height="50" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">SQL이 "어떻게(How)"가 아닌 "무엇을(What)"로 작성되는 선언형 언어인 이유</text>
  <text x="440" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">집합 기반 연산 — 최적화는 옵티마이저가 담당, 개발자는 원하는 결과만 기술</text>
</svg>
