<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파인튜닝 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">데이터 준비 → 학습 → 평가 → 배포</text>

  <!-- Steps -->
  <rect x="60" y="100" width="140" height="80" rx="8" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">1. 데이터 준비</text>
  <text x="130" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지시-응답 쌍 수집</text>
  <text x="130" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">품질 필터링</text>
  <text x="130" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">포맷 변환</text>

  <line x1="200" y1="140" x2="226" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="222,135 232,140 222,145" fill="#444"/>

  <rect x="232" y="100" width="140" height="80" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="302" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">2. 기반 모델 선택</text>
  <text x="302" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">크기 결정 (7B~70B)</text>
  <text x="302" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Base vs Instruct</text>
  <text x="302" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">라이선스 확인</text>

  <line x1="372" y1="140" x2="398" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="394,135 404,140 394,145" fill="#444"/>

  <rect x="404" y="100" width="140" height="80" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="474" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">3. 학습 설정</text>
  <text x="474" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LoRA/QLoRA 설정</text>
  <text x="474" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하이퍼파라미터</text>
  <text x="474" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">학습 실행</text>

  <line x1="544" y1="140" x2="570" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="566,135 576,140 566,145" fill="#444"/>

  <rect x="576" y="100" width="140" height="80" rx="8" fill="#1a0d0d" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="646" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8b84b">4. 평가</text>
  <text x="646" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">벤치마크 측정</text>
  <text x="646" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">태스크별 평가</text>
  <text x="646" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사람 평가</text>

  <line x1="716" y1="140" x2="742" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="738,135 748,140 738,145" fill="#444"/>

  <rect x="748" y="100" width="72" height="80" rx="8" fill="#1a1500" stroke="#e05555" stroke-width="1.5"/>
  <text x="784" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">5. 배포</text>
  <text x="784" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">병합/서빙</text>
  <text x="784" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모니터링</text>

  <!-- Code block -->
  <rect x="60" y="208" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># QLoRA 파인튜닝 핵심 설정 (HuggingFace TRL)</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> trl </text>
  <text x="108" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">     import</text>
  <text x="108" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            SFTTrainer, SFTConfig</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> peft </text>
  <text x="108" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">      import</text>
  <text x="108" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">             LoraConfig, get_peft_model</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">lora_config = LoraConfig(r=</text>
  <text x="268" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">16</text>
  <text x="284" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, lora_alpha=</text>
  <text x="380" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">32</text>
  <text x="396" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, target_modules=[</text>
  <text x="524" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"q_proj"</text>
  <text x="576" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="584" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"v_proj"</text>
  <text x="636" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">])</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">model = get_peft_model(base_model, lora_config)</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">trainer = SFTTrainer(model=model, train_dataset=dataset, ...)</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">trainer.train()</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">               # 학습 가능 파라미터: 전체의 0.1~1%만</text>
</svg>
