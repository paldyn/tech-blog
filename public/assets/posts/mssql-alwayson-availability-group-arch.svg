<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Always On 가용성 그룹 아키텍처</text>

  <!-- Listener -->
  <rect x="310" y="72" width="260" height="48" rx="8" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">AG Listener (VNN/IP)</text>
  <text x="440" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">애플리케이션 연결 진입점 · 자동 라우팅</text>

  <!-- Primary -->
  <rect x="60" y="156" width="340" height="136" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="2"/>
  <text x="230" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Primary 레플리카</text>
  <text x="230" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">읽기/쓰기 모두 허용</text>
  <text x="230" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">AG 데이터베이스 마스터</text>
  <text x="230" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">모든 DML · DDL 허용</text>
  <text x="230" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로그 생성 → Secondary로 전송</text>

  <!-- Arrow: Listener to Primary -->
  <line x1="362" y1="120" x2="280" y2="156" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Secondary Sync -->
  <rect x="480" y="156" width="340" height="136" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Secondary (동기)</text>
  <text x="650" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">같은 데이터센터 권장</text>
  <text x="650" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">동기 커밋: 0 데이터 손실 보장</text>
  <text x="650" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 장애 조치(Automatic Failover) 가능</text>
  <text x="650" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">읽기 전용 라우팅으로 읽기 부하 분산</text>

  <!-- Arrow: Primary to Secondary sync -->
  <path d="M 400 200 C 430 200 450 200 480 200" stroke="#55c555" stroke-width="2.5" fill="none" marker-end="url(#arrg)"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">로그 스트림</text>

  <!-- Secondary Async (DR) -->
  <rect x="260" y="332" width="360" height="96" rx="8" fill="#101010" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Secondary (비동기) — DR 사이트</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">다른 데이터센터 · 지리적 분리</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비동기 커밋: 약간의 데이터 지연 허용</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수동 장애 조치 · 백업 오프로드</text>

  <!-- Arrow Primary to DR -->
  <path d="M 230 292 C 230 312 440 312 440 332" stroke="#888" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr)"/>
  <text x="320" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비동기 전송</text>

  <!-- WSFC -->
  <rect x="60" y="448" width="760" height="32" rx="6" fill="#1a1a0a" stroke="#888" stroke-width="1"/>
  <text x="440" y="469" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">WSFC(Windows Server Failover Cluster) — AG 멤버 상태 감지 및 장애 조치 조율</text>
</svg>
