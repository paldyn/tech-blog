<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">V8 엔진의 JS 코드 실행 파이프라인</text>

  <!-- Pipeline steps: horizontal flow -->
  <!-- Step 1: Source Code -->
  <rect x="60" y="80" width="110" height="70" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">소스 코드</text>
  <text x="115" y="130" text-anchor="middle" font-size="11" fill="#888">JavaScript</text>
  <text x="115" y="145" text-anchor="middle" font-size="11" fill="#888">텍스트 파일</text>

  <!-- Arrow 1→2 -->
  <polygon points="175,115 196,108 196,112 208,112 208,118 196,118 196,122" fill="#444"/>

  <!-- Step 2: Parser -->
  <rect x="210" y="80" width="110" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="265" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">파서</text>
  <text x="265" y="130" text-anchor="middle" font-size="11" fill="#888">토크나이징</text>
  <text x="265" y="145" text-anchor="middle" font-size="11" fill="#888">AST 생성</text>

  <!-- Arrow 2→3 -->
  <polygon points="325,115 346,108 346,112 358,112 358,118 346,118 346,122" fill="#444"/>

  <!-- Step 3: Ignition (Interpreter) -->
  <rect x="360" y="80" width="130" height="70" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="425" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">Ignition</text>
  <text x="425" y="122" text-anchor="middle" font-size="11" fill="#888">인터프리터</text>
  <text x="425" y="138" text-anchor="middle" font-size="11" fill="#888">바이트코드 실행</text>
  <text x="425" y="143" text-anchor="middle" font-size="9" fill="#555">프로파일링 데이터 수집</text>

  <!-- Arrow 3→4 -->
  <polygon points="495,115 516,108 516,112 526,112 526,118 516,118 516,122" fill="#ce9178"/>

  <!-- Step 4: TurboFan (JIT) -->
  <rect x="528" y="80" width="130" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="593" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">TurboFan</text>
  <text x="593" y="122" text-anchor="middle" font-size="11" fill="#888">JIT 컴파일러</text>
  <text x="593" y="138" text-anchor="middle" font-size="11" fill="#888">최적화 머신코드</text>
  <text x="593" y="148" text-anchor="middle" font-size="9" fill="#555">Hot 함수만 선별 컴파일</text>

  <!-- Arrow 4→5 -->
  <polygon points="662,115 683,108 683,112 693,112 693,118 683,118 683,122" fill="#55c555"/>

  <!-- Step 5: Machine Code -->
  <rect x="695" y="80" width="125" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="757" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">기계어</text>
  <text x="757" y="130" text-anchor="middle" font-size="11" fill="#888">CPU 직접 실행</text>
  <text x="757" y="145" text-anchor="middle" font-size="11" fill="#888">최고 성능</text>

  <!-- Deoptimization arrow (curved back) -->
  <path d="M 820 150 Q 820 195 593 195 Q 365 195 425 158" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <polygon points="425,158 418,172 432,172" fill="#e05555"/>
  <text x="640" y="190" text-anchor="middle" font-size="11" fill="#e05555">역최적화 (Deopt)</text>
  <text x="640" y="205" text-anchor="middle" font-size="10" fill="#555">타입 가정이 틀렸을 때</text>

  <!-- Hidden Class explanation -->
  <text x="60" y="255" font-size="16" font-weight="600" fill="#e8e8e8">Hidden Class — V8의 최적화 비결</text>

  <rect x="60" y="270" width="370" height="100" rx="8" fill="#0d1117" stroke="#333"/>
  <text x="80" y="292" font-size="13" font-weight="600" fill="#7ec8e3">같은 구조 → 같은 Hidden Class → 빠름</text>
  <rect x="80" y="302" width="330" height="58" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="136" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> p1 = { x: </text>
  <text x="230" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="238" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, y: </text>
  <text x="274" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="282" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> };</text>
  <text x="96" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="136" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> p2 = { x: </text>
  <text x="230" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="238" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, y: </text>
  <text x="274" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">4</text>
  <text x="282" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> };</text>
  <text x="96" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// p1, p2 → 동일 Hidden Class → 최적화</text>

  <rect x="450" y="270" width="370" height="100" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="292" font-size="13" font-weight="600" fill="#e05555">다른 구조 → 다른 Hidden Class → 느림</text>
  <rect x="470" y="302" width="330" height="58" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="486" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="526" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> a = { x: </text>
  <text x="616" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="624" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> };</text>
  <text x="486" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a.y = </text>
  <text x="536" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="544" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="486" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 프로퍼티 동적 추가 → Class 전환</text>

  <!-- Three engines comparison -->
  <text x="60" y="400" font-size="16" font-weight="600" fill="#e8e8e8">3대 엔진 비교</text>
  <rect x="60" y="414" width="230" height="56" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">V8 (Google)</text>
  <text x="175" y="456" text-anchor="middle" font-size="11" fill="#888">Chrome · Node · Deno · Bun · Edge</text>

  <rect x="325" y="414" width="230" height="56" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">SpiderMonkey (Mozilla)</text>
  <text x="440" y="456" text-anchor="middle" font-size="11" fill="#888">Firefox · Firefox Android</text>

  <rect x="590" y="414" width="230" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">JavaScriptCore (Apple)</text>
  <text x="705" y="456" text-anchor="middle" font-size="11" fill="#888">Safari · iOS · Bun 내부</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #3</text>
</svg>
