<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">V8 엔진의 코드 실행 파이프라인</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">소스 코드 → AST → 바이트코드 → 최적화된 기계어</text>

  <!-- Pipeline steps -->
  <!-- 1. Source Code -->
  <rect x="60" y="106" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">소스 코드</text>
  <text x="130" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">JavaScript text</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="136" x2="234" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="244,136 234,130 234,142" fill="#444"/>

  <!-- 2. Parser -->
  <rect x="244" y="106" width="140" height="60" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="314" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Parser</text>
  <text x="314" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">어휘/구문 분석</text>

  <!-- Arrow 2→3 -->
  <line x1="384" y1="136" x2="418" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="428,136 418,130 418,142" fill="#444"/>

  <!-- 3. AST -->
  <rect x="428" y="106" width="140" height="60" rx="8" fill="#2e2a1a" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="498" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c55a" text-anchor="middle">AST</text>
  <text x="498" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">추상 구문 트리</text>

  <!-- Arrow 3→4 -->
  <line x1="568" y1="136" x2="602" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="612,136 602,130 602,142" fill="#444"/>

  <!-- 4. Ignition -->
  <rect x="612" y="106" width="200" height="60" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="712" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Ignition (인터프리터)</text>
  <text x="712" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">바이트코드 생성·실행</text>

  <!-- Down arrow from Ignition -->
  <line x1="712" y1="166" x2="712" y2="206" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="712,216 706,206 718,206" fill="#e05555"/>
  <text x="730" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Hot path</text>

  <!-- Turbofan -->
  <rect x="580" y="216" width="264" height="70" rx="8" fill="#2e1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="712" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">TurboFan (JIT 컴파일러)</text>
  <text x="712" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">최적화된 기계어 코드 생성</text>
  <text x="712" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">타입 추론, 인라이닝, 탈최적화</text>

  <!-- Deoptimize arrow back -->
  <line x1="580" y1="260" x2="520" y2="260" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="520" y1="260" x2="520" y2="166" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="520,166 514,176 526,176" fill="#e05555"/>
  <text x="500" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">탈최적화</text>

  <!-- Garbage Collector section -->
  <rect x="60" y="320" width="460" height="86" rx="8" fill="#111" stroke="#333"/>
  <text x="290" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">가비지 컬렉터 (Orinoco)</text>
  <text x="290" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Minor GC (Scavenger) — Young 세대: 짧은 주기</text>
  <text x="290" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Major GC (Mark-Sweep) — Old 세대: 전체 힙 수집</text>

  <!-- Hidden class / Inline cache -->
  <rect x="540" y="320" width="300" height="86" rx="8" fill="#111" stroke="#333"/>
  <text x="690" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">최적화 기법</text>
  <text x="690" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Hidden Class — 객체 형태 추적</text>
  <text x="690" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Inline Cache (IC) — 반복 호출 캐싱</text>

  <!-- Code block -->
  <rect x="60" y="424" width="760" height="58" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 같은 형태의 객체를 반복 생성 → Hidden Class 최적화 활용</text>
  <text x="76" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="132" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> points = </text><text x="220" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">[</text><text x="228" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">{x:</text><text x="264" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="278" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, y:</text><text x="312" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text><text x="326" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}, {x:</text><text x="376" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text><text x="390" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, y:</text><text x="424" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text><text x="438" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}];</text><text x="488" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> // 같은 Hidden Class 공유</text>

  <text x="440" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
