<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="deoptArrow" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="600" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">V8 엔진의 JS 코드 실행 파이프라인</text>

  <!-- Pipeline steps: horizontal flow -->
  <!-- Step 1: Source Code -->
  <rect x="60" y="80" width="110" height="70" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">소스 코드</text>
  <text x="115" y="128" text-anchor="middle" font-size="11" fill="#888">JavaScript</text>
  <text x="115" y="144" text-anchor="middle" font-size="11" fill="#888">텍스트 파일</text>

  <!-- Arrow 1→2 -->
  <polygon points="175,115 196,108 196,112 208,112 208,118 196,118 196,122" fill="#444"/>

  <!-- Step 2: Parser -->
  <rect x="210" y="80" width="110" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="265" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">파서</text>
  <text x="265" y="128" text-anchor="middle" font-size="11" fill="#888">토크나이징</text>
  <text x="265" y="144" text-anchor="middle" font-size="11" fill="#888">AST 생성</text>

  <!-- Arrow 2→3 -->
  <polygon points="325,115 346,108 346,112 358,112 358,118 346,118 346,122" fill="#444"/>

  <!-- Step 3: Ignition (Interpreter) -->
  <rect x="360" y="80" width="130" height="70" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="425" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">Ignition</text>
  <text x="425" y="128" text-anchor="middle" font-size="11" fill="#888">인터프리터</text>
  <text x="425" y="144" text-anchor="middle" font-size="11" fill="#888">바이트코드 실행</text>

  <!-- Arrow 3→4 -->
  <polygon points="495,115 516,108 516,112 526,112 526,118 516,118 516,122" fill="#ce9178"/>

  <!-- Step 4: TurboFan (JIT) -->
  <rect x="528" y="80" width="130" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="593" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">TurboFan</text>
  <text x="593" y="128" text-anchor="middle" font-size="11" fill="#888">JIT 컴파일러</text>
  <text x="593" y="144" text-anchor="middle" font-size="11" fill="#888">최적화 머신코드</text>

  <!-- Arrow 4→5 -->
  <polygon points="662,115 683,108 683,112 693,112 693,118 683,118 683,122" fill="#55c555"/>

  <!-- Step 5: Machine Code -->
  <rect x="695" y="80" width="125" height="70" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="757" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">기계어</text>
  <text x="757" y="128" text-anchor="middle" font-size="11" fill="#888">CPU 직접 실행</text>
  <text x="757" y="144" text-anchor="middle" font-size="11" fill="#888">최고 성능</text>

  <!-- Deoptimization arrow (curved back, large U-shape so labels fit inside) -->
  <path d="M 757 158 Q 757 290 593 290 Q 425 290 425 162"
        stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" fill="none"
        marker-end="url(#deoptArrow)" opacity="0.85"/>

  <!-- Deopt labels INSIDE the U-curve, centered vertically in the space between boxes and curve dip -->
  <text x="593" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">역최적화 (Deopt)</text>
  <text x="593" y="248" text-anchor="middle" font-size="11" fill="#999">타입 가정이 빗나가면 Ignition으로 돌아감</text>

  <!-- Hidden Class explanation -->
  <text x="60" y="340" font-size="16" font-weight="600" fill="#e8e8e8">Hidden Class — V8의 최적화 비결</text>

  <rect x="60" y="354" width="370" height="108" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="376" font-size="13" font-weight="600" fill="#7ec8e3">같은 구조 → 같은 Hidden Class → 빠름</text>
  <rect x="80" y="386" width="330" height="64" rx="6" fill="#070b14" stroke="#2a3a55" stroke-width="1"/>
  <text x="96" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> p1 = { x: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, y: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8"> };</tspan></text>
  <text x="96" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> p2 = { x: </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, y: </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8"> };</tspan></text>
  <text x="96" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// p1, p2 → 동일 Hidden Class → 최적화</text>

  <rect x="450" y="354" width="370" height="108" rx="8" fill="#1a0d10" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="376" font-size="13" font-weight="600" fill="#e05555">다른 구조 → 다른 Hidden Class → 느림</text>
  <rect x="470" y="386" width="330" height="64" rx="6" fill="#070b14" stroke="#552a2a" stroke-width="1"/>
  <text x="486" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> a = { x: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> };</tspan></text>
  <text x="486" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">a.y = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="486" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 프로퍼티 동적 추가 → Class 전환</text>

  <!-- Three engines comparison -->
  <text x="60" y="500" font-size="16" font-weight="600" fill="#e8e8e8">3대 엔진 비교</text>
  <rect x="60" y="514" width="230" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">V8 (Google)</text>
  <text x="175" y="558" text-anchor="middle" font-size="11" fill="#888">Chrome · Node · Deno · Bun · Edge</text>

  <rect x="325" y="514" width="230" height="60" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">SpiderMonkey (Mozilla)</text>
  <text x="440" y="558" text-anchor="middle" font-size="11" fill="#888">Firefox · Firefox Android</text>

  <rect x="590" y="514" width="230" height="60" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">JavaScriptCore (Apple)</text>
  <text x="705" y="558" text-anchor="middle" font-size="11" fill="#888">Safari · iOS · Bun 내부</text>
</svg>
