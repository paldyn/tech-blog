<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">변경 메서드 vs 비변경 메서드</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">원본 배열에 미치는 영향 비교</text>

  <!-- Mutating side -->
  <rect x="60" y="95" width="360" height="380" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="95" width="360" height="36" rx="8" fill="#e05555"/>
  <rect x="60" y="119" width="360" height="12" fill="#e05555"/>
  <text x="240" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">원본 변경 (Mutating)</text>

  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">push(item)</text>
  <text x="240" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">끝에 추가, length 반환</text>

  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">pop()</text>
  <text x="240" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">끝 제거, 제거된 요소 반환</text>

  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">shift()</text>
  <text x="240" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앞 제거, 제거된 요소 반환</text>

  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">unshift(...items)</text>
  <text x="240" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앞에 추가, length 반환</text>

  <text x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">splice(start, del, ...)</text>
  <text x="240" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">임의 삽입·삭제</text>

  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sort(fn)</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정렬, this 반환</text>

  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">reverse()</text>
  <text x="240" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">역순, this 반환</text>

  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">fill(v, start, end)</text>
  <text x="240" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구간 채우기</text>

  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">copyWithin(t, s, e)</text>
  <text x="240" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부 복사</text>

  <rect x="72" y="328" width="336" height="48" rx="6" fill="#1f0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">const a = [</text><text x="178" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3</text><text x="190" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text><text x="198" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="210" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text><text x="218" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text><text x="230" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">];</text>
  <text x="88" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a.sort(); </text><text x="178" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// a: [1, 2, 3] 변경됨!</text>

  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ React state·함수형에서 직접 사용 금지</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 사본을 만든 뒤 조작: [...arr].sort()</text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 또는 ES2023 toSorted / toReversed 사용</text>
  <text x="80" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ splice 대신 toSpliced (ES2023)</text>

  <!-- Non-mutating side -->
  <rect x="460" y="95" width="360" height="380" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="95" width="360" height="36" rx="8" fill="#55c555"/>
  <rect x="460" y="119" width="360" height="12" fill="#55c555"/>
  <text x="640" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">비변경 (Non-Mutating)</text>

  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">map(fn)</text>
  <text x="620" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">filter(fn)</text>
  <text x="620" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">slice(start, end)</text>
  <text x="620" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">concat(...)</text>
  <text x="620" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">flat(depth)</text>
  <text x="620" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">flatMap(fn)</text>
  <text x="620" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 배열 반환</text>

  <text x="480" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">toSorted(fn) ✦</text>
  <text x="620" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정렬된 새 배열</text>

  <text x="480" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">toReversed() ✦</text>
  <text x="620" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">역순된 새 배열</text>

  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">toSpliced(...) ✦</text>
  <text x="620" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">삽입·삭제된 새 배열</text>

  <text x="480" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">with(idx, val) ✦</text>
  <text x="620" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특정 위치 교체된 새 배열</text>

  <rect x="472" y="348" width="336" height="48" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="488" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">const a = [</text><text x="578" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3</text><text x="590" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text><text x="598" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="610" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text><text x="618" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text><text x="630" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">];</text>
  <text x="488" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a.toSorted(); </text><text x="596" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// a 그대로 [3,1,2]</text>

  <text x="480" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✦ ES2023 — Chrome 110+, Node 20+</text>
  <text x="480" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 유지 → 예측 가능, 버그 감소</text>
  <text x="480" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">React / Immer 패턴과 자연스럽게 결합</text>
</svg>
