<svg width="880" height="490" viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파스칼의 삼각형: C(5,2) = C(4,1) + C(4,2)</text>

  <!-- row labels -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">
    <text x="120" y="115">n=0</text>
    <text x="120" y="173">n=1</text>
    <text x="120" y="231">n=2</text>
    <text x="120" y="289">n=3</text>
    <text x="120" y="347">n=4</text>
    <text x="120" y="405">n=5</text>
  </g>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle">
    <!-- n=0 -->
    <rect x="412" y="90" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="440" y="115" fill="#ffffff">1</text>
    <!-- n=1 -->
    <rect x="380" y="148" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="408" y="173" fill="#ffffff">1</text>
    <rect x="444" y="148" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="472" y="173" fill="#ffffff">1</text>
    <!-- n=2 -->
    <rect x="348" y="206" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="376" y="231" fill="#ffffff">1</text>
    <rect x="412" y="206" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="440" y="231" fill="#ffffff">2</text>
    <rect x="476" y="206" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="504" y="231" fill="#ffffff">1</text>
    <!-- n=3 -->
    <rect x="316" y="264" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="344" y="289" fill="#ffffff">1</text>
    <rect x="380" y="264" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="408" y="289" fill="#ffffff">3</text>
    <rect x="444" y="264" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="472" y="289" fill="#ffffff">3</text>
    <rect x="508" y="264" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="536" y="289" fill="#ffffff">1</text>
    <!-- n=4 -->
    <rect x="284" y="322" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="312" y="347" fill="#ffffff">1</text>
    <rect x="348" y="322" width="56" height="40" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
    <text x="376" y="347" fill="#7ec8e3" font-weight="600">4</text>
    <rect x="412" y="322" width="56" height="40" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
    <text x="440" y="347" fill="#7ec8e3" font-weight="600">6</text>
    <rect x="476" y="322" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="504" y="347" fill="#ffffff">4</text>
    <rect x="540" y="322" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="568" y="347" fill="#ffffff">1</text>
    <!-- n=5 -->
    <rect x="252" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="280" y="405" fill="#ffffff">1</text>
    <rect x="316" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="344" y="405" fill="#ffffff">5</text>
    <rect x="380" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#55c555" stroke-width="2.5"/>
    <text x="408" y="405" fill="#55c555" font-weight="600">10</text>
    <rect x="444" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="472" y="405" fill="#ffffff">10</text>
    <rect x="508" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="536" y="405" fill="#ffffff">5</text>
    <rect x="572" y="380" width="56" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="600" y="405" fill="#ffffff">1</text>
  </g>

  <!-- annotation -->
  <rect x="650" y="300" width="170" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="666" y="334" fill="#7ec8e3" font-weight="600">4 + 6</text>
    <text x="666" y="362" fill="#ffffff">= <tspan fill="#55c555" font-weight="600">10</tspan></text>
    <text x="666" y="396" fill="#9aa4b8">바로 위 두 수의 합</text>
  </g>

  <text x="60" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">파스칼 항등식 C(n, r) = C(n-1, r-1) + C(n-1, r) — n번째 원소를 "뽑거나 / 안 뽑거나"</text>
</svg>
