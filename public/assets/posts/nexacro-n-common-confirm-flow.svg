<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공통 confirm 팝업 호출 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">브라우저 내장 confirm 대신 커스텀 팝업 폼 사용</text>

  <!-- Caller: Business Form -->
  <rect x="60" y="100" width="220" height="60" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">업무 폼</text>
  <text x="170" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">gfn_confirm("삭제?", cb)</text>

  <!-- Arrow right -->
  <line x1="280" y1="130" x2="360" y2="130" stroke="#555" stroke-width="2"/>
  <polygon points="368,130 356,124 356,136" fill="#555"/>
  <text x="320" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">openPopup</text>

  <!-- Confirm popup form -->
  <rect x="368" y="92" width="220" height="76" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="478" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">gfn_confirm.xfdl</text>
  <text x="478" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메시지 표시</text>
  <text x="478" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">확인 / 취소 버튼</text>

  <!-- User interaction -->
  <rect x="368" y="200" width="220" height="50" rx="8" fill="#111" stroke="#333"/>
  <text x="478" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">사용자 버튼 클릭</text>
  <text x="478" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">확인 또는 취소</text>

  <line x1="478" y1="168" x2="478" y2="198" stroke="#555" stroke-width="1.5"/>
  <polygon points="478,200 472,188 484,188" fill="#555"/>

  <!-- returnValue -->
  <line x1="478" y1="250" x2="478" y2="280" stroke="#555" stroke-width="1.5"/>
  <polygon points="478,282 472,270 484,270" fill="#555"/>

  <!-- Return to caller -->
  <rect x="368" y="282" width="220" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="478" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">returnValue 설정</text>
  <text x="478" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">{ result: "ok" | "cancel" }</text>

  <!-- Arrow back to caller -->
  <line x1="368" y1="307" x2="280" y2="307" stroke="#555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="278,307 290,301 290,313" fill="#555"/>
  <text x="320" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">callback</text>

  <!-- Callback result -->
  <rect x="60" y="282" width="220" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">콜백 함수 실행</text>
  <text x="170" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">if (result == "ok") fn_del()</text>

  <!-- Alternative: native confirm problem -->
  <rect x="660" y="100" width="180" height="76" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="750" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">브라우저 confirm()</text>
  <text x="750" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">✗ 스타일 커스텀 불가</text>
  <text x="750" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">✗ 다국어 처리 불가</text>

  <rect x="660" y="200" width="180" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">커스텀 confirm</text>
  <text x="750" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">✓ 디자인 시스템 통일</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">모든 업무 폼은 gfn_confirm() 함수를 통해 커스텀 팝업을 호출</text>
</svg>
