  <rect x="244" y="222" width="168" height="52" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="328" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
