  <!-- Examples -->
  <rect x="60" y="294" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">feat(auth): add OAuth2 login with Google</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">fix(api): handle null response from payment gateway</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">feat!: remove deprecated login endpoint  <tspan fill="#9aa4b8"># BREAKING CHANGE</tspan></text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">Added user profile   <tspan fill="#9aa4b8"># 훅이 이 형식을 거부</tspan></text>
