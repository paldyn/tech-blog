  <rect x="612" y="222" width="208" height="52" rx="6" fill="#1a0f00" stroke="#ce9178" stroke-width="1"/>
  <text x="716" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
