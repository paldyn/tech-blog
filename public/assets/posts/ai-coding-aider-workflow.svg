<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Aider 워크플로우</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">AI Pair Programming with Git Integration</text>

  <defs>
    <marker id="aiderarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Main flow -->
  <!-- 1. Developer -->
  <rect x="40" y="130" width="140" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">개발자</text>
  <text x="110" y="182" text-anchor="middle" font-size="12" fill="#888">자연어 요청</text>
  <text x="110" y="199" text-anchor="middle" font-size="12" fill="#888">/add 파일 추가</text>

  <line x1="180" y1="170" x2="218" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#aiderarr)"/>

  <!-- 2. Aider -->
  <rect x="218" y="114" width="170" height="112" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="303" y="144" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Aider</text>
  <text x="303" y="166" text-anchor="middle" font-size="12" fill="#888">컨텍스트 구성</text>
  <text x="303" y="184" text-anchor="middle" font-size="12" fill="#888">편집 형식 요청</text>
  <text x="303" y="202" text-anchor="middle" font-size="12" fill="#888">diff 파싱·적용</text>
  <text x="303" y="220" text-anchor="middle" font-size="12" fill="#888">자동 git commit</text>

  <line x1="388" y1="170" x2="426" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#aiderarr)"/>

  <!-- 3. LLM -->
  <rect x="426" y="130" width="150" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="501" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">LLM</text>
  <text x="501" y="178" text-anchor="middle" font-size="12" fill="#888">Claude / GPT</text>
  <text x="501" y="196" text-anchor="middle" font-size="12" fill="#888">Gemini / 로컬</text>

  <line x1="576" y1="170" x2="614" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#aiderarr)"/>

  <!-- 4. Codebase -->
  <rect x="614" y="130" width="150" height="80" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="689" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">코드베이스</text>
  <text x="689" y="178" text-anchor="middle" font-size="12" fill="#888">파일 수정 반영</text>
  <text x="689" y="196" text-anchor="middle" font-size="12" fill="#888">Git 커밋 생성</text>

  <!-- Feedback loop -->
  <defs>
    <marker id="feedarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <path d="M 689 210 Q 689 270 303 270 Q 218 270 218 226" fill="none"
        stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#feedarr)"/>
  <text x="460" y="292" text-anchor="middle" font-size="12" fill="#7777cc">결과 확인 후 다음 요청</text>

  <!-- Architect mode -->
  <rect x="40" y="326" width="760" height="84" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">Architect 모드 (aider --architect)</text>
  <text x="440" y="370" text-anchor="middle" font-size="13" fill="#e8e8e8">설계 모델(Claude Opus 등) → 코딩 모델(Sonnet 등) 두 단계 분리</text>
  <text x="440" y="390" text-anchor="middle" font-size="12" fill="#888">복잡한 기능: 먼저 설계(고비용 모델)만 하고, 실제 구현은 빠른 모델이 진행</text>
  <text x="440" y="406" text-anchor="middle" font-size="12" fill="#888">품질↑ + 비용 최적화 동시 달성</text>
</svg>
