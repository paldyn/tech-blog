<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ApiResponse&lt;T&gt; 구현과 사용 예시</text>

  <!-- 왼쪽 코드 박스: 클래스 정의 (x=50, y=72, w=370, h=352) -->
  <rect x="50" y="72" width="370" height="352" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- 박스 제목 라인 -->
  <text x="235" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">ApiResponse.java</text>
  <line x1="50" y1="108" x2="420" y2="108" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 코드 내용 (14줄, step=18, y=124~358) -->
  <!-- 대칭 계산: body=108~424=316px, 13×18=234span, pad=(316-234-13)/2=34.5, first=108+34.5+10=152.5≈153 -->
  <!-- 수정: y=124 사용 (박스 상단에서 16px 패딩) -->
  <text x="66" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// ApiResponse.java</text>
  <text x="66" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Getter</tspan></text>
  <text x="66" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> ApiResponse&lt;T&gt; {</tspan></text>
  <text x="66" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">private final boolean</tspan><tspan fill="#ffffff"> success;</tspan></text>
  <text x="66" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> String  code;</tspan></text>
  <text x="66" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> String  message;</tspan></text>
  <text x="66" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> T       data;</tspan></text>
  <text x="66" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="66" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">public static</tspan><tspan fill="#ffffff"> &lt;T&gt; ApiResponse&lt;T&gt;</tspan></text>
  <text x="66" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ffffff">ok(T data) {</tspan></text>
  <text x="66" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#7ec8e3" font-weight="600">return new</tspan><tspan fill="#ffffff"> ApiResponse&lt;&gt;(</tspan></text>
  <text x="66" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"200"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"OK"</tspan><tspan fill="#ffffff">, data);</tspan></text>
  <text x="66" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan x="80">}</tspan></text>
  <text x="66" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 오른쪽 코드 박스: 컨트롤러 사용 (x=460, y=72, w=370, h=352) -->
  <rect x="460" y="72" width="370" height="352" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Controller 사용 예</text>
  <line x1="460" y1="108" x2="830" y2="108" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 오른쪽 코드 내용 (10줄, 수직 중앙 정렬) -->
  <!-- body=108~424=316px, 9×18=162span, pad=(316-162-13)/2=70.5, first=108+70.5+10=188.5≈189 -->
  <text x="476" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 성공 응답 반환</text>
  <text x="476" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@GetMapping</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/users/{id}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> ApiResponse&lt;UserDto&gt;</tspan></text>
  <text x="476" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">getUser(</tspan><tspan fill="#7ec8e3" font-weight="600">@PathVariable</tspan><tspan fill="#ffffff"> Long id){</tspan></text>
  <text x="476" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="490" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> ApiResponse.ok(</tspan></text>
  <text x="476" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="504" fill="#ffffff">service.findById(id));</tspan></text>
  <text x="476" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="476" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 오류 응답 반환</text>
  <text x="476" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> ApiResponse.error(</tspan></text>
  <text x="476" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="490" fill="#ce9178">"E404"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"사용자 없음"</tspan><tspan fill="#ffffff">);</tspan></text>
</svg>
