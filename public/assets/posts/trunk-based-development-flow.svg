<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Trunk-Based Development</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">단수명 trunk(main)에 소규모 커밋, 짧은 수명의 feature 브랜치</text>

  <!-- Trunk line -->
  <text x="72" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">trunk</text>
  <line x1="100" y1="160" x2="820" y2="160" stroke="#7ec8e3" stroke-width="3"/>

  <!-- Trunk commits (frequent, small) -->
  <circle cx="130" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="200" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="270" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="340" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="430" cy="160" r="7" fill="#9988dd"/>
  <circle cx="500" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="570" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="640" cy="160" r="7" fill="#7ec8e3"/>
  <circle cx="720" cy="160" r="7" fill="#9988dd"/>
  <circle cx="790" cy="160" r="7" fill="#7ec8e3"/>

  <!-- Short-lived feature branch 1 (max 1-2 days) -->
  <text x="72" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">feature/</text>
  <text x="72" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">short</text>

  <line x1="270" y1="160" x2="290" y2="100" stroke="#9988dd" stroke-width="1.5"/>
  <line x1="290" y1="100" x2="410" y2="100" stroke="#9988dd" stroke-width="1.5"/>
  <line x1="410" y1="100" x2="430" y2="153" stroke="#9988dd" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <circle cx="350" cy="100" r="5" fill="#9988dd"/>

  <!-- Duration label -->
  <rect x="285" y="74" width="140" height="20" rx="4" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="355" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">수명 ≤ 2일</text>

  <!-- Short-lived feature branch 2 -->
  <line x1="570" y1="160" x2="590" y2="100" stroke="#9988dd" stroke-width="1.5"/>
  <line x1="590" y1="100" x2="700" y2="100" stroke="#9988dd" stroke-width="1.5"/>
  <line x1="700" y1="100" x2="720" y2="153" stroke="#9988dd" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <circle cx="645" cy="100" r="5" fill="#9988dd"/>

  <rect x="590" y="74" width="120" height="20" rx="4" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="650" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9988dd">수명 ≤ 2일</text>

  <!-- CI pipeline triggered on each commit -->
  <text x="440" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">↑ 커밋마다 CI 자동 실행</text>

  <!-- Feature flags box -->
  <rect x="60" y="230" width="360" height="160" rx="8" fill="#111" stroke="#e0955e" stroke-width="1.5"/>
  <text x="240" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0955e">Feature Flag (토글)</text>

  <rect x="76" y="268" width="328" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 미완성 기능은 플래그로 감싸기</text>
  <text x="92" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">if feature_flags.enabled(</text>
  <text x="92" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">'new-search'</tspan>):</text>
  <text x="92" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    show_new_search()</text>
  <text x="92" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 미완성 상태로 trunk에 머지 가능</text>

  <!-- Rules box -->
  <rect x="460" y="230" width="360" height="160" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">TBD 핵심 규칙</text>
  <text x="476" y="283"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">① feature 브랜치 수명 ≤ 2일</text>
  <text x="476" y="307"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">② 커밋 전 로컬 CI 통과</text>
  <text x="476" y="331"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">③ trunk 항상 빌드 가능 상태</text>
  <text x="476" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">④ 미완성 코드는 Feature Flag</text>
  <text x="476" y="379"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">⑤ 하루 1회 이상 trunk에 통합</text>

  <!-- Footer -->
  <text x="440" y="450" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">TBD = Trunk-Based Development — 구글, 메타 등 대형 팀이 실전에서 검증한 전략</text>
</svg>
