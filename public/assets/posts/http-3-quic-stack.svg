<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect x="0" y="0" width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프로토콜 스택 — HTTP/2 vs HTTP/3</text>

  <!-- HTTP/2 column -->
  <text x="200" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">HTTP/2</text>

  <rect x="80" y="120" width="240" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">HTTP/2</text>
  <text x="200" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다중화 · HPACK</text>

  <rect x="80" y="186" width="240" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">TLS 1.2 / 1.3</text>
  <text x="200" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">별도 핸드셰이크</text>

  <rect x="80" y="252" width="240" height="56" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">TCP</text>
  <text x="200" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">순서 강제 → HOL 블로킹</text>

  <rect x="80" y="318" width="240" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">IP</text>

  <!-- HTTP/3 column -->
  <text x="680" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">HTTP/3</text>

  <rect x="560" y="120" width="240" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">HTTP/3</text>
  <text x="680" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다중화 · QPACK</text>

  <rect x="560" y="186" width="240" height="122" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">QUIC</text>
  <text x="680" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">신뢰성 전송 + TLS 1.3 통합</text>
  <text x="680" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스트림별 독립 전달</text>
  <text x="680" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">암호화 내장 · 평문 없음</text>

  <rect x="560" y="318" width="240" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">UDP / IP</text>

  <!-- center note -->
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">TLS+전송</text>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">한 덩어리로</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">통합</text>

  <text x="60" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TCP 3단 계층(TCP→TLS→HTTP)을 QUIC이 하나로 합쳐 핸드셰이크 왕복을 줄인다.</text>
</svg>
