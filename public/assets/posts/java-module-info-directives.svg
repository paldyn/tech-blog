<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="370" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">module-info.java의 지시어</text>

  <!-- code box -->
  <rect x="50" y="74" width="440" height="252" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="102" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">module</tspan><tspan fill="#ffffff"> com.app.service {</tspan></text>
  <text x="66" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">requires</tspan><tspan fill="#ffffff"> com.app.util;</tspan></text>
  <text x="66" y="150" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">requires transitive</tspan><tspan fill="#ffffff"> java.sql;</tspan></text>
  <text x="66" y="174" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">exports</tspan><tspan fill="#ffffff"> com.app.service.api;</tspan></text>
  <text x="66" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">opens</tspan><tspan fill="#ffffff"> com.app.service.dto;</tspan></text>
  <text x="66" y="222" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">uses</tspan><tspan fill="#ffffff"> com.app.spi.Plugin;</tspan></text>
  <text x="66" y="246" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">provides</tspan><tspan fill="#ffffff"> spi.Plugin</tspan></text>
  <text x="66" y="270" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">with</tspan><tspan fill="#ffffff"> impl.MyPlugin;</tspan></text>
  <text x="66" y="294" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff" xml:space="preserve">}</text>

  <!-- legend -->
  <rect x="520" y="74" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="98" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">requires</tspan> — 의존하는 모듈</text>

  <rect x="520" y="120" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="144" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">transitive</tspan> — 의존을 다시 노출</text>

  <rect x="520" y="166" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="190" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">exports</tspan> — 패키지 공개(컴파일+런타임)</text>

  <rect x="520" y="212" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="236" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">opens</tspan> — 리플렉션 접근 허용</text>

  <rect x="520" y="258" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="282" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">uses</tspan> — 서비스 소비 선언</text>

  <rect x="520" y="304" width="320" height="38" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="328" font-size="13" fill="#bbb"><tspan fill="#7ec8e3" font-weight="600">provides..with</tspan> — 서비스 구현 제공</text>
</svg>
