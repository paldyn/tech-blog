<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">로거 계층과 전파(propagation)</text>

  <defs>
    <marker id="lcarr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="340" y="84" width="200" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="110" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">root</text>
  <text x="440" y="130" font-size="11" fill="#9aa4b8" text-anchor="middle">최상위 · 모든 로그가 모임</text>

  <rect x="340" y="176" width="200" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="202" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">myapp</text>
  <text x="440" y="222" font-size="11" fill="#9aa4b8" text-anchor="middle">getLogger("myapp")</text>

  <rect x="120" y="252" width="240" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="277" font-size="13" fill="#e8e8e8" text-anchor="middle">myapp.db</text>

  <rect x="520" y="252" width="240" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="277" font-size="13" fill="#e8e8e8" text-anchor="middle">myapp.web</text>

  <line x1="240" y1="252" x2="400" y2="234" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#lcarr)"/>
  <line x1="640" y1="252" x2="480" y2="234" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#lcarr)"/>
  <line x1="440" y1="176" x2="440" y2="146" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#lcarr)"/>

  <text x="600" y="168" font-size="13" fill="#888">로그는 자식 → 부모로 전파되어 root까지 올라간다</text>
</svg>
