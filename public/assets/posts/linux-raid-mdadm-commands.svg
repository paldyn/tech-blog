<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">mdadm 핵심 명령어</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">생성 · 모니터링 · 관리 · 복구</text>

  <!-- Left column: Create & Monitor -->
  <text x="60" y="100" font-size="14" font-weight="600" fill="#7ec8e3">RAID 생성 · 모니터링</text>

  <!-- Code block 1 -->
  <rect x="60" y="108" width="380" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="127" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># RAID 5 생성 (디스크 3개)</text>
  <text x="76" y="145" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="124" y="145" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--create /dev/md0 \</text>
  <text x="76" y="163" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">  --level=5 --raid-devices=3 \</text>
  <text x="76" y="181" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">  /dev/sd{b,c,d}</text>
  <line x1="76" y1="194" x2="424" y2="194" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="212" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 동기화 진행 상태 확인</text>
  <text x="76" y="230" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">watch </text>
  <text x="114" y="230" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">cat /proc/mdstat</text>

  <!-- Code block 2 - 상태 확인 -->
  <text x="60" y="278" font-size="14" font-weight="600" fill="#55c555">상태 확인</text>
  <rect x="60" y="286" width="380" height="114" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="305" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 상세 상태</text>
  <text x="76" y="323" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="124" y="323" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--detail /dev/md0</text>
  <line x1="76" y1="336" x2="424" y2="336" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="354" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 모든 배열 스캔</text>
  <text x="76" y="372" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="124" y="372" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--detail --scan</text>

  <!-- Right column: Fail & Recover -->
  <text x="460" y="100" font-size="14" font-weight="600" fill="#e05555">장애 처리 · 복구</text>

  <!-- Code block 3 -->
  <rect x="460" y="108" width="380" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="127" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 디스크 장애 표시</text>
  <text x="476" y="145" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="524" y="145" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--fail /dev/md0 /dev/sdb</text>
  <line x1="476" y1="158" x2="824" y2="158" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="176" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 장애 디스크 제거</text>
  <text x="476" y="194" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="524" y="194" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--remove /dev/md0 /dev/sdb</text>
  <line x1="476" y1="208" x2="824" y2="208" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="226" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 새 디스크 추가 (재구성 시작)</text>
  <text x="476" y="244" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="524" y="244" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--add /dev/md0 /dev/sde</text>

  <!-- Code block 4 - 설정 저장 -->
  <text x="460" y="278" font-size="14" font-weight="600" fill="#7777cc">설정 저장 · 중지</text>
  <rect x="460" y="286" width="380" height="114" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="305" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># mdadm.conf 업데이트</text>
  <text x="476" y="323" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="524" y="323" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--detail --scan >> /etc/mdadm/mdadm.conf</text>
  <line x1="476" y1="336" x2="824" y2="336" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="354" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># 배열 중지</text>
  <text x="476" y="372" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mdadm </text>
  <text x="524" y="372" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve">--stop /dev/md0</text>

  <!-- Footer tip -->
  <rect x="60" y="420" width="760" height="26" rx="6" fill="#141622"/>
  <text x="440" y="437" text-anchor="middle" font-size="12" fill="#7ec8e3">💡 /proc/mdstat — RAID 배열 실시간 상태 · 재구성(resync) 진행률 확인</text>
</svg>
