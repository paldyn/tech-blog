<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Form Include — 화면 조각 재사용</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">공통 조각을 여러 Form에서 Include</text>

  <!-- SearchBar.xfdl (common fragment) -->
  <rect x="290" y="90" width="300" height="54" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">SearchBar.xfdl (공통 조각)</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">검색 조건 + 조회 버튼</text>

  <!-- Arrows to forms -->
  <line x1="360" y1="144" x2="180" y2="192" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="177,198 174,186 186,190" fill="#4a8aa0"/>
  <text x="240" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">include</text>

  <line x1="440" y1="144" x2="440" y2="192" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="440,198 435,188 445,188" fill="#4a8aa0"/>
  <text x="490" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">include</text>

  <line x1="520" y1="144" x2="700" y2="192" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="703,198 693,190 705,186" fill="#4a8aa0"/>
  <text x="650" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">include</text>

  <!-- Three forms -->
  <rect x="60" y="200" width="240" height="180" rx="8" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="180" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OrderList.xfdl</text>
  <!-- Include placeholder inside form -->
  <rect x="76" y="232" width="208" height="40" rx="4" fill="#0a1620" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="180" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">[inc] SearchBar</text>
  <rect x="76" y="280" width="208" height="84" rx="4" fill="#0d1f0d" stroke="#3a5a3a" stroke-width="1"/>
  <text x="180" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">grdOrder (주문 Grid)</text>

  <rect x="320" y="200" width="240" height="180" rx="8" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">CustMgmt.xfdl</text>
  <rect x="336" y="232" width="208" height="40" rx="4" fill="#0a1620" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="440" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">[inc] SearchBar</text>
  <rect x="336" y="280" width="208" height="84" rx="4" fill="#0d1f0d" stroke="#3a5a3a" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">grdCust (고객 Grid)</text>

  <rect x="580" y="200" width="240" height="180" rx="8" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="700" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ProdList.xfdl</text>
  <rect x="596" y="232" width="208" height="40" rx="4" fill="#0a1620" stroke="#4a8aa0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="700" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">[inc] SearchBar</text>
  <rect x="596" y="280" width="208" height="84" rx="4" fill="#0d1f0d" stroke="#3a5a3a" stroke-width="1"/>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">grdProd (상품 Grid)</text>

  <!-- Bottom note -->
  <rect x="60" y="406" width="760" height="44" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c84a" text-anchor="middle">SearchBar.xfdl를 한 번 수정하면 Include한 모든 Form에 자동 반영</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상속과 달리 Form 구조를 바꾸지 않고 UI 조각만 삽입</text>

  <!-- Footer -->
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
