<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">MAP · MRR 비교</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">MAP는 전체 관련 문서, MRR은 첫 번째 관련 문서의 위치에 집중한다</text>

  <!-- MAP explanation -->
  <text x="220" y="96" text-anchor="middle" fill="#e0a020" font-size="14" font-weight="600">MAP (Mean Average Precision)</text>

  <rect x="60" y="108" width="360" height="220" rx="8" fill="#111827" stroke="#3a2905" stroke-width="1.5"/>

  <!-- Example query -->
  <text x="80" y="132" fill="#888" font-size="12" font-weight="600">예시: 쿼리 1 결과 (✓=관련, ✗=무관련)</text>
  <text x="80" y="152" fill="#e8e8e8" font-size="12">순위 1: ✓  P@1 = 1/1 = 1.00</text>
  <text x="80" y="170" fill="#ccc" font-size="12">순위 2: ✗</text>
  <text x="80" y="188" fill="#e8e8e8" font-size="12">순위 3: ✓  P@3 = 2/3 = 0.67</text>
  <text x="80" y="206" fill="#ccc" font-size="12">순위 4: ✗</text>
  <text x="80" y="224" fill="#e8e8e8" font-size="12">순위 5: ✓  P@5 = 3/5 = 0.60</text>

  <line x1="76" y1="236" x2="414" y2="236" stroke="#333" stroke-width="1"/>
  <text x="80" y="254" fill="#888" font-size="12">AP@5 = (1.00 + 0.67 + 0.60) / 3</text>
  <text x="320" y="254" text-anchor="end" fill="#e0a020" font-size="14" font-weight="700">= 0.756</text>
  <text x="80" y="274" fill="#888" font-size="11">→ 관련 문서가 나올 때의 Precision만 평균</text>
  <text x="80" y="292" fill="#7ec8e3" font-size="11">MAP = 여러 쿼리의 AP 평균</text>
  <text x="80" y="310" fill="#888" font-size="11">관련 문서가 상위에 많을수록 AP↑</text>

  <!-- Divider -->
  <line x1="440" y1="96" x2="440" y2="360" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- MRR explanation -->
  <text x="660" y="96" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">MRR (Mean Reciprocal Rank)</text>

  <rect x="460" y="108" width="360" height="220" rx="8" fill="#111827" stroke="#1a0a2a" stroke-width="1.5"/>

  <text x="480" y="132" fill="#888" font-size="12" font-weight="600">3개 쿼리의 첫 번째 관련 문서 위치</text>
  <text x="480" y="152" fill="#e8e8e8" font-size="12">쿼리 1: 1위에 관련  → 1/1 = 1.000</text>
  <text x="480" y="172" fill="#e8e8e8" font-size="12">쿼리 2: 3위에 관련  → 1/3 = 0.333</text>
  <text x="480" y="192" fill="#e8e8e8" font-size="12">쿼리 3: 2위에 관련  → 1/2 = 0.500</text>

  <line x1="476" y1="204" x2="814" y2="204" stroke="#333" stroke-width="1"/>
  <text x="480" y="222" fill="#888" font-size="12">MRR = (1.000 + 0.333 + 0.500) / 3</text>
  <text x="800" y="222" text-anchor="end" fill="#7777cc" font-size="14" font-weight="700">= 0.611</text>
  <text x="480" y="248" fill="#888" font-size="11">→ 첫 번째 정답이 빠를수록 MRR↑</text>
  <text x="480" y="268" fill="#7ec8e3" font-size="11">QA 시스템, 추천 단일 답변에 적합</text>
  <text x="480" y="288" fill="#888" font-size="11">관련 문서가 1개만 있을 때 효과적</text>

  <!-- Comparison table -->
  <rect x="60" y="350" width="760" height="56" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="200" y="370" text-anchor="middle" fill="#e0a020" font-size="12" font-weight="600">MAP</text>
  <text x="200" y="390" text-anchor="middle" fill="#888" font-size="11">다수의 관련 문서, 전반적 랭킹 품질</text>
  <line x1="380" y1="352" x2="380" y2="404" stroke="#333" stroke-width="1"/>
  <text x="500" y="370" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">MRR</text>
  <text x="500" y="390" text-anchor="middle" fill="#888" font-size="11">단 하나의 관련 문서, 첫 정답 속도</text>
  <line x1="620" y1="352" x2="620" y2="404" stroke="#333" stroke-width="1"/>
  <text x="750" y="370" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="600">NDCG</text>
  <text x="750" y="390" text-anchor="middle" fill="#888" font-size="11">등급별 관련도, 순위 가중치 세밀 조정</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
