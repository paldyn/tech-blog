<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">방화벽 DMZ 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">외부망 / DMZ / 내부망 3구간 분리 설계</text>

  <defs>
    <marker id="zArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c44a"/>
    </marker>
    <marker id="zArrR" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#e8c44a"/>
    </marker>
    <marker id="zBlock" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 외부망 -->
  <rect x="60" y="120" width="140" height="120" rx="8" fill="#2a1a0a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="130" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">외부망</text>
  <text x="130" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인터넷 사용자</text>
  <text x="130" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">외부 공격자</text>
  <text x="130" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파트너사</text>

  <!-- 외부 방화벽 -->
  <rect x="235" y="132" width="80" height="96" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="275" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">외부</text>
  <text x="275" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">FW</text>

  <!-- DMZ -->
  <rect x="340" y="100" width="200" height="160" rx="8" fill="#1a1500" stroke="#e8c44a" stroke-width="2"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c44a">DMZ</text>

  <rect x="360" y="140" width="160" height="36" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">웹 서버 / API GW</text>

  <rect x="360" y="186" width="160" height="36" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">메일 서버 / DNS</text>

  <!-- 내부 방화벽 -->
  <rect x="565" y="132" width="80" height="96" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="605" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">내부</text>
  <text x="605" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">FW</text>

  <!-- 내부망 -->
  <rect x="680" y="120" width="140" height="120" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">내부망</text>
  <text x="750" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 서버</text>
  <text x="750" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부 업무 시스템</text>
  <text x="750" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">직원 PC</text>

  <!-- 화살표 -->
  <line x1="200" y1="180" x2="235" y2="180" stroke="#e8c44a" stroke-width="2" marker-end="url(#zArr)"/>
  <line x1="315" y1="180" x2="340" y2="180" stroke="#e8c44a" stroke-width="2" marker-end="url(#zArr)"/>
  <line x1="540" y1="180" x2="565" y2="180" stroke="#e8c44a" stroke-width="2" marker-end="url(#zArr)"/>
  <line x1="645" y1="180" x2="680" y2="180" stroke="#e8c44a" stroke-width="2" marker-end="url(#zArr)"/>

  <!-- 차단 표시: 외부 → 내부 직접 -->
  <line x1="200" y1="130" x2="680" y2="130" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 외부 → 내부 직접 접근 차단</text>

  <!-- 트래픽 흐름 -->
  <rect x="60" y="295" width="760" height="68" rx="8" fill="#111"/>
  <text x="440" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">허용/차단 흐름</text>
  <text x="220" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">외부 → DMZ (80/443): ✓ 허용</text>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">외부 → 내부망 직접: ✗ 차단</text>
  <text x="680" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">DMZ → 내부 DB (3306): ✓ 허용</text>
  <text x="220" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">내부 → 외부 (임의): ✗ 제한적 허용</text>
  <text x="680" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">내부 → DMZ: ✓ 허용</text>
</svg>
