<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">페이지 분할 (Page Split) — 무작위 삽입 문제</text>

  <!-- Before split -->
  <text x="200" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">삽입 전 (가득 찬 페이지)</text>

  <rect x="60" y="100" width="280" height="56" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">10 | 20 | 30 | 40 | 50</text>
  <text x="200" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">페이지 꽉 참 (capacity 5)</text>

  <!-- Arrow: insert 25 (random) -->
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">INSERT id=25 (무작위)</text>
  <line x1="340" y1="128" x2="500" y2="128" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- After split -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">분할 후 (2개 페이지)</text>

  <rect x="500" y="100" width="165" height="56" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="582" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">10 | 20 | 25</text>
  <text x="582" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">50% 채워짐</text>

  <rect x="680" y="100" width="165" height="56" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="762" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">30 | 40 | 50</text>
  <text x="762" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">50% 채워짐</text>

  <!-- Split cost annotation -->
  <rect x="60" y="192" width="760" height="80" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">페이지 분할 비용</text>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">① 새 페이지 할당 · ② 기존 페이지 절반 이동 · ③ 부모 노드 업데이트</text>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">④ 연결 리스트 포인터 갱신 · ⑤ undo/redo 로그 기록</text>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">→ I/O 집약적, 인덱스 단편화(fragmentation) 증가</text>

  <!-- Comparison: sequential insert -->
  <text x="200" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">순차 삽입 — 분할 없음</text>

  <rect x="60" y="334" width="165" height="56" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="142" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">10 | 20 | 30</text>
  <text x="142" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순서대로 채움</text>

  <line x1="225" y1="362" x2="243" y2="362" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="243" y="334" width="165" height="56" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="325" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">40 | 50</text>
  <text x="325" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">새 페이지, 끝에 추가</text>

  <text x="660" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">페이지 분할 없음 → 단편화 최소 → 삽입 성능 유지</text>
</svg>
