<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커밋 작성자(author) 수정 방법</text>

  <!-- Method 1: amend -->
  <rect x="60" y="75" width="370" height="155" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">방법 1 — amend (마지막 커밋만)</text>
  <rect x="76" y="108" width="338" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 작성자 변경</text>
  <text x="92" y="151" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">git commit --amend</text>
  <text x="92" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  --author=</text>
  <text x="183" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"Name &lt;email&gt;"</text>
  <text x="92" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  --no-edit</text>

  <!-- Method 2: rebase -i -->
  <rect x="460" y="75" width="370" height="155" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="645" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">방법 2 — rebase -i (여러 커밋)</text>
  <rect x="476" y="108" width="338" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">git rebase -i HEAD~3</text>
  <text x="492" y="151" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># pick → edit 로 변경 후</text>
  <text x="492" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">git commit --amend</text>
  <text x="492" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  --author=</text>
  <text x="583" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"Name &lt;e&gt;" --no-edit</text>

  <!-- Method 3: filter-repo -->
  <rect x="60" y="258" width="760" height="130" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">방법 3 — filter-repo (전체 히스토리 일괄 교체)</text>
  <rect x="76" y="290" width="728" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># mailmap 파일 생성: 새이름 &lt;새이메일&gt; &lt;이전이메일&gt;</text>
  <text x="92" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">echo </text>
  <text x="126" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"New Name &lt;new@ex.com&gt; &lt;old@ex.com&gt;"</text>
  <text x="458" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> &gt; .mailmap</text>
  <text x="92" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">git filter-repo </text>
  <text x="214" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--use-mailmap</text>
  <text x="340" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600"> --force</text>
</svg>
