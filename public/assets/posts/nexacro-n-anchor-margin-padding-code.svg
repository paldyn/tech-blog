<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Anchor·Margin·Padding 코드 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">실전 레이아웃 xfdl 선언</text>

  <!-- Left: full-width fill -->
  <text x="70" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">전체 영역 채우기 패턴</text>
  <rect x="60" y="108" width="360" height="192" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- Grid가 남은 영역 모두 채움 --&gt;</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Div id=<tspan fill="#ce9178">"divBtn"</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  left=<tspan fill="#b5cea8">"0"</tspan> top=<tspan fill="#b5cea8">"0"</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  right=<tspan fill="#b5cea8">"0"</tspan> height=<tspan fill="#b5cea8">"40"</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  anchors=<tspan fill="#ce9178">"left right"</tspan>/&gt;</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Grid id=<tspan fill="#ce9178">"grdMain"</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  left=<tspan fill="#b5cea8">"0"</tspan> top=<tspan fill="#b5cea8">"40"</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  right=<tspan fill="#b5cea8">"0"</tspan> bottom=<tspan fill="#b5cea8">"0"</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  anchors=<tspan fill="#ce9178">"left right top bottom"</tspan>/&gt;</text>

  <!-- Right: margin/padding usage -->
  <text x="470" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">margin · padding 활용</text>
  <rect x="460" y="108" width="360" height="192" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- margin: 상 우 하 좌 --&gt;</text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Button id=<tspan fill="#ce9178">"btnSave"</tspan></text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  right=<tspan fill="#b5cea8">"10"</tspan> bottom=<tspan fill="#b5cea8">"10"</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  anchors=<tspan fill="#ce9178">"right bottom"</tspan></text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  margin=<tspan fill="#ce9178">"4 8 4 8"</tspan>/&gt;</text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- padding은 Div/Form에 적용 --&gt;</text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Div id=<tspan fill="#ce9178">"divCard"</tspan></text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  padding=<tspan fill="#ce9178">"16 16 16 16"</tspan></text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  style=<tspan fill="#ce9178">"background:#1a1a2e;"</tspan>/&gt;</text>

  <!-- Bottom: runtime anchor change -->
  <text x="70" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">런타임에서 위치·크기 동적 변경</text>
  <rect x="60" y="336" width="760" height="70" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 스크립트로 위치와 크기 동적 조정</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">this.grdMain.<tspan fill="#55c555">move</tspan>(<tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">80</tspan>);              <tspan fill="#6a8aa0">// left, top 변경</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">this.grdMain.<tspan fill="#55c555">resize</tspan>(<tspan fill="#b5cea8">1720</tspan>, <tspan fill="#b5cea8">940</tspan>);     <tspan fill="#6a8aa0">// width, height 변경</tspan></text>

  <!-- Footer -->
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
