<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a040"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MERGE 문 처리 흐름</text>

  <!-- Source / Target boxes -->
  <rect x="60" y="70" width="230" height="54" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">SOURCE 테이블/서브쿼리</text>
  <text x="175" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">입력 데이터 (신규·변경)</text>

  <rect x="590" y="70" width="230" height="54" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="705" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">TARGET 테이블</text>
  <text x="705" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 데이터가 저장되는 테이블</text>

  <!-- Merge condition -->
  <line x1="290" y1="97" x2="370" y2="97" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="590" y1="97" x2="510" y2="97" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="370" y="70" width="140" height="54" rx="8" fill="#1a1a0a" stroke="#e0a040" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a040" text-anchor="middle">ON 조건</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">키 일치 여부 판단</text>

  <!-- Match check -->
  <line x1="440" y1="124" x2="440" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="440,156 520,185 440,214 360,185" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">일치?</text>

  <!-- MATCHED path -->
  <line x1="520" y1="185" x2="580" y2="185" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="550" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">YES</text>
  <rect x="582" y="160" width="238" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="701" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">WHEN MATCHED</text>
  <text x="701" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ UPDATE 또는 DELETE</text>

  <!-- NOT MATCHED BY TARGET path -->
  <line x1="360" y1="185" x2="290" y2="185" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="325" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">NO</text>
  <rect x="60" y="160" width="228" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="174" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">NOT MATCHED BY TARGET</text>
  <text x="174" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ INSERT (신규 행)</text>

  <!-- NOT MATCHED BY SOURCE path -->
  <line x1="440" y1="214" x2="440" y2="244" stroke="#e0a040" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="300" y="246" width="280" height="50" rx="6" fill="#1a1a0a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a040" text-anchor="middle">NOT MATCHED BY SOURCE</text>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ DELETE (TARGET에만 있는 행)</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="178" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 완전한 MERGE 예시 (재고 동기화)</text>
  <text xml:space="preserve" x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">MERGE INTO</tspan><tspan fill="#ffffff"> inventory </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan><tspan fill="#ffffff"> tgt</tspan></text>
  <text xml:space="preserve" x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">USING</tspan><tspan fill="#ffffff"> daily_update </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan><tspan fill="#ffffff"> src</tspan></text>
  <text xml:space="preserve" x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> (tgt.product_id = src.product_id)</tspan></text>
  <text xml:space="preserve" x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">WHEN MATCHED AND</tspan><tspan fill="#ffffff"> src.qty != tgt.qty </tspan><tspan fill="#7ec8e3" font-weight="600">THEN</tspan></text>
  <text xml:space="preserve" x="80" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">UPDATE SET</tspan><tspan fill="#ffffff"> tgt.qty = src.qty, tgt.updated_at = GETDATE()</tspan></text>
  <text xml:space="preserve" x="80" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">WHEN NOT MATCHED BY TARGET THEN</tspan></text>
  <text xml:space="preserve" x="80" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">INSERT</tspan><tspan fill="#ffffff"> (product_id, qty) </tspan><tspan fill="#7ec8e3" font-weight="600">VALUES</tspan><tspan fill="#ffffff"> (src.product_id, src.qty)</tspan></text>
  <text xml:space="preserve" x="80" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">OUTPUT</tspan><tspan fill="#ffffff"> $action, inserted.product_id, deleted.qty; </tspan><tspan fill="#9aa4b8">-- 변경 추적</tspan></text>
</svg>
