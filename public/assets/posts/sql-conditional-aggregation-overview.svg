<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">조건부 집계 — CASE WHEN + 집계함수</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">FILTER 절과 비교 · 크로스탭 패턴</text>

  <!-- Left: CASE WHEN approach -->
  <rect x="50" y="104" width="360" height="48" fill="#131820" rx="8" stroke="#1e2433"/>
  <text x="230" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">CASE WHEN 방식</text>
  <text x="230" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모든 RDBMS 지원</text>

  <!-- Code block left -->
  <rect x="50" y="164" width="360" height="198" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="66" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  dept,</text>
  <text x="66" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">COUNT</tspan>(*) total,</text>
  <text x="66" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> gender=<tspan fill="#ce9178">'M'</tspan></text>
  <text x="66" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       <tspan fill="#7ec8e3">THEN</tspan> salary <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#b5cea8">0</tspan> <tspan fill="#7ec8e3">END</tspan>) m_sal,</text>
  <text x="66" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">AVG</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> grade=<tspan fill="#ce9178">'A'</tspan></text>
  <text x="66" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       <tspan fill="#7ec8e3">THEN</tspan> score <tspan fill="#7ec8e3">END</tspan>) a_avg</text>
  <text x="66" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="66" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  employees</text>
  <text x="66" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">GROUP BY</text>
  <text x="66" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">         dept;</text>

  <!-- Right: FILTER approach -->
  <rect x="470" y="104" width="360" height="48" fill="#131820" rx="8" stroke="#1e2433"/>
  <text x="650" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">FILTER 절 방식 (SQL:2003+)</text>
  <text x="650" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PostgreSQL, DuckDB, SQLite 3.30+</text>

  <!-- Code block right -->
  <rect x="470" y="164" width="360" height="198" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="486" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="486" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  dept,</text>
  <text x="486" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">COUNT</tspan>(*) total,</text>
  <text x="486" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">SUM</tspan>(salary)</text>
  <text x="486" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">    FILTER (<tspan fill="#7ec8e3">WHERE</tspan> gender=<tspan fill="#ce9178">'M'</tspan>) m_sal,</text>
  <text x="486" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">AVG</tspan>(score)</text>
  <text x="486" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">    FILTER (<tspan fill="#7ec8e3">WHERE</tspan> grade=<tspan fill="#ce9178">'A'</tspan>) a_avg</text>
  <text x="486" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="486" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  employees</text>
  <text x="486" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">GROUP BY</text>
  <text x="486" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">         dept;</text>

  <!-- Arrow between -->
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888" text-anchor="middle">vs</text>

  <!-- Bottom: crosstab pattern -->
  <rect x="50" y="384" width="780" height="112" fill="#131820" rx="8" stroke="#1e2433"/>
  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">크로스탭 패턴 — 행을 열로 펼치기</text>
  <text x="60" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="60" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  dept,</text>
  <text x="60" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> yr=<tspan fill="#b5cea8">2023</tspan> <tspan fill="#7ec8e3">THEN</tspan> sales <tspan fill="#7ec8e3">END</tspan>) y2023,   <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> yr=<tspan fill="#b5cea8">2024</tspan> <tspan fill="#7ec8e3">THEN</tspan> sales <tspan fill="#7ec8e3">END</tspan>) y2024,   <tspan fill="#7ec8e3">SUM</tspan>(<tspan fill="#7ec8e3">CASE WHEN</tspan> yr=<tspan fill="#b5cea8">2025</tspan> <tspan fill="#7ec8e3">THEN</tspan> sales <tspan fill="#7ec8e3">END</tspan>) y2025</text>
  <text x="60" y="478" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="60" y="478" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      sales_data <tspan fill="#7ec8e3">GROUP BY</tspan> dept;</text>
</svg>
