<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="wl1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">WebSocket.Listener — 이벤트가 콜백으로 들어온다</text>

  <rect x="60" y="110" width="240" height="150" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="148" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">WebSocket 연결</text>
  <text x="180" y="178" font-size="12" fill="#888" text-anchor="middle">메시지가 도착할 때마다</text>
  <text x="180" y="200" font-size="12" fill="#888" text-anchor="middle">Listener의 메서드를</text>
  <text x="180" y="222" font-size="12" fill="#888" text-anchor="middle">자동으로 호출</text>

  <rect x="500" y="80" width="320" height="44" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="108" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">onOpen — 연결이 열림</text>

  <rect x="500" y="138" width="320" height="44" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="166" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">onText — 메시지 수신</text>

  <rect x="500" y="196" width="320" height="44" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="224" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">onError — 오류 발생</text>

  <rect x="500" y="254" width="320" height="44" rx="8" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="282" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">onClose — 연결 종료</text>

  <line x1="302" y1="170" x2="498" y2="102" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#wl1)"/>
  <line x1="302" y1="180" x2="498" y2="160" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#wl1)"/>
  <line x1="302" y1="200" x2="498" y2="218" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#wl1)"/>
  <line x1="302" y1="220" x2="498" y2="276" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#wl1)"/>
</svg>
