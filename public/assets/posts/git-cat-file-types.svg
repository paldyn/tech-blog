<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git cat-file: 오브젝트 타입별 출력</text>

  <defs>
    <marker id="arr7" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- blob -->
  <rect x="60" y="75" width="160" height="60" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">blob</text>
  <text x="140" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 내용</text>

  <!-- tree -->
  <rect x="60" y="155" width="160" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="140" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">tree</text>
  <text x="140" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디렉터리 목록</text>

  <!-- commit -->
  <rect x="60" y="235" width="160" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="140" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">commit</text>
  <text x="140" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커밋 메타데이터</text>

  <!-- tag -->
  <rect x="60" y="315" width="160" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">tag</text>
  <text x="140" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">annotated 태그</text>

  <!-- Arrows -->
  <line x1="220" y1="105" x2="280" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>
  <line x1="220" y1="185" x2="280" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>
  <line x1="220" y1="265" x2="280" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>
  <line x1="220" y1="345" x2="280" y2="345" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>

  <!-- Code box -->
  <rect x="280" y="70" width="560" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="300" y="97" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># blob: 파일 원본 내용 출력</text>
  <text xml:space="preserve" x="300" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="397" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -p HEAD:README.md</text>

  <text xml:space="preserve" x="300" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># tree: 디렉터리 엔트리 목록</text>
  <text xml:space="preserve" x="300" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="397" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -p HEAD^{tree}</text>
  <text xml:space="preserve" x="300" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">100644</text><text xml:space="preserve" x="356" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> blob abc123  README.md</text>
  <text xml:space="preserve" x="300" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">040000</text><text xml:space="preserve" x="356" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> tree def456  src</text>

  <text xml:space="preserve" x="300" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># commit: 커밋 내용 출력</text>
  <text xml:space="preserve" x="300" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="397" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -p HEAD</text>
  <text xml:space="preserve" x="300" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">tree</text><text xml:space="preserve" x="342" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 9d8a3e... | </text><text xml:space="preserve" x="468" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">parent</text><text xml:space="preserve" x="524" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 4f2b1a...</text>
  <text xml:space="preserve" x="300" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">author</text><text xml:space="preserve" x="356" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Alice &lt;a@b.com&gt; 1716868800 +0900</text>

  <text xml:space="preserve" x="300" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 타입·크기만 확인</text>
  <text xml:space="preserve" x="300" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="397" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -t HEAD   </text><text xml:space="preserve" x="510" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># commit</text>
  <text xml:space="preserve" x="300" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git cat-file</text><text xml:space="preserve" x="397" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -s HEAD   </text><text xml:space="preserve" x="510" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 250 (바이트)</text>

  <!-- Bottom note -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">-p (pretty-print) | -t (type) | -s (size) | --batch (stdin에서 여러 SHA 처리)</text>
</svg>
