<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Flyway vs Liquibase — 핵심 비교</text>

  <!-- Flyway 열 -->
  <rect x="60" y="70" width="360" height="50" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">Flyway</text>

  <!-- Liquibase 열 -->
  <rect x="460" y="70" width="360" height="50" rx="8" fill="#1a2030" stroke="#ce9178" stroke-width="2"/>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#ce9178" text-anchor="middle">Liquibase</text>

  <!-- 구분선 -->
  <line x1="440" y1="80" x2="440" y2="480" stroke="#2a3040" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 행 1: 마이그레이션 형식 -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">마이그레이션 형식</text>
  <rect x="60" y="165" width="360" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">V{버전}__{설명}.sql</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SQL 스크립트 파일 전용</text>

  <text x="460" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">마이그레이션 형식</text>
  <rect x="460" y="165" width="360" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">changelog.xml / .yaml / .sql</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">XML·YAML·JSON·SQL 모두 지원</text>

  <!-- 행 2: 히스토리 테이블 -->
  <text x="60" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
