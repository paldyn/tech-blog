  <rect x="460" y="239" width="360" height="32" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">DATABASECHANGELOG</text>

  <!-- 행 3: 롤백 -->
  <text x="60" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
