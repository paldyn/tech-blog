  <text x="80" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Spring Boot 프로젝트 표준 선택</text>

  <rect x="460" y="420" width="360" height="56" rx="6" fill="#1a2030" stroke="#ce9178" stroke-width="1"/>
  <text x="480" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
