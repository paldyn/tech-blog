  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&lt;rollback&gt; 절에 역방향 SQL 기술</text>

  <!-- 행 4: 조건부 실행 -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
