  <text x="480" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복잡한 조건부 마이그레이션 필요</text>
  <text x="480" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">롤백 자동화 요구사항 있을 때</text>
</svg>
