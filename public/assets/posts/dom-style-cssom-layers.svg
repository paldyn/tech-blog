<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSSOM 레이어 구조와 스타일 우선순위</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">인라인 style → CSSStyleSheet → getComputedStyle</text>

  <!-- Layer 1: element.style (inline) -->
  <rect x="60" y="96" width="760" height="64" rx="8" fill="#0d1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">element.style</text>
  <text x="100" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인라인 스타일만 반영. 시트·상속·초기값 제외. 쓰기 즉시 반영.</text>
  <text x="740" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="end">우선순위 최고</text>

  <!-- Arrow down -->
  <line x1="440" y1="160" x2="440" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,188 434,178 446,178" fill="#444"/>

  <!-- Layer 2: CSSStyleSheet / document.styleSheets -->
  <rect x="60" y="190" width="760" height="64" rx="8" fill="#0a0d1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">document.styleSheets[n].cssRules</text>
  <text x="100" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">외부/내부 CSS 규칙 접근. CSSStyleRule.style로 개별 프로퍼티 수정.</text>
  <text x="740" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="end">시트 선언 반영</text>

  <!-- Arrow down -->
  <line x1="440" y1="254" x2="440" y2="274" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,282 434,272 446,272" fill="#444"/>

  <!-- Layer 3: getComputedStyle -->
  <rect x="60" y="284" width="760" height="64" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">getComputedStyle(el)</text>
  <text x="100" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">계단식 결합 최종값. 읽기 전용. 항상 절댓값(px, rgb...). 강제 리플로우 가능.</text>
  <text x="740" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="end">최종 계산값</text>

  <!-- CSS Custom Properties -->
  <rect x="60" y="372" width="370" height="72" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">CSS 커스텀 프로퍼티 (변수)</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">el.style.setProperty('--color', '#f00')</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">getComputedStyle(el).getPropertyValue('--color')</text>

  <!-- CSSStyleDeclaration methods -->
  <rect x="450" y="372" width="370" height="72" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">CSSStyleDeclaration 주요 메서드</text>
  <text x="470" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.setProperty(prop, val, priority?)</text>
  <text x="470" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.getPropertyValue(prop)  .removeProperty(prop)</text>
</svg>
