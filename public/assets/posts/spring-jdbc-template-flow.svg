<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 510">
  <rect width="880" height="510" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JdbcTemplate 처리 흐름</text>

  <!-- ── Step 1: 개발자 코드 ── -->
  <rect x="70" y="76" width="340" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="102"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">개발자 코드</text>
  <text x="90" y="122"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">jdbcTemplate.query(sql, mapper, args)</text>

  <!-- Right label 1 -->
  <text x="470" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">파라미터만 전달</text>
  <text x="470" y="118"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">자원 관리는 JdbcTemplate이 담당</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="136" x2="240" y2="154" stroke="#444" stroke-width="2"/>
  <polygon points="240,160 233,150 247,150" fill="#444"/>

  <!-- ── Step 2: JdbcTemplate ── -->
  <rect x="70" y="160" width="340" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="186"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">JdbcTemplate</text>
  <text x="90" y="206"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">DataSource에서 Connection 획득 요청</text>

  <!-- Right label 2 -->
  <text x="470" y="183"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">핵심 템플릿 메서드</text>
  <text x="470" y="201"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">try-finally로 예외 발생 시에도 자원 해제</text>

  <!-- Arrow 2 -->
  <line x1="240" y1="220" x2="240" y2="238" stroke="#444" stroke-width="2"/>
  <polygon points="240,244 233,234 247,234" fill="#444"/>

  <!-- ── Step 3: DataSource ── -->
  <rect x="70" y="244" width="340" height="60" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="270"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">DataSource / 커넥션 풀</text>
  <text x="90" y="290"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">실제 DB Connection 대여</text>

  <!-- Right label 3 -->
  <text x="470" y="267"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">HikariCP 기본 채택</text>
  <text x="470" y="285"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">트랜잭션 중이면 동일 Connection 재사용</text>

  <!-- Arrow 3 -->
  <line x1="240" y1="304" x2="240" y2="322" stroke="#444" stroke-width="2"/>
  <polygon points="240,328 233,318 247,318" fill="#444"/>

  <!-- ── Step 4: PreparedStatement ── -->
  <rect x="70" y="328" width="340" height="60" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="354"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">PreparedStatement</text>
  <text x="90" y="374"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">파라미터 바인딩 &amp; SQL 실행</text>

  <!-- Right label 4 -->
  <text x="470" y="351"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">? 플레이스홀더 사용</text>
  <text x="470" y="369"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">SQL Injection 자동 방어</text>

  <!-- Arrow 4 -->
  <line x1="240" y1="388" x2="240" y2="406" stroke="#444" stroke-width="2"/>
  <polygon points="240,412 233,402 247,402" fill="#444"/>

  <!-- ── Step 5: ResultSet + RowMapper ── -->
  <rect x="70" y="412" width="340" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="438"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">ResultSet → RowMapper</text>
  <text x="90" y="458"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">행 매핑 완료 → Connection 자동 반납</text>

  <!-- Right label 5 -->
  <text x="470" y="435"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">람다 RowMapper 권장</text>
  <text x="470" y="453"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">BeanPropertyRowMapper로 자동 매핑 가능</text>

  <!-- Vertical label for left column -->
  <text x="240" y="492"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555" text-anchor="middle">Connection · Statement · ResultSet 모두 finally 블록에서 자동 닫힘</text>
</svg>
