<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Few-shot 예시 설계 원칙</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">좋은 예시의 조건과 선택 전략</text>

  <!-- Good examples -->
  <rect x="60" y="90" width="360" height="256" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">좋은 예시의 조건</text>
  <line x1="76" y1="128" x2="404" y2="128" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 다양성: 여러 패턴을 커버</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 대표성: 실제 입력과 분포 유사</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 명확성: 입력-출력 관계 명확</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 정확성: 오답 예시 포함 금지</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 순서: 유사한 예시 먼저 배치</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">★ 예시 위치: 실제 질문 직전에 배치</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">  (너무 앞쪽 예시는 효과 감소)</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">참고: Brown et al. (2020) GPT-3 논문</text>

  <!-- Bad examples warning -->
  <rect x="460" y="90" width="360" height="256" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">주의해야 할 예시 패턴</text>
  <line x1="476" y1="128" x2="804" y2="128" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">✗ 동질한 예시 반복 (편향 유발)</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  긍정 3개, 부정 0개 → 긍정 편향</text>
  <text x="480" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">✗ 너무 긴 예시 (토큰 낭비)</text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  예시 자체가 500토큰 이상</text>
  <text x="480" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">✗ 실제 입력과 동떨어진 예시</text>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  도메인이 완전히 다른 예시</text>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">✗ 레이블 오류 포함 예시</text>
  <text x="480" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  잘못된 정답이 학습 방향 오염</text>

  <!-- Bottom -->
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">예시 4~8개가 대부분의 태스크에서 최적 — 그 이상은 컨텍스트 낭비 가능</text>
</svg>
