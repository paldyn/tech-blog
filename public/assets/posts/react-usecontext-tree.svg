<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-ctx" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-ctx2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Context — Provider에서 Consumer까지</text>

  <!-- Provider box (top) -->
  <rect x="300" y="68" width="280" height="56" rx="8" fill="#1a0a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">ThemeContext.Provider</text>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">value={{ theme: 'dark', toggle }}</text>

  <!-- Arrow down to Layout -->
  <line x1="440" y1="126" x2="440" y2="152" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-ctx)"/>

  <!-- Layout box -->
  <rect x="310" y="156" width="260" height="46" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Layout (중간 계층)</text>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">props 전달 없음 — context 무관통</text>

  <!-- Arrow down to two consumers -->
  <line x1="360" y1="204" x2="240" y2="244" stroke="#444" stroke-width="1.5" marker-end="url(#arr-ctx2)"/>
  <line x1="520" y1="204" x2="640" y2="244" stroke="#444" stroke-width="1.5" marker-end="url(#arr-ctx2)"/>

  <!-- Consumer 1 -->
  <rect x="100" y="248" width="280" height="56" rx="6" fill="#0a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Header</text>
  <text x="240" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">useContext(ThemeContext) ✓</text>

  <!-- Consumer 2 -->
  <rect x="500" y="248" width="280" height="56" rx="6" fill="#0a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ThemeButton</text>
  <text x="640" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">useContext(ThemeContext) ✓</text>

  <!-- Summary box -->
  <rect x="60" y="334" width="760" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">
    <tspan font-weight="600" fill="#e8e8e8">Context 원리:</tspan>
    <tspan> Provider가 값을 제공 → 하위 어디서든 useContext로 직접 구독</tspan>
  </text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">중간 컴포넌트가 props를 전달할 필요 없음 — Prop Drilling 해결</text>
</svg>
