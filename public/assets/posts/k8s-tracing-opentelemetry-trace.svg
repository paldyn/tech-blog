<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">하나의 요청, 하나의 트레이스, 여러 스팬</text>

  <!-- request path -->
  <rect x="60" y="90" width="150" height="56" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Gateway</text>
  <text x="135" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 진입</text>

  <line x1="210" y1="118" x2="280" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="90" width="150" height="56" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="355" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Order</text>
  <text x="355" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">주문 처리</text>

  <line x1="430" y1="118" x2="500" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="90" width="150" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="575" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Payment</text>
  <text x="575" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결제 승인</text>

  <line x1="650" y1="118" x2="720" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="720" y="90" width="100" height="56" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="770" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">DB</text>
  <text x="770" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿼리</text>

  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 구간이 같은 trace_id를 공유하고, 호출마다 부모-자식 span이 생긴다</text>

  <!-- waterfall -->
  <text x="70" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">스팬 워터폴 (트레이싱 UI에서 보는 모습)</text>

  <line x1="200" y1="240" x2="200" y2="430" stroke="#1e2433" stroke-width="1"/>
  <line x1="820" y1="240" x2="820" y2="430" stroke="#1e2433" stroke-width="1"/>
  <text x="200" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0ms</text>
  <text x="820" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">320ms</text>

  <text x="186" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="end">gateway</text>
  <rect x="200" y="252" width="620" height="24" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">320ms</text>

  <text x="186" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">order</text>
  <rect x="240" y="294" width="540" height="24" rx="4" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">285ms</text>

  <text x="186" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="end">payment</text>
  <rect x="290" y="336" width="430" height="24" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="505" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">230ms ← 병목!</text>

  <text x="186" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="end">db query</text>
  <rect x="320" y="378" width="120" height="24" rx="4" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="380" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">60ms</text>

  <!-- bottom -->
  <rect x="60" y="466" width="760" height="40" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="491" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메트릭은 "느리다"를, 로그는 "에러 메시지"를, 트레이스는 "어느 구간에서 왜"를 알려준다</text>
</svg>
