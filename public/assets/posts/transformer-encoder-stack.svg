<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Encoder 스택과 문맥 표현</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">레이어가 깊어질수록 더 추상적인 문맥 정보가 쌓인다</text>

  <!-- Input embedding layer -->
  <rect x="50" y="96" width="240" height="38" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Input Embedding + PE</text>

  <!-- Arrow -->
  <line x1="170" y1="134" x2="170" y2="150" stroke="#444" stroke-width="2"/>
  <polygon points="163,150 170,162 177,150" fill="#444"/>

  <!-- Encoder layer 1 -->
  <rect x="50" y="162" width="240" height="58" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Encoder Layer 1</text>
  <text x="170" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">표층 특징: 품사, 어휘 관계</text>
  <line x1="170" y1="220" x2="170" y2="236" stroke="#444" stroke-width="2"/>
  <polygon points="163,236 170,248 177,236" fill="#444"/>

  <!-- Encoder layer 2 -->
  <rect x="50" y="248" width="240" height="58" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1.5" opacity="0.85"/>
  <text x="170" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Encoder Layer 2</text>
  <text x="170" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문법 구조, 구(phrase) 관계</text>
  <line x1="170" y1="306" x2="170" y2="322" stroke="#444" stroke-width="2"/>
  <polygon points="163,322 170,334 177,322" fill="#444"/>

  <!-- Ellipsis -->
  <text x="170" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#555" text-anchor="middle">· · ·  N layers  · · ·</text>
  <line x1="170" y1="368" x2="170" y2="384" stroke="#444" stroke-width="2"/>
  <polygon points="163,384 170,396 177,384" fill="#444"/>

  <!-- Encoder layer N -->
  <rect x="50" y="396" width="240" height="58" fill="#1a1f35" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Encoder Layer N</text>
  <text x="170" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">의미·담화·장거리 의존 관계</text>

  <!-- Output arrow -->
  <line x1="290" y1="425" x2="328" y2="425" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="328,418 344,425 328,432" fill="#55c555"/>

  <!-- Output box -->
  <rect x="344" y="406" width="200" height="40" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="444" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">문맥 표현 (seq_len × d_model)</text>

  <!-- Right panel: code -->
  <rect x="560" y="96" width="270" height="350" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="576" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 단일 Encoder 레이어</text>
  <text x="576" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class </text>
  <text x="618" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">EncoderLayer(nn.Module):</text>
  <text x="576" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  def </tspan><tspan fill="#e8e8e8">__init__(self, d, h, d_ff):</tspan></text>
  
  <text x="576" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    super().__init__()</text>
  <text x="576" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.attn = MultiHeadAttn(d, h)</text>
  <text x="576" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.ff   = FFN(d, d_ff)</text>
  <text x="576" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.norm1 = nn.LayerNorm(d)</text>
  <text x="576" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.norm2 = nn.LayerNorm(d)</text>
  <text x="576" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  </text>
  <text x="576" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  def </tspan><tspan fill="#e8e8e8">forward(self, x, mask):</tspan></text>
  
  <text x="576" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # ① MHA + Add &amp; Norm</text>
  <text x="576" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x = self.norm1(</text>
  <text x="576" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        x + self.attn(x, x, x, mask))</text>
  <text x="576" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # ② FFN + Add &amp; Norm</text>
  <text x="576" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x = self.norm2(x + self.ff(x))</text>
  <text x="576" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#e8e8e8">x</tspan></text>
  
</svg>
