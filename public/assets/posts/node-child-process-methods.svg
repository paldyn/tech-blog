<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">child_process 4가지 API 비교</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">spawn · exec · execFile · fork — 용도에 따라 선택</text>

  <!-- spawn -->
  <rect x="60" y="92" width="180" height="120" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="118" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">spawn()</text>
  <text x="150" y="140" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">스트리밍 I/O</text>
  <text x="150" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">셸 없이 직접 실행</text>
  <text x="150" y="176" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">대용량 출력에 적합</text>
  <text x="150" y="200" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">stdout/stderr: Stream</text>

  <!-- exec -->
  <rect x="260" y="92" width="180" height="120" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="350" y="118" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">exec()</text>
  <text x="350" y="140" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">버퍼링 후 콜백</text>
  <text x="350" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">셸(/bin/sh) 사용</text>
  <text x="350" y="176" text-anchor="middle" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">주입 위험 — 주의</text>
  <text x="350" y="200" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">stdout/stderr: Buffer</text>

  <!-- execFile -->
  <rect x="460" y="92" width="180" height="120" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="550" y="118" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">execFile()</text>
  <text x="550" y="140" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">버퍼링 후 콜백</text>
  <text x="550" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">셸 없이 직접 실행</text>
  <text x="550" y="176" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">exec보다 안전</text>
  <text x="550" y="200" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">stdout/stderr: Buffer</text>

  <!-- fork -->
  <rect x="660" y="92" width="160" height="120" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="2"/>
  <text x="740" y="118" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">fork()</text>
  <text x="740" y="140" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Node.js 전용</text>
  <text x="740" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">IPC 채널 자동 생성</text>
  <text x="740" y="176" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">process.send()</text>
  <text x="740" y="200" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">cluster 내부 사용</text>

  <!-- Sync variants label -->
  <text x="440" y="240" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">동기 변형: spawnSync · execSync · execFileSync (이벤트 루프 블로킹 — 스크립트/CLI 전용)</text>

  <!-- Promise util row -->
  <rect x="200" y="260" width="480" height="70" rx="8" fill="#111218" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="286" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">util.promisify / exec Promise</text>
  <text x="440" y="308" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">import { exec } from 'child_process/promises'</text>
  <text x="440" y="322" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">const { stdout } = await exec('git log --oneline -5');</text>

  <!-- Use case arrows -->
  <text x="150" y="360" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">ffmpeg, git</text>
  <text x="350" y="360" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">셸 파이프라인</text>
  <text x="550" y="360" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">외부 바이너리</text>
  <text x="740" y="360" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Node.js 모듈</text>

  <text x="150" y="378" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">대용량 출력</text>
  <text x="350" y="378" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">리다이렉션 사용 시</text>
  <text x="550" y="378" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">인수 배열 권장</text>
  <text x="740" y="378" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">IPC 필요 시</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">exec()에 사용자 입력을 직접 삽입하면 셸 주입 취약점 발생 — execFile 또는 인수 배열 사용 권장</text>
</svg>
