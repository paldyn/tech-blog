<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a" rx="12">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Adapter vs LoRA vs Prefix Tuning 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">삽입 위치, 파라미터 수, 추론 오버헤드, 성능을 기준으로 비교한다</text>

  <!-- ─── Comparison Table ─── -->
  <rect x="60" y="82" width="760" height="182" rx="8" fill="#0f1117" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Header row bg -->
  <rect x="60" y="82" width="760" height="30" rx="8" fill="#131825"/>
  <line x1="60" y1="112" x2="820" y2="112" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Column separators -->
  <line x1="195" y1="82" x2="195" y2="264" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="385" y1="82" x2="385" y2="264" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="565" y1="82" x2="565" y2="264" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="710" y1="82" x2="710" y2="264" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row separators -->
  <line x1="60" y1="148" x2="820" y2="148" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="188" x2="820" y2="188" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="228" x2="820" y2="228" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Header text -->
  <text x="127" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">방법</text>
  <text x="290" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">삽입 위치</text>
  <text x="475" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">파라미터 수</text>
  <text x="637" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">추론 오버헤드</text>
  <text x="765" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">성능 (일반)</text>

  <!-- Row 1: Adapter -->
  <text x="127" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">Adapter</text>
  <text x="127" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Houlsby 2019</text>
  <text x="290" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">FFN·Attention 뒤 (직렬)</text>
  <text x="475" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">2×d×r × L (r≪d)</text>
  <text x="637" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">있음 (순차 처리)</text>
  <text x="765" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">우수 (NLU)</text>

  <!-- Row 2: LoRA -->
  <text x="127" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">LoRA</text>
  <text x="127" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Hu 2021</text>
  <text x="290" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">가중치 행렬 (병렬)</text>
  <text x="475" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">2×d×r (병합 가능)</text>
  <text x="637" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">없음 (병합 후)</text>
  <text x="765" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">최우수 (범용)</text>

  <!-- Row 3: Prefix Tuning -->
  <text x="127" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Prefix Tuning</text>
  <text x="127" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Li &amp; Liang 2021</text>
  <text x="290" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">전 레이어 KV</text>
  <text x="475" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">2×L×m×d (m=토큰 수)</text>
  <text x="637" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">있음 (시퀀스 증가)</text>
  <text x="765" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">양호 (NLG)</text>

  <!-- Row 4: Full FT -->
  <text x="127" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Full Fine-tuning</text>
  <text x="127" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(기준선)</text>
  <text x="290" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">전체 파라미터</text>
  <text x="475" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">100%</text>
  <text x="637" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">없음</text>
  <text x="765" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">최우수 (기준)</text>

  <!-- ─── Code block ─── -->
  <rect x="60" y="278" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="80" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">## HuggingFace PEFT - AdapterConfig 설정 예시 (ia3·bottleneck 등)</text>

  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> peft </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> IA3Config, TaskType, get_peft_model</tspan></text>

  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># IA³ = Infused Adapter by Inhibiting and Amplifying Inner Activations</tspan></text>
  <text x="80" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">config = IA3Config(</tspan></text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    task_type=TaskType.</tspan><tspan fill="#b5cea8">SEQ_CLS</tspan><tspan fill="#ffffff">,          </tspan><tspan fill="#9aa4b8"># 분류 태스크</tspan></text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    target_modules=[</tspan><tspan fill="#ce9178">"q"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"v"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"wo"</tspan><tspan fill="#ffffff">], </tspan><tspan fill="#9aa4b8"># 적용 레이어</tspan></text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">)</tspan></text>
</svg>
