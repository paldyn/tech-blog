<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트 계층별 특성</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="32" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">특성</text>
  <text x="360" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">단위 테스트</text>
  <text x="560" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8">통합 테스트</text>
  <text x="760" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">E2E 테스트</text>

  <!-- Data rows -->
  <!-- Row 1: 실행 속도 -->
  <rect x="60" y="96" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 속도</text>
  <text x="360" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">매우 빠름 (ms)</text>
  <text x="560" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">보통 (초)</text>
  <text x="760" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">느림 (분)</text>

  <!-- Row 2: 유지보수 비용 -->
  <rect x="60" y="128" width="760" height="32" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">유지보수 비용</text>
  <text x="360" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">낮음</text>
  <text x="560" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">중간</text>
  <text x="760" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">높음</text>

  <!-- Row 3: 격리 수준 -->
  <rect x="60" y="160" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">격리 수준</text>
  <text x="360" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">완전 격리</text>
  <text x="560" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">부분 격리 (DB/API 목킹)</text>
  <text x="760" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">없음 (실제 환경)</text>

  <!-- Row 4: 신뢰도 -->
  <rect x="60" y="192" width="760" height="32" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비즈니스 신뢰도</text>
  <text x="360" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">낮음 (구현 단위)</text>
  <text x="560" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">중간 (모듈 연동)</text>
  <text x="760" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음 (실사용 흐름)</text>

  <!-- Row 5: 적합한 대상 -->
  <rect x="60" y="224" width="760" height="32" rx="0" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적합한 대상</text>
  <text x="360" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">순수 함수 · 유틸 · 알고리즘</text>
  <text x="560" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">API 라우트 · 서비스 · 컴포넌트</text>
  <text x="760" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">핵심 사용자 흐름</text>

  <!-- Row 6: 불안정성 -->
  <rect x="60" y="256" width="760" height="32" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">플래키(flaky) 위험</text>
  <text x="360" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">매우 낮음</text>
  <text x="560" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">낮음 (목 활용 시)</text>
  <text x="760" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">높음 (타이밍 의존)</text>

  <!-- Trophy model explanation -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">트로피 모델 (Kent C. Dodds) — 프론트엔드 권장 배분</text>

  <rect x="60" y="336" width="760" height="88" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Trophy bar -->
  <rect x="80" y="356" width="44" height="52" rx="4" fill="#3a4a6e"/>
  <text x="102" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">정적 분석</text>
  <text x="102" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">ESLint/TS</text>

  <rect x="140" y="368" width="66" height="40" rx="4" fill="#0d2218"/>
  <text x="173" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">단위 테스트</text>
  <text x="173" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">~10%</text>

  <rect x="222" y="352" width="360" height="56" rx="4" fill="#141a0a"/>
  <text x="402" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8">통합 테스트 (Testing Library 등)</text>
  <text x="402" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">~60% — 가장 비중 높음</text>

  <rect x="598" y="362" width="100" height="46" rx="4" fill="#1a0d0d"/>
  <text x="648" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">E2E</text>
  <text x="648" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">~30%</text>

  <rect x="714" y="356" width="86" height="52" rx="4" fill="#1a0d0d"/>
  <text x="757" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">핵심 E2E</text>
  <text x="757" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">소수</text>
  <text x="757" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">중요 경로만</text>
</svg>
