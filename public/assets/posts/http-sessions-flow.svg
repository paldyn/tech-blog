<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#dd9955"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">세션 기반 인증 흐름</text>
    <!-- Client box -->
    <rect x="60" y="75" width="170" height="310" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="145" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">브라우저</text>
    <line x1="60" y1="110" x2="230" y2="110" stroke="#4a7aaa" stroke-width="1"/>
    <text x="145" y="135" text-anchor="middle" font-size="11" fill="#e8e8e8">① 로그인 요청</text>
    <text x="145" y="152" text-anchor="middle" font-size="10" fill="#888">POST /login</text>
    <text x="145" y="195" text-anchor="middle" font-size="11" fill="#e8e8e8">③ 쿠키 저장</text>
    <text x="145" y="212" text-anchor="middle" font-size="10" fill="#888">Set-Cookie: sid=ABC</text>
    <text x="145" y="255" text-anchor="middle" font-size="11" fill="#e8e8e8">④ 인증된 요청</text>
    <text x="145" y="272" text-anchor="middle" font-size="10" fill="#888">Cookie: sid=ABC</text>
    <text x="145" y="315" text-anchor="middle" font-size="11" fill="#e8e8e8">⑥ 응답 수신</text>
    <text x="145" y="332" text-anchor="middle" font-size="10" fill="#888">200 OK + 데이터</text>
    <!-- Server box -->
    <rect x="440" y="75" width="170" height="310" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="525" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">웹 서버</text>
    <line x1="440" y1="110" x2="610" y2="110" stroke="#3aaa5a" stroke-width="1"/>
    <text x="525" y="135" text-anchor="middle" font-size="11" fill="#e8e8e8">② 세션 생성</text>
    <text x="525" y="152" text-anchor="middle" font-size="10" fill="#888">sid=ABC → 저장소</text>
    <text x="525" y="195" text-anchor="middle" font-size="11" fill="#e8e8e8">  (응답)</text>
    <text x="525" y="212" text-anchor="middle" font-size="10" fill="#888">Set-Cookie: sid=ABC</text>
    <text x="525" y="255" text-anchor="middle" font-size="11" fill="#e8e8e8">⑤ 세션 조회</text>
    <text x="525" y="272" text-anchor="middle" font-size="10" fill="#888">저장소에서 sid=ABC 검증</text>
    <text x="525" y="315" text-anchor="middle" font-size="11" fill="#e8e8e8">  (응답)</text>
    <text x="525" y="332" text-anchor="middle" font-size="10" fill="#888">200 OK + 사용자 데이터</text>
    <!-- Session store box -->
    <rect x="680" y="155" width="160" height="80" rx="8" fill="#2a2a0f" stroke="#aaaa3a" stroke-width="1.5"/>
    <text x="760" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#dddd55">세션 저장소</text>
    <text x="760" y="196" text-anchor="middle" font-size="10" fill="#888">Redis / DB</text>
    <text x="760" y="214" text-anchor="middle" font-size="10" fill="#888">sid → user 매핑</text>
    <!-- Arrows -->
    <line x1="230" y1="143" x2="440" y2="143" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="440" y1="163" x2="230" y2="163" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <line x1="610" y1="173" x2="680" y2="185" stroke="#dddd55" stroke-width="1.5" marker-end="url(#arro)"/>
    <line x1="230" y1="263" x2="440" y2="263" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="610" y1="275" x2="680" y2="220" stroke="#dddd55" stroke-width="1.5" marker-end="url(#arro)"/>
    <line x1="440" y1="323" x2="230" y2="323" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <text x="440" y="420" text-anchor="middle" font-size="11" fill="#555">세션 고정 공격 방어: 로그인 성공 후 반드시 새 세션 ID 발급</text>
  </g>
</svg>
