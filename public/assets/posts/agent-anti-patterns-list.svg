<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에이전트 10대 안티패턴</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">실제 프로덕션에서 자주 발생하는 실수 — 증상, 원인, 해결책</text>

  <!-- Left column (1-5) -->
  <!-- AP1 -->
  <rect x="40" y="90" width="380" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">① 무한 루프 (Infinite Loop)</text>
  <text x="60" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">종료 조건 없이 에이전트가 같은 도구를 반복 호출</text>
  <text x="60" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: max_iterations + is_termination_msg + 타임아웃</text>

  <!-- AP2 -->
  <rect x="40" y="168" width="380" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">② 과도한 도구 호출 (Tool Overuse)</text>
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불필요하게 많은 도구 호출로 비용·레이턴시 급증</text>
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: 도구 설명 명확화 + 캐싱 + 결과 재사용 지시</text>

  <!-- AP3 -->
  <rect x="40" y="246" width="380" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">③ 컨텍스트 오염 (Context Pollution)</text>
  <text x="60" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도구 결과 원문이 컨텍스트를 가득 채워 퀄리티 저하</text>
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: 도구 결과 요약 + max_token 트리밍</text>

  <!-- AP4 -->
  <rect x="40" y="324" width="380" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">④ 환각 도구 호출 (Hallucinated Tool)</text>
  <text x="60" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">존재하지 않는 도구를 호출하거나 잘못된 파라미터 사용</text>
  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: JSON Schema 강제 + 파라미터 검증 + 오류 핸들링</text>

  <!-- AP5 -->
  <rect x="40" y="402" width="380" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⑤ 에이전트 없어도 되는 곳에 에이전트</text>
  <text x="60" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단순 Q&A, 고정 파이프라인에 복잡한 에이전트 사용</text>
  <text x="60" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: 에이전트 필요성 검토 (복잡도 vs 단순 RAG)</text>

  <!-- Right column (6-10) -->
  <!-- AP6 -->
  <rect x="460" y="90" width="380" height="70" rx="6" fill="#1a1a00" stroke="#e0a855" stroke-width="1.5"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">⑥ 메모리 없는 에이전트 (Amnesiac)</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대화마다 이전 컨텍스트를 기억 못해 반복 질문</text>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: Checkpointer + External Memory (mem0)</text>

  <!-- AP7 -->
  <rect x="460" y="168" width="380" height="70" rx="6" fill="#1a1a00" stroke="#e0a855" stroke-width="1.5"/>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">⑦ 모놀리식 에이전트 (God Agent)</text>
  <text x="480" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">하나의 에이전트에 모든 도구와 책임 집중 → 성능 저하</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: 역할별 분리 (멀티 에이전트 + 전문화)</text>

  <!-- AP8 -->
  <rect x="460" y="246" width="380" height="70" rx="6" fill="#1a1a00" stroke="#e0a855" stroke-width="1.5"/>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">⑧ 취약한 오류 처리 (No Error Handling)</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도구 실패 시 예외 미처리로 전체 에이전트 크래시</text>
  <text x="480" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: try/except + fallback 전략 + 재시도 로직</text>

  <!-- AP9 -->
  <rect x="460" y="324" width="380" height="70" rx="6" fill="#1a1a00" stroke="#e0a855" stroke-width="1.5"/>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">⑨ 프롬프트 인젝션 (Prompt Injection)</text>
  <text x="480" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">악의적 입력이 에이전트 행동을 조작하는 보안 취약점</text>
  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: 입력 검증 + 시스템 프롬프트 격리 + 권한 제한</text>

  <!-- AP10 -->
  <rect x="460" y="402" width="380" height="70" rx="6" fill="#1a1a00" stroke="#e0a855" stroke-width="1.5"/>
  <text x="480" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">⑩ 미검증 배포 (No Evaluation)</text>
  <text x="480" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">평가 없이 프로덕션 배포 → 회귀 감지 불가</text>
  <text x="480" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">해결: LangSmith 평가 파이프라인 + CI 자동 테스트</text>

  <!-- Bottom divider -->
  <rect x="40" y="488" width="800" height="18" rx="4" fill="#0f0f0f"/>
  <text x="440" y="501" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333">프로덕션 에이전트의 공통 장애물 — 설계 단계에서 예방하는 것이 가장 저렴한 해결책</text>
</svg>
