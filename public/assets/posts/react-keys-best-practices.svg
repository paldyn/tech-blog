<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">key 올바른 사용법</text>

  <!-- Bad: index -->
  <rect x="60" y="64" width="360" height="130" rx="10" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">❌ 인덱스 key — 언제 문제가 되나</text>
  <rect x="76" y="100" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="122" fill="#9aa4b8">// 인덱스 key는 정렬·삽입·삭제 시 버그</tspan>
    <tspan x="92" dy="18" fill="#ffffff">{items.map((item, </tspan><tspan fill="#e05555">i</tspan><tspan fill="#ffffff">) =&gt; (</tspan>
    <tspan x="92" dy="18" fill="#ce9178">  &lt;Input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">key</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#e05555">i</tspan><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3">defaultValue</tspan><tspan fill="#ffffff">={item.text} </tspan><tspan fill="#ce9178">/&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">))}</tspan>
  </text>

  <!-- Good: stable id -->
  <rect x="460" y="64" width="360" height="130" rx="10" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">✅ 안정적 ID key</text>
  <rect x="476" y="100" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="122" fill="#9aa4b8">// 데이터베이스 ID 또는 고유 식별자</tspan>
    <tspan x="492" dy="18" fill="#ffffff">{items.map(item =&gt; (</tspan>
    <tspan x="492" dy="18" fill="#ce9178">  &lt;Input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">key</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#55c555">item.id</tspan><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3">defaultValue</tspan><tspan fill="#ffffff">={item.text} </tspan><tspan fill="#ce9178">/&gt;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">))}</tspan>
  </text>

  <!-- Key reset trick -->
  <rect x="60" y="216" width="760" height="164" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="240" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">key 변경으로 컴포넌트 강제 초기화 (리셋 트릭)</text>
  <rect x="76" y="254" width="728" height="114" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="276" fill="#9aa4b8">// userId가 바뀌면 Profile을 완전히 다시 마운트</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 내부 상태(입력값, 스크롤 위치 등)가 모두 초기화됨</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App({ userId }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;Profile</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">key</tspan><tspan fill="#ffffff">={userId} </tspan><tspan fill="#7ec8e3">userId</tspan><tspan fill="#ffffff">={userId} </tspan><tspan fill="#ce9178">/&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// key가 같아야 상태 보존 / 달라지면 언마운트+재마운트</tspan>
  </text>
</svg>
