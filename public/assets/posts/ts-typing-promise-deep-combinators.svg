<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Promise 조합 함수의 반환 타입</text>
  <text x="60" y="78" font-size="13" fill="#888">입력 [Promise&lt;A&gt;, Promise&lt;B&gt;]가 결과 튜플로 정확히 매핑된다</text>

  <rect x="60" y="100" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#55c555">Promise.all</text>
  <text x="76" y="152" font-size="13" fill="#ffffff">[Promise&lt;A&gt;, Promise&lt;B&gt;] → Promise&lt;[A, B]&gt;</text>
  <text x="76" y="172" font-size="13" fill="#9aa4b8">전부 성공하면 튜플, 하나라도 실패하면 즉시 reject</text>

  <rect x="60" y="194" width="760" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-size="14" font-weight="600" fill="#7ec8e3">Promise.allSettled</text>
  <text x="76" y="246" font-size="13" fill="#ffffff">→ Promise&lt;[PromiseSettledResult&lt;A&gt;, ...]&gt;</text>
  <text x="76" y="266" font-size="13" fill="#9aa4b8">status로 좁혀 fulfilled.value / rejected.reason 접근</text>

  <rect x="60" y="288" width="370" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="316" font-size="14" font-weight="600" fill="#7777cc">Promise.race</text>
  <text x="76" y="340" font-size="13" fill="#ffffff">→ Promise&lt;A | B&gt;</text>
  <text x="76" y="362" font-size="13" fill="#9aa4b8">가장 먼저 끝난 것의 타입</text>

  <rect x="450" y="288" width="370" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="316" font-size="14" font-weight="600" fill="#e05555">Promise.any</text>
  <text x="466" y="340" font-size="13" fill="#ffffff">→ Promise&lt;A | B&gt;</text>
  <text x="466" y="362" font-size="13" fill="#9aa4b8">첫 성공값 / 모두 실패 시 AggregateError</text>
</svg>
