<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="520" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Spring AOP 핵심 용어</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Aspect · JoinPoint · Pointcut · Advice · Weaving</text>

<!-- ── CENTER: Target Method Timeline ── -->
<text x="440" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">대상 메서드 실행 흐름</text>

<!-- Timeline bar -->
<rect x="150" y="116" width="580" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
<text x="440" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">orderService.placeOrder(request) — JoinPoint</text>

<!-- ── TERM BOXES ── -->

<!-- 1. Aspect -->
<rect x="60" y="184" width="220" height="90" rx="8" fill="#0c1c2e" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="170" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Aspect</text>
<text x="170" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">횡단 관심사를 담은 모듈</text>
<text x="170" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Pointcut + Advice 의 묶음</text>
<text x="170" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Aspect 클래스</text>

<!-- 2. JoinPoint -->
<rect x="330" y="184" width="220" height="90" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
<text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#9999ee">JoinPoint</text>
<text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Advice가 삽입 가능한 지점</text>
<text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Spring AOP: 메서드 실행만</text>
<text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JoinPoint 파라미터로 정보 접근</text>

<!-- 3. Pointcut -->
<rect x="600" y="184" width="220" height="90" rx="8" fill="#1a1000" stroke="#e8b04a" stroke-width="1.5"/>
<text x="710" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8b04a">Pointcut</text>
<text x="710" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">어느 JoinPoint에 적용할지</text>
<text x="710" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">결정하는 서술 표현식</text>
<text x="710" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">execution(* com.example..*.*(..))</text>

<!-- 4. Advice -->
<rect x="60" y="310" width="350" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
<text x="235" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Advice</text>
<text x="235" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Pointcut에 매칭된 JoinPoint에서</text>
<text x="235" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">실행되는 실제 코드 (Aspect의 액션)</text>
<text x="235" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Before · @After · @Around · @AfterReturning · @AfterThrowing</text>

<!-- 5. Weaving -->
<rect x="470" y="310" width="350" height="90" rx="8" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
<text x="645" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Weaving</text>
<text x="645" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Aspect를 대상 코드에 결합하는 과정</text>
<text x="645" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Spring AOP: 런타임 프록시로 위빙</text>
<text x="645" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BeanPostProcessor After 단계에서 수행</text>

<!-- Connection line from timeline to JoinPoint -->
<line x1="440" y1="152" x2="440" y2="184" stroke="#9999ee" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="434,182 446,182 440,194" fill="#9999ee"/>

<!-- Summary row -->
<rect x="60" y="432" width="760" height="50" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
<text x="440" y="453" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Aspect = Pointcut + Advice</text>
<text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Weaving은 Pointcut이 매칭하는 JoinPoint에 Advice를 결합하는 행위</text>

<!-- Footer -->
<text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
