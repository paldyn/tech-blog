<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 소거로 인한 제약 사항</text>

  <!-- Grid 2x2 -->
  <!-- Top left: instanceof -->
  <rect x="40" y="64" width="380" height="140" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="56" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">instanceof 검사 불가</text>
  <text x="56" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 컴파일 오류</tspan></text>
  <text x="56" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (obj </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> List&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt;) </tspan><tspan fill="#e05555">// NG</tspan></text>
  <text x="56" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 가능: raw type만</tspan></text>
  <text x="56" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (obj </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> List&lt;?&gt;) </tspan><tspan fill="#55c555">// OK</tspan></text>
  <text x="56" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (obj </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> List) </tspan><tspan fill="#55c555">// OK</tspan></text>

  <!-- Top right: generic array -->
  <rect x="460" y="64" width="380" height="140" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">제네릭 배열 생성 불가</text>
  <text x="476" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 컴파일 오류</tspan></text>
  <text x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> List&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt;[</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">]; </tspan><tspan fill="#e05555">// NG</tspan></text>
  <text x="476" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 대신: 리스트 사용</tspan></text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> List[</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">]; </tspan><tspan fill="#9aa4b8">// raw, unchecked</tspan></text>
  <text x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ArrayList&lt;&gt;(); </tspan><tspan fill="#55c555">// 권장</tspan></text>

  <!-- Bottom left: T instantiation -->
  <rect x="40" y="224" width="380" height="120" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="56" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">T 인스턴스 생성 불가</text>
  <text x="56" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> T(); </tspan><tspan fill="#e05555">// 컴파일 오류!</tspan></text>
  <text x="56" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 우회: 팩토리 함수 전달</tspan></text>
  <text x="56" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; </tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> create(Supplier&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; factory)</tspan></text>
  <text x="56" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">factory.get(); </tspan><tspan fill="#55c555">// OK</tspan></text>

  <!-- Bottom right: overloading by generic -->
  <rect x="460" y="224" width="380" height="120" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">제네릭 타입으로 오버로딩 불가</text>
  <text x="476" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> m(List&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt; l) {} </tspan><tspan fill="#e05555">// NG</tspan></text>
  <text x="476" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> m(List&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Integer</tspan><tspan fill="#ffffff">&gt; l) {} </tspan><tspan fill="#e05555">// 같은 시그니처!</tspan></text>
  <text x="476" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 소거 후 둘 다 m(List l) → 충돌</tspan></text>
  <text x="476" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 메서드 이름을 다르게 하거나 파라미터 추가</tspan></text>

  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">타입 소거는 Java 5 이전 코드와의 하위 호환성을 위한 설계 결정</text>
</svg>
