<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> { readFile } </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"node:fs/promises"</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> buf: </tspan><tspan font-weight="600" fill="#7ec8e3">Buffer</tspan><tspan fill="#ffffff"> = </tspan><tspan font-weight="600" fill="#7ec8e3">await</tspan><tspan fill="#ffffff"> readFile(p)</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> env: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff"> | </tspan><tspan font-weight="600" fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff"> = process.env.X</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">process.on(</tspan><tspan fill="#ce9178">"exit"</tspan><tspan fill="#ffffff">, (code) =&gt; {})</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// @types/node가 Buffer·process·global을</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 전역 타입으로 제공한다</tspan></text>
