<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Cursor 핵심 사용법</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Cursor Rules + Composer Agent 패턴</text>

  <!-- Left: cursorrules -->
  <text x="80" y="104" font-size="13" font-weight="600" fill="#55c555">.cursor/rules (프로젝트 AI 지침)</text>
  <rect x="60" y="116" width="370" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 기술 스택</text>
  <text x="76" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- Python 3.11, FastAPI 0.110</text>
  <text x="76" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- SQLAlchemy 2.0 (async)</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- Pydantic v2</text>
  <text x="76" y="214" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 코딩 규칙</text>
  <text x="76" y="232" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- 타입 힌트 필수</text>
  <text x="76" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- 한국어 주석 선호</text>
  <text x="76" y="268" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- 에러: HTTPException 사용</text>
  <text x="76" y="286" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 금지 패턴</text>
  <text x="76" y="304" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">- print() 사용 금지, logging 사용</text>

  <!-- Right: Composer agent request -->
  <text x="456" y="104" font-size="13" font-weight="600" fill="#7ec8e3">Composer Agent 모드 요청 패턴</text>
  <rect x="440" y="116" width="380" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="138" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 기능 구현 요청 (Agent 모드)</text>
  <text x="456" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">사용자 프로필 수정 API를 만들어줘.</text>
  <text x="456" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- PATCH /users/{user_id}</text>
  <text x="456" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- name, bio, avatar_url 수정 가능</text>
  <text x="456" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- JWT 인증 필요</text>
  <text x="456" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- @file:models/user.py 참고</text>
  <text x="456" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Cursor가 자동으로:</text>
  <text x="456" y="268" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">→ routers/users.py 라우터 추가</text>
  <text x="456" y="286" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">→ schemas/user.py Pydantic 모델</text>
  <text x="456" y="304" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">→ tests/test_users.py 유닛 테스트</text>

  <!-- Keyboard shortcuts -->
  <text x="60" y="334" font-size="14" font-weight="600" fill="#e8e8e8">주요 단축키</text>

  <rect x="60" y="348" width="170" height="36" rx="5" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="362" text-anchor="middle" font-size="12" fill="#7777cc">Ctrl+K / ⌘K</text>
  <text x="145" y="378" text-anchor="middle" font-size="11" fill="#666">인라인 편집</text>

  <rect x="248" y="348" width="170" height="36" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="333" y="362" text-anchor="middle" font-size="12" fill="#7ec8e3">Ctrl+L / ⌘L</text>
  <text x="333" y="378" text-anchor="middle" font-size="11" fill="#666">Chat 패널</text>

  <rect x="436" y="348" width="170" height="36" rx="5" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="521" y="362" text-anchor="middle" font-size="12" fill="#e05555">Ctrl+I / ⌘I</text>
  <text x="521" y="378" text-anchor="middle" font-size="11" fill="#666">Composer</text>

  <rect x="624" y="348" width="196" height="36" rx="5" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="722" y="362" text-anchor="middle" font-size="12" fill="#55c555">Tab</text>
  <text x="722" y="378" text-anchor="middle" font-size="11" fill="#666">자동완성 수락</text>

  <text x="60" y="396" font-size="12" fill="#555">* Cursor Pro ($20/월) 기준: Claude 4, GPT-4o 무제한, fast request 500회/월 포함</text>
</svg>
