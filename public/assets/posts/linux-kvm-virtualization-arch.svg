<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">KVM 가상화 스택 아키텍처</text>

  <!-- Guest VM 1 -->
  <rect x="60" y="70" width="260" height="150" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Guest VM 1</text>
  <rect x="80" y="108" width="220" height="36" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="190" y="131" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Guest OS (Linux/Windows)</text>
  <rect x="80" y="152" width="100" height="30" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="130" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">vCPU × 2</text>
  <rect x="190" y="152" width="110" height="30" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="245" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">vRAM 4 GB</text>

  <!-- Guest VM 2 -->
  <rect x="340" y="70" width="260" height="150" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Guest VM 2</text>
  <rect x="360" y="108" width="220" height="36" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="470" y="131" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Guest OS</text>
  <rect x="360" y="152" width="100" height="30" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="410" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">vCPU × 4</text>
  <rect x="470" y="152" width="110" height="30" rx="5" fill="#1a1a4a" stroke="#7777cc" stroke-width="0.8"/>
  <text x="525" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">vRAM 8 GB</text>

  <!-- Guest VM 3 -->
  <rect x="620" y="70" width="200" height="150" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="720" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">Guest VM N</text>
  <text x="720" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">...</text>

  <!-- Arrow from VMs down to QEMU -->
  <line x1="190" y1="220" x2="190" y2="262"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="470" y1="220" x2="470" y2="262"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="720" y1="220" x2="720" y2="262"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- QEMU layer -->
  <rect x="60" y="262" width="760" height="70" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">QEMU — 디바이스 에뮬레이션 레이어</text>
  <text x="440" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가상 디스크(virtio-blk), 가상 NIC(virtio-net), VGA, USB 등 에뮬레이션</text>

  <!-- Arrow QEMU → KVM -->
  <line x1="440" y1="332" x2="440" y2="364"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- KVM kernel module -->
  <rect x="60" y="364" width="760" height="70" rx="8" fill="#002010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">KVM — Linux 커널 모듈 (/dev/kvm)</text>
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VMCS/VMCB 관리, vCPU 스케줄링, 메모리 가상화(EPT/NPT), 하드웨어 가속</text>

  <!-- Arrow KVM → CPU -->
  <line x1="440" y1="434" x2="440" y2="464"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Physical hardware -->
  <rect x="60" y="464" width="760" height="36" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="487" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">물리 CPU (Intel VT-x / AMD-V) · 물리 RAM · 스토리지</text>
</svg>
