<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">umask 계산 원리</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">기본 최대 권한에서 umask 비트를 제거해 실제 권한 도출</text>

  <!-- Formula display -->
  <rect x="60" y="84" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="440" y="116" text-anchor="middle" font-size="18" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">실제 권한 = 최대 권한 AND NOT(umask)</text>

  <!-- File example -->
  <rect x="60" y="152" width="360" height="200" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <rect x="60" y="152" width="360" height="32" rx="8" fill="#141622"/>
  <text x="240" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">일반 파일 (umask 022)</text>

  <text x="84" y="204" font-size="13" fill="#888">기본 최대 권한</text>
  <text x="396" y="204" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">666  (rw-rw-rw-)</text>

  <text x="84" y="230" font-size="13" fill="#888">umask</text>
  <text x="396" y="230" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">022  (----w--w-)</text>

  <line x1="84" y1="242" x2="400" y2="242" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <text x="84" y="264" font-size="13" fill="#888">결과 (비트 제거)</text>
  <text x="396" y="264" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">644  (rw-r--r--)</text>

  <rect x="84" y="278" width="292" height="52" rx="6" fill="#000000"/>
  <text x="84" y="296" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  110 110 110   (666)</text>
  <text x="84" y="314" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">- 000 010 010   (022)</text>
  <text x="84" y="332" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">= 110 100 100   (644)</text>

  <!-- Directory example -->
  <rect x="460" y="152" width="360" height="200" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <rect x="460" y="152" width="360" height="32" rx="8" fill="#141622"/>
  <text x="640" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">디렉터리 (umask 022)</text>

  <text x="484" y="204" font-size="13" fill="#888">기본 최대 권한</text>
  <text x="796" y="204" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">777  (rwxrwxrwx)</text>

  <text x="484" y="230" font-size="13" fill="#888">umask</text>
  <text x="796" y="230" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">022  (----w--w-)</text>

  <line x1="484" y1="242" x2="800" y2="242" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <text x="484" y="264" font-size="13" fill="#888">결과 (비트 제거)</text>
  <text x="796" y="264" text-anchor="end" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">755  (rwxr-xr-x)</text>

  <rect x="484" y="278" width="292" height="52" rx="6" fill="#000000"/>
  <text x="484" y="296" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  111 111 111   (777)</text>
  <text x="484" y="314" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">- 000 010 010   (022)</text>
  <text x="484" y="332" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">= 111 101 101   (755)</text>

  <!-- Footer -->
  <rect x="60" y="368" width="760" height="24" rx="6" fill="#141622"/>
  <text x="440" y="384" text-anchor="middle" font-size="12" fill="#888">파일 최대값: 666 (실행 기본 부여 안 함) · 디렉터리 최대값: 777</text>
</svg>
