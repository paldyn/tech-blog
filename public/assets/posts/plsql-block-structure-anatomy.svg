<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PL/SQL 블록 구조 해부</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">DECLARE / BEGIN / EXCEPTION / END — 4개 섹션의 역할</text>

  <!-- Left: Block anatomy with colors -->
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">익명 블록 구조</text>
  <rect x="60" y="108" width="300" height="360" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <!-- DECLARE section highlight -->
  <rect x="66" y="114" width="288" height="58" fill="#1a2830" rx="4"/>
  <text x="82" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">DECLARE</text>
  <text x="82" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  v_name  VARCHAR2(50);</text>
  <text x="82" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  v_count NUMBER := </text><text x="254" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text><text x="262" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>

  <!-- BEGIN section highlight -->
  <rect x="66" y="176" width="288" height="118" fill="#1a2010" rx="4"/>
  <text x="82" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">BEGIN</text>
  <text x="82" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  SELECT</text><text x="130" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> last_name</text>
  <text x="82" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  INTO</text><text x="118" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   v_name</text>
  <text x="82" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  FROM</text><text x="118" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   employees</text>
  <text x="82" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  WHERE</text><text x="130" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  employee_id = </text><text x="250" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">100</text><text x="268" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="82" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  DBMS_OUTPUT.PUT_LINE(v_name);</text>

  <!-- EXCEPTION section highlight -->
  <rect x="66" y="298" width="288" height="76" fill="#2a1a10" rx="4"/>
  <text x="82" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">EXCEPTION</text>
  <text x="82" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  WHEN</text><text x="118" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> NO_DATA_FOUND </text><text x="246" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">THEN</text>
  <text x="82" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    DBMS_OUTPUT.PUT_LINE(</text><text x="274" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'없음'</text><text x="298" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>
  <text x="82" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    v_count := v_count + </text><text x="274" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="280" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>

  <!-- END section -->
  <rect x="66" y="378" width="288" height="26" fill="#0d1a0d" rx="4"/>
  <text x="82" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">END</text><text x="106" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="82" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">/</text>

  <!-- Right: Explanation callouts -->
  <!-- DECLARE explanation -->
  <rect x="400" y="108" width="420" height="80" fill="#1a2830" rx="6" stroke="#2a4a60" stroke-width="1"/>
  <text x="610" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">DECLARE 섹션 (선택)</text>
  <text x="416" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">변수, 상수, 커서, 예외, 중첩 서브프로그램 선언</text>
  <text x="416" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생략 가능 (변수가 없을 때)</text>
  <!-- connector -->
  <line x1="354" y1="143" x2="400" y2="143" stroke="#2a4a60" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- BEGIN explanation -->
  <rect x="400" y="204" width="420" height="80" fill="#1a2010" rx="6" stroke="#2a5020" stroke-width="1"/>
  <text x="610" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">BEGIN 섹션 (필수)</text>
  <text x="416" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 가능 문장: SQL, 제어 구조, 프로시저 호출</text>
  <text x="416" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최소 NULL; 한 줄이라도 반드시 포함</text>
  <!-- connector -->
  <line x1="354" y1="235" x2="400" y2="235" stroke="#2a5020" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- EXCEPTION explanation -->
  <rect x="400" y="300" width="420" height="80" fill="#2a1a10" rx="6" stroke="#5a2a10" stroke-width="1"/>
  <text x="610" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">EXCEPTION 섹션 (선택)</text>
  <text x="416" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">런타임 예외 핸들러: WHEN 예외명 THEN 처리</text>
  <text x="416" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생략 시 예외가 상위 블록으로 전파</text>
  <!-- connector -->
  <line x1="354" y1="335" x2="400" y2="335" stroke="#5a2a10" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- END explanation -->
  <rect x="400" y="396" width="420" height="48" fill="#0d1a0d" rx="6" stroke="#1a3a1a" stroke-width="1"/>
  <text x="610" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">END; (필수)</text>
  <text x="416" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">블록 종료. / (슬래시)로 SQL*Plus에서 실행</text>
  <!-- connector -->
  <line x1="354" y1="391" x2="400" y2="415" stroke="#1a3a1a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Block types -->
  <rect x="60" y="480" width="760" height="46" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PL/SQL 블록 유형</text>
  <text x="190" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">익명 블록 — 일회성 실행, 저장 안 됨</text>
  <text x="440" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로시저/함수 — 이름 있고 저장·재호출 가능</text>
  <text x="700" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">패키지·트리거 — 논리 묶음 / 이벤트 기반</text>
</svg>
