<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 프레임 구조</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이더넷 II 프레임 (가장 널리 쓰이는 형식)</text>

  <!-- Frame fields -->
  <!-- Preamble -->
  <rect x="60" y="88" width="88" height="56" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="104" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888" text-anchor="middle">Preamble</text>
  <text x="104" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">7 byte</text>
  <text x="104" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#444" text-anchor="middle">10101010...</text>

  <!-- SFD -->
  <rect x="156" y="88" width="50" height="56" rx="5" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="181" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#888" text-anchor="middle">SFD</text>
  <text x="181" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">1 byte</text>
  <text x="181" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#444" text-anchor="middle">10101011</text>

  <!-- Dst MAC -->
  <rect x="214" y="88" width="110" height="56" rx="5" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="269" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Dst MAC</text>
  <text x="269" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">6 byte</text>
  <text x="269" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">목적지 MAC</text>

  <!-- Src MAC -->
  <rect x="332" y="88" width="110" height="56" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="387" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Src MAC</text>
  <text x="387" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">6 byte</text>
  <text x="387" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">출발지 MAC</text>

  <!-- EtherType -->
  <rect x="450" y="88" width="78" height="56" rx="5" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="489" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">EtherType</text>
  <text x="489" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">2 byte</text>
  <text x="489" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">0x0800=IPv4</text>

  <!-- Payload -->
  <rect x="536" y="88" width="174" height="56" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="623" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888" text-anchor="middle">Payload</text>
  <text x="623" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">46~1500 byte</text>
  <text x="623" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#444" text-anchor="middle">IP 패킷 (또는 ARP 등)</text>

  <!-- FCS -->
  <rect x="718" y="88" width="102" height="56" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="769" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">FCS</text>
  <text x="769" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">4 byte</text>
  <text x="769" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">CRC-32</text>

  <!-- EtherType values -->
  <rect x="60" y="168" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555" xml:space="preserve">EtherType 주요 값</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">0x0800 → IPv4    0x0806 → ARP</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">0x86DD → IPv6    0x8100 → 802.1Q VLAN 태그</text>
  <text x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">0x8847 → MPLS unicast</text>
  <text x="480" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">0x88CC → LLDP</text>

  <!-- Standards -->
  <rect x="60" y="270" width="760" height="106" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">이더넷 표준별 속도</text>
  <text x="130" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">10BASE-T</text>
  <text x="130" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">10 Mbps (CAT3)</text>
  <text x="280" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">100BASE-TX</text>
  <text x="280" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">100 Mbps (CAT5)</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">1000BASE-T</text>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">1 Gbps (CAT5e/6)</text>
  <text x="610" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">10GBASE-T</text>
  <text x="610" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">10 Gbps (CAT6a)</text>
  <text x="760" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">400G+</text>
  <text x="760" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">광섬유 / DAC</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">프레임 구조는 모든 속도에서 동일 — 속도만 빨라짐</text>
</svg>
