<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이더넷 프레임 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">IEEE 802.3 표준 — 이더넷 II (DIX) 형식</text>

  <!-- Frame fields -->
  <!-- Preamble -->
  <rect x="60" y="90" width="80" height="60" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">프리앰블</text>
  <text x="100" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">8바이트</text>
  <text x="100" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">동기화</text>

  <!-- Dst MAC -->
  <rect x="145" y="90" width="100" height="60" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="195" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8c44a">목적지 MAC</text>
  <text x="195" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">6바이트</text>
  <text x="195" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">수신자</text>

  <!-- Src MAC -->
  <rect x="250" y="90" width="100" height="60" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="300" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8c44a">출발지 MAC</text>
  <text x="300" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">6바이트</text>
  <text x="300" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">송신자</text>

  <!-- EtherType -->
  <rect x="355" y="90" width="80" height="60" rx="4" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="395" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">EtherType</text>
  <text x="395" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">2바이트</text>
  <text x="395" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">상위 프로토콜</text>

  <!-- Payload -->
  <rect x="440" y="90" width="260" height="60" rx="4" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">페이로드 (데이터)</text>
  <text x="570" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">46~1500바이트</text>
  <text x="570" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">IP 패킷 등</text>

  <!-- FCS -->
  <rect x="705" y="90" width="80" height="60" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="745" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">FCS</text>
  <text x="745" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">4바이트</text>
  <text x="745" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">오류 검출</text>

  <!-- total size label -->
  <line x1="60" y1="165" x2="785" y2="165" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="160" x2="60" y2="170" stroke="#555" stroke-width="1.5"/>
  <line x1="785" y1="160" x2="785" y2="170" stroke="#555" stroke-width="1.5"/>
  <text x="422" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최소 64바이트 ~ 최대 1518바이트 (MTU 1500 + 헤더 18)</text>

  <!-- EtherType code box -->
  <rect x="60" y="200" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">EtherType 주요 값</text>
  <text x="80" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">0x0800  →  IPv4</text>
  <text x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">0x0806  →  ARP</text>
  <text x="80" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">0x86DD  →  IPv6</text>

  <!-- MTU explanation -->
  <rect x="460" y="200" width="360" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">MTU (Maximum Transmission Unit)</text>
  <text x="480" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 이더넷 표준 MTU: 1500 바이트</text>
  <text x="480" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 초과 시 IP 단편화(Fragmentation) 발생</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Jumbo Frame: 최대 9000바이트 (데이터센터)</text>

  <text x="440" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">FCS = CRC-32 체크섬 — 수신 측이 오류 감지, 오류 수정은 상위 계층 담당</text>
</svg>
