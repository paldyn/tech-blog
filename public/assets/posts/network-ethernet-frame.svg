<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 프레임 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">IEEE 802.3 Ethernet II 프레임 포맷</text>

  <!-- Frame visualization -->
  <rect x="60" y="88" width="760" height="60" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Preamble 8B -->
  <rect x="64" y="92" width="68" height="52" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="98" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#e05555" text-anchor="middle">Preamble</text>
  <text x="98" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">+SFD</text>
  <text x="98" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">8 bytes</text>

  <!-- Dst MAC 6B -->
  <rect x="136" y="92" width="110" height="52" rx="4" fill="#1a2a35" stroke="#7ec8e3" stroke-width="2"/>
  <text x="191" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Dst MAC</text>
  <text x="191" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">ff:ff:ff:ff:ff:ff</text>
  <text x="191" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">6 bytes</text>

  <!-- Src MAC 6B -->
  <rect x="250" y="92" width="110" height="52" rx="4" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="305" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Src MAC</text>
  <text x="305" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">aa:bb:cc:11:22:33</text>
  <text x="305" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">6 bytes</text>

  <!-- EtherType 2B -->
  <rect x="364" y="92" width="80" height="52" rx="4" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="404" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">EtherType</text>
  <text x="404" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">0x0800</text>
  <text x="404" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">2 bytes</text>

  <!-- Payload 46-1500B -->
  <rect x="448" y="92" width="260" height="52" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="578" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Payload (IP Packet)</text>
  <text x="578" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">46 ~ 1500 bytes</text>
  <text x="578" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">(최소 46B, 부족 시 패딩)</text>

  <!-- FCS 4B -->
  <rect x="712" y="92" width="100" height="52" rx="4" fill="#1a1a35" stroke="#7777cc" stroke-width="2"/>
  <text x="762" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">FCS</text>
  <text x="762" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CRC-32</text>
  <text x="762" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">4 bytes</text>

  <!-- EtherType values -->
  <rect x="60" y="172" width="360" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">EtherType 주요 값</text>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">0x0800  </text>
  <text x="173" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">IPv4</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">0x86DD  </text>
  <text x="173" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">IPv6</text>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">0x0806  </text>
  <text x="173" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ARP</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">0x8100  </text>
  <text x="173" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">VLAN Tag (802.1Q)</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">0x8847  </text>
  <text x="173" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">MPLS Unicast</text>

  <!-- Ethernet speed evolution -->
  <rect x="440" y="172" width="380" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="630" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">이더넷 속도 발전</text>

  <text x="460" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">10BASE-T</text>
  <text x="800" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">10 Mbps (1990)</text>
  <text x="460" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">100BASE-TX</text>
  <text x="800" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">100 Mbps (1995)</text>
  <text x="460" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1000BASE-T</text>
  <text x="800" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">1 Gbps (1999)</text>
  <text x="460" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">10GBASE-T</text>
  <text x="800" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">10 Gbps (2006)</text>
  <text x="460" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">400GbE / 800GbE</text>
  <text x="800" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">400~800 Gbps (2024)</text>

  <!-- MTU note -->
  <rect x="60" y="324" width="760" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">MTU (Maximum Transmission Unit)</text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이더넷 표준 MTU = 1500 bytes (Payload)</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ip </text>
  <text x="98" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">link show eth0 | grep mtu</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Jumbo Frame: MTU 9000 (데이터센터)</text>
</svg>
