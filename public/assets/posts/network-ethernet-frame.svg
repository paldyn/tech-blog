<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-d" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 II 프레임 구조 (IEEE 802.3)</text>

  <!-- Frame fields with sizes -->
  <!-- Preamble -->
  <rect x="40" y="68" width="80" height="76" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">프리앰블</text>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">7 bytes</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">동기화</text>
  <!-- SFD -->
  <rect x="124" y="68" width="50" height="76" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="149" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">SFD</text>
  <text x="149" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 byte</text>
  <text x="149" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0xAB</text>
  <!-- Dest MAC -->
  <rect x="178" y="68" width="110" height="76" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="233" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">목적지 MAC</text>
  <text x="233" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">6 bytes</text>
  <text x="233" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">수신자 주소</text>
  <!-- Src MAC -->
  <rect x="292" y="68" width="110" height="76" rx="4" fill="#0d2016" stroke="#55c555" stroke-width="2"/>
  <text x="347" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">출발지 MAC</text>
  <text x="347" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">6 bytes</text>
  <text x="347" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">송신자 주소</text>
  <!-- EtherType -->
  <rect x="406" y="68" width="80" height="76" rx="4" fill="#1a120a" stroke="#e8a55c" stroke-width="2"/>
  <text x="446" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8a55c" text-anchor="middle">EtherType</text>
  <text x="446" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">2 bytes</text>
  <text x="446" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">0x0800=IPv4</text>
  <!-- Payload -->
  <rect x="490" y="68" width="235" height="76" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="607" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">페이로드</text>
  <text x="607" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">46 ~ 1500 bytes</text>
  <text x="607" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">IP 패킷 등</text>
  <!-- FCS -->
  <rect x="729" y="68" width="110" height="76" rx="4" fill="#2a0a2a" stroke="#cc55cc" stroke-width="2"/>
  <text x="784" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#cc55cc" text-anchor="middle">FCS</text>
  <text x="784" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc55cc" text-anchor="middle">4 bytes</text>
  <text x="784" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">CRC-32</text>

  <!-- MTU annotation -->
  <line x1="178" y1="150" x2="724" y2="150" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="178" y1="145" x2="178" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="724" y1="145" x2="724" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="451" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">MTU = 1500 bytes (최대 전송 단위)</text>

  <!-- EtherType values -->
  <rect x="60" y="184" width="760" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a55c" text-anchor="middle">주요 EtherType 값</text>
  <text x="200" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">0x0800 = IPv4</text>
  <text x="200" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인터넷 프로토콜 v4</text>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">0x86DD = IPv6</text>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인터넷 프로토콜 v6</text>
  <text x="680" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">0x0806 = ARP</text>
  <text x="680" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">주소 결정 프로토콜</text>

  <!-- CSMA/CD note -->
  <rect x="60" y="294" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이더넷 속도별 표준</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">10BASE-T    = 10 Mbps  (Cat3)</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1000BASE-T  = 1 Gbps   (Cat5e)</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">10GBASE-T   = 10 Gbps  (Cat6a)</text>
</svg>
