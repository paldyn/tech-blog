<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">예외 처리 모범 사례 체크리스트</text>

  <!-- DO list -->
  <rect x="55" y="65" width="370" height="44" rx="6" fill="#0c1c0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">✓ 해야 할 것 (DO)</text>

  <text x="75" y="135" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="135" font-size="12" fill="#e8e8e8">구체적 예외 타입 지정 — except ValueError</text>
  <text x="75" y="158" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="158" font-size="12" fill="#e8e8e8">예외 원인 보존 — raise NewError() from e</text>
  <text x="75" y="181" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="181" font-size="12" fill="#e8e8e8">finally로 리소스 정리 (또는 with 문 사용)</text>
  <text x="75" y="204" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="204" font-size="12" fill="#e8e8e8">커스텀 예외로 의미 명확화</text>
  <text x="75" y="227" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="227" font-size="12" fill="#e8e8e8">except 블록에서 로그 남기기</text>
  <text x="75" y="250" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="250" font-size="12" fill="#e8e8e8">else로 정상 경로 분리</text>
  <text x="75" y="273" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="273" font-size="12" fill="#e8e8e8">예외가 예외적 상황에만 사용</text>
  <text x="75" y="296" font-size="13" fill="#55c555">✔</text>
  <text x="95" y="296" font-size="12" fill="#e8e8e8">테스트에서 경고를 오류로 전환</text>

  <!-- DON'T list -->
  <rect x="455" y="65" width="370" height="44" rx="6" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="93" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">✗ 피해야 할 것 (DON'T)</text>

  <text x="475" y="135" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="135" font-size="12" fill="#e8e8e8">bare except: — 모든 예외 묵음 처리</text>
  <text x="475" y="158" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="158" font-size="12" fill="#e8e8e8">pass만 있는 except (무시 처리)</text>
  <text x="475" y="181" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="181" font-size="12" fill="#e8e8e8">except Exception: 남용 — 너무 넓은 catch</text>
  <text x="475" y="204" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="204" font-size="12" fill="#e8e8e8">제어 흐름에 예외 사용 (루프 탈출 등)</text>
  <text x="475" y="227" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="227" font-size="12" fill="#e8e8e8">SystemExit·KeyboardInterrupt 직접 catch</text>
  <text x="475" y="250" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="250" font-size="12" fill="#e8e8e8">except 블록에서 원인 숨기고 재발생</text>
  <text x="475" y="273" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="273" font-size="12" fill="#e8e8e8">예외 메시지 없는 raise CustomError()</text>
  <text x="475" y="296" font-size="13" fill="#e05555">✗</text>
  <text x="495" y="296" font-size="12" fill="#e8e8e8">try 블록을 너무 크게 만들기</text>

  <!-- Bottom rule -->
  <rect x="55" y="326" width="770" height="46" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="349" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">핵심 원칙</text>
  <text x="440" y="366" text-anchor="middle" font-size="12" fill="#888">예외는 실제로 예외적인 상황(예측 불가 오류)에만 쓴다. 정상 흐름은 조건문으로 처리한다.</text>
</svg>
