<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 510"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">@ComponentScan 필터 옵션</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">includeFilters · excludeFilters로 스캔 대상 세밀 제어</text>

  <!-- Left column: includeFilters -->
  <rect x="60" y="86" width="370" height="36" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">includeFilters — 추가 포함</text>

  <rect x="60" y="130" width="370" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="153" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">@ComponentScan(</text>
  <text x="76" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  basePackages</text>
  <text x="187" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = </text>
  <text x="207" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">"com.example"</text>
  <text x="76" y="189" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  includeFilters</text>
  <text x="196" y="189" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = {</text>
  <text x="76" y="207" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">    // 특정 어노테이션 달린 클래스 포함</text>
  <text x="76" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    @Filter</text>
  <text x="138" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">(type = FilterType.</text>
  <text x="306" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">ANNOTATION</text>
  <text x="376" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">,</text>
  <text x="76" y="243" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">     classes</text>
  <text x="150" y="243" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = MyCustomAnnotation.class)</text>
  <text x="76" y="261" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  },</text>
  <text x="76" y="279" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">  // 기본 필터 유지 여부</text>
  <text x="76" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  useDefaultFilters</text>
  <text x="210" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = </text>
  <text x="228" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">true</text>
  <text x="258" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="76" y="315" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">public class </text>
  <text x="173" y="315" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">AppConfig {}</text>

  <!-- Right column: excludeFilters -->
  <rect x="450" y="86" width="370" height="36" rx="6" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">excludeFilters — 제외</text>

  <rect x="450" y="130" width="370" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="153" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">@ComponentScan(</text>
  <text x="466" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  basePackages</text>
  <text x="577" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = </text>
  <text x="597" y="171" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">"com.example"</text>
  <text x="466" y="189" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  excludeFilters</text>
  <text x="586" y="189" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = {</text>
  <text x="466" y="207" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">    // 특정 클래스 제외</text>
  <text x="466" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    @Filter</text>
  <text x="528" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">(type = FilterType.</text>
  <text x="696" y="225" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">ASSIGNABLE_TYPE</text>
  <text x="466" y="243" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">     classes</text>
  <text x="540" y="243" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8"> = LegacyConfig.class),</text>
  <text x="466" y="261" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">    // 정규식으로 패키지 제외</text>
  <text x="466" y="279" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    @Filter</text>
  <text x="528" y="279" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">(type = FilterType.</text>
  <text x="696" y="279" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">REGEX</text>
  <text x="466" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">     pattern</text>
  <text x="540" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178"> = ".*Test.*"</text>
  <text x="640" y="297" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="466" y="315" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  })</text>

  <!-- FilterType table -->
  <rect x="60" y="344" width="760" height="120" rx="8" fill="#111" stroke="#222"/>
  <text x="440" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#888">FilterType 종류</text>
  <line x1="60" y1="378" x2="820" y2="378" stroke="#222" stroke-width="1"/>
  <!-- Row headers -->
  <text x="160" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">FilterType</text>
  <text x="440" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#888">설명</text>
  <text x="700" y="396" text-anchor="middle" font-size="12" font-weight="600" fill="#888">지정 속성</text>
  <line x1="60" y1="404" x2="820" y2="404" stroke="#222" stroke-width="1"/>
  <line x1="290" y1="378" x2="290" y2="464" stroke="#222" stroke-width="1"/>
  <line x1="580" y1="378" x2="580" y2="464" stroke="#222" stroke-width="1"/>
  <!-- Rows -->
  <text x="160" y="420" text-anchor="middle" font-size="12" fill="#7777cc">ANNOTATION</text>
  <text x="430" y="420" font-size="12" fill="#e8e8e8">특정 어노테이션을 가진 클래스</text>
  <text x="600" y="420" font-size="12" fill="#888">classes = SomeAnnotation.class</text>
  <line x1="60" y1="428" x2="820" y2="428" stroke="#222" stroke-width="1"/>
  <text x="160" y="444" text-anchor="middle" font-size="12" fill="#7777cc">ASSIGNABLE_TYPE</text>
  <text x="430" y="444" font-size="12" fill="#e8e8e8">특정 클래스/인터페이스의 하위 타입</text>
  <text x="600" y="444" font-size="12" fill="#888">classes = SomeClass.class</text>
  <line x1="60" y1="452" x2="820" y2="452" stroke="#222" stroke-width="1"/>
  <text x="160" y="468" text-anchor="middle" font-size="12" fill="#7777cc">REGEX · ASPECTJ · CUSTOM</text>
  <text x="430" y="468" font-size="12" fill="#e8e8e8">정규식 · AspectJ 패턴 · 직접 구현</text>
  <text x="600" y="468" font-size="12" fill="#888">pattern / classes (TypeFilter)</text>

  <!-- Footer -->
  <text x="440" y="496" text-anchor="middle" font-size="11" fill="#444">useDefaultFilters=false + includeFilters 조합으로 완전히 수동 스캔 구성도 가능합니다</text>
</svg>
