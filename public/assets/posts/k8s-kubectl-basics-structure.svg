<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">kubectl 명령어 구조 해부</text>

  <!-- Command string display -->
  <rect x="60" y="70" width="760" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="96" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#ffffff" xml:space="preserve">kubectl  get  pods  -n kube-system  -o wide</text>
  <text x="440" y="120" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">─── 커맨드라인 ────────────────────────────────────────────────────</text>

  <!-- Part boxes with annotation lines -->
  <!-- Part 1: kubectl (base) -->
  <rect x="60" y="165" width="130" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="197" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">kubectl</text>
  <text x="125" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CLI 도구</text>
  <line x1="125" y1="165" x2="125" y2="134" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Part 2: verb -->
  <rect x="220" y="165" width="120" height="56" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="197" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">동사(verb)</text>
  <text x="280" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get / apply / delete</text>
  <line x1="280" y1="165" x2="280" y2="134" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Part 3: resource type -->
  <rect x="370" y="165" width="140" height="56" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="197" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">리소스 타입</text>
  <text x="440" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pods / svc / deploy</text>
  <line x1="440" y1="165" x2="440" y2="134" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Part 4: namespace flag -->
  <rect x="540" y="165" width="140" height="56" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="610" y="197" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">네임스페이스</text>
  <text x="610" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-n &lt;name&gt; 또는 --all</text>
  <line x1="610" y1="165" x2="610" y2="134" stroke="#ce9178" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Part 5: output flag -->
  <rect x="710" y="165" width="110" height="56" rx="8" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="765" y="197" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">출력 형식</text>
  <text x="765" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-o yaml/json/wide</text>
  <line x1="765" y1="165" x2="765" y2="134" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Resource name note -->
  <rect x="210" y="300" width="460" height="56" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 이름 지정: <tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">kubectl get pod my-pod</tspan></text>
  <text x="440" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이름 생략 시 전체 목록 반환</text>
</svg>
