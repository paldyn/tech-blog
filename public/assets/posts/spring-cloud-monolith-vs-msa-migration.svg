<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Strangler Fig 패턴: 점진적 MSA 전환</text>

  <!-- 단계 1 -->
  <text x="145" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1단계: 기존 모놀리스</text>

  <rect x="40" y="94" width="210" height="120" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="145" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">모놀리스</text>
  <rect x="60" y="128" width="170" height="24" rx="4" fill="#13132a" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">사용자 + 주문 + 상품</text>
  <rect x="60" y="160" width="170" height="18" rx="3" fill="#1a1a30" stroke="#555" stroke-width="1"/>
  <text x="145" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">단일 DB</text>
  <text x="145" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">모든 기능이 하나에</text>

  <!-- 화살표 1 → 2 -->
  <line x1="250" y1="154" x2="288" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 단계 2 -->
  <text x="395" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">2단계: 첫 서비스 분리</text>

  <rect x="290" y="94" width="210" height="120" rx="8" fill="#0d100d" stroke="#ce9178" stroke-width="2"/>
  <text x="395" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">모놀리스 (축소중)</text>
  <rect x="310" y="128" width="170" height="24" rx="4" fill="#131313" stroke="#555" stroke-width="1"/>
  <text x="395" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">주문 + 상품 (유지)</text>
  <!-- 새 서비스 -->
  <rect x="310" y="160" width="170" height="24" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="395" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">사용자 서비스 (신규)</text>
  <text x="395" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">API Gateway 도입</text>

  <!-- 화살표 2 → 3 -->
  <line x1="500" y1="154" x2="538" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 단계 3 -->
  <text x="655" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3단계: 완전한 MSA</text>

  <rect x="540" y="94" width="300" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">모든 서비스 독립</text>
  <rect x="556" y="128" width="80" height="22" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="596" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">사용자</text>
  <rect x="648" y="128" width="80" height="22" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="688" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">주문</text>
  <rect x="740" y="128" width="80" height="22" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="780" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">상품</text>
  <rect x="556" y="160" width="264" height="18" rx="3" fill="#0d1117" stroke="#3a6a3a" stroke-width="1"/>
  <text x="688" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">독립 DB + API Gateway + Service Registry</text>
  <text x="690" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">독립 배포 · 독립 스케일</text>

  <!-- 코드 박스: Spring Cloud 설정 -->
  <rect x="40" y="244" width="380" height="248" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 주문 서비스 application.yml</text>
  <text x="60" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">spring</text>
  <text x="60" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  application.name: order-service</text>
  <text x="60" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Eureka에 자동 등록</text>
  <text x="60" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">eureka</text>
  <text x="60" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  client.service-url:</text>
  <text x="60" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    defaultZone: http://eureka:8761/eureka</text>
  <text x="60" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 타 서비스 호출 (OpenFeign)</text>
  <text x="60" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">@FeignClient</text>
  <text x="144" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(name = </text>
  <text x="210" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"user-service"</text>
  <text x="314" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="60" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">interface</text>
  <text x="130" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> UserClient {}</text>
  <text x="60" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Eureka 서비스명으로 자동 로드밸런싱</text>

  <!-- 코드 박스: Resilience4j -->
  <rect x="460" y="244" width="380" height="248" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Circuit Breaker (Resilience4j)</text>
  <text x="480" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">@CircuitBreaker</text>
  <text x="480" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  (name = </text>
  <text x="562" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"userService"</text>
  <text x="670" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>
  <text x="480" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   fallbackMethod = </text>
  <text x="626" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"fallback"</text>
  <text x="706" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="480" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">public</text>
  <text x="530" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> UserDto getUser(Long id) {</text>
  <text x="480" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="496" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="540" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> userClient.findById(id);</text>
  <text x="480" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="480" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">private</text>
  <text x="536" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> UserDto fallback(Long id,</text>
  <text x="480" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    Throwable t) {</text>
  <text x="480" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // 기본값 반환</text>
  <text x="480" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="496" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="540" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> UserDto.unknown(id);</text>
  <text x="480" y="488" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
