<svg xmlns="http://www.w3.org/2000/svg" width="880" height="510" viewBox="0 0 880 510">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">API 응답 봉투 패턴 (Response Envelope)</text>

  <!-- 중앙 ApiResponse 구조 박스 -->
  <rect x="190" y="62" width="500" height="188" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">ApiResponse&lt;T&gt;</text>
  <line x1="190" y1="100" x2="690" y2="100" stroke="#7777cc" stroke-width="1" opacity="0.4"/>

  <!-- 필드 행 (y=122, 154, 186, 218) -->
  <!-- success -->
  <text x="215" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">success</text>
  <text x="355" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">boolean</text>
  <text x="465" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리 성공 여부 (true / false)</text>

  <!-- code -->
  <text x="215" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">code</text>
  <text x="355" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">String</text>
  <text x="465" y="154"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 코드 ("200", "E404" 등)</text>

  <!-- message -->
  <text x="215" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">message</text>
  <text x="355" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">String</text>
  <text x="465" y="186"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람이 읽을 수 있는 응답 메시지</text>

  <!-- data -->
  <text x="215" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">data</text>
  <text x="355" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">T</text>
  <text x="465" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 페이로드 (제네릭 타입)</text>

  <!-- 중앙 박스 하단 y=250 -->

  <!-- 라벨 (화살표 상단) -->
  <text x="238" y="273" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">성공 응답</text>
  <text x="642" y="273" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">오류 응답</text>

  <!-- 화살표 -->
  <line x1="355" y1="250" x2="238" y2="285"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="525" y1="250" x2="642" y2="285"
        stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- 성공 응답 JSON 박스 (x=60, y=285, w=356, h=190) -->
  <rect x="60" y="285" width="356" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- content: 6 lines at y=326,344,362,380,398,416 (symmetric in box) -->
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="90" fill="#ce9178">"success"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="90" fill="#ce9178">"code"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"200"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="90" fill="#ce9178">"message"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"조회 성공"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="90" fill="#ce9178">"data"</tspan><tspan fill="#ffffff">: { </tspan><tspan fill="#ce9178">"id"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 오류 응답 JSON 박스 (x=464, y=285, w=356, h=190) -->
  <rect x="464" y="285" width="356" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="480" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="494" fill="#ce9178">"success"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="480" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="494" fill="#ce9178">"code"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"E404"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="480" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="494" fill="#ce9178">"message"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"사용자 없음"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="480" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="494" fill="#ce9178">"data"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7777cc">null</tspan></text>
  <text x="480" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
