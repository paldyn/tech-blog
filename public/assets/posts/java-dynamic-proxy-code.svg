<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Proxy.newProxyInstance 한눈에</text>

  <rect x="60" y="78" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="106" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 인터페이스 타입으로 프록시를 만든다</text>
  <text x="78" y="130" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Service proxy = (Service) Proxy.newProxyInstance(</text>
  <text x="78" y="152" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    Service.class.getClassLoader(),   </text>
  <text x="540" y="152" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 클래스로더</text>
  <text x="78" y="174" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    new Class[]{ Service.class },     </text>
  <text x="540" y="174" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 구현할 인터페이스</text>
  <text x="78" y="196" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    (p, method, args) -&gt; {           </text>
  <text x="540" y="196" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># InvocationHandler</text>
  <text x="78" y="218" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        log.info("call " + method.getName());</text>
  <text x="78" y="240" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        return method.invoke(target, args);</text>
  <text x="78" y="262" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    });</text>

  <text x="440" y="312" font-size="13" fill="#9aa4b8" text-anchor="middle">제약: 동적 프록시는 인터페이스만 구현한다 — 클래스 프록시는 CGLIB·바이트코드 라이브러리가 필요</text>
</svg>
