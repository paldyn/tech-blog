<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrGray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">쿼리 우선순위</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">사용자·보조기술이 요소를 찾는 방식에 가까울수록 위에 있다</text>

  <!-- Priority bars -->
  <rect x="160" y="100" width="560" height="46" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="182" y="129" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">getByRole</text>
  <text x="700" y="129" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">접근성 트리 기반 — 거의 모든 요소</text>
  <text x="740" y="129" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">1순위</text>

  <rect x="160" y="158" width="560" height="46" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="182" y="187" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">getByLabelText</text>
  <text x="700" y="187" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">폼 필드의 표준 — 레이블 연결 검증</text>

  <rect x="160" y="216" width="560" height="46" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="182" y="245" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">getByPlaceholderText</text>
  <text x="700" y="245" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">레이블이 없을 때의 차선책</text>

  <rect x="160" y="274" width="560" height="46" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="182" y="303" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">getByText</text>
  <text x="700" y="303" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버튼·입력이 아닌 일반 요소</text>

  <rect x="160" y="332" width="560" height="46" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="182" y="361" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">getByAltText / getByTitle</text>
  <text x="700" y="361" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미지 등 제한적 용도</text>

  <rect x="160" y="390" width="560" height="46" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="182" y="419" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555">getByTestId</text>
  <text x="700" y="419" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자가 볼 수 없는 식별자</text>
  <text x="740" y="419" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">최후 수단</text>

  <!-- Priority direction arrow -->
  <line x1="110" y1="110" x2="110" y2="426" stroke="#888888" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGray)"/>
  <text x="110" y="468" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">우선순위 ↓</text>

  <text x="440" y="504" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">getByRole로 찾을 수 없다면 마크업의 접근성부터 의심하라</text>
</svg>
