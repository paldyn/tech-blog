<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Checked vs Unchecked — 핵심 비교</text>

  <!-- Headers -->
  <rect x="60" y="62" width="370" height="40" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Checked Exception</text>

  <rect x="450" y="62" width="370" height="40" rx="6" fill="#1a1a0d" stroke="#ce9178" stroke-width="2"/>
  <text x="635" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#ce9178" text-anchor="middle">Unchecked (RuntimeException)</text>

  <!-- Rows -->
  <!-- Row 1: 기반 클래스 -->
  <rect x="60" y="110" width="760" height="36" rx="0" fill="#0a0a14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기반 클래스</text>
  <text x="245" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Exception (RT 제외)</text>
  <text x="635" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">RuntimeException</text>

  <!-- Row 2: 컴파일러 강제 -->
  <rect x="60" y="146" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일러 강제</text>
  <text x="245" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">처리 또는 throws 선언 필수</text>
  <text x="635" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">선택 — 선언 안 해도 됨</text>

  <!-- Row 3: 발생 원인 -->
  <rect x="60" y="182" width="760" height="36" rx="0" fill="#0a0a14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">발생 원인</text>
  <text x="245" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">외부 환경 (파일, 네트워크, DB)</text>
  <text x="635" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">프로그래밍 오류, 잘못된 입력</text>

  <!-- Row 4: 복구 가능성 -->
  <rect x="60" y="218" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복구 가능성</text>
  <text x="245" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">복구 가능성 있음</text>
  <text x="635" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일반적으로 복구 불가</text>

  <!-- Row 5: 대표 예외 -->
  <rect x="60" y="254" width="760" height="36" rx="0" fill="#0a0a14" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대표 예외</text>
  <text x="245" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">IOException, SQLException</text>
  <text x="635" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">NPE, IllegalArgument, IAE</text>

  <!-- Row 6: 현대 Java -->
  <rect x="60" y="290" width="760" height="36" rx="0" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="80" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현대 Java 추세</text>
  <text x="245" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">점점 줄어드는 추세</text>
  <text x="635" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Spring 등 대부분 Unchecked 선호</text>

  <!-- Code block -->
  <rect x="60" y="348" width="760" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Checked: 반드시 처리</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> save(String path) </tspan><tspan fill="#7ec8e3" font-weight="600">throws</tspan><tspan fill="#ffffff"> IOException { ... }</tspan></text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Unchecked: throws 선언 없이 던질 수 있음</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> setAge(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> age) {</tspan></text>
  <text x="76" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (age &lt; 0) </tspan><tspan fill="#7ec8e3" font-weight="600">throw new</tspan><tspan fill="#ffffff"> IllegalArgumentException(</tspan><tspan fill="#ce9178">"음수 불가"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="474" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
