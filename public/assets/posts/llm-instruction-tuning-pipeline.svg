<svg width="880" height="460" viewBox="0 0 880 460"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">LLM 인스트럭션 튜닝 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">베이스 모델 → SFT → (RLHF / DPO) → 정렬된 어시스턴트</text>

  <!-- Stage 1: Base Model -->
  <rect x="40" y="92" width="158" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="119" y="118" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="700">베이스 모델</text>
  <text x="119" y="136" text-anchor="middle" fill="#888" font-size="11">사전학습 완료</text>
  <text x="119" y="152" text-anchor="middle" fill="#888" font-size="11">텍스트 완성 특화</text>
  <text x="119" y="166" text-anchor="middle" fill="#888" font-size="11">지시 이해 부족</text>

  <!-- Arrow 1 -->
  <polygon points="206,130 234,130 234,124 250,132 234,140 234,134 206,134" fill="#7777cc"/>

  <!-- Stage 2: SFT -->
  <rect x="250" y="92" width="158" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="329" y="116" text-anchor="middle" fill="#55c555" font-size="13" font-weight="700">SFT</text>
  <text x="329" y="132" text-anchor="middle" fill="#888" font-size="11">Supervised Fine-Tuning</text>
  <text x="329" y="148" text-anchor="middle" fill="#888" font-size="11">지시-응답 쌍 학습</text>
  <text x="329" y="164" text-anchor="middle" fill="#888" font-size="11">10K~100K 데이터</text>

  <!-- Arrow 2 -->
  <polygon points="416,130 444,130 444,124 460,132 444,140 444,134 416,134" fill="#55c555"/>

  <!-- Stage 3: RLHF / DPO -->
  <rect x="460" y="92" width="170" height="80" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="545" y="116" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="700">RLHF / DPO</text>
  <text x="545" y="132" text-anchor="middle" fill="#888" font-size="11">인간 선호도 정렬</text>
  <text x="545" y="148" text-anchor="middle" fill="#888" font-size="11">보상 모델 학습</text>
  <text x="545" y="164" text-anchor="middle" fill="#888" font-size="11">선택 vs 거절 쌍</text>

  <!-- Arrow 3 -->
  <polygon points="638,130 666,130 666,124 682,132 666,140 666,134 638,134" fill="#7ec8e3"/>

  <!-- Stage 4: Chat Model -->
  <rect x="682" y="92" width="160" height="80" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="762" y="116" text-anchor="middle" fill="#55c555" font-size="13" font-weight="700">어시스턴트 모델</text>
  <text x="762" y="132" text-anchor="middle" fill="#888" font-size="11">지시 따르기 ✓</text>
  <text x="762" y="148" text-anchor="middle" fill="#888" font-size="11">안전한 응답 ✓</text>
  <text x="762" y="164" text-anchor="middle" fill="#888" font-size="11">유용성 ✓</text>

  <!-- SFT Data Format section -->
  <text x="290" y="208" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">SFT 데이터 포맷</text>

  <!-- Chat template -->
  <rect x="40" y="220" width="500" height="140" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="56" y="241" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># LLaMA-3 Chat Template</text>
  <text x="56" y="259" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|begin_of_text|&gt;</text>
  <text x="56" y="277" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|start_header_id|&gt;</text>
  <text x="196" y="277" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">system</text>
  <text x="244" y="277" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|end_header_id|&gt;</text>
  <text x="56" y="295" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">당신은 도움이 되는 AI 어시스턴트입니다.</text>
  <text x="56" y="313" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|start_header_id|&gt;</text>
  <text x="196" y="313" fill="#55c555" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">user</text>
  <text x="232" y="313" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|end_header_id|&gt;</text>
  <text x="56" y="331" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">파이썬으로 피보나치 수열을 구현해줘.</text>
  <text x="56" y="349" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|start_header_id|&gt;</text>
  <text x="196" y="349" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">assistant</text>
  <text x="268" y="349" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;|end_header_id|&gt;</text>

  <!-- DPO preference data -->
  <text x="710" y="208" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">DPO 선호 데이터</text>
  <rect x="560" y="220" width="280" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="576" y="241" fill="#888" font-size="11">동일한 질문에 대해 두 응답 비교:</text>

  <rect x="576" y="252" width="248" height="54" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="268" text-anchor="middle" fill="#55c555" font-size="11" font-weight="600">✓ 선택된 응답 (chosen)</text>
  <text x="584" y="284" fill="#e8e8e8" font-size="11">명확하고 안전하며 유익한</text>
  <text x="584" y="298" fill="#e8e8e8" font-size="11">고품질 응답</text>

  <rect x="576" y="314" width="248" height="54" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="330" text-anchor="middle" fill="#e05555" font-size="11" font-weight="600">✗ 거절된 응답 (rejected)</text>
  <text x="584" y="346" fill="#888" font-size="11">유해하거나 부정확하거나</text>
  <text x="584" y="360" fill="#888" font-size="11">도움이 안 되는 응답</text>

  <!-- Bottom: Why IT matters -->
  <text x="440" y="404" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">베이스 모델 vs 인스트럭션 튜닝 모델</text>
  <rect x="40" y="416" width="370" height="28" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="225" y="435" text-anchor="middle" fill="#888" font-size="12">Base: "파이썬 피보나치 수열 구현:" → 코드 완성 시도</text>
  <rect x="470" y="416" width="370" height="28" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="435" text-anchor="middle" fill="#e8e8e8" font-size="12">Chat: "파이썬으로 구현해줘." → 완성된 코드 + 설명 제공</text>
</svg>
