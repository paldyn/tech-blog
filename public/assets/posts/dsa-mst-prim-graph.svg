<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프림 알고리즘 — 노드 확장 MST</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">트리에서 최소 가중치 간선으로 노드 추가</text>

  <defs>
    <marker id="prim-mst" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="prim-cand" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step-by-step Prim visualization -->
  <!-- Step 1: Start from A -->
  <rect x="40" y="86" width="260" height="200" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="170" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">Step 1: A 시작</text>

  <circle cx="100" cy="150" r="20" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>

  <line x1="119" y1="143" x2="183" y2="133" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="154" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">2</text>

  <line x1="119" y1="157" x2="183" y2="167" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="154" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">4</text>

  <circle cx="201" cy="130" r="20" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="201" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">B</text>

  <circle cx="201" cy="170" r="20" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="201" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">C</text>

  <text x="170" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">후보: B(2), C(4)</text>
  <text x="170" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">선택: B(최소=2)</text>
  <text x="170" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트리: {A}</text>

  <!-- Step 2 -->
  <rect x="320" y="86" width="260" height="200" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="450" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">Step 2: B 추가</text>

  <circle cx="380" cy="150" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">A</text>

  <line x1="399" y1="143" x2="443" y2="133" stroke="#55c555" stroke-width="2.5"/>
  <text x="423" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">2</text>

  <circle cx="461" cy="130" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="461" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">B</text>

  <line x1="399" y1="157" x2="463" y2="167" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="434" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">4</text>

  <circle cx="481" cy="170" r="20" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="481" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">C</text>

  <text x="450" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">후보: C(3), D(5)</text>
  <text x="450" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">선택: C(최소=3)</text>
  <text x="450" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트리: {A,B}</text>

  <!-- Step 3 -->
  <rect x="600" y="86" width="260" height="200" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="730" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">Step 3~n-1: 완성</text>

  <circle cx="660" cy="150" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">A</text>

  <circle cx="720" cy="120" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">B</text>

  <circle cx="780" cy="150" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="780" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">C</text>

  <circle cx="720" cy="180" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">D</text>

  <line x1="679" y1="144" x2="703" y2="128" stroke="#55c555" stroke-width="2.5"/>
  <line x1="738" y1="122" x2="762" y2="142" stroke="#55c555" stroke-width="2.5"/>
  <line x1="679" y1="156" x2="703" y2="172" stroke="#55c555" stroke-width="2.5"/>

  <text x="730" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">MST 완성!</text>
  <text x="730" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">V-1개 간선 선택</text>
  <text x="730" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트리: {A,B,C,D}</text>

  <!-- Bottom: complexity comparison -->
  <rect x="40" y="320" width="800" height="160" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">프림 vs 크루스칼 비교</text>

  <rect x="60" y="360" width="360" height="100" fill="#1a2a3a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">프림</text>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">방식: 노드 중심 확장</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">자료구조: 우선순위 큐</text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시간: O((V+E)log V)</text>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Dense 그래프에 유리</text>

  <rect x="460" y="360" width="360" height="100" fill="#1a3a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">크루스칼</text>
  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">방식: 간선 중심 정렬</text>
  <text x="480" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">자료구조: 유니온 파인드</text>
  <text x="480" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">시간: O(E log E)</text>
  <text x="480" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Sparse 그래프에 유리</text>
</svg>
