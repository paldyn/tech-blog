<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">예외 처리 의사결정 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">예외가 발생했을 때 올바른 선택을 위한 가이드</text>

  <!-- Start -->
  <rect x="330" y="90" width="220" height="44" rx="22" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">예외 발생</text>

  <line x1="440" y1="134" x2="440" y2="164" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Q1 -->
  <polygon points="440,174 540,200 440,226 340,200" fill="#101020" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">복구 가능한가?</text>

  <!-- Yes path -->
  <line x1="340" y1="200" x2="200" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="270" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">예</text>

  <!-- No path -->
  <line x1="540" y1="200" x2="680" y2="200" stroke="#e05555" stroke-width="2" marker-end="url(#arrW)"/>
  <text x="610" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">아니오</text>

  <!-- Handle/recover -->
  <rect x="80" y="176" width="240" height="48" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">복구 로직 실행</text>
  <text x="200" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재시도, 기본값 반환, fallback</text>

  <!-- Wrap and propagate -->
  <rect x="560" y="176" width="240" height="48" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">래핑 후 전파</text>
  <text x="680" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cause 보존, 추상화 수준 맞추기</text>

  <line x1="440" y1="226" x2="440" y2="266" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>

  <!-- Q2 -->
  <polygon points="440,276 560,302 440,328 320,302" fill="#101020" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">로깅이 필요한가?</text>

  <line x1="320" y1="302" x2="180" y2="302" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="250" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">예</text>

  <line x1="560" y1="302" x2="700" y2="302" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="630" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">아니오</text>

  <rect x="60" y="278" width="240" height="48" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">최상위에서만 로그</text>
  <text x="180" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중간 계층 로그는 중복 발생</text>

  <rect x="580" y="278" width="240" height="48" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">그냥 전파</text>
  <text x="700" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">throw e 또는 래핑 후 throw</text>

  <!-- Key principles bottom -->
  <rect x="60" y="360" width="760" height="140" rx="8" fill="#101010" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">핵심 원칙 요약</text>

  <text x="100" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="120" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">예외는 예외적인 상황에만 — 흐름 제어 수단으로 사용 금지</text>

  <text x="100" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="120" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">예외를 삼키지 말 것 (빈 catch 블록 금지)</text>

  <text x="100" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="120" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">cause 항상 전달 — 원인 예외 소실 금지</text>

  <text x="100" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="120" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">로그는 최상위 경계(ExceptionHandler)에서 한 번만</text>

  <text x="480" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="500" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">catch (Exception e) { log.error(...); throw e; } — 중복 로그</text>

  <text x="480" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="500" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">catch (Exception e) { } — 예외 삼키기</text>

  <text x="480" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="500" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">throw new AppException("오류") — cause 없음</text>

  <text x="480" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="500" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">if (list.size() &gt; 0) throw new ... — 정상 흐름 제어</text>
</svg>
