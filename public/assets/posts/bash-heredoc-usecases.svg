<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Here Document 활용 패턴</text>

  <!-- SSH remote command -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">SSH 원격 명령</text>
  <rect x="60" y="106" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ssh</tspan><tspan fill="#ffffff"> user@host &lt;&lt;</tspan><tspan fill="#ce9178">'ENDSSH'</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  sudo systemctl restart nginx</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  tail -20 /var/log/nginx/error.log</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ce9178">ENDSSH</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 'ENDSSH' 인용 → 로컬 변수 확장 없음</text>

  <!-- SQL heredoc -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">SQL 실행</text>
  <rect x="450" y="106" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">psql</tspan><tspan fill="#ffffff"> -U admin mydb &lt;&lt;SQL</tspan></text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  SELECT id, name</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  FROM users</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  WHERE active = true;</tspan></text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">SQL</tspan></text>

  <!-- File generation -->
  <rect x="60" y="236" width="760" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">설정 파일 생성 (변수 치환 포함)</text>
  <rect x="60" y="278" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="298" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> &gt; /etc/myapp.conf &lt;&lt;EOF</tspan></text>
  <text x="76" y="316" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  HOST=$DB_HOST   PORT=$DB_PORT   DB=$DB_NAME   USER=$DB_USER</tspan></text>
  <text x="76" y="334" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">EOF</tspan><tspan fill="#9aa4b8">  # EOF가 파일 끝으로 사용됨</tspan></text>
  <text x="76" y="352" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># sudo 권한 파일: sudo tee /etc/protected.conf &lt;&lt; EOF ... EOF</text>
</svg>
