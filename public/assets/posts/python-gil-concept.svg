<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GIL — 전역 인터프리터 잠금</text>

  <!-- CPU cores at top -->
  <rect x="60" y="64" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">CPU Core 0</text>
  <text x="150" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Thread 1 실행 중</text>

  <rect x="260" y="64" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="350" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">CPU Core 1</text>
  <text x="350" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Thread 2 대기 중</text>

  <rect x="460" y="64" width="180" height="50" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="550" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">CPU Core 2</text>
  <text x="550" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Thread 3 대기 중</text>

  <rect x="660" y="64" width="160" height="50" rx="8" fill="#2b0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">GIL</text>
  <text x="740" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단 하나의 락</text>

  <!-- GIL explanation -->
  <rect x="60" y="138" width="760" height="84" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">GIL (Global Interpreter Lock) 이란?</text>
  <text x="440" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">CPython 인터프리터가 한 번에 하나의 스레드만 파이썬 바이트코드를 실행하도록 강제하는 뮤텍스</text>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">멀티코어 CPU 에서도 파이썬 스레드는 병렬 실행되지 않음 (CPU 바운드 작업 기준)</text>

  <!-- Impact boxes -->
  <rect x="60" y="244" width="360" height="100" rx="8" fill="#2b0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">GIL 의 제약: CPU 바운드</text>
  <text x="240" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">멀티스레드로 CPU 연산 분산 불가</text>
  <text x="240" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스레드 수 늘려도 속도 향상 없음</text>
  <text x="240" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ multiprocessing 으로 우회</text>

  <rect x="460" y="244" width="360" height="100" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">GIL 이 풀리는 경우: I/O</text>
  <text x="640" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">I/O 대기 중 GIL 자동 해제</text>
  <text x="640" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다른 스레드가 실행 기회 획득</text>
  <text x="640" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ I/O 바운드는 threading 효과적</text>

  <!-- GIL removal note (3.13) -->
  <rect x="60" y="366" width="760" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Python 3.13+ — Experimental Free-threaded CPython</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">GIL 없는 빌드(--disable-gil) 실험적 제공. python3.13t 로 실행.</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">진정한 멀티코어 병렬성 가능 — 아직 실험 단계, 기본값 아님</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">PEP 703으로 표준화 진행 중</text>
</svg>
