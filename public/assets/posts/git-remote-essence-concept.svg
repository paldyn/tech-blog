<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">원격 저장소(Remote)의 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">로컬 저장소와 원격 저장소, 그 사이의 추적 브랜치</text>

  <!-- Local repo box -->
  <rect x="60" y="90" width="340" height="340" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">로컬 저장소 (.git)</text>

  <!-- Local branches -->
  <rect x="80" y="130" width="300" height="36" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="230" y="153" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">로컬 브랜치: main, feature</text>

  <!-- Tracking branches -->
  <rect x="80" y="178" width="300" height="36" rx="6" fill="#0a0a1a" stroke="#7777cc"/>
  <text x="230" y="201" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">추적 브랜치: origin/main</text>

  <!-- Remote config -->
  <rect x="80" y="226" width="300" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve">[remote "origin"]</text>
  <text x="96" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  url = https://github.com/...</text>

  <!-- Object db -->
  <rect x="80" y="294" width="300" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="230" y="317" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">objects/ (로컬 복사본)</text>

  <!-- FETCH_HEAD -->
  <rect x="80" y="342" width="300" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="230" y="365" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">FETCH_HEAD</text>
  <text x="230" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(마지막 fetch 결과)</text>

  <!-- Arrows between local and remote -->
  <!-- fetch arrow -->
  <line x1="400" y1="220" x2="480" y2="220" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="478,220 466,214 466,226" fill="#7ec8e3"/>
  <text x="440" y="213" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">fetch</text>

  <!-- push arrow -->
  <line x1="480" y1="250" x2="400" y2="250" stroke="#7777cc" stroke-width="2"/>
  <polygon points="402,250 414,244 414,256" fill="#7777cc"/>
  <text x="440" y="267" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">push</text>

  <!-- Remote repo box -->
  <rect x="480" y="90" width="360" height="340" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ce9178">원격 저장소 (origin)</text>

  <!-- Remote branches -->
  <rect x="500" y="130" width="320" height="36" rx="6" fill="#1a0a0a" stroke="#ce9178"/>
  <text x="660" y="153" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">브랜치: main, feature</text>

  <!-- Remote object db -->
  <rect x="500" y="178" width="320" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="660" y="201" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">objects/ (원격 원본)</text>

  <!-- Remote providers list -->
  <rect x="500" y="226" width="320" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="516" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">원격 저장소 제공자 예시</text>
  <text x="516" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• GitHub</text>
  <text x="516" y="296"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• GitLab</text>
  <text x="516" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• Bitbucket</text>
  <text x="516" y="340"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 자체 서버 (bare repository)</text>
  <text x="516" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 로컬 경로 (file:///...)</text>

  <!-- Bottom label -->
  <text x="440" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">원격 저장소는 그 자체도 완전한 Git 저장소 — 단지 네트워크 너머에 있을 뿐</text>
</svg>
