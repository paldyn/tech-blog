<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PyTorch 학습 루프 전체 흐름</text>

  <!-- Step boxes -->
  <!-- 1. DataLoader -->
  <rect x="60" y="74" width="180" height="54" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① DataLoader</text>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">배치 추출 · 셔플</text>

  <line x1="240" y1="101" x2="298" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2. Forward -->
  <rect x="300" y="74" width="180" height="54" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="390" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② Forward Pass</text>
  <text x="390" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">model(x) → 예측</text>

  <line x1="480" y1="101" x2="538" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. Loss -->
  <rect x="540" y="74" width="160" height="54" rx="8" fill="#2a1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="620" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">③ Loss 계산</text>
  <text x="620" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">criterion(pred, y)</text>

  <line x1="700" y1="101" x2="758" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4. zero_grad -->
  <rect x="760" y="74" width="60" height="54" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="790" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">④ zero</text>
  <text x="790" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">_grad</text>
  <text x="790" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">()</text>

  <!-- down from step 4 -->
  <line x1="790" y1="128" x2="790" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 5. Backward -->
  <rect x="660" y="168" width="160" height="54" rx="8" fill="#2a1535" stroke="#6e3a9e" stroke-width="1.5"/>
  <text x="740" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c77ec8" text-anchor="middle">⑤ Backward</text>
  <text x="740" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">loss.backward()</text>

  <line x1="660" y1="195" x2="538" y2="195" stroke="#c77ec8" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- 6. step -->
  <rect x="380" y="168" width="156" height="54" rx="8" fill="#2a1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="458" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⑥ optimizer</text>
  <text x="458" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.step() — W 업데이트</text>

  <line x1="380" y1="195" x2="298" y2="195" stroke="#c77ec8" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- 7. log -->
  <rect x="100" y="168" width="196" height="54" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="198" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑦ 지표 기록</text>
  <text x="198" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">loss·acc 누적 · 로깅</text>

  <!-- repeat arrow -->
  <path d="M 100 195 Q 60 280 60 101" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"
        fill="none" marker-end="url(#arr)"/>
  <text x="34" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">배치</text>
  <text x="34" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">반복</text>

  <!-- Validation block -->
  <rect x="60" y="264" width="760" height="44" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">에폭 종료 → 검증 단계 (model.eval() + torch.no_grad())</text>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">val_loss · val_acc 계산 → 조기 종료 · LR 스케줄러 업데이트</text>

  <!-- Code block -->
  <rect x="60" y="328" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">for</text>
  <text x="106" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> epoch </text>
  <text x="178" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="200" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> range(num_epochs):</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    model.train()</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="116" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> x, y </text>
  <text x="168" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="190" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> train_loader:</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        optimizer.zero_grad()</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        loss = criterion(model(x), y)</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        loss.backward()</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        optimizer.step()</text>
</svg>
