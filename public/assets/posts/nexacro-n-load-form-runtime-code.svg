<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">loadContents / createContents 코드</text>

  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">loadContents 패턴</text>
  <rect x="60" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Div에 Form 로드</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_loadForm</tspan>(sUrl, oArgs) {</text>
  <text x="76" y="150" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var oDiv = this.div_content;</text>
  <text x="76" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oDiv.loadContents(</text>
  <text x="76" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    sUrl,</text>
  <text x="76" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oArgs || {});</text>
  <text x="76" y="222" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="76" y="250" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 로드 완료 후 자식 Form 접근</text>
  <text x="76" y="268" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">div_content_onload</tspan>(obj, e) {</text>
  <text x="76" y="286" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 로드된 Form 객체</text>
  <text x="76" y="304" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oForm</ttml></tspan> = obj.form;</text>
  <text x="76" y="322" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#e8e8e8">(oForm) {</ttml></ttml></tspan></text>
  <text x="76" y="340" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oForm.fn_search();</text>
  <text x="76" y="358" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="376" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">createContents 패턴</text>
  <rect x="460" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Frame에 Form 생성</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_addTab</ttml></ttml></tspan>(sUrl, sId) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var oFrame =</text>
  <text x="476" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    application.mainframe</text>
  <text x="476" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      .workarea;</text>
  <text x="476" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oFrame.createContents(</text>
  <text x="476" y="222" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    sId, sUrl);</text>
  <text x="476" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="268" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 특정 Form 활성화</text>
  <text x="476" y="286" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_activateForm</ttml></ttml></tspan>(sId) {</text>
  <text x="476" y="304" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var oFrame =</text>
  <text x="476" y="322" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    application.mainframe.workarea;</text>
  <text x="476" y="340" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oFrame.activate(sId);</text>
  <text x="476" y="358" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="386" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Form 제거</text>
  <text x="476" y="404" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oFrame.deleteContents(sId);</text>
</svg>
