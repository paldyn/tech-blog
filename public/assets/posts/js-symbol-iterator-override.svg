<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Symbol.iterator 재정의 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">기존 내장 타입 동작 커스터마이징</text>

  <!-- 왼쪽: 배열 역순 이터레이터 -->
  <rect x="60" y="96" width="360" height="340" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">배열 역순 이터레이터 래퍼</text>
  <rect x="80" y="130" width="320" height="280" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class</text>
  <text x="132" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Reversed {</text>
  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  constructor(arr) {</text>
  <text x="96" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.arr = arr;</tspan></text>
  
  <text x="96" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="96" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  *[</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#e8e8e8">.iterator]() {</tspan></text>

  <text x="96" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> i = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.arr.length - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <text x="96" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">         i >= </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; i--) {</tspan></text>

  <text x="96" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">      yield</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#e8e8e8">.arr[i];</tspan></text>

  <text x="96" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>
  <text x="96" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="96" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="96" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> rev = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Reversed([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">]);</tspan></text>

  <text x="96" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// [...rev] → [3, 2, 1]</text>
  <text x="96" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// for..of rev → 3, 2, 1</text>

  <!-- 오른쪽: 객체에 Symbol.iterator 추가 -->
  <rect x="460" y="96" width="360" height="340" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="480" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">일반 객체를 이터러블로</text>
  <rect x="480" y="130" width="320" height="280" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="532" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> matrix = {</text>
  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  rows: [[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">], [</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">]],</tspan></text>

  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  *[</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#e8e8e8">.iterator]() {</tspan></text>

  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> row </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#e8e8e8">.rows)</tspan></text>

  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">      yield*</tspan><tspan fill="#e8e8e8"> row;</tspan></text>
  
  <text x="496" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  },</text>
  <text x="496" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2D 행렬을 평탄하게 순회</text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">[...matrix]</text>
  <text x="580" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// [1, 2, 3, 4]</text>
  <text x="496" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="532" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> [a, b] = matrix;</text>
  <text x="496" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// a=1, b=2</text>
  <text x="496" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text>
  <text x="520" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Set(matrix)</text>
  <text x="608" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Set {1,2,3,4}</text>

</svg>
