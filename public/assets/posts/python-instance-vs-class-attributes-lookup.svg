<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">속성 조회 순서 (MRO 이전 단계)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">인스턴스 __dict__ → 클래스 __dict__</text>

  <!-- Instance box -->
  <rect x="60" y="95" width="320" height="200" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="60" y="95" width="320" height="36" rx="8" fill="#1a2d40"/>
  <text x="220" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">인스턴스 (rex)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rex.__dict__</text>
  <rect x="80" y="160" width="280" height="70" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">"name"</text>
  <text x="148" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="160" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"Rex"</text>
  <text x="96" y="198" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">"age"</text>
  <text x="136" y="198" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="148" y="198" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="96" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># species 없음!</text>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">① 먼저 여기서 찾는다</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인스턴스마다 독립적 딕셔너리</text>

  <!-- Arrow down-right -->
  <line x1="380" y1="190" x2="430" y2="190" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="430,184 444,190 430,196" fill="#7777cc"/>
  <text x="380" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">없으면</text>
  <text x="380" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 클래스로</text>

  <!-- Class box -->
  <rect x="450" y="95" width="370" height="200" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <rect x="450" y="95" width="370" height="36" rx="8" fill="#1a1a2e"/>
  <text x="635" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">클래스 (Dog)</text>
  <text x="470" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Dog.__dict__</text>
  <rect x="470" y="160" width="330" height="70" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="486" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">"species"</text>
  <text x="554" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="566" y="180" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"Canis"</text>
  <text x="486" y="198" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">"bark"</text>
  <text x="526" y="198" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: &lt;function&gt;</text>
  <text x="486" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">"__init__"</text>
  <text x="551" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: &lt;function&gt;</text>
  <text x="470" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">② 없으면 여기서 찾는다</text>
  <text x="470" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 인스턴스가 공유</text>

  <!-- Shadow box: AttributeError -->
  <rect x="60" y="320" width="760" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">③ 클래스에도 없으면</text>
  <text x="230" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> → 상위 클래스(MRO) 탐색 → 최종적으로 AttributeError 발생</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e05555" xml:space="preserve">rex.unknown  # AttributeError: 'Dog' object has no attribute 'unknown'</text>

  <!-- Shadowing note -->
  <rect x="60" y="388" width="760" height="62" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">인스턴스 속성이 클래스 속성을 가리는(shadow) 경우</text>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">rex.species = </text>
  <text x="158" y="428" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"wolf"</text>
  <text x="196" y="428" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  # rex.__dict__에 추가 → Dog.species는 무변</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">print(rex.species)   </text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                         # "wolf"  (인스턴스 우선)</text>
</svg>
