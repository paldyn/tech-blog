<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">runc 아키텍처 — OCI Runtime Spec 구현</text>

  <!-- Column 1: High-level Runtime -->
  <rect x="60" y="80" width="220" height="80" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">High-level Runtime</text>
  <text x="170" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Docker / containerd / Podman</text>
  <text x="170" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">OCI Bundle 생성 후 runc 호출</text>

  <!-- Arrow: HR → runc -->
  <line x1="280" y1="120" x2="340" y2="120"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="310" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">exec</text>

  <!-- Column 2: runc -->
  <rect x="340" y="80" width="200" height="80" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">runc</text>
  <text x="440" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">OCI Runtime Spec 구현체</text>
  <text x="440" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Go / opencontainers/runc</text>

  <!-- OCI Bundle box -->
  <rect x="60" y="220" width="220" height="70" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">OCI Bundle</text>
  <text x="170" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">config.json + rootfs/</text>
  <text x="170" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">OCI Image Spec 준수</text>

  <!-- Arrow: Bundle → runc -->
  <line x1="280" y1="255" x2="340" y2="160"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)" stroke-dasharray="4,4"/>

  <!-- Arrow: runc → Kernel -->
  <line x1="540" y1="120" x2="600" y2="120"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="570" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">syscall</text>

  <!-- Column 3: Linux Kernel primitives -->
  <rect x="600" y="80" width="220" height="340" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Linux Kernel</text>

  <!-- Kernel items -->
  <rect x="618" y="120" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Namespaces</text>

  <rect x="618" y="162" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">cgroups v1 / v2</text>

  <rect x="618" y="204" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">seccomp / LSM</text>

  <rect x="618" y="246" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Capabilities</text>

  <rect x="618" y="288" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">pivot_root / chroot</text>

  <rect x="618" y="330" width="184" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="710" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">rlimits / mounts</text>

  <!-- runc internals -->
  <rect x="340" y="220" width="200" height="180" rx="8" fill="#001a08" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">runc 내부 단계</text>
  <text x="356" y="268"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">① config.json 파싱</text>
  <text x="356" y="290"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">② Namespace 생성 (clone)</text>
  <text x="356" y="312"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">③ rootfs pivot_root</text>
  <text x="356" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">④ cgroup 연결</text>
  <text x="356" y="356"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⑤ 엔트리포인트 exec</text>
  <text x="356" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">⑥ 모니터링 &amp; 종료 처리</text>

  <!-- Arrow: runc internals → kernel -->
  <line x1="540" y1="310" x2="600" y2="280"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)" stroke-dasharray="4,4"/>

  <!-- Bottom label -->
  <text x="440" y="472" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">runc은 OCI Runtime Spec을 구현한 저수준 컨테이너 런타임 — 직접 Linux 커널 기능을 호출</text>
</svg>
