<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .sec-title { font-size: 14px; font-weight: 700; fill: #e8e8e8; letter-spacing: 0.06em; }
      .box-text { font-size: 12px; font-weight: 600; fill: #e8e8e8; }
      .inner-text { font-size: 11px; fill: #999; }
      .note-text { font-size: 10px; fill: #555; letter-spacing: 0.04em; }
      .conn-label { font-size: 10px; fill: #666; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4a4a4a"/>
    </marker>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Center divider -->
  <line x1="440" y1="18" x2="440" y2="502" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== ENCODER ===== -->
  <text x="220" y="28" class="sec-title" text-anchor="middle">인코더 (Encoder)</text>

  <!-- 입력 시퀀스 -->
  <rect x="130" y="40" width="180" height="34" fill="#111" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="220" y="62" class="box-text" text-anchor="middle">입력 시퀀스</text>

  <line x1="220" y1="74" x2="220" y2="92" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 임베딩 + PE -->
  <rect x="100" y="94" width="240" height="34" fill="#111" stroke="#2e2e2e" stroke-width="1.5" rx="6"/>
  <text x="220" y="116" class="inner-text" text-anchor="middle">임베딩 + 위치 인코딩 (PE)</text>

  <line x1="220" y1="128" x2="220" y2="146" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 인코더 블록 (dashed) -->
  <rect x="60" y="148" width="320" height="186" fill="#0d0d0d" stroke="#2e2e2e" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="220" y="168" class="note-text" text-anchor="middle">인코더 블록 × N</text>

  <!-- MHSA -->
  <rect x="80" y="176" width="280" height="36" fill="#141414" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="220" y="199" class="inner-text" text-anchor="middle">멀티헤드 셀프 어텐션</text>

  <text x="220" y="228" class="note-text" text-anchor="middle">Add &amp; Norm</text>

  <!-- FFN -->
  <rect x="80" y="238" width="280" height="36" fill="#141414" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="220" y="261" class="inner-text" text-anchor="middle">피드포워드 네트워크 (FFN)</text>

  <text x="220" y="296" class="note-text" text-anchor="middle">Add &amp; Norm</text>
  <!-- block ends at y=334 -->

  <line x1="220" y1="334" x2="220" y2="352" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 인코더 출력 -->
  <rect x="90" y="354" width="260" height="34" fill="#111" stroke="#3a3a3a" stroke-width="1.5" rx="6"/>
  <text x="220" y="376" class="inner-text" text-anchor="middle" fill="#b0b0b0">인코더 출력 (맥락 벡터)</text>


  <!-- ===== DECODER ===== -->
  <text x="660" y="28" class="sec-title" text-anchor="middle">디코더 (Decoder)</text>

  <!-- 이전 출력 토큰 -->
  <rect x="570" y="40" width="180" height="34" fill="#111" stroke="#333" stroke-width="1.5" rx="6"/>
  <text x="660" y="62" class="box-text" text-anchor="middle">이전 출력 토큰</text>

  <line x1="660" y1="74" x2="660" y2="92" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 임베딩 + PE -->
  <rect x="540" y="94" width="240" height="34" fill="#111" stroke="#2e2e2e" stroke-width="1.5" rx="6"/>
  <text x="660" y="116" class="inner-text" text-anchor="middle">임베딩 + 위치 인코딩 (PE)</text>

  <line x1="660" y1="128" x2="660" y2="146" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 디코더 블록 (dashed) -->
  <rect x="500" y="148" width="320" height="240" fill="#0d0d0d" stroke="#2e2e2e" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="660" y="168" class="note-text" text-anchor="middle">디코더 블록 × N</text>

  <!-- 마스크드 MHSA -->
  <rect x="520" y="176" width="280" height="36" fill="#141414" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="660" y="199" class="inner-text" text-anchor="middle">마스크드 셀프 어텐션</text>

  <text x="660" y="228" class="note-text" text-anchor="middle">Add &amp; Norm</text>

  <!-- 크로스 어텐션 (highlighted) -->
  <rect x="520" y="238" width="280" height="36" fill="#141414" stroke="#3e3e3e" stroke-width="1.5" rx="5"/>
  <text x="660" y="261" class="inner-text" text-anchor="middle" fill="#b0b0b0">크로스 어텐션 ← 인코더</text>

  <text x="660" y="296" class="note-text" text-anchor="middle">Add &amp; Norm</text>

  <!-- FFN -->
  <rect x="520" y="304" width="280" height="36" fill="#141414" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="660" y="327" class="inner-text" text-anchor="middle">피드포워드 네트워크 (FFN)</text>

  <text x="660" y="362" class="note-text" text-anchor="middle">Add &amp; Norm</text>
  <!-- block ends at y=388 -->

  <line x1="660" y1="388" x2="660" y2="406" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 선형 + Softmax -->
  <rect x="580" y="408" width="160" height="34" fill="#111" stroke="#2e2e2e" stroke-width="1.5" rx="6"/>
  <text x="660" y="430" class="inner-text" text-anchor="middle">선형 변환 + Softmax</text>

  <line x1="660" y1="442" x2="660" y2="460" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 다음 토큰 -->
  <rect x="610" y="462" width="100" height="34" fill="#1a1a1a" stroke="#4a4a4a" stroke-width="1.5" rx="6"/>
  <text x="660" y="484" class="box-text" text-anchor="middle" fill="#e0e0e0">다음 토큰</text>


  <!-- ===== CROSS-ATTENTION CONNECTION ===== -->
  <!-- From encoder output right (350, 371) → elbow → decoder cross-attn left (520, 256) -->
  <path d="M 350,371 L 430,371 L 430,256 L 520,256"
        fill="none" stroke="#555" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="432" y="340" class="conn-label" text-anchor="start">맥락</text>
  <text x="432" y="353" class="conn-label" text-anchor="start">전달</text>

</svg>
