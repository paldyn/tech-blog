<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="ar-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ar-arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Argo Rollouts — 구성 요소</text>

  <!-- Rollout CRD -->
  <rect x="50" y="95" width="220" height="90" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Rollout (CRD)</text>
  <text x="160" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Deployment를 대체</text>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">strategy: canary / blueGreen</text>

  <!-- controller -->
  <rect x="330" y="95" width="220" height="90" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Rollouts Controller</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단계 진행 · 가중치 조정</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">분석 · 자동 승급/롤백</text>

  <line x1="270" y1="140" x2="330" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar-arr)"/>

  <!-- ReplicaSets -->
  <rect x="610" y="80" width="220" height="50" rx="8" fill="#13151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">stable ReplicaSet (v1)</text>

  <rect x="610" y="150" width="220" height="50" rx="8" fill="#13151c" stroke="#ce9178" stroke-width="1.5"/>
  <text x="720" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">canary ReplicaSet (v2)</text>

  <line x1="550" y1="125" x2="610" y2="105" stroke="#55c555" stroke-width="2" marker-end="url(#ar-arr)"/>
  <line x1="550" y1="155" x2="610" y2="175" stroke="#55c555" stroke-width="2" marker-end="url(#ar-arr)"/>

  <!-- AnalysisRun -->
  <rect x="330" y="240" width="220" height="90" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">AnalysisRun</text>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AnalysisTemplate 기반</text>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메트릭 쿼리 · 성공/실패 판정</text>

  <line x1="440" y1="185" x2="440" y2="240" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ar-arg)"/>

  <!-- metric provider -->
  <rect x="50" y="240" width="220" height="90" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">메트릭 공급자</text>
  <text x="160" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Prometheus · Datadog</text>
  <text x="160" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CloudWatch · Web 등</text>

  <line x1="330" y1="285" x2="270" y2="285" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ar-arr)"/>

  <!-- traffic router -->
  <rect x="610" y="240" width="220" height="90" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="720" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">트래픽 라우터</text>
  <text x="720" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Istio · NGINX · ALB</text>
  <text x="720" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Gateway API · SMI</text>

  <line x1="550" y1="160" x2="610" y2="255" stroke="#55c555" stroke-width="2" marker-end="url(#ar-arr)"/>

  <!-- bottom -->
  <rect x="50" y="375" width="780" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">컨트롤러가 가중치·분석·승급을 자동 조율 — 매니페스트는 Deployment와 거의 동일</text>
</svg>
