<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">접근 제어 구현 패턴</text>

  <!-- Vulnerable IDOR -->
  <text x="220" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">취약 — 소유자 검증 없음</text>

  <rect x="60" y="94" width="340" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">// ❌ IDOR 취약 패턴</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">app</text>
  <text x="104" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.get(</text>
  <text x="148" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'/orders/:id'</text>
  <text x="250" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, async (req, res) =&gt; {</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // ID만으로 조회 — 소유자 확인 없음!</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  const</text>
  <text x="120" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> order = await Order.findById(req.params.id);</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  res.json(order);</text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">});</text>

  <!-- Safe IDOR -->
  <text x="660" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">안전 — 소유자 검증 포함</text>

  <rect x="480" y="94" width="340" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">// ✅ 소유자 확인 포함</text>
  <text x="496" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">app</text>
  <text x="524" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.get(</text>
  <text x="568" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'/orders/:id'</text>
  <text x="670" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, authenticate, async (req, res) =&gt; {</text>
  <text x="496" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  const</text>
  <text x="540" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> order = await Order.findOne({</text>
  <text x="496" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    _id: req.params.id,</text>
  <text x="496" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">    userId: req.user.id  </text>
  <text x="648" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 소유자 검증</text>
  <text x="496" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  });</text>

  <!-- Role-based access -->
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">역할 기반 접근 제어 (RBAC) 미들웨어</text>

  <rect x="60" y="268" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">// 재사용 가능한 권한 미들웨어</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="118" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> requireRole = (...roles) =&gt; (req, res, next) =&gt; {</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if</text>
  <text x="96" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> (!req.user || !roles.includes(req.user.role))</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    return res.status(</text>
  <text x="208" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">403</text>
  <text x="226" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">).json({ error: </text>
  <text x="346" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">'Forbidden'</text>
  <text x="408" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> });</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  next();</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  };</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">app.delete('/admin/users/:id', authenticate, requireRole('admin'), deleteUser);</text>
</svg>
