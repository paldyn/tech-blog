<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 시스템의 프라이버시 위협</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">학습 단계와 추론 단계에서 발생하는 프라이버시 공격</text>

  <!-- Center: AI Model -->
  <rect x="355" y="190" width="170" height="80" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">AI 모델</text>
  <text x="440" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">학습 데이터 내재</text>
  <text x="440" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파라미터에 기억</text>

  <!-- Attack 1: Membership Inference -->
  <rect x="60" y="96" width="210" height="80" rx="8" fill="#1a100a" stroke="#e05555" stroke-width="1"/>
  <text x="165" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">멤버십 추론 공격</text>
  <text x="165" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특정 데이터가 학습에</text>
  <text x="165" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포함됐는지 추론</text>
  <line x1="270" y1="136" x2="355" y2="210" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>

  <!-- Attack 2: Model Inversion -->
  <rect x="60" y="210" width="210" height="80" rx="8" fill="#1a100a" stroke="#e05555" stroke-width="1"/>
  <text x="165" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">모델 역추론 공격</text>
  <text x="165" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모델 출력으로 학습</text>
  <text x="165" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터를 재구성</text>
  <line x1="270" y1="250" x2="355" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>

  <!-- Attack 3: Training Data Extraction -->
  <rect x="60" y="324" width="210" height="80" rx="8" fill="#1a100a" stroke="#e05555" stroke-width="1"/>
  <text x="165" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">학습 데이터 추출</text>
  <text x="165" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LLM에 학습된 개인정보</text>
  <text x="165" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프롬프트로 추출</text>
  <line x1="270" y1="364" x2="355" y2="270" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>

  <!-- Attack 4: Inference-time Privacy -->
  <rect x="610" y="96" width="210" height="80" rx="8" fill="#1a100a" stroke="#e0a055" stroke-width="1"/>
  <text x="715" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">추론 시점 유출</text>
  <text x="715" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 입력 프롬프트</text>
  <text x="715" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API 서버에 전달됨</text>
  <line x1="610" y1="136" x2="525" y2="210" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Attack 5: Adversarial Extraction -->
  <rect x="610" y="210" width="210" height="80" rx="8" fill="#1a100a" stroke="#e0a055" stroke-width="1"/>
  <text x="715" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">적대적 추출</text>
  <text x="715" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RAG 시스템에서</text>
  <text x="715" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타 사용자 컨텍스트 접근</text>
  <line x1="610" y1="250" x2="525" y2="250" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Attack 6: Aggregation Attack -->
  <rect x="610" y="324" width="210" height="80" rx="8" fill="#1a100a" stroke="#e0a055" stroke-width="1"/>
  <text x="715" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">집계 공격</text>
  <text x="715" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">익명화 데이터 여러 개를</text>
  <text x="715" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결합해 개인 식별</text>
  <line x1="610" y1="364" x2="525" y2="270" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Bottom labels -->
  <text x="165" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">← 학습 단계 공격</text>
  <text x="715" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055" text-anchor="middle">추론 단계 공격 →</text>
</svg>
