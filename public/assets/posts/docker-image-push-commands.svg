<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image push — 명령 패턴</text>

  <!-- Left column -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 push 흐름</text>
  <rect x="60" y="92" width="370" height="154" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1. 이미지 빌드</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker build</tspan><tspan fill="#ffffff"> -t myapp:v1.0.0 .</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2. 레지스트리용 태그 추가</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#ffffff"> myapp:v1.0.0 \</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  myorg/myapp:v1.0.0</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 3. push</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker push</tspan><tspan fill="#ffffff"> myorg/myapp:v1.0.0</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker push</tspan><tspan fill="#ffffff"> myorg/myapp:latest</tspan></text>

  <!-- Left column: CI pattern -->
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">버전 + latest 동시 push</text>
  <rect x="60" y="282" width="370" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">VERSION=v1.0.0</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#ffffff"> myapp myorg/myapp:$VERSION</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#ffffff"> myapp myorg/myapp:latest</tspan></text>

  <!-- Right column: Private registry -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Private Registry push</text>
  <rect x="448" y="92" width="372" height="136" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 로그인</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker login</tspan><tspan fill="#ffffff"> ghcr.io -u $GITHUB_ACTOR \</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  --password-stdin &lt;&lt;&lt; $GITHUB_TOKEN</tspan></text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 태그 + push</text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#ffffff"> myapp ghcr.io/myorg/myapp:v1</tspan></text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker push</tspan><tspan fill="#ffffff"> ghcr.io/myorg/myapp:v1</tspan></text>
  <text x="464" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># --password-stdin 권장 (보안)</text>

  <!-- Right column: –all-tags -->
  <text x="460" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--all-tags 옵션</text>
  <rect x="448" y="270" width="372" height="84" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 로컬의 모든 태그 한 번에 push</text>
  <text x="464" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker push</tspan><tspan fill="#ffffff"> --all-tags myorg/myapp</tspan></text>
  <text x="464" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 같은 이름의 모든 로컬 태그 전송</text>
  <text x="464" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">v1.0.0, v1.0.1, latest 등 한 번에</text>

  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">push 전 docker tag로 레지스트리 주소 포함 이름으로 지정 필수</text>
</svg>
