<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-active" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨텍스트 전환 흐름</text>

  <!-- kubectl at top -->
  <rect x="340" y="72" width="200" height="52" rx="8" fill="#1a1a1a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="102" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">kubectl</text>

  <!-- Current context label -->
  <rect x="340" y="150" width="200" height="44" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="176" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">current-context</text>
  <line x1="440" y1="124" x2="440" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Three cluster contexts -->
  <!-- Context 1: dev (active) -->
  <rect x="60" y="240" width="200" height="80" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">dev-cluster</text>
  <text x="160" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">kind-dev</text>
  <text x="160" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">● 현재 활성</text>
  <line x1="380" y1="194" x2="200" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr-active)"/>

  <!-- Context 2: staging -->
  <rect x="340" y="240" width="200" height="80" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">staging-cluster</text>
  <text x="440" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">arn:aws:eks:...</text>
  <text x="440" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">비활성</text>
  <line x1="440" y1="194" x2="440" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Context 3: prod -->
  <rect x="620" y="240" width="200" height="80" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="720" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">prod-cluster</text>
  <text x="720" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">gke_project_...</text>
  <text x="720" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">비활성</text>
  <line x1="500" y1="194" x2="680" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Switch command -->
  <rect x="60" y="358" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="386" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl config use-context staging-cluster</text>
</svg>
