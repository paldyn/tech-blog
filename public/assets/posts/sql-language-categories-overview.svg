<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL 언어 분류 — DDL · DML · DCL · TCL</text>

  <!-- DDL -->
  <rect x="60" y="66" width="370" height="170" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="60" y="66" width="370" height="28" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">DDL — 데이터 정의어</text>
  <text x="245" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Data Definition Language — 구조 생성/변경/삭제</text>

  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">CREATE</text>
  <text x="170" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테이블, 인덱스, 뷰 생성</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">ALTER</text>
  <text x="170" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테이블/컬럼/제약 수정</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DROP</text>
  <text x="170" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">객체 완전 삭제 (복구 불가)</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">TRUNCATE</text>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 행 삭제 (구조 유지)</text>
  <text x="245" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">대부분 DBMS에서 암묵적 커밋 (Auto-commit)</text>

  <!-- DML -->
  <rect x="450" y="66" width="370" height="170" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <rect x="450" y="66" width="370" height="28" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">DML — 데이터 조작어</text>
  <text x="635" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Data Manipulation Language — 데이터 읽기/쓰기</text>

  <text x="470" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">SELECT</text>
  <text x="560" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 조회 (읽기 전용)</text>
  <text x="470" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">INSERT</text>
  <text x="560" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">행 삽입</text>
  <text x="470" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">UPDATE</text>
  <text x="560" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 행 수정</text>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">DELETE</text>
  <text x="560" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">행 삭제 (조건부 가능)</text>
  <text x="635" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">트랜잭션 내에서 실행 — COMMIT/ROLLBACK 가능</text>

  <!-- DCL -->
  <rect x="60" y="256" width="370" height="150" rx="8" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <rect x="60" y="256" width="370" height="28" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="245" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">DCL — 데이터 제어어</text>
  <text x="245" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Data Control Language — 권한 관리</text>

  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">GRANT</text>
  <text x="170" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권한 부여 (SELECT, INSERT 등)</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">REVOKE</text>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권한 회수</text>
  <text x="245" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DBA 영역 — 보안 정책과 연계</text>
  <text x="245" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ROLE로 권한 묶음 관리</text>

  <!-- TCL -->
  <rect x="450" y="256" width="370" height="150" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <rect x="450" y="256" width="370" height="28" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">TCL — 트랜잭션 제어어</text>
  <text x="635" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Transaction Control Language — ACID 보장</text>

  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">COMMIT</text>
  <text x="570" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 영구 반영</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">ROLLBACK</text>
  <text x="570" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 취소, 이전 상태로</text>
  <text x="470" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SAVEPOINT</text>
  <text x="570" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">트랜잭션 중간 저장점</text>
  <text x="635" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ROLLBACK TO SAVEPOINT로 부분 롤백</text>

  <!-- Bottom note -->
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">일부 분류에서는 SELECT를 별도 DQL(Data Query Language)로 구분하기도 함</text>
</svg>
