<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 언어 분류 체계</text>

  <!-- DDL -->
  <rect x="60" y="68" width="360" height="120" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">DDL — 데이터 정의어</text>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Data Definition Language</text>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">CREATE · ALTER · DROP</text>
  <text x="240" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">TRUNCATE · RENAME · COMMENT</text>
  <text x="240" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스키마 구조 정의. 즉시 COMMIT(암묵적)</text>

  <!-- DML -->
  <rect x="460" y="68" width="360" height="120" rx="8" fill="#111822" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">DML — 데이터 조작어</text>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Data Manipulation Language</text>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SELECT · INSERT · UPDATE</text>
  <text x="640" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">DELETE · MERGE · CALL</text>
  <text x="640" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 CRUD. 트랜잭션 안에서 실행</text>

  <!-- DCL -->
  <rect x="60" y="214" width="360" height="120" rx="8" fill="#111822" stroke="#ce9178" stroke-width="2"/>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ce9178" text-anchor="middle">DCL — 데이터 제어어</text>
  <text x="240" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Data Control Language</text>
  <text x="240" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">GRANT · REVOKE</text>
  <text x="240" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">권한 부여 및 회수</text>
  <text x="240" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">보안 접근 제어. 즉시 적용</text>

  <!-- TCL -->
  <rect x="460" y="214" width="360" height="120" rx="8" fill="#111822" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">TCL — 트랜잭션 제어어</text>
  <text x="640" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Transaction Control Language</text>
  <text x="640" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">COMMIT · ROLLBACK</text>
  <text x="640" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SAVEPOINT · SET TRANSACTION</text>
  <text x="640" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 경계 제어</text>

  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SELECT는 DML에 속하지만 "조회 전용"이므로 DQL(Data Query Language)로 따로 부르기도 함</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DDL은 암묵적 커밋 — Oracle/MSSQL/PostgreSQL 모두 DDL은 트랜잭션 밖에서 즉시 반영</text>
</svg>
