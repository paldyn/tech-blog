<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 언어 분류 — DDL · DML · DCL · TCL</text>

  <!-- ── DDL (top-left) ── -->
  <rect x="60" y="72" width="350" height="190" rx="8" fill="#0d0d0d" stroke="#2a2a4a"/>
  <rect x="60" y="72" width="350" height="44" rx="8" fill="#0a0a1a"/>
  <rect x="60" y="100" width="350" height="16" fill="#0a0a1a"/>
  <text x="235" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">DDL — 데이터 정의 언어</text>
  <text x="235" y="113" text-anchor="middle" font-size="10" fill="#555">Data Definition Language</text>
  <text x="80" y="136" font-size="12" fill="#7777cc">CREATE</text>
  <text x="148" y="136" font-size="12" fill="#888">테이블·인덱스·뷰 생성</text>
  <text x="80" y="155" font-size="12" fill="#7777cc">ALTER</text>
  <text x="148" y="155" font-size="12" fill="#888">컬럼 추가·변경·삭제</text>
  <text x="80" y="174" font-size="12" fill="#7777cc">DROP</text>
  <text x="148" y="174" font-size="12" fill="#888">객체 완전 삭제</text>
  <text x="80" y="193" font-size="12" fill="#7777cc">TRUNCATE</text>
  <text x="185" y="193" font-size="12" fill="#888">모든 행 삭제 (DDL 계열)</text>
  <text x="80" y="212" font-size="12" fill="#7777cc">RENAME</text>
  <text x="185" y="212" font-size="12" fill="#888">객체 이름 변경</text>
  <text x="80" y="246" font-size="11" fill="#555">암묵적 COMMIT · 롤백 불가</text>

  <!-- ── DML (top-right) ── -->
  <rect x="470" y="72" width="350" height="190" rx="8" fill="#0d0d0d" stroke="#1a2a1a"/>
  <rect x="470" y="72" width="350" height="44" rx="8" fill="#0a1a0a"/>
  <rect x="470" y="100" width="350" height="16" fill="#0a1a0a"/>
  <text x="645" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">DML — 데이터 조작 언어</text>
  <text x="645" y="113" text-anchor="middle" font-size="10" fill="#555">Data Manipulation Language</text>
  <text x="490" y="136" font-size="12" fill="#55c555">SELECT</text>
  <text x="558" y="136" font-size="12" fill="#888">데이터 조회 (읽기)</text>
  <text x="490" y="155" font-size="12" fill="#55c555">INSERT</text>
  <text x="558" y="155" font-size="12" fill="#888">새 행 삽입</text>
  <text x="490" y="174" font-size="12" fill="#55c555">UPDATE</text>
  <text x="558" y="174" font-size="12" fill="#888">기존 행 수정</text>
  <text x="490" y="193" font-size="12" fill="#55c555">DELETE</text>
  <text x="558" y="193" font-size="12" fill="#888">행 삭제 (조건부)</text>
  <text x="490" y="212" font-size="12" fill="#55c555">MERGE</text>
  <text x="558" y="212" font-size="12" fill="#888">INSERT + UPDATE 합성 (UPSERT)</text>
  <text x="490" y="246" font-size="11" fill="#555">트랜잭션 안에서 동작 · ROLLBACK 가능</text>

  <!-- ── DCL (bottom-left) ── -->
  <rect x="60" y="282" width="350" height="170" rx="8" fill="#0d0d0d" stroke="#2a1a1a"/>
  <rect x="60" y="282" width="350" height="44" rx="8" fill="#1a0a0a"/>
  <rect x="60" y="310" width="350" height="16" fill="#1a0a0a"/>
  <text x="235" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">DCL — 데이터 제어 언어</text>
  <text x="235" y="323" text-anchor="middle" font-size="10" fill="#555">Data Control Language</text>
  <text x="80" y="346" font-size="12" fill="#e05555">GRANT</text>
  <text x="148" y="346" font-size="12" fill="#888">권한 부여 (SELECT, INSERT…)</text>
  <text x="80" y="365" font-size="12" fill="#e05555">REVOKE</text>
  <text x="148" y="365" font-size="12" fill="#888">권한 회수</text>
  <text x="80" y="384" font-size="11" fill="#555">예: GRANT SELECT ON employees TO alice;</text>
  <text x="80" y="403" font-size="11" fill="#555">예: REVOKE INSERT ON orders FROM bob;</text>
  <text x="80" y="430" font-size="11" fill="#444">보안·접근제어 담당. 대부분 즉시 반영됨</text>

  <!-- ── TCL (bottom-right) ── -->
  <rect x="470" y="282" width="350" height="170" rx="8" fill="#0d0d0d" stroke="#1a1a2a"/>
  <rect x="470" y="282" width="350" height="44" rx="8" fill="#0a0a15"/>
  <rect x="470" y="310" width="350" height="16" fill="#0a0a15"/>
  <text x="645" y="309" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">TCL — 트랜잭션 제어 언어</text>
  <text x="645" y="323" text-anchor="middle" font-size="10" fill="#555">Transaction Control Language</text>
  <text x="490" y="346" font-size="12" fill="#7ec8e3">COMMIT</text>
  <text x="566" y="346" font-size="12" fill="#888">변경 사항 영구 반영</text>
  <text x="490" y="365" font-size="12" fill="#7ec8e3">ROLLBACK</text>
  <text x="566" y="365" font-size="12" fill="#888">변경 사항 취소 (마지막 커밋 이후)</text>
  <text x="490" y="384" font-size="12" fill="#7ec8e3">SAVEPOINT</text>
  <text x="590" y="384" font-size="12" fill="#888">중간 저장점 설정</text>
  <text x="490" y="403" font-size="12" fill="#7ec8e3">BEGIN / START TRAN</text>
  <text x="490" y="417" font-size="11" fill="#555">(일부 DBMS에서 TCL로 분류)</text>
  <text x="490" y="440" font-size="11" fill="#444">ACID 보장의 핵심. DML과 함께 동작</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
