<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파라미터 확장 고급 패턴</text>

  <!-- Code block: indirection and substrings -->
  <rect x="60" y="70" width="360" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">간접 참조 &amp; 변수명 목록</text>
  <text x="80" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">VAR=greeting</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">greeting=<tspan fill="#ce9178">"안녕하세요"</tspan></text>
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 간접 참조 ${!var}</tspan></text>
  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${!VAR}"</tspan>   <tspan fill="#9aa4b8"># 안녕하세요</tspan></text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># DB_ 로 시작하는 변수명 목록</tspan></text>
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${!DB_@}"</tspan></text>
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 배열 인덱스/키 목록</tspan></text>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ARR=(<tspan fill="#ce9178">a b c</tspan>)</text>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${!ARR[@]}"</tspan>  <tspan fill="#9aa4b8"># 0 1 2</tspan></text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${#ARR[@]}"</tspan>  <tspan fill="#9aa4b8"># 3 (길이)</tspan></text>

  <!-- Right: transform expansions -->
  <rect x="460" y="70" width="360" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">변환 확장 (Bash 4.4+)</text>
  <text x="480" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">STR=<tspan fill="#ce9178">"Hello World"</tspan></text>
  <text x="480" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 쿼팅: 특수문자 이스케이프</tspan></text>
  <text x="480" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${STR@Q}"</tspan></text>
  <text x="480" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 대문자/소문자 변환</tspan></text>
  <text x="480" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${STR@U}"</tspan>  <tspan fill="#9aa4b8"># HELLO WORLD</tspan></text>
  <text x="480" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${STR@L}"</tspan>  <tspan fill="#9aa4b8"># hello world</tspan></text>
  <text x="480" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 변수 속성 정보</tspan></text>
  <text x="480" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${STR@a}"</tspan>  <tspan fill="#9aa4b8"># 속성 플래그</tspan></text>
  <text x="480" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># printf 형식 출력</tspan></text>
  <text x="480" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"${STR@E}"</tspan>  <tspan fill="#9aa4b8"># 이스케이프 해석</tspan></text>

  <!-- Bottom label -->
  <text x="440" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@Q / @U / @L / @a / @E — Bash 4.4 이상, ${!var}은 Bash 2.0 이상</text>
</svg>
