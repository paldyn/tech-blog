<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#2a4a5a" stroke-width="0.5"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555" stroke="#1a4a1a" stroke-width="0.5"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05555" stroke="#5a1a1a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Autowired 빈 선택 우선순위</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">타입 → 빈 이름 → @Primary → @Qualifier</text>

  <!-- Step 1: Type match -->
  <rect x="60" y="90" width="760" height="52" rx="8" fill="#0e1820" stroke="#1e3050"/>
  <text x="100" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Step 1</text>
  <text x="160" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">타입으로 후보 검색</text>
  <text x="160" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PaymentGateway 타입의 빈을 모두 찾는다</text>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">후보 N개</text>

  <!-- Arrow -->
  <line x1="440" y1="142" x2="440" y2="162" stroke="#2a4a5a" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Step 2: Single or Multiple -->
  <rect x="60" y="164" width="340" height="52" rx="8" fill="#071207" stroke="#1e3a1e"/>
  <text x="100" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">N = 1</text>
  <text x="150" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">바로 주입 완료</text>
  <text x="100" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유일한 구현체 자동 선택</text>

  <rect x="480" y="164" width="340" height="52" rx="8" fill="#0f0e07" stroke="#3a3a1e"/>
  <text x="520" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">N ≥ 2</text>
  <text x="570" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">후보 여러 개 → 추가 선택</text>
  <text x="520" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@Primary / @Qualifier / 빈이름 순서로</text>

  <!-- Arrow from multiple -->
  <line x1="650" y1="216" x2="650" y2="240" stroke="#3a3a2a" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Step 3: @Primary -->
  <rect x="480" y="242" width="340" height="52" rx="8" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Step 2</text>
  <text x="580" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">@Primary 빈 있으면 선택</text>
  <text x="520" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@Primary가 없으면 Step 3으로</text>

  <!-- Arrow -->
  <line x1="650" y1="294" x2="650" y2="318" stroke="#3a3a2a" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Step 3: @Qualifier -->
  <rect x="480" y="320" width="340" height="52" rx="8" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Step 3</text>
  <text x="580" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">@Qualifier 이름 매칭</text>
  <text x="520" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선언한 qualifier값과 동일한 빈 선택</text>

  <!-- Arrow -->
  <line x1="650" y1="372" x2="650" y2="396" stroke="#3a3a2a" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Step 4: bean name -->
  <rect x="480" y="398" width="340" height="52" rx="8" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Step 4</text>
  <text x="580" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파라미터·필드 이름 매칭</text>
  <text x="520" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수명 = 빈 이름이면 선택</text>

  <!-- No match -->
  <text x="680" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">매칭 실패 → NoUniqueBeanDefinitionException</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
