<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">gitignore 범위별 계층 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">전역 · 저장소 · 로컬 — 각각 역할이 다르다</text>

  <!-- Column headers -->
  <text x="180" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">전역 (Global)</text>
  <text x="440" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">저장소 (Repo)</text>
  <text x="700" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">로컬 (Local)</text>

  <!-- Global column -->
  <rect x="60" y="118" width="240" height="220" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="180" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">~/.config/git/ignore</text>
  <text x="180" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">또는 core.excludesFile</text>
  <line x1="80" y1="172" x2="280" y2="172" stroke="#1e2c4a" stroke-width="1"/>
  <text x="180" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 모든 저장소에 적용</text>
  <text x="180" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 저장소에 커밋 안 됨</text>
  <text x="180" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 개인 도구 설정</text>
  <text x="180" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">.DS_Store</text>
  <text x="180" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Thumbs.db</text>
  <text x="180" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">.idea/ .vscode/</text>
  <text x="180" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">*.local</text>

  <!-- Repo column -->
  <rect x="320" y="118" width="240" height="220" fill="#0d1520" rx="8" stroke="#1a4a1a" stroke-width="1"/>
  <text x="440" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">.gitignore (루트/하위)</text>
  <text x="440" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">저장소에 커밋됨</text>
  <line x1="340" y1="172" x2="540" y2="172" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 팀 전체에 공유</text>
  <text x="440" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 프로젝트 빌드 산출물</text>
  <text x="440" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 프레임워크 캐시</text>
  <text x="440" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">node_modules/</text>
  <text x="440" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">dist/ build/ target/</text>
  <text x="440" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">__pycache__/</text>
  <text x="440" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">.env (환경 변수)</text>

  <!-- Local column -->
  <rect x="580" y="118" width="240" height="220" fill="#0d1520" rx="8" stroke="#4a3a1a" stroke-width="1"/>
  <text x="700" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">.git/info/exclude</text>
  <text x="700" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">커밋 안 됨, 로컬만</text>
  <line x1="600" y1="172" x2="800" y2="172" stroke="#1e2c4a" stroke-width="1"/>
  <text x="700" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 이 저장소에서만</text>
  <text x="700" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 팀원과 공유 안 됨</text>
  <text x="700" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 임시/개인 작업용</text>
  <text x="700" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">scratch.txt</text>
  <text x="700" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">my-notes.md</text>
  <text x="700" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">local-config/</text>

  <!-- Legend: sharing -->
  <rect x="60" y="358" width="760" height="40" fill="#0a0f1a" rx="6" stroke="#1e2c4a" stroke-width="1"/>
  <text x="180" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">개인 — 모든 저장소</text>
  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">팀 공유 — 이 저장소</text>
  <text x="700" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">개인 — 이 저장소만</text>
</svg>
