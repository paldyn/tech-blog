<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DBMS별 SQL 방언 주요 차이</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="264" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 페이지 제한 (LIMIT / TOP / ROWNUM 방언 비교)</text>
  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- [PostgreSQL / MySQL / SQLite]</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> * <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> products <tspan font-weight="600" fill="#7ec8e3">LIMIT</tspan> <tspan fill="#b5cea8">10</tspan> <tspan font-weight="600" fill="#7ec8e3">OFFSET</tspan> <tspan fill="#b5cea8">20</tspan>;</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- [SQL Server / SQL:2008 표준]</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> * <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> products</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">ORDER BY</tspan> id <tspan font-weight="600" fill="#7ec8e3">OFFSET</tspan> <tspan fill="#b5cea8">20</tspan> <tspan font-weight="600" fill="#7ec8e3">ROWS FETCH NEXT</tspan> <tspan fill="#b5cea8">10</tspan> <tspan font-weight="600" fill="#7ec8e3">ROWS ONLY</tspan>;</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- [Oracle &lt; 12c]</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> * <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> (</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> *, ROWNUM rn <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> products <tspan font-weight="600" fill="#7ec8e3">WHERE</tspan> ROWNUM &lt;= <tspan fill="#b5cea8">30</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">) <tspan font-weight="600" fill="#7ec8e3">WHERE</tspan> rn &gt; <tspan fill="#b5cea8">20</tspan>;</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- [SQL Server &lt; 2012]</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT TOP</tspan> <tspan fill="#b5cea8">10</tspan> * <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> products;  <tspan fill="#9aa4b8">-- OFFSET 지원 X</tspan></text>
</svg>
