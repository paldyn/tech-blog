<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 방언(Dialect) 비교</text>

  <!-- ANSI (center) -->
  <rect x="330" y="66" width="220" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ANSI/ISO SQL 표준</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공통 문법의 기준</text>

  <!-- Vendors -->
  <rect x="60" y="176" width="160" height="60" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Oracle</text>
  <text x="140" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ROWNUM, NVL, DECODE</text>

  <rect x="250" y="176" width="160" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PostgreSQL</text>
  <text x="330" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RETURNING, ILIKE, $$</text>

  <rect x="440" y="176" width="160" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MySQL</text>
  <text x="520" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LIMIT, AUTO_INCREMENT</text>

  <rect x="630" y="176" width="190" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="725" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SQL Server (T-SQL)</text>
  <text x="725" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TOP, IDENTITY, ISNULL</text>

  <!-- dashed lines from ANSI -->
  <line x1="390" y1="126" x2="160" y2="176" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="420" y1="126" x2="330" y2="176" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="460" y1="126" x2="520" y2="176" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="490" y1="126" x2="725" y2="176" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Code comparison -->
  <rect x="60" y="260" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 상위 3행 조회 — 방언별 차이</text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- Oracle: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FETCH FIRST</tspan>
    <tspan fill="#ffffff"> 3 </tspan>
    <tspan fill="#7ec8e3" font-weight="600">ROWS ONLY</tspan>
    <tspan fill="#9aa4b8">  MySQL: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">LIMIT</tspan>
    <tspan fill="#ffffff"> 3</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- ANSI:  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FETCH FIRST</tspan>
    <tspan fill="#ffffff"> 3 </tspan>
    <tspan fill="#7ec8e3" font-weight="600">ROWS ONLY</tspan>
    <tspan fill="#9aa4b8">  T-SQL: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">TOP</tspan>
    <tspan fill="#ffffff">(3)</tspan>
  </text>
</svg>
