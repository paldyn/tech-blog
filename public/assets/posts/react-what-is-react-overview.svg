<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React: 사용자 인터페이스 라이브러리</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">View 레이어에 집중 — 나머지는 생태계가 담당</text>

  <defs>
    <marker id="arr-cyan" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="55" y="100" width="190" height="260" rx="10" fill="#12121e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="126" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">입력 (Input)</text>

  <rect x="75" y="143" width="150" height="52" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="166" font-size="13" fill="#e8e8e8" text-anchor="middle">State / Props</text>
  <text x="150" y="185" font-size="11" fill="#888" text-anchor="middle">컴포넌트 데이터</text>

  <rect x="75" y="208" width="150" height="52" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="231" font-size="13" fill="#e8e8e8" text-anchor="middle">사용자 이벤트</text>
  <text x="150" y="250" font-size="11" fill="#888" text-anchor="middle">클릭, 입력, 스크롤</text>

  <rect x="75" y="273" width="150" height="52" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="296" font-size="13" fill="#e8e8e8" text-anchor="middle">외부 데이터</text>
  <text x="150" y="315" font-size="11" fill="#888" text-anchor="middle">API 응답, Context</text>

  <line x1="245" y1="230" x2="305" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-cyan)"/>

  <rect x="305" y="100" width="270" height="260" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="126" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">React Core</text>

  <rect x="325" y="143" width="230" height="46" rx="6" fill="#111825" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="163" font-size="13" fill="#e8e8e8" text-anchor="middle">컴포넌트 트리 구성</text>
  <text x="440" y="180" font-size="11" fill="#888" text-anchor="middle">App -&gt; Page -&gt; Card -&gt; Button</text>

  <rect x="325" y="200" width="230" height="46" rx="6" fill="#111825" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="220" font-size="13" fill="#e8e8e8" text-anchor="middle">Virtual DOM 생성</text>
  <text x="440" y="237" font-size="11" fill="#888" text-anchor="middle">메모리 내 경량 UI 표현</text>

  <rect x="325" y="257" width="230" height="46" rx="6" fill="#111825" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="277" font-size="13" fill="#e8e8e8" text-anchor="middle">Diff &amp; Reconcile</text>
  <text x="440" y="294" font-size="11" fill="#888" text-anchor="middle">변경 부분만 최소 업데이트</text>

  <line x1="575" y1="230" x2="635" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="635" y="100" width="190" height="260" rx="10" fill="#0f1e12" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="126" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">출력 (Output)</text>

  <rect x="655" y="143" width="150" height="52" rx="6" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="166" font-size="13" fill="#e8e8e8" text-anchor="middle">브라우저 DOM</text>
  <text x="730" y="185" font-size="11" fill="#888" text-anchor="middle">실제 화면 업데이트</text>

  <rect x="655" y="208" width="150" height="52" rx="6" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="231" font-size="13" fill="#e8e8e8" text-anchor="middle">Native (RN)</text>
  <text x="730" y="250" font-size="11" fill="#888" text-anchor="middle">iOS / Android</text>

  <rect x="655" y="273" width="150" height="52" rx="6" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="296" font-size="13" fill="#e8e8e8" text-anchor="middle">서버 렌더링</text>
  <text x="730" y="315" font-size="11" fill="#888" text-anchor="middle">HTML 문자열 (SSR)</text>

  <rect x="55" y="390" width="770" height="80" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="416" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">React는 View만 담당 — 생태계로 완성</text>
  <text x="440" y="440" font-size="12" fill="#888" text-anchor="middle">라우팅: React Router · 상태: Zustand/Redux · 서버: Next.js/Remix</text>
  <text x="440" y="460" font-size="12" fill="#888" text-anchor="middle">데이터 패칭: TanStack Query · 폼: React Hook Form</text>
</svg>
