<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">React — 선언형 UI 라이브러리</text>

  <!-- Left: Imperative -->
  <rect x="60" y="76" width="340" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="230" y="102" text-anchor="middle" font-size="16" font-weight="600" fill="#e05555">명령형 (jQuery / Vanilla JS)</text>
  <!-- code box -->
  <rect x="76" y="116" width="308" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="136" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" dy="0" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> btn = </tspan><tspan fill="#7ec8e3" font-weight="600">document</tspan>
    <tspan x="92" dy="18" fill="#ffffff">.getElementById(</tspan><tspan fill="#ce9178">'btn'</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="18" fill="#ffffff">btn.textContent = count;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">btn.style.color = </tspan><tspan fill="#ce9178">'red'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 어떻게 바꿀지 직접 지시</tspan>
  </text>

  <!-- Right: Declarative -->
  <rect x="480" y="76" width="340" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="650" y="102" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">선언형 (React)</text>
  <!-- code box -->
  <rect x="496" y="116" width="308" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="512" y="136" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="512" dy="0" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Counter() {</tspan>
    <tspan x="512" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="512" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;button&gt;</tspan><tspan fill="#ffffff">{count}</tspan><tspan fill="#ce9178">&lt;/button&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="512" dy="18" fill="#ffffff">}</tspan>
    <tspan x="512" dy="18" fill="#9aa4b8">// 어떤 상태여야 할지만 선언</tspan>
  </text>

  <!-- VS Arrow -->
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="398" y="132" width="64" height="32" rx="8" fill="#1e1b4b"/>
  <text x="430" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">vs</text>

  <!-- UI = f(state) section -->
  <rect x="60" y="264" width="760" height="90" rx="10" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="296" text-anchor="middle" font-size="20" font-weight="700" fill="#7ec8e3">UI = f(state)</text>
  <text x="440" y="326" text-anchor="middle" font-size="14" fill="#888">상태(state)가 주어지면 UI는 항상 동일하게 결정된다 — React의 핵심 철학</text>

  <!-- Three pillars -->
  <rect x="60" y="378" width="222" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="171" y="406" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">컴포넌트 기반</text>
  <text x="171" y="428" text-anchor="middle" font-size="12" fill="#888">UI를 독립된 조각으로 분리</text>
  <text x="171" y="446" text-anchor="middle" font-size="12" fill="#888">재사용 · 조합 가능</text>

  <rect x="329" y="378" width="222" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">단방향 데이터 흐름</text>
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#888">props는 부모→자식으로만</text>
  <text x="440" y="446" text-anchor="middle" font-size="12" fill="#888">예측 가능한 상태 관리</text>

  <rect x="598" y="378" width="222" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="709" y="406" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">가상 DOM 활용</text>
  <text x="709" y="428" text-anchor="middle" font-size="12" fill="#888">변경된 부분만 실제 DOM</text>
  <text x="709" y="446" text-anchor="middle" font-size="12" fill="#888">에 반영 — 성능 최적화</text>
</svg>
