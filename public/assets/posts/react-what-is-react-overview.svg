<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">React란 무엇인가?</text>

  <rect x="310" y="68" width="260" height="64" rx="12" fill="#0f1f3d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">React</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">UI 구축을 위한 자바스크립트 라이브러리</text>

  <line x1="440" y1="132" x2="440" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="60" y="172" width="220" height="78" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">컴포넌트(Components)</text>
  <text x="170" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">UI를 독립적이고 재사용</text>
  <text x="170" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">가능한 조각으로 분리</text>

  <rect x="330" y="172" width="220" height="78" rx="12" fill="#1a1a0d" stroke="#e0c044" stroke-width="1.5"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c044">상태(State)</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">UI 변화를 이끄는</text>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">컴포넌트 내부 데이터</text>

  <rect x="600" y="172" width="220" height="78" rx="12" fill="#1a0d1a" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="710" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#cc77cc">속성(Props)</text>
  <text x="710" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">부모에서 자식으로</text>
  <text x="710" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">전달되는 읽기 전용 값</text>

  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">라이브러리 vs 프레임워크</text>

  <rect x="60" y="310" width="360" height="110" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">React (라이브러리)</text>
  <text x="240" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; UI 렌더링에 집중</text>
  <text x="240" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; 라우팅&#xB7;상태관리는 별도 선택</text>
  <text x="240" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; 유연한 조합 (자유도 높음)</text>

  <rect x="460" y="310" width="360" height="110" rx="12" fill="#1a1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Angular / Vue (프레임워크)</text>
  <text x="640" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; 풀스택 솔루션 제공</text>
  <text x="640" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; 라우팅&#xB7;상태&#xB7;폼 내장</text>
  <text x="640" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2022; 정해진 구조 (자유도 낮음)</text>

  <rect x="60" y="440" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// React 컴포넌트의 기본 구조</text>
  <text x="76" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Greeting({ name }) {</tspan></text>
  <text x="76" y="504" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;h1&gt;안녕하세요, {name}님!&lt;/h1&gt;;</tspan></text>
  <text x="76" y="524" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
