<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Zustand 미들웨어 합성</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">스토어 생성자를 함수로 감싸는 계층 구조</text>

  <!-- Layer 1: devtools -->
  <rect x="140" y="95" width="600" height="250" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="162" y="121" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">devtools( ... )</text>
  <text x="718" y="121" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Redux DevTools 연동</text>

  <!-- Layer 2: persist -->
  <rect x="180" y="135" width="520" height="170" rx="10" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="202" y="161" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">persist( ... )</text>
  <text x="678" y="161" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">localStorage 저장</text>

  <!-- Layer 3: immer -->
  <rect x="220" y="175" width="440" height="90" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="242" y="201" text-anchor="start"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">immer( ... )</text>
  <text x="638" y="201" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">불변성 자동 처리</text>

  <!-- Layer 4: creator -->
  <rect x="260" y="215" width="360" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="238" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">(set, get) =&gt; ({ ...state })</text>

  <text x="440" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">안쪽에서 바깥 순서로 적용된다 — immer → persist → devtools</text>
</svg>
