<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분할 상환 분석의 3가지 기법</text>

  <!-- Method 1: Aggregate -->
  <rect x="60" y="76" width="240" height="150" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="180" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">총계법 (Aggregate)</text>
  <line x1="80" y1="114" x2="280" y2="114" stroke="#333" stroke-width="1"/>
  <text x="180" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">n번 연산의 총 비용 T(n) 계산</text>
  <text x="180" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">분할 상환 비용 = T(n)/n</text>
  <text x="180" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">3n / n = O(1)</text>
  <text x="180" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">동적 배열 분석에 직관적</text>

  <!-- Method 2: Accounting -->
  <rect x="320" y="76" width="240" height="150" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">회계법 (Accounting)</text>
  <line x1="340" y1="114" x2="540" y2="114" stroke="#333" stroke-width="1"/>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 연산에 "크레딧" 미리 부여</text>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비싼 연산은 누적 크레딧으로</text>
  <text x="440" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">push에 3 크레딧 부여</text>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">복사 비용 선불 처리</text>

  <!-- Method 3: Potential -->
  <rect x="580" y="76" width="240" height="150" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">포텐셜법 (Potential)</text>
  <line x1="600" y1="114" x2="800" y2="114" stroke="#333" stroke-width="1"/>
  <text x="700" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포텐셜 함수 Φ 정의</text>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">분할상환비용 = 실비용 + ΔΦ</text>
  <text x="700" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Φ = 2·size - capacity</text>
  <text x="700" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">이론 분석에서 가장 엄밀</text>

  <!-- Real-world examples -->
  <rect x="60" y="246" width="760" height="150" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">분할 상환 O(1)인 실제 자료구조·연산</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">● Python list.append()</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">동적 배열 확장: 가끔 O(n)이지만 평균 O(1)</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">● 스택의 push/pop (최대 크기 제한 없을 때)</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">균형 잡힌 push/pop 시퀀스의 평균 비용</text>
  <text x="460" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">● Hash table insertion (동적 리해싱)</text>
  <text x="460" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">load factor 초과 시 O(n), 평균 O(1)</text>
  <text x="460" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">● 피보나치 힙 연산</text>
  <text x="460" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">decrease-key amortized O(1)</text>
</svg>
