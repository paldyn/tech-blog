<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="rdArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="rdArrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">환원 A ≤ₚ B: A를 B의 입력으로 변환</text>

  <!-- A instance -->
  <rect x="60" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#e8a855" stroke-width="2"/>
  <text x="150" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a855" font-weight="600">A의 입력 x</text>
  <text x="150" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">풀고 싶은 문제</text>

  <!-- transform f -->
  <rect x="350" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">변환 f (다항 시간)</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">x → f(x)</text>

  <!-- B instance -->
  <rect x="640" y="110" width="180" height="80" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="730" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">B의 입력 f(x)</text>
  <text x="730" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">풀 줄 아는 문제</text>

  <line x1="242" y1="150" x2="348" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rdArr)"/>
  <line x1="532" y1="150" x2="638" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rdArr)"/>

  <!-- answer flow back -->
  <rect x="640" y="250" width="180" height="64" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="730" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">B의 답 (예/아니오)</text>
  <text x="730" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">B 해결기로 계산</text>

  <rect x="60" y="250" width="180" height="64" rx="8" fill="#000000" stroke="#e8a855" stroke-width="2"/>
  <text x="150" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a855" font-weight="600">A의 답</text>
  <text x="150" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그대로 사용</text>

  <line x1="638" y1="282" x2="242" y2="282" stroke="#55c555" stroke-width="2" marker-end="url(#rdArrG)"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">같은 답 (yes ⇔ yes 보존)</text>

  <text x="730" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">↓ B를 푼다</text>

  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">B를 풀 수 있으면 A도 풀 수 있다 → "B는 A만큼 어렵다"</text>
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">변환 f 자체가 다항 시간이어야 어려움이 정확히 전달된다</text>
</svg>
