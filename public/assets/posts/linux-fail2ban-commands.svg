<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fail2ban-client 운영 명령</text>

  <!-- Col headers -->
  <rect x="60" y="60" width="300" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="210" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">명령</text>
  <rect x="372" y="60" width="448" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="596" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">설명</text>

  <!-- Row 1 -->
  <rect x="60" y="104" width="300" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="80" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">fail2ban-client status</text>
  <rect x="372" y="104" width="448" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">전체 jail 목록 및 상태</text>
  <text x="392" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">활성 jail, 밴된 IP 수 등</text>

  <!-- Row 2 -->
  <rect x="60" y="152" width="300" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="80" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">fail2ban-client status sshd</text>
  <rect x="372" y="152" width="448" height="40" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="392" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">sshd jail 상세 — 밴된 IP 목록</text>
  <text x="392" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">currently-banned, failed 횟수</text>

  <!-- Row 3 -->
  <rect x="60" y="200" width="300" height="40" rx="4" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1"/>
  <text x="80" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">fail2ban-client ban sshd 1.2.3.4</text>
  <rect x="372" y="200" width="448" height="40" rx="4" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1"/>
  <text x="392" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">수동 IP 차단</text>
  <text x="392" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">알려진 악성 IP 즉시 차단</text>

  <!-- Row 4 -->
  <rect x="60" y="248" width="300" height="40" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="80" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">fail2ban-client unban 1.2.3.4</text>
  <rect x="372" y="248" width="448" height="40" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="392" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">수동 IP 해제</text>
  <text x="392" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실수로 자신의 IP 밴됐을 때</text>

  <!-- Code: test -->
  <rect x="60" y="304" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 필터 테스트: 로그 라인이 failregex와 매칭되는지 확인</text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">fail2ban-regex</text>
  <text x="192" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> /var/log/auth.log /etc/fail2ban/filter.d/sshd.conf</text>
  <text x="80" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 자신의 IP 화이트리스트: jail.local  ignoreip = 192.168.1.0/24</text>
</svg>
