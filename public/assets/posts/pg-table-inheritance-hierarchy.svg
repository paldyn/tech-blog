<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">테이블 상속 계층 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">부모 테이블 조회 → 자식 데이터 포함</text>

  <!-- Parent table: vehicle -->
  <rect x="300" y="100" width="280" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">vehicle (부모)</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">id, make, model, year, price</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">CHECK (year >= 1886)</text>

  <!-- Arrow to car -->
  <line x1="340" y1="180" x2="200" y2="270" stroke="#444" stroke-width="1.5"/>
  <polygon points="194,264 200,278 206,264" fill="#444"/>

  <!-- Arrow to truck -->
  <line x1="440" y1="180" x2="440" y2="270" stroke="#444" stroke-width="1.5"/>
  <polygon points="434,264 440,278 446,264" fill="#444"/>

  <!-- Arrow to motorcycle -->
  <line x1="540" y1="180" x2="680" y2="270" stroke="#444" stroke-width="1.5"/>
  <polygon points="674,264 680,278 686,264" fill="#444"/>

  <!-- INHERITS label -->
  <text x="270" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">INHERITS</text>
  <text x="450" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">INHERITS</text>
  <text x="600" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">INHERITS</text>

  <!-- Child: car -->
  <rect x="80" y="278" width="240" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">car (자식)</text>
  <text x="200" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">+ num_doors, fuel_type</text>
  <text x="200" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">부모 컬럼 모두 상속</text>

  <!-- Child: truck -->
  <rect x="320" y="278" width="240" height="80" rx="8" fill="#0d1f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">truck (자식)</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">+ payload_tons, axles</text>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">부모 컬럼 모두 상속</text>

  <!-- Child: motorcycle -->
  <rect x="560" y="278" width="240" height="80" rx="8" fill="#1a0d1f" stroke="#c880e0" stroke-width="1.5"/>
  <text x="680" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#c880e0" text-anchor="middle">motorcycle (자식)</text>
  <text x="680" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">+ sidecar, engine_cc</text>
  <text x="680" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">부모 컬럼 모두 상속</text>

  <!-- Query result boxes -->
  <rect x="60" y="390" width="370" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SELECT * FROM vehicle</text>
  <text x="245" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ car + truck + motorcycle 모두 포함</text>
  <text x="245" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">tableoid::regclass로 자식 테이블 구분 가능</text>

  <rect x="450" y="390" width="370" height="80" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="635" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">SELECT * FROM ONLY vehicle</text>
  <text x="635" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ vehicle 직접 삽입된 행만</text>
  <text x="635" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ONLY 키워드로 자식 제외</text>
</svg>
