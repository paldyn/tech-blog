<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">형식 검사 유형별 정규식 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">날짜 · 숫자 · 이메일 · 전화번호 — 자주 쓰는 정규식 모음</text>

  <!-- 헤더 -->
  <rect x="60" y="88" width="160" height="32" fill="#111" rx="4"/>
  <text x="140" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">형식 유형</text>
  <rect x="224" y="88" width="200" height="32" fill="#111" rx="4"/>
  <text x="324" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">입력 예시</text>
  <rect x="428" y="88" width="392" height="32" fill="#111" rx="4"/>
  <text x="624" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">정규식 패턴</text>

  <!-- 날짜 YYYYMMDD -->
  <rect x="60" y="124" width="160" height="40" fill="#0d2137" rx="4"/>
  <text x="140" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">날짜 (YYYYMMDD)</text>
  <rect x="224" y="124" width="200" height="40" fill="#0d2137" rx="4"/>
  <text x="324" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">20261231</text>
  <rect x="428" y="124" width="392" height="40" fill="#0d2137" rx="4"/>
  <text x="438" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^\d{4}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])$/</text>

  <!-- 날짜 YYYY-MM-DD -->
  <rect x="60" y="168" width="160" height="40" fill="#0d1a2a" rx="4"/>
  <text x="140" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">날짜 (YYYY-MM-DD)</text>
  <rect x="224" y="168" width="200" height="40" fill="#0d1a2a" rx="4"/>
  <text x="324" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">2026-12-31</text>
  <rect x="428" y="168" width="392" height="40" fill="#0d1a2a" rx="4"/>
  <text x="438" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/</text>

  <!-- 정수 -->
  <rect x="60" y="212" width="160" height="40" fill="#0d1e0d" rx="4"/>
  <text x="140" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">정수</text>
  <rect x="224" y="212" width="200" height="40" fill="#0d1e0d" rx="4"/>
  <text x="324" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">-123, 0, 456</text>
  <rect x="428" y="212" width="392" height="40" fill="#0d1e0d" rx="4"/>
  <text x="438" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^-?\d+$/</text>

  <!-- 소수 -->
  <rect x="60" y="256" width="160" height="40" fill="#0d1e0d" rx="4"/>
  <text x="140" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">소수 (양수)</text>
  <rect x="224" y="256" width="200" height="40" fill="#0d1e0d" rx="4"/>
  <text x="324" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">3.14, 100.0</text>
  <rect x="428" y="256" width="392" height="40" fill="#0d1e0d" rx="4"/>
  <text x="438" y="281" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^\d+(\.\d+)?$/</text>

  <!-- 이메일 -->
  <rect x="60" y="300" width="160" height="40" fill="#160f28" rx="4"/>
  <text x="140" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">이메일</text>
  <rect x="224" y="300" width="200" height="40" fill="#160f28" rx="4"/>
  <text x="324" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">user@example.com</text>
  <rect x="428" y="300" width="392" height="40" fill="#160f28" rx="4"/>
  <text x="438" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^[\w.+-]+@[\w-]+\.[a-z]{2,}$/i</text>

  <!-- 전화번호 -->
  <rect x="60" y="344" width="160" height="40" fill="#1a1a0d" rx="4"/>
  <text x="140" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c44a" text-anchor="middle">전화번호</text>
  <rect x="224" y="344" width="200" height="40" fill="#1a1a0d" rx="4"/>
  <text x="324" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">010-1234-5678</text>
  <rect x="428" y="344" width="392" height="40" fill="#1a1a0d" rx="4"/>
  <text x="438" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/^0\d{1,2}-\d{3,4}-\d{4}$/</text>

  <!-- 사업자번호 -->
  <rect x="60" y="388" width="160" height="40" fill="#111" rx="4"/>
  <text x="140" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사업자번호</text>
  <rect x="224" y="388" width="200" height="40" fill="#111" rx="4"/>
  <text x="324" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">123-45-67890</text>
  <rect x="428" y="388" width="392" height="40" fill="#111" rx="4"/>
  <text x="438" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">/^\d{3}-\d{2}-\d{5}$/</text>
</svg>
