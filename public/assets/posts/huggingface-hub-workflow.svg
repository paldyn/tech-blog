<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HuggingFace Hub — 업로드 &amp; 다운로드 워크플로우</text>

  <!-- Hub central box -->
  <rect x="300" y="180" width="280" height="80" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">HuggingFace Hub</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">huggingface.co</text>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">models · datasets · spaces</text>

  <!-- Left: Local workspace -->
  <rect x="60" y="180" width="200" height="80" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="160" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">로컬 작업공간</text>
  <text x="160" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">model weights / tokenizer</text>
  <text x="160" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">datasets / Gradio app</text>

  <!-- Arrow: Local → Hub (upload) -->
  <line x1="260" y1="210" x2="298" y2="218" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="279" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">push_to_hub()</text>

  <!-- Arrow: Hub → Local (download) -->
  <line x1="298" y1="238" x2="260" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="279" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">from_pretrained()</text>

  <!-- Right: User application -->
  <rect x="620" y="180" width="200" height="80" rx="8" fill="#251a35" stroke="#6e3a9e" stroke-width="1.5"/>
  <text x="720" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#c77ec8" text-anchor="middle">사용자 앱</text>
  <text x="720" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AutoModel.from_pretrained</text>
  <text x="720" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pipeline() / load_dataset()</text>

  <!-- Arrow: Hub → App -->
  <line x1="580" y1="218" x2="618" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="599" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">다운로드</text>

  <!-- Bottom three type boxes -->
  <rect x="60" y="310" width="220" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="170" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Model Repository</text>
  <text x="170" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pytorch_model.bin / safetensors</text>
  <text x="170" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">config.json · tokenizer.json</text>

  <rect x="330" y="310" width="220" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dataset Repository</text>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Arrow / Parquet 파일</text>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">dataset_infos.json</text>

  <rect x="600" y="310" width="220" height="80" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="710" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c77ec8" text-anchor="middle">Space (앱 배포)</text>
  <text x="710" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Gradio / Streamlit 앱</text>
  <text x="710" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">app.py + requirements.txt</text>

  <!-- Connectors from Hub to type boxes -->
  <line x1="380" y1="260" x2="200" y2="310" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="260" x2="440" y2="310" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="500" y1="260" x2="680" y2="310" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Code block -->
  <rect x="60" y="416" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 모델 업로드 — push_to_hub()</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">model.push_to_hub(</text>
  <text x="220" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"my-org/klue-bert-finetuned"</text>
  <text x="534" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">tokenizer.push_to_hub(</text>
  <text x="246" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"my-org/klue-bert-finetuned"</text>
  <text x="560" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 다운로드 — from_pretrained()이 내부적으로 hf_hub_download() 호출</text>
</svg>
