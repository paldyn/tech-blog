<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Named Volume 생명주기</text>

  <!-- Step 1: Create -->
  <rect x="60" y="70" width="160" height="80" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 생성</text>
  <text x="140" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">volume create</text>
  <text x="140" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이름 지정</text>

  <!-- Arrow 1 → 2 -->
  <line x1="220" y1="110" x2="258" y2="110" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="266,110 254,104 254,116" fill="#7ec8e3"/>

  <!-- Step 2: Use -->
  <rect x="266" y="70" width="160" height="80" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="346" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 마운트</text>
  <text x="346" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">docker run -v</text>
  <text x="346" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컨테이너에 연결</text>

  <!-- Arrow 2 → 3 -->
  <line x1="426" y1="110" x2="464" y2="110" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="472,110 460,104 460,116" fill="#7ec8e3"/>

  <!-- Step 3: Inspect -->
  <rect x="472" y="70" width="160" height="80" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="552" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 확인</text>
  <text x="552" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">volume inspect</text>
  <text x="552" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상태·경로 조회</text>

  <!-- Arrow 3 → 4 -->
  <line x1="632" y1="110" x2="670" y2="110" stroke="#e05555" stroke-width="2"/>
  <polygon points="678,110 666,104 666,116" fill="#e05555"/>

  <!-- Step 4: Remove -->
  <rect x="678" y="70" width="150" height="80" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="753" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">④ 삭제</text>
  <text x="753" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">volume rm</text>
  <text x="753" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">명시적 삭제 필요</text>

  <!-- Note: container rm does not delete volume -->
  <rect x="266" y="180" width="350" height="40" fill="#1a1f0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="441" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">docker rm (컨테이너 삭제) 해도 볼륨은 유지됨</text>

  <!-- Commands block -->
  <rect x="60" y="244" width="760" height="128" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 생성</tspan></text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">docker volume create </tspan><tspan fill="#ce9178">my-data</tspan></text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 마운트 후 컨테이너 실행</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#ffffff"> -d -v </tspan><tspan fill="#ce9178">my-data</tspan><tspan fill="#ffffff">:/data --name myapp ubuntu sleep inf</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 컨테이너 삭제 후에도 볼륨은 남는다</tspan></text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker rm</tspan><tspan fill="#ffffff"> myapp  </tspan><tspan fill="#9aa4b8">→  docker volume ls 에서 my-data 여전히 존재</tspan></text>
</svg>
