<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub 이슈 템플릿 종류</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">.github/ISSUE_TEMPLATE/ 디렉토리 구성</text>

  <!-- Directory structure (left top) -->
  <rect x="40" y="90" width="360" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .github/ISSUE_TEMPLATE/ 구조</text>
  <text x="56" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">.github/ISSUE_TEMPLATE/</text>
  <text x="56" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">&#9500;&#9472; bug_report.yml</text>
  <text x="56" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">&#9500;&#9472; feature_request.yml</text>
  <text x="56" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">&#9492;&#9472; config.yml</text>
  <text x="56" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .yml = Issue Forms (구조화)</text>
  <text x="56" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .md = 기존 마크다운 방식</text>

  <!-- Bug report template (bottom left) -->
  <rect x="40" y="258" width="360" height="216" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">bug_report.yml</text>
  <text x="56" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">name</text>
  <text x="106" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">: Bug Report</text>
  <text x="56" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">description</text>
  <text x="152" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">: 버그를 신고합니다</text>
  <text x="56" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">labels</text>
  <text x="112" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">: [</text>
  <text x="136" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">bug</text>
  <text x="174" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">]</text>
  <text x="56" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">body</text>
  <text x="96" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">:</text>
  <text x="56" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  - type: </text>
  <text x="132" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">textarea</text>
  <text x="56" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    id: </text>
  <text x="98" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">reproduce</text>
  <text x="56" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    label: </text>
  <text x="114" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">재현 방법</text>
  <text x="56" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    required: </text>
  <text x="138" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">true</text>
  <text x="56" y="460" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">  - type: dropdown ...</text>

  <!-- Right side: Issue Forms field types -->
  <rect x="420" y="90" width="420" height="380" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="630" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Issue Forms 필드 유형</text>

  <!-- Field types -->
  <rect x="436" y="128" width="180" height="56" rx="6" fill="#0d1824" stroke="#7ec8e3" stroke-width="1"/>
  <text x="526" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">textarea</text>
  <text x="526" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">여러 줄 텍스트 입력</text>

  <rect x="626" y="128" width="180" height="56" rx="6" fill="#0d1824" stroke="#7ec8e3" stroke-width="1"/>
  <text x="716" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">input</text>
  <text x="716" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단일 줄 텍스트</text>

  <rect x="436" y="198" width="180" height="56" rx="6" fill="#071624" stroke="#9988dd" stroke-width="1"/>
  <text x="526" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">dropdown</text>
  <text x="526" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">선택 목록</text>

  <rect x="626" y="198" width="180" height="56" rx="6" fill="#071624" stroke="#9988dd" stroke-width="1"/>
  <text x="716" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">checkboxes</text>
  <text x="716" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">체크박스 목록</text>

  <rect x="436" y="268" width="370" height="56" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1"/>
  <text x="621" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">markdown</text>
  <text x="621" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">읽기 전용 안내 텍스트 (입력 없음)</text>

  <!-- config.yml -->
  <rect x="436" y="344" width="370" height="110" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="621" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">config.yml — 이슈 생성 화면 설정</text>
  <text x="452" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">blank_issues_enabled</text>
  <text x="626" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">: false</text>
  <text x="452" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8"># 빈 이슈 생성 비활성화</text>
  <text x="452" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"># 템플릿 선택 강제</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Issue Forms(.yml)는 구조화된 입력 폼 제공 — .md 방식보다 일관된 데이터 수집 가능</text>
</svg>
