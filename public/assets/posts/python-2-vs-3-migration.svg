<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 2→3 마이그레이션 체크리스트</text>

  <!-- Left column -->
  <rect x="60" y="70" width="360" height="260" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">자주 나오는 변환 포인트</text>
  <line x1="80" y1="104" x2="400" y2="104" stroke="#7777cc" stroke-width="0.5"/>
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  print 문 → print() 함수</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  unicode → str, str → bytes</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  3/2 결과 확인 (정수→실수)</text>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  dict.keys()/.values() 이터레이터</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  except Exception, e → except E as e</text>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  xrange → range</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  __future__ 임포트 제거</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x25B6;  reduce → functools.reduce</text>

  <!-- Right column -->
  <rect x="460" y="70" width="360" height="260" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">2to3 자동 변환 도구</text>
  <line x1="480" y1="104" x2="800" y2="104" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="476" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 없이 Python에 내장됨</text>
  <text x="476" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ 2to3 -w myscript.py</tspan></text>
  <text x="476" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 차이만 미리 보기</text>
  <text x="476" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ 2to3 mydir/</tspan></text>
  <text x="476" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 수정자만 실행</text>
  <text x="476" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ 2to3 -f print -w x.py</tspan></text>
  <text x="476" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># pyupgrade: 더 적극적 변환</text>
  <text x="476" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ pyupgrade --py39-plus *.py</tspan></text>

  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">신규 프로젝트는 처음부터 Python 3.12+ 로 시작하세요</text>
</svg>
