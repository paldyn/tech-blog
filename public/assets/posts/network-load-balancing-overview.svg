<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">로드 밸런싱 — 요청 분산 구조</text>

  <!-- Clients (left) -->
  <rect x="50" y="110" width="138" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="119" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">클라이언트 1</text>

  <rect x="50" y="204" width="138" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="119" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">클라이언트 2</text>

  <rect x="50" y="298" width="138" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="119" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">클라이언트 3</text>

  <!-- Load Balancer (center) -->
  <rect x="350" y="162" width="170" height="136" rx="10" fill="#0b2016" stroke="#2a8a50" stroke-width="2"/>
  <text x="435" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">로드 밸런서</text>
  <text x="435" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Load Balancer</text>
  <text x="435" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">VIP: 10.0.0.1</text>
  <text x="435" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">분산 규칙 적용</text>

  <!-- Servers (right) -->
  <rect x="662" y="110" width="155" height="52" rx="8" fill="#1a0f20" stroke="#6a3a8a" stroke-width="1.5"/>
  <text x="739" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">서버 A  192.168.1.10</text>

  <rect x="662" y="204" width="155" height="52" rx="8" fill="#1a0f20" stroke="#6a3a8a" stroke-width="1.5"/>
  <text x="739" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">서버 B  192.168.1.11</text>

  <rect x="662" y="298" width="155" height="52" rx="8" fill="#1a0f20" stroke="#6a3a8a" stroke-width="1.5"/>
  <text x="739" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">서버 C  192.168.1.12</text>

  <!-- Arrows: Clients → LB -->
  <line x1="188" y1="136" x2="350" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <line x1="188" y1="230" x2="350" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <line x1="188" y1="324" x2="350" y2="264" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Arrows: LB → Servers -->
  <line x1="520" y1="196" x2="662" y2="136" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="520" y1="230" x2="662" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="520" y1="264" x2="662" y2="324" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Arrow labels -->
  <text x="265" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">HTTP 요청</text>
  <text x="588" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">분산 처리</text>

  <!-- Bottom summary -->
  <rect x="50" y="412" width="780" height="44" rx="6" fill="#0f1a0f" stroke="#1a4a2a" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트는 항상 동일한 VIP로 요청 — 실제 서버 IP는 로드 밸런서만 알고 있음</text>
</svg>
