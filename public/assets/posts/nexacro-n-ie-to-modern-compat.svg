<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IE → 모던 브라우저 전환 체크리스트</text>

  <!-- Column headers -->
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">IE 전용 패턴</text>
  <text x="680" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">모던 표준 대체</text>

  <!-- Divider line -->
  <line x1="440" y1="70" x2="440" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Row 1 -->
  <rect x="60" y="108" width="340" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">ActiveX 컴포넌트</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">그리드·파일 업로드 ActiveX</text>

  <line x1="400" y1="138" x2="460" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="108" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Nexacro N Grid / HTML5 API</text>
  <text x="500" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">네이티브 컴포넌트 또는 표준 API</text>

  <!-- Row 2 -->
  <rect x="60" y="190" width="340" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">document.all / attachEvent</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IE 전용 DOM API 사용</text>

  <line x1="400" y1="220" x2="460" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="190" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">nexacro.on() / 표준 이벤트</text>
  <text x="500" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Nexacro 이벤트 핸들러 사용</text>

  <!-- Row 3 -->
  <rect x="60" y="272" width="340" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">CSS filter: progid:...</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IE 전용 그래디언트·그림자 CSS</text>

  <line x1="400" y1="302" x2="460" y2="302" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="272" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Nexacro CSS-like 속성</text>
  <text x="500" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">background-color / box-shadow 등</text>

  <!-- Row 4 -->
  <rect x="60" y="354" width="340" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">VBScript / JScript 혼용</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IE 전용 스크립트 언어</text>

  <line x1="400" y1="384" x2="460" y2="384" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="354" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">순수 JavaScript (ECMAScript)</text>
  <text x="500" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">표준 JS로 통일 — ES6+ 기능 활용</text>

  <!-- Row 5 -->
  <rect x="60" y="436" width="340" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">window.showModalDialog</text>
  <text x="80" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IE 전용 팝업 API</text>

  <line x1="400" y1="466" x2="460" y2="466" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="436" width="340" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">form.popup() / form.open()</text>
  <text x="500" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Nexacro 팝업 API로 대체</text>
</svg>
