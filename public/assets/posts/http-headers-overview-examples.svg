<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 헤더 형식과 주요 예시</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">이름: 값 형식 — 대소문자 무관 (HTTP/2는 소문자 강제)</text>

  <!-- Header format -->
  <rect x="60" y="88" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">헤더 형식</text>
  <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Header-Name:</text>
  <text x="222" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> value [; param=val]\r\n</text>
  <text x="680" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#9aa4b8">&#8592; CRLF 종결</text>

  <!-- Left examples: Request headers -->
  <text x="230" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">요청 헤더 예시</text>

  <rect x="60" y="188" width="360" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Host:</text>
  <text x="126" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> www.example.com</text>

  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Accept:</text>
  <text x="148" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> text/html,</text>
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">         application/json;q=0.9</text>

  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Accept-Encoding:</text>
  <text x="236" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> gzip, br</text>

  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Authorization:</text>
  <text x="228" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> Bearer eyJhb...</text>

  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">If-None-Match:</text>
  <text x="240" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> "abc123"</text>

  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Cookie:</text>
  <text x="148" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> session=abc; theme=dark</text>

  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="222" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> application/json</text>

  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="250" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> 42</text>

  <!-- Right examples: Response headers -->
  <text x="650" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">응답 헤더 예시</text>

  <rect x="460" y="188" width="360" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="618" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> application/json</text>

  <text x="480" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="642" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> 128</text>

  <text x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Content-Encoding:</text>
  <text x="662" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> gzip</text>

  <text x="480" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Cache-Control:</text>
  <text x="634" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> max-age=3600</text>

  <text x="480" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">ETag:</text>
  <text x="530" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#b5cea8"> "d41d8cd98f00b204"</text>

  <text x="480" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Set-Cookie:</text>
  <text x="588" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> sid=abc;</text>
  <text x="480" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">           HttpOnly; Secure</text>

  <text x="480" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Location:</text>
  <text x="566" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ce9178"> /api/users/42</text>

  <text x="480" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">Strict-Transport:</text>
  <text x="660" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> HSTS</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">HTTP/2는 헤더를 소문자 강제 (:method, :path 등 가상 헤더) + HPACK 압축으로 크기 절감</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">헤더는 평문 전송 — HTTPS 없으면 Authorization·Cookie 내용 탈취 가능</text>
</svg>
