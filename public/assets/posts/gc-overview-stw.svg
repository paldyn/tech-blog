<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Stop-The-World — 모든 GC의 공통 비용</text>

  <!-- STW band -->
  <rect x="420" y="92" width="140" height="186" fill="#e05555" fill-opacity="0.12" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="490" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">STW pause</text>

  <!-- App thread bars -->
  <text x="140" y="124" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T1</text>
  <rect x="150" y="110" width="270" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="560" y="110" width="240" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="140" y="164" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T2</text>
  <rect x="150" y="150" width="270" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="560" y="150" width="240" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <text x="140" y="204" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App T3</text>
  <rect x="150" y="190" width="270" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="560" y="190" width="240" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>

  <!-- GC thread bar -->
  <text x="140" y="254" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">GC</text>
  <rect x="420" y="240" width="140" height="18" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <!-- Phase labels -->
  <text x="285" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">애플리케이션 실행</text>
  <text x="490" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">전 스레드 정지, GC 작업</text>
  <text x="680" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">재개</text>

  <!-- Two metrics -->
  <rect x="60" y="330" width="360" height="104" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">처리량 (Throughput)</text>
  <text x="240" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전체 시간 중 앱이 실행된 비율</text>
  <text x="240" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">배치·대용량 처리에서 중요 — Parallel GC의 강점</text>

  <rect x="460" y="330" width="360" height="104" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">지연 시간 (Latency)</text>
  <text x="640" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">한 번의 멈춤이 얼마나 긴가</text>
  <text x="640" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">API 응답시간에 직결 — ZGC·Shenandoah의 강점</text>
</svg>
