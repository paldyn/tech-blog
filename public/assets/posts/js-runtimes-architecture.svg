<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 런타임 아키텍처</text>

  <!-- Shared layer label -->
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">모든 런타임의 공통 구성요소</text>

  <!-- JS Engine box (shared) -->
  <rect x="280" y="84" width="320" height="50" rx="8" fill="#0a1628" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">JS 엔진 (ECMAScript 실행)</text>
  <text x="440" y="124" text-anchor="middle" font-size="11" fill="#888">V8 / SpiderMonkey / JSC / Hermes</text>

  <!-- Arrow down -->
  <line x1="440" y1="134" x2="440" y2="154" stroke="#444" stroke-width="2"/>
  <polygon points="433,154 440,164 447,154" fill="#444"/>

  <!-- Event Loop box -->
  <rect x="280" y="166" width="320" height="44" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">이벤트 루프 (Event Loop)</text>

  <!-- Three columns below -->
  <!-- Browser column -->
  <rect x="60" y="238" width="234" height="220" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="238" width="234" height="38" rx="8" fill="#7ec8e3" fill-opacity="0.15"/>
  <text x="177" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">브라우저</text>

  <text x="80" y="296" font-size="12" fill="#888">Web APIs</text>
  <text x="80" y="316" font-size="11" fill="#666">• DOM · CSSOM</text>
  <text x="80" y="334" font-size="11" fill="#666">• fetch · WebSocket</text>
  <text x="80" y="352" font-size="11" fill="#666">• setTimeout · RAF</text>
  <text x="80" y="370" font-size="11" fill="#666">• localStorage · Cookie</text>
  <text x="80" y="388" font-size="11" fill="#666">• Web Workers</text>
  <text x="80" y="408" font-size="11" fill="#7ec8e3">샌드박스 보안 모델</text>
  <text x="80" y="428" font-size="11" fill="#7ec8e3">파일 시스템 접근 불가</text>

  <!-- Arrow: engine → browser -->
  <path d="M 360 188 L 177 188 L 177 238" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <!-- Node.js column -->
  <rect x="323" y="238" width="234" height="220" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <rect x="323" y="238" width="234" height="38" rx="8" fill="#55c555" fill-opacity="0.15"/>
  <text x="440" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Node.js</text>

  <text x="343" y="296" font-size="12" fill="#888">libuv + C++ 바인딩</text>
  <text x="343" y="316" font-size="11" fill="#666">• fs (파일시스템)</text>
  <text x="343" y="334" font-size="11" fill="#666">• net · http · https</text>
  <text x="343" y="352" font-size="11" fill="#666">• process · child_process</text>
  <text x="343" y="370" font-size="11" fill="#666">• Worker Threads</text>
  <text x="343" y="388" font-size="11" fill="#666">• Buffer · Stream</text>
  <text x="343" y="408" font-size="11" fill="#55c555">CommonJS + ESM 지원</text>
  <text x="343" y="428" font-size="11" fill="#55c555">npm 생태계</text>

  <!-- Arrow: engine → node -->
  <line x1="440" y1="210" x2="440" y2="238" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <!-- Deno/Bun column -->
  <rect x="586" y="238" width="234" height="220" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="586" y="238" width="234" height="38" rx="8" fill="#ce9178" fill-opacity="0.15"/>
  <text x="703" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">Deno / Bun</text>

  <text x="606" y="296" font-size="12" fill="#888">모던 런타임</text>
  <text x="606" y="316" font-size="11" fill="#666">• 보안 권한 모델 (Deno)</text>
  <text x="606" y="334" font-size="11" fill="#666">• Web API 기본 내장</text>
  <text x="606" y="352" font-size="11" fill="#666">• TypeScript 네이티브</text>
  <text x="606" y="370" font-size="11" fill="#666">• 번들러 내장 (Bun)</text>
  <text x="606" y="388" font-size="11" fill="#666">• JSX 지원 (Bun)</text>
  <text x="606" y="408" font-size="11" fill="#ce9178">npm 호환 (Bun)</text>
  <text x="606" y="428" font-size="11" fill="#ce9178">URL 기반 import (Deno)</text>

  <!-- Arrow: engine → deno/bun -->
  <path d="M 520 188 L 703 188 L 703 238" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <!-- Shared callback queue label at bottom of event loop -->
  <text x="440" y="232" text-anchor="middle" font-size="11" fill="#666">← 각 런타임의 Host API가 이벤트 루프에 콜백을 공급합니다 →</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="13" fill="#888">JS 엔진 = ECMAScript 실행 / 런타임 = 엔진 + 환경 API + 이벤트 루프</text>
  <text x="440" y="528" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
