<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Node.js 런타임 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">V8 엔진 + libuv 이벤트 루프 + Node.js API 레이어</text>

  <!-- Your App -->
  <rect x="300" y="100" width="280" height="50" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">애플리케이션 코드 (JS/TS)</text>

  <!-- Arrow down -->
  <line x1="440" y1="150" x2="440" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,184 434,174 446,174" fill="#555"/>

  <!-- Node.js APIs layer -->
  <rect x="120" y="184" width="640" height="56" rx="8" fill="#0e1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Node.js Core APIs</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fs · http · path · stream · crypto · child_process …</text>

  <!-- Arrow down -->
  <line x1="280" y1="240" x2="280" y2="270" stroke="#555" stroke-width="1.5"/>
  <polygon points="280,280 274,270 286,270" fill="#555"/>
  <line x1="600" y1="240" x2="600" y2="270" stroke="#555" stroke-width="1.5"/>
  <polygon points="600,280 594,270 606,270" fill="#555"/>

  <!-- V8 and libuv -->
  <rect x="120" y="280" width="300" height="70" rx="8" fill="#2e2a1a" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="270" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c55a" text-anchor="middle">V8 Engine</text>
  <text x="270" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">JS 파싱·실행·GC</text>

  <rect x="460" y="280" width="300" height="70" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">libuv</text>
  <text x="610" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이벤트 루프 · 비동기 I/O · Thread Pool</text>

  <!-- OS layer -->
  <rect x="120" y="382" width="640" height="44" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666" text-anchor="middle">운영체제 (Linux / macOS / Windows)</text>

  <text x="440" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
