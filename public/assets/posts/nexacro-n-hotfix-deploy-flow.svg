  <rect x="24" y="312" width="832" height="82" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="44" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">프로세스 노트</text>
  <text x="44" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 결함 발견 즉시 핫픽스 브랜치를 main/master에서 분기합니다.</text>
  <text x="44" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 스테이징 배포 후 스모크 테스트를 수행하고, 운영 배포 전 롤백 계획을 반드시 수립합니다.</text>
