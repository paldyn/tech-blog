<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">테이블 설계 — 좋은 이름과 나쁜 이름</text>

  <!-- ── Left: Bad examples ── -->
  <rect x="60" y="70" width="350" height="360" rx="8" fill="#0d0d0d" stroke="#3a1a1a"/>
  <text x="235" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">✗ 나쁜 예시</text>
  <line x1="60" y1="110" x2="410" y2="110" stroke="#2a1a1a"/>

  <!-- Bad code block -->
  <rect x="78" y="122" width="314" height="228" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="143" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 예약어 충돌</text>
  <text x="92" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="216" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> order</text>
  <text x="260" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="92" y="179" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 의미 불명확</text>
  <text x="92" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="216" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> t1</text>
  <text x="240" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="92" y="215" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 단수 (관례 불일치)</text>
  <text x="92" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="216" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> Employee</text>
  <text x="308" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="92" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 특수문자 포함</text>
  <text x="92" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="216" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> "User-Data"</text>
  <text x="330" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="92" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 이름이 너무 유사</text>
  <text x="92" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="216" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> orders2</text>
  <text x="282" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="92" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- SELECT는 예약어!</text>
  <text x="92" y="341" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>

  <text x="78" y="375" font-size="11" fill="#e05555">✗ order: SQL 예약어. 따옴표 필요</text>
  <text x="78" y="393" font-size="11" fill="#e05555">✗ t1: 나중에 무엇인지 알 수 없음</text>
  <text x="78" y="411" font-size="11" fill="#e05555">✗ Employee: camelCase 대신 snake_case</text>

  <!-- ── Right: Good examples ── -->
  <rect x="470" y="70" width="350" height="360" rx="8" fill="#0d0d0d" stroke="#1a3a1a"/>
  <text x="645" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">✓ 좋은 예시</text>
  <line x1="470" y1="110" x2="820" y2="110" stroke="#1a2a1a"/>

  <!-- Good code block -->
  <rect x="488" y="122" width="314" height="228" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="502" y="143" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 예약어 회피 (복수형)</text>
  <text x="502" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="626" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"> orders</text>
  <text x="678" y="161" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="502" y="179" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 의미 명확</text>
  <text x="502" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="626" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"> employees</text>
  <text x="710" y="197" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="502" y="215" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 소문자 snake_case</text>
  <text x="502" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="626" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"> order_items</text>
  <text x="716" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="502" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 알파벳+숫자+밑줄</text>
  <text x="502" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="626" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"> audit_logs</text>
  <text x="706" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>
  <text x="502" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 명확한 이름</text>
  <text x="502" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="626" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"> order_history</text>
  <text x="734" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...);</text>

  <text x="488" y="375" font-size="11" fill="#55c555">✓ orders: 복수형, 예약어 아님</text>
  <text x="488" y="393" font-size="11" fill="#55c555">✓ snake_case: 모든 DBMS에서 안전</text>
  <text x="488" y="411" font-size="11" fill="#55c555">✓ order_history: orders2보다 명확</text>

  <!-- Footer -->
  <text x="440" y="456" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 2</text>
</svg>
