<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">선택적 Catch-all — [[...slug]] 실전 예시</text>

  <!-- Left: Required catch-all -->
  <rect x="50" y="68" width="360" height="340" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">[...slug] — 필수</text>

  <rect x="68" y="108" width="324" height="60" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="131" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">app/docs/[...slug]/page.tsx</text>
  <text x="230" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1개 이상 세그먼트 필수</text>

  <rect x="68" y="184" width="324" height="76" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/intro</text>
  <text x="88" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/api/auth</text>
  <text x="88" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/a/b/c/d</text>

  <rect x="68" y="276" width="324" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">✗ /docs  →  404</text>
  <text x="88" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">별도 docs/page.tsx 필요</text>

  <rect x="68" y="334" width="324" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="118" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> { slug } = await params</text>
  <text x="84" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// slug: string[] (항상 있음)</text>
  <text x="84" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// ['intro'] | ['api','auth']</text>

  <!-- Right: Optional catch-all -->
  <rect x="470" y="68" width="360" height="340" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e07840">[[...slug]] — 선택적</text>

  <rect x="488" y="108" width="324" height="60" rx="6" fill="#2a1a08" stroke="#e07840" stroke-width="1"/>
  <text x="650" y="131" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e07840">app/docs/[[...slug]]/page.tsx</text>
  <text x="650" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0개 이상 세그먼트 허용</text>

  <rect x="488" y="184" width="324" height="92" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs  →  slug: undefined</text>
  <text x="508" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/intro</text>
  <text x="508" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/api/auth</text>
  <text x="508" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">✓ /docs/a/b/c/d</text>

  <rect x="488" y="292" width="324" height="28" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">하나의 파일로 전체 /docs/* 처리</text>

  <rect x="488" y="334" width="324" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="504" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="538" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> { slug } = await params</text>
  <text x="504" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// slug: string[] | undefined</text>
  <text x="504" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// undefined = /docs 루트</text>
</svg>
