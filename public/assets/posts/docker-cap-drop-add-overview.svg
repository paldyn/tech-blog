<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Docker 기본 Capability 집합</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">컨테이너 root는 호스트 root보다 제한된 capability를 갖는다</text>

  <!-- Default capabilities in container (14 caps) -->
  <!-- Row 1 -->
  <rect x="60" y="86" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="144" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">CHOWN</text>
  <text x="144" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 소유자 변경</text>

  <rect x="244" y="86" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="328" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DAC_OVERRIDE</text>
  <text x="328" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 권한 무시</text>

  <rect x="428" y="86" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="512" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">FOWNER</text>
  <text x="512" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소유자 권한 우회</text>

  <rect x="612" y="86" width="208" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="716" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">NET_BIND_SERVICE</text>
  <text x="716" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1024 미만 포트 바인딩</text>

  <!-- Row 2 -->
  <rect x="60" y="150" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="144" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">KILL</text>
  <text x="144" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로세스 시그널 전송</text>

  <rect x="244" y="150" width="168" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="328" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">MKNOD</text>
  <text x="328" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">디바이스 노드 생성</text>

  <rect x="428" y="150" width="168" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="512" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">NET_RAW</text>
  <text x="512" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">raw 소켓(ARP 스푸핑)</text>

  <rect x="612" y="150" width="208" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="716" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">SYS_CHROOT</text>
  <text x="716" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">chroot() 호출</text>

  <!-- Row 3 -->
  <rect x="60" y="214" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="144" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SETGID</text>
  <text x="144" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GID 변경</text>

  <rect x="244" y="214" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="328" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SETUID</text>
  <text x="328" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UID 변경</text>

  <rect x="428" y="214" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="512" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SETFCAP</text>
  <text x="512" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 capability 설정</text>

  <rect x="612" y="214" width="208" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="716" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SETPCAP</text>
  <text x="716" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">허용 집합 변경</text>

  <!-- Row 4 -->
  <rect x="60" y="278" width="168" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="144" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">AUDIT_WRITE</text>
  <text x="144" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">감사 로그 기록</text>

  <rect x="244" y="278" width="168" height="48" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="328" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SYS_PTRACE</text>
  <text x="328" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">디버거 (선택 추가)</text>

  <!-- Legend -->
  <rect x="60" y="360" width="760" height="116" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">권장 조치</text>

  <rect x="80" y="396" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="102" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">빨강 = 대부분 앱에서 불필요 → --cap-drop으로 제거 권장</text>

  <rect x="80" y="420" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="102" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">파랑 = 많은 앱에서 필요 or 무해 → 유지 가능</text>

  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최소 권한 원칙: --cap-drop=ALL 후 필요한 것만 --cap-add로 추가</text>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전체 capability 목록: man capabilities(7) 참조 (약 40개)</text>
</svg>
