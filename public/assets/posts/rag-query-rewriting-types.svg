<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">쿼리 재작성 기법 분류</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">원본 쿼리의 약점을 보완하는 4가지 전략</text>

  <!-- Original Query -->
  <rect x="330" y="90" width="220" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">원본 쿼리</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"LLM이 뭔가요?"</text>

  <!-- Arrows down -->
  <line x1="200" y1="140" x2="130" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="125,178 130,190 138,181" fill="#444"/>
  <line x1="330" y1="140" x2="310" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="305,178 310,190 318,181" fill="#444"/>
  <line x1="550" y1="140" x2="570" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="565,178 570,190 578,181" fill="#444"/>
  <line x1="680" y1="140" x2="740" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="735,178 740,190 748,181" fill="#444"/>

  <!-- 1. Multi-Query -->
  <rect x="60" y="190" width="200" height="100" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Multi-Query</text>
  <text x="160" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동일 질문을 다양한 관점으로</text>
  <text x="160" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">"LLM의 정의는?"</text>
  <text x="160" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">"대규모 언어 모델 원리?"</text>
  <text x="160" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">"GPT·Claude 차이점?"</text>

  <!-- 2. HyDE -->
  <rect x="280" y="190" width="200" height="100" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">HyDE</text>
  <text x="380" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가상 문서 임베딩</text>
  <text x="380" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">LLM이 질문에 대한</text>
  <text x="380" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">가상 답변 생성</text>
  <text x="380" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">→ 그 답변으로 검색</text>

  <!-- 3. Step-Back -->
  <rect x="500" y="190" width="200" height="100" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="600" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Step-Back</text>
  <text x="600" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상위 개념 추상화</text>
  <text x="600" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">"LLM" → "AI 언어 모델"</text>
  <text x="600" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">더 넓은 컨텍스트 검색</text>
  <text x="600" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">세부 질문 전에 배경 파악</text>

  <!-- 4. Decomposition -->
  <rect x="720" y="190" width="100" height="100" rx="8" fill="#1a1500" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="770" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e8b84b">Query</text>
  <text x="770" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e8b84b">Decomp.</text>
  <text x="770" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하위 질문 분해</text>
  <text x="770" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cccc88">"LLM 뭔가요?"</text>
  <text x="770" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cccc88">→ "정의"</text>
  <text x="770" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cccc88">→ "원리"</text>

  <!-- Code block -->
  <rect x="60" y="316" width="760" height="124" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Multi-Query 재작성 (LangChain)</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> langchain.retrievers </text>
  <text x="108" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">                     import</text>
  <text x="108" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                            MultiQueryRetriever</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">retriever = MultiQueryRetriever.from_llm(</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    retriever=vectorstore.as_retriever(),</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    llm=ChatAnthropic(model=</text>
  <text x="280" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"claude-sonnet-4-6"</text>
  <text x="472" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)  </text>
  <text x="100" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 원본 쿼리 → 3~5개 변형 쿼리 자동 생성 → 결과 통합</text>
</svg>
