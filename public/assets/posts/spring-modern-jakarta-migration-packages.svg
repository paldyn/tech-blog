<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    javax → jakarta 패키지 마이그레이션
  </text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">
    Spring Boot 2 (Java EE) → Spring Boot 3 (Jakarta EE 10)
  </text>

  <!-- Left column header: javax -->
  <rect x="60" y="100" width="320" height="42" fill="#2a1515" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">javax.* (Spring Boot 2.x)</text>

  <!-- Right column header: jakarta -->
  <rect x="500" y="100" width="320" height="42" fill="#0f2a15" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">jakarta.* (Spring Boot 3.x)</text>

  <!-- Row 1 -->
  <rect x="60" y="162" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="80" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">javax.servlet</text>
  <text x="80" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HttpServletRequest, Filter</text>

  <line x1="380" y1="188" x2="500" y2="188" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="500" y="162" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="520" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">jakarta.servlet</text>
  <text x="520" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HttpServletRequest, Filter</text>

  <!-- Row 2 -->
  <rect x="60" y="232" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="80" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">javax.persistence</text>
  <text x="80" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Entity, @Column, EntityManager</text>

  <line x1="380" y1="258" x2="500" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="500" y="232" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="520" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">jakarta.persistence</text>
  <text x="520" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Entity, @Column, EntityManager</text>

  <!-- Row 3 -->
  <rect x="60" y="302" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="80" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">javax.validation</text>
  <text x="80" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Valid, @NotNull, @Size</text>

  <line x1="380" y1="328" x2="500" y2="328" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="500" y="302" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="520" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">jakarta.validation</text>
  <text x="520" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Valid, @NotNull, @Size</text>

  <!-- Row 4 -->
  <rect x="60" y="372" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="80" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">javax.annotation</text>
  <text x="80" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@PostConstruct, @PreDestroy</text>

  <line x1="380" y1="398" x2="500" y2="398" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="500" y="372" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="520" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">jakarta.annotation</text>
  <text x="520" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@PostConstruct, @PreDestroy</text>

  <!-- Row 5 -->
  <rect x="60" y="442" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="80" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">javax.transaction</text>
  <text x="80" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Transactional (JTA)</text>

  <line x1="380" y1="468" x2="500" y2="468" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="500" y="442" width="320" height="52" fill="#1a1a1a" rx="6" stroke="#333" stroke-width="1"/>
  <text x="520" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">jakarta.transaction</text>
  <text x="520" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@Transactional (JTA)</text>

  <!-- center label -->
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">rename</text>
</svg>
