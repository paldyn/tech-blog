<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrR3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 함수 — 타입 파라미터 T의 흐름</text>

  <!-- Generic function box -->
  <rect x="250" y="66" width="380" height="70" rx="10" fill="#0a0a12" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">function identity&lt;T&gt;(x: T): T</text>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T = 호출 시점에 결정되는 타입 파라미터</text>

  <!-- Call 1 -->
  <rect x="60" y="192" width="220" height="66" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">identity("hello")</text>
  <text x="170" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T = string 추론</text>
  <text x="170" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">반환: string</text>

  <!-- Call 2 -->
  <rect x="330" y="192" width="220" height="66" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">identity(42)</text>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T = number 추론</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">반환: number</text>

  <!-- Call 3 -->
  <rect x="600" y="192" width="220" height="66" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">identity(true)</text>
  <text x="710" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T = boolean 추론</text>
  <text x="710" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">반환: boolean</text>

  <!-- Arrows from function to calls -->
  <line x1="350" y1="136" x2="200" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR3)"/>
  <line x1="440" y1="136" x2="440" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR3)"/>
  <line x1="530" y1="136" x2="680" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR3)"/>

  <!-- Key insight box -->
  <rect x="60" y="298" width="760" height="96" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">제네릭의 핵심</text>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· any와 달리 입력 타입이 출력 타입에 보존됨 — 타입 안전성 유지</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 컴파일러가 T를 추론하므로 대부분 명시적 지정 불필요</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 코드 재사용: 하나의 함수 정의로 여러 타입에 대해 동작</text>
</svg>
