<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">use() 훅 — Promise &amp; Context 읽기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">React 19 신규 훅: 조건문 안에서도 사용 가능</text>

  <!-- Left column: before (useEffect pattern) -->
  <rect x="60" y="100" width="360" height="36" rx="8" fill="#2a1a0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Before — useEffect 패턴</text>

  <rect x="60" y="144" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> UserProfile(&#123; id &#125;) &#123;</text>
  <text x="76" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [user, setUser] = useState(<tspan fill="#b5cea8">null</tspan>);</text>
  <text x="76" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [loading, setLoading] = useState(<tspan fill="#b5cea8">true</tspan>);</text>
  <text x="76" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  useEffect(() =&gt; &#123;</text>
  <text x="76" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    fetchUser(id).then(u =&gt; &#123;</text>
  <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      setUser(u); setLoading(<tspan fill="#b5cea8">false</tspan>);</text>
  <text x="76" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &#125;);</text>
  <text x="76" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;, [id]);</text>
  <text x="76" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // loading/error 처리 + 렌더링...</text>

  <!-- Right column: after (use() pattern) -->
  <rect x="460" y="100" width="360" height="36" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">After — use() 패턴</text>

  <rect x="460" y="144" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Suspense + use() 조합</text>
  <text x="476" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> UserProfile(&#123; userPromise &#125;) &#123;</text>
  <text x="476" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#9aa4b8">// 조건문 안에서도 사용 가능!</tspan></text>
  <text x="476" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> user = use(userPromise);</text>
  <text x="476" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">h1</tspan>&gt;&#123;user.name&#125;&lt;/<tspan fill="#7ec8e3" font-weight="600">h1</tspan>&gt;;</text>
  <text x="476" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="476" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 부모에서:</text>
  <text x="476" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#7ec8e3" font-weight="600">Suspense</tspan> fallback=&#123;&lt;Spinner/&gt;&#125;&gt;</text>
  <text x="476" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &lt;<tspan fill="#7ec8e3" font-weight="600">UserProfile</tspan> userPromise=&#123;p&#125;/&gt;</text>

  <!-- Context reading section -->
  <rect x="60" y="348" width="760" height="36" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="371" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">use()로 Context 읽기 — 조건문 안에서도 OK</text>

  <rect x="60" y="392" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> Notification(&#123; show &#125;) &#123;</text>
  <text x="76" y="429" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!show) <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#b5cea8">null</tspan>;</text>
  <text x="76" y="447" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#9aa4b8">// useContext는 훅 규칙 위반이지만 use()는 괜찮음</tspan></text>
  <text x="76" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> theme = use(ThemeContext);</text>
  <text x="76" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">div</tspan> className=&#123;theme&#125;&gt;알림 메시지&lt;/<tspan fill="#7ec8e3" font-weight="600">div</tspan>&gt;; &#125;</text>
</svg>
