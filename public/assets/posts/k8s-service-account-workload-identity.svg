<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IRSA — IAM Roles for Service Accounts (AWS)</text>

  <!-- Pod -->
  <rect x="50" y="70" width="200" height="120" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pod</text>
  <text x="150" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SA: my-sa</text>
  <text x="150" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">annotation:</text>
  <text x="150" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">iam.amazonaws.com/role:</text>
  <text x="150" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">arn:aws:iam::ACCT:role/...</text>

  <!-- Arrow Pod → OIDC Provider -->
  <line x1="252" y1="130" x2="318" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="285" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">K8s JWT</text>
  <text x="285" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apache-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Token</text>

  <!-- OIDC Provider -->
  <rect x="320" y="86" width="200" height="88" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="420" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">K8s OIDC Endpoint</text>
  <text x="420" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JWKS (공개키) 노출</text>
  <text x="420" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">eks.amazonaws.com/v1/</text>
  <text x="420" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">oidc?cluster=...</text>

  <!-- Arrow OIDC → AWS STS -->
  <line x1="522" y1="130" x2="588" y2="130" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="555" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Token</text>
  <text x="555" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">교환</text>

  <!-- AWS STS -->
  <rect x="590" y="86" width="240" height="88" rx="8" fill="#1a1208" stroke="#5a3a1a" stroke-width="1.5"/>
  <text x="710" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">AWS STS</text>
  <text x="710" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AssumeRoleWithWebIdentity</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">JWT 검증 후 임시 자격증명 발급</text>
  <text x="710" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">AccessKey + SecretKey + Token</text>

  <!-- Arrow STS → App -->
  <line x1="710" y1="174" x2="710" y2="256" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- AWS Services -->
  <rect x="590" y="258" width="240" height="80" rx="8" fill="#1a1208" stroke="#5a3a1a" stroke-width="1.5"/>
  <text x="710" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">AWS Services</text>
  <text x="710" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">S3 / DynamoDB / Secrets Manager</text>
  <text x="710" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">IAM Role에 허용된 서비스만 접근</text>

  <!-- Arrow back to Pod -->
  <line x1="590" y1="298" x2="252" y2="298" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <line x1="150" y1="298" x2="150" y2="192" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <text x="400" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">AWS SDK 자동 인증 (환경변수 주입)</text>

  <!-- Setup info -->
  <rect x="50" y="320" width="520" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># ServiceAccount에 IAM Role 어노테이션</text>
  <text x="66" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">eks.amazonaws.com/role-arn: </text>
  <text x="66" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">                             arn:aws:iam::123:role/my-role</text>

  <!-- Bottom note -->
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">액세스 키/시크릿 없이 IAM 역할로 AWS 서비스 접근 — 보안 베스트 프랙티스</text>
</svg>
