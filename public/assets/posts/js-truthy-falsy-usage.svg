<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Truthy · Falsy 실전 활용 패턴</text>

  <!-- Code block left -->
  <rect x="60" y="62" width="380" height="340" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">일반적인 활용</text>

  <text x="76" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 존재 여부 확인
  </text>
  <text x="76" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (user) {</tspan><tspan fill="#9aa4b8"> /* user !== null/undefined */</tspan><tspan fill="#ffffff">}</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (!error) {</tspan><tspan fill="#9aa4b8"> /* 에러 없음 */</tspan><tspan fill="#ffffff">}</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기본값 설정
  </text>
  <text x="76" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> name </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> input </tspan><tspan fill="#7ec8e3">||</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'익명'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> port </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> env.PORT </tspan><tspan fill="#7ec8e3">??</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">3000</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="250" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 배열 요소 필터
  </text>
  <text x="76" y="268" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> arr </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> [</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="286" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.filter(Boolean); </tspan><tspan fill="#9aa4b8">// [1, 2]</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 단락 평가 패턴
  </text>
  <text x="76" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">user </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> user.isAdmin </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> showPanel();</tspan>
  </text>
  <text x="76" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">user?.isAdmin </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> showPanel();</tspan>
  </text>
  <text x="76" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JSX: 조건부 렌더링
  </text>
  <text x="76" y="412" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">{isLoading </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;Spinner /&gt;}</tspan>
  </text>

  <!-- Code block right: pitfalls -->
  <rect x="460" y="62" width="380" height="340" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">주의해야 할 패턴</text>

  <text x="476" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 0과 "" 도 falsy라서 생략될 수 있음
  </text>
  <text x="476" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> qty </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> cartItem.qty </tspan><tspan fill="#7ec8e3">||</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="476" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// qty가 0이면 1로 대체! 버그
  </text>
  <text x="476" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ ?? 로 null/undefined만 체크
  </text>
  <text x="476" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> qty </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> cartItem.qty </tspan><tspan fill="#7ec8e3">??</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="476" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 배열이 비어있는지 확인
  </text>
  <text x="476" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (!items) { ... } </tspan><tspan fill="#9aa4b8">// [] 는 truthy!</tspan>
  </text>
  <text x="476" y="250" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ 길이로 확인
  </text>
  <text x="476" y="268" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (items.length </tspan><tspan fill="#7ec8e3">===</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">) { ... }</tspan>
  </text>
  <text x="476" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ JSX에서 0이 렌더링
  </text>
  <text x="476" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">{count </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;List /&gt;}</tspan><tspan fill="#9aa4b8"> // 0이면 "0" 출력!</tspan>
  </text>
  <text x="476" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ 명시적 boolean
  </text>
  <text x="476" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">{count </tspan><tspan fill="#7ec8e3">&gt;</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;List /&gt;}</tspan>
  </text>
  <text x="476" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 또는: {!!count &amp;&amp; &lt;List /&gt;}
  </text>
  <text x="476" y="412" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 또는: {Boolean(count) &amp;&amp; &lt;List /&gt;}
  </text>

  <!-- Bottom -->
  <text x="440" y="418" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">핵심: || 는 모든 falsy를 건너뜀, ?? 는 null/undefined만 건너뜀</text>
</svg>
