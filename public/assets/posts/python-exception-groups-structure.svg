<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ExceptionGroup 구조 (Python 3.11+)</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr-eg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- ExceptionGroup root -->
  <rect x="260" y="65" width="360" height="56" rx="8" fill="#13102a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">ExceptionGroup("여러 오류 발생", [...])</text>
  <text x="440" y="111" text-anchor="middle" font-size="11" fill="#888">message + 예외 리스트를 함께 래핑</text>

  <!-- Lines to children -->
  <line x1="440" y1="121" x2="440" y2="145" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="160" y1="145" x2="720" y2="145" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="160" y1="145" x2="160" y2="165" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="440" y1="145" x2="440" y2="165" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="720" y1="145" x2="720" y2="165" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Child exceptions -->
  <rect x="60" y="165" width="200" height="56" rx="6" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">ValueError("입력 오류")</text>
  <text x="160" y="209" text-anchor="middle" font-size="11" fill="#888">첫 번째 예외</text>

  <rect x="340" y="165" width="200" height="56" rx="6" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">TypeError("타입 오류")</text>
  <text x="440" y="209" text-anchor="middle" font-size="11" fill="#888">두 번째 예외</text>

  <rect x="620" y="165" width="200" height="56" rx="6" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">RuntimeError("실행 오류")</text>
  <text x="720" y="209" text-anchor="middle" font-size="11" fill="#888">세 번째 예외</text>

  <!-- Code block: except* syntax -->
  <rect x="55" y="250" width="770" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># except* 로 타입별 분리 처리 (Python 3.11+)</text>
  <text x="75" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    async_task_runner()</text>
  <text x="75" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">* ValueError </text><text x="243" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="263" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> eg:</text>
  <text x="75" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_value_errors(eg.exceptions)</text>
</svg>
