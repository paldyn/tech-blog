<svg xmlns="http://www.w3.org/2000/svg" width="880" height="378" viewBox="0 0 880 378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="378" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Pending 단골 원인과 Events 메시지</text>
  <text x="50" y="80" font-size="14" fill="#888">FailedScheduling 문구가 어느 갈래인지 알려준다</text>

  <rect x="50" y="105" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="130" font-size="13" font-weight="600" fill="#ffffff">자원 부족 — Insufficient cpu / memory</text>
  <text x="66" y="151" font-size="12" fill="#9aa4b8">request를 수용할 노드가 없음. request 축소·노드 증설·오토스케일</text>

  <rect x="50" y="173" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="198" font-size="13" font-weight="600" fill="#ffffff">노드 셀렉터·어피니티 불일치 — didn't match node selector/affinity</text>
  <text x="66" y="219" font-size="12" fill="#9aa4b8">라벨 조건을 만족하는 노드가 없음. 라벨·셀렉터 재확인</text>

  <rect x="50" y="241" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="266" font-size="13" font-weight="600" fill="#ffffff">테인트 미허용 — had untolerated taint</text>
  <text x="66" y="287" font-size="12" fill="#9aa4b8">노드 테인트를 견디는 toleration이 없음. toleration 추가</text>

  <rect x="50" y="309" width="780" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="334" font-size="13" font-weight="600" fill="#ffffff">PVC 미바인딩 — pod has unbound immediate PersistentVolumeClaims</text>
  <text x="66" y="355" font-size="12" fill="#9aa4b8">볼륨이 묶이지 않음. StorageClass·프로비저너·접근 모드 점검</text>
</svg>
