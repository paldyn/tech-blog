<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">줄 단위 메모리 측정</text>

  <rect x="60" y="84" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Line #   Mem usage   Increment   Line Contents</text>
  <text xml:space="preserve" x="78" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     3    40.1 MiB    40.1 MiB   <tspan fill="#7ec8e3" font-weight="600">@profile</tspan></text>
  <text xml:space="preserve" x="78" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     4    40.1 MiB     0.0 MiB   def build():</text>
  <text xml:space="preserve" x="78" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     5   <tspan fill="#e05555">802.4 MiB  762.3 MiB</tspan>     data = [0] * 10**8</text>
  <text xml:space="preserve" x="78" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     6   802.4 MiB     0.0 MiB     return sum(data)</text>
  <text xml:space="preserve" x="78" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Increment이 큰 5번 줄이 메모리를 폭발시킨 지점</text>
</svg>
