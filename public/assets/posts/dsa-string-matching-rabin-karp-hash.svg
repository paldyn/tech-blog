<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">라빈-카프: 슬라이딩 윈도우 해시</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">텍스트 "abcdeabc", 패턴 "abc" — 해시값 이동으로 O(1) 갱신</text>

  <!-- Text chars -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">텍스트:</text>

  <rect x="134" y="90" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="158" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">a</text>
  <rect x="186" y="90" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="210" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">b</text>
  <rect x="238" y="90" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="262" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">c</text>
  <rect x="290" y="90" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="314" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">d</text>
  <rect x="342" y="90" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="366" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">e</text>
  <rect x="394" y="90" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="418" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">a</text>
  <rect x="446" y="90" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="470" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">b</text>
  <rect x="498" y="90" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="522" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">c</text>

  <!-- Sliding windows -->
  <!-- Window 1 -->
  <rect x="130" y="144" width="158" height="34" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" rx="4"/>
  <text x="209" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">hash(abc)</text>

  <!-- Window 2 -->
  <rect x="182" y="144" width="158" height="34" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" rx="4"/>
  <text x="261" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hash(bcd)</text>

  <!-- Window 3 -->
  <rect x="234" y="144" width="158" height="34" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" rx="4"/>
  <text x="313" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hash(cde)</text>

  <!-- Match window -->
  <rect x="390" y="144" width="158" height="34" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="4"/>
  <text x="469" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">hash(abc) ✓ 일치!</text>

  <!-- Rolling hash formula -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">롤링 해시 점화식</text>

  <rect x="60" y="220" width="460" height="96" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 초기 해시: 패턴 or 첫 윈도우</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">h = sum(ord(s[i]) * base^(m-1-i)) % mod</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 한 칸 이동: O(1)</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">new_h = (h - ord(remove)*h_first)*base + ord(add)</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">new_h %= mod</text>

  <!-- Hash match process -->
  <rect x="540" y="220" width="300" height="96" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="690" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">해시 매칭 과정</text>
  <text x="556" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1. 해시값 비교 (O(1))</text>
  <text x="556" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. 해시 일치 → 문자 직접 비교</text>
  <text x="556" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">   (해시 충돌 가능성 검증)</text>
  <text x="556" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3. 불일치 → 다음 윈도우</text>

  <!-- Spurious hit explanation -->
  <rect x="60" y="336" width="760" height="96" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="8"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">허위 양성(Spurious Hit)과 복잡도</text>
  <rect x="76" y="368" width="300" height="50" fill="#2a1a1a" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="226" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">해시 충돌: 해시 같지만 문자열 다름</text>
  <text x="226" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 문자 비교로 검증 필요 (O(m) 추가)</text>
  <rect x="396" y="368" width="408" height="50" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1" rx="4"/>
  <text x="600" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">큰 소수 mod 사용으로 충돌 확률 ≈ 1/mod</text>
  <text x="600" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">평균: O(n+m), 최악(모두 충돌): O(n·m)</text>
</svg>
