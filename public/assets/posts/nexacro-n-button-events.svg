<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Button 이벤트 처리 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">onclick 핸들러 + enable 제어 + 중복 클릭 방지</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="320" fill="#070b14" rx="6" stroke="#1e2433"/>

  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 저장 버튼 — 중복 클릭 방지 패턴</text>
  <text x="80" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="151" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> btn_save_onclick(obj, e) {</text>
  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 처리 중 버튼 비활성화</text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  this.btn_save.set_enable(</tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  this.btn_save.set_text(</tspan><tspan fill="#ce9178">"저장 중..."</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  this.transaction(</text>
  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    "save"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"SVC:saveData"</tspan></text>

  <text x="80" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    , </tspan><tspan fill="#ce9178">"in:ds_input"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"fn_saveCallback"</tspan></text>

  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  );</text>
  <text x="80" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="80" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="151" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fn_saveCallback(sId, nEC, sEM) {</text>
  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  // 완료 후 버튼 복원</text>
  <text x="80" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  this.btn_save.set_enable(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  this.btn_save.set_text(</tspan><tspan fill="#ce9178">"저장"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#e8e8e8"> (nEC == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">) alert(</tspan><tspan fill="#ce9178">"저장 완료"</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
</svg>
